notes:
  pharmacopoeia_status: "No WHO or Commission E monographs identified for H. erinaceus. Included in Chinese Pharmacopoeia; widely used in traditional Chinese medicine, Japanese Kampo medicine, and Korean traditional medicine."

  standardization_challenges: "Significant variation in erinacine A content across strains (Liu 2024). Standardization methods using HPLC, LC-MS/MS established but not universally applied in commercial products."

  dosing_summary: |
    Clinical trials used varied doses:
    - Cognitive impairment: 3,000 mg/day (96% dry powder) for 16 weeks (Mori 2009)
    - Early Alzheimer's: 1,050 mg/day mycelia (5 mg/g erinacine A) for 49 weeks (Li 2020)
    - Acute cognitive effects: 1,800 mg single dose (Docherty 2023) to 3,000 mg single dose (Surendran 2025)
    - Mood/anxiety: Cookies containing H. erinaceus for 4 weeks (Nagano 2010, dose not specified)

  bioavailability_summary: |
    - Erinacine A: 24.39% absolute bioavailability (Tsai 2021)
    - Erinacine S: 15.13% absolute bioavailability (Hu 2019)
    - Both compounds cross blood-brain barrier
    - Peak brain concentrations at 8 hours post-oral dose

  safety_summary: |
    - NOAEL >3,000 mg/kg/day in 28-day rat study (Li 2014)
    - NOAEL ≥2,625 mg/kg/day in 13-week rat study (Lee 2019)
    - NOAEL 2,000 mg/kg/day for β-glucan extract in 90-day study (Chen 2022)
    - Generally recognized as safe; no hepatotoxicity (LiverTox 2024)
    - Main adverse effects: mild GI symptoms (<10% subjects), rare hypersensitivity

  research_gaps: |
    - Limited large-scale clinical trials
    - Need for standardization of extraction methods
    - Pharmacokinetics in humans not fully elucidated
    - Active constituents beyond erinacines and hericenones not fully identified (Mori 2008)
    - Optimal dosing and treatment duration require further investigation
    - Meta-analyses limited by incomplete reporting in existing studies (Menon 2025)
    - Lack of standardized testing methods for bioactive compounds
    - Most mycelium products grown on grain substrates; difficult to separate from fillers
    - Need for minimum effective concentrations of erinacines, hericenones, and polysaccharides
    - Long-term safety data beyond 49 weeks needed

  compound_comparison: |
    Fruiting body vs. Mycelium:
    - Fruiting body: Rich in hericenones (<20 to 500 µg/g dry weight)
    - Mycelium: Rich in erinacines (~150 µg/g)
    - Both contain β-glucan polysaccharides (beta 1-3, 1-6 glucan)
    - Erinacines show greater NGF secretion in bioassays than hericenones
    - Both compound types are low molecular weight and can cross blood-brain barrier
    - Erinacine A bioavailability (24.39%) higher than Erinacine S (15.13%)
    - Peak brain concentrations for erinacines occur at 8 hours post-oral dose
