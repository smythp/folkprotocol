individual_herbs_mechanisms:
  cholinergic_enhancers:
    - id: bacopa_monnieri_mechanism
      herb: Bacopa monnieri
      common_names: ["Brahmi", "Water hyssop"]
      primary_mechanisms:
        - mechanism: "Acetylcholinesterase inhibition"
          detail: "Inhibits enzyme that breaks down acetylcholine, increasing ACh availability"
          neurotransmitter: acetylcholine
        - mechanism: "Choline acetyltransferase activation"
          detail: "Activates enzyme that promotes acetylcholine synthesis"
          neurotransmitter: acetylcholine
        - mechanism: "Enhanced synaptic transmission"
        - mechanism: "BDNF enhancement"
      cognitive_domains:
        - Delayed word recall (effect size: 0.95)
        - Working memory
        - Attention (in ADHD populations)
        - Mental control
        - Logical memory
      clinical_evidence:
        - "Significant improvement at 8 and 12 weeks in mental control, logical memory, paired association learning"
        - "93% reduction in restlessness in ADHD children"
        - "89% improvement in self-control in ADHD children"
      dosage_clinical: "300-600 mg daily (standardized to 50% bacosides)"
      sources:
        - "https://pmc.ncbi.nlm.nih.gov/articles/PMC8363108/"
        - "https://trygraymatter.com/blogs/science/5-adaptogenic-herbs-ashwagandha-bacopa-to-calm-the-adhd-brain"

    - id: melissa_officinalis_mechanism
      herb: Melissa officinalis
      common_names: ["Lemon balm"]
      primary_mechanisms:
        - mechanism: "GABA transaminase inhibition"
          detail: "Rosmarinic acid inhibits enzyme that degrades GABA, increasing GABA levels"
          neurotransmitter: GABA
          key_compound: "Rosmarinic acid (40% inhibition at 100 μg/mL)"
        - mechanism: "GABA receptor binding"
          detail: "Rosmarinic acid and other compounds directly bind to GABAA receptors"
        - mechanism: "Acetylcholinesterase inhibition"
          detail: "Both rosmarinic acid and terpenoids inhibit AChE, increasing acetylcholine"
          neurotransmitter: acetylcholine
      cognitive_effects:
        - "Increases calmness, memory, and alertness under mental stress"
        - "Anxiolytic and anti-depressant properties"
        - "Sleep quality enhancement"
      sources:
        - "https://pmc.ncbi.nlm.nih.gov/articles/PMC11510126/"
        - "https://pubmed.ncbi.nlm.nih.gov/19165747/"

    - id: ginkgo_biloba_egb761
      herb: Ginkgo biloba
      standardized_extract: "EGb 761"
      composition: "24% flavonoid glycosides, 6% terpene lactones"
      primary_mechanisms:
        - mechanism: "Cerebral blood flow enhancement"
          detail: "Promotes nitric oxide production, dilates cerebral vessels"
          onset: "Dose-related response lasting at least 6 days"
        - mechanism: "Antioxidant and free radical scavenging"
          detail: "Both flavonoid and ginkgolide components reduce ROS and inhibit lipid peroxidation"
        - mechanism: "Mitochondrial protection"
          detail: "Prevents mitochondrial DNA oxidation, stabilizes membranes"
        - mechanism: "Neurogenesis and synaptogenesis"
        - mechanism: "Neurotransmission improvement"
        - mechanism: "High-affinity choline uptake enhancement"
      cognitive_effects:
        - "Improved cognition in mild cognitive impairment and dementia"
        - "Enhanced memory, executive function, cognitive flexibility (in combination with Cistanche)"
      dosage_clinical: "240 mg EGb 761 daily (single dose)"
      safety_limit: "Maximum 240 mg daily for acceptable pharmacokinetic interactions"
      sources:
        - "https://pubmed.ncbi.nlm.nih.gov/11475535/"
        - "https://www.mdpi.com/1424-8247/14/4/305"

