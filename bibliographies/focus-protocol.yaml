  compiled_date: 2026-01-15
  herbs_covered: 15

systematic_reviews_meta_analyses:
  - id: frontiers_2025_natural_extracts
    title: "Effects of natural extracts in cognitive function of healthy adults: a systematic review and network meta-analysis"
    journal: Frontiers in Pharmacology
    year: 2025
    pubmed_url: "https://www.frontiersin.org/journals/pharmacology/articles/10.3389/fphar.2025.1573034/full"
    study_type: network_meta_analysis
    studies_included: 27
    total_participants: 2334
    natural_extracts_tested: 19
    key_findings:
      overall_cognition:
        - metric: best_performer
          result: "Polygala tenuifolia Willdenow roots (RPTW)"
          interpretation: "Greatest improvement in overall cognition"
        - metric: attention_domain
          result: "No extracts significantly outperformed placebo"
          interpretation: "Limited evidence for attention-specific benefits"
      attention_specific:
        - metric: best_for_attention
          result: "1500 mg MP (Polygonum odoratum and Morus alba)"
          sucra_value: 83.4
          ranking: "First among tested natural products"
      memory_executive_function:
        - metric: best_performer
          result: "Cistanche tubulosa + Ginkgo biloba combination (CG)"
          domains: ["Memory", "Executive function", "Cognitive flexibility"]
      conclusion: "Combination formulas showed superior effects; attention domain remains challenging target"

  - id: kew_2022_adhd_phytotherapy
    title: "Phytotherapy for Attention Deficit Hyperactivity Disorder (ADHD): A Systematic Review and Meta-analysis"
    journal: Frontiers in Pharmacology
    year: 2022
    pubmed_id: "35592415"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/35592415/"
    pmc_url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC9110892/"
    study_type: systematic_review_meta_analysis
    trials_included: 7
    population: "Children and adolescents with ADHD"
    key_findings:
      efficacy_rating:
        - herb: Melissa officinalis
          efficacy: "Fair indication"
          safety: "Safe"
        - herb: Bacopa monnieri
          efficacy: "Fair indication"
          safety: "Safe"
        - herb: Matricaria chamomilla
          efficacy: "Fair indication"
          safety: "Safe"
        - herb: Valeriana officinalis
          efficacy: "Fair indication"
          safety: "Safe"
        - herb: Ginkgo biloba
          efficacy: "Limited evidence"
        - herb: Pine bark extract
          efficacy: "Limited evidence"
      conclusion: "Fair indication for several herbs in ADHD management; safety profile favorable"

  - id: hu_2023_theanine
    title: "Promising, but Not Completely Conclusive—The Effect of l-Theanine on Cognitive Performance Based on the Systematic Review and Meta-Analysis"
    journal: Journal of Clinical Medicine
    year: 2024
    volume: 14
    issue: 21
    pages: 7710
    url: "https://www.mdpi.com/2077-0383/14/21/7710"
    study_type: systematic_review_meta_analysis
    databases_searched: "Through July 2024"
    population: "Healthy adults"
    key_findings:
      cognitive_effects: "Promising evidence for cognitive enhancement"
      attention: "Positive trends in attention measures"
      combination_synergy: "Enhanced effects when combined with caffeine"
      conclusion: "Promising but not completely conclusive evidence"

  - id: poolsup_2021_cognitive_aging
    title: "A systematic review of the safety and efficacy on cognitive function of herbal and nutritional medicines in older adults with and without subjective cognitive impairment"
    journal: Systematic Reviews
    year: 2023
    doi: "10.1186/s13643-023-02301-6"
    pubmed_url: "https://link.springer.com/article/10.1186/s13643-023-02301-6"
    study_type: systematic_review
    population: "Older adults with and without subjective cognitive impairment"
    key_findings:
      bacopa_monnieri: "Evidence for memory enhancement"
      ginkgo_biloba: "Mixed evidence; benefits in specific formulations"
      combination_formulas: "Polyherbal formulas showed promise"
      safety: "Generally safe with mild side effects"

head_to_head_comparative_studies:
  - id: stough_2013_bacopa_vs_modafinil
    title: "Cognitive effects of two nutraceuticals Ginseng and Bacopa benchmarked against modafinil"
    journal: Psychopharmacology
    year: 2013
    pmc_url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC3575939/"
    study_type: comparative_review_effect_sizes
    comparison_groups:
      - Bacopa monnieri
      - Panax ginseng
      - Modafinil (pharmaceutical reference)
    key_findings:
      bacopa_effect_sizes:
        - metric: delayed_word_recall
          effect_size: 0.95
          interpretation: "Largest effect observed"
        - metric: consistency
          result: "Most consistent and largest effect size across verbal and auditory learning tasks"
      ginseng_effect_sizes:
        - metric: simple_reaction_time
          effect_size: 0.86
          interpretation: "Highest effect for ginseng"
      conclusion: "Bacopa produced most consistent and largest cognitive effects"

  - id: scholey_2010_bacopa_ginkgo
    title: "Effects of a combined extract of Ginkgo biloba and Bacopa monniera on cognitive function in healthy humans"
    journal: Human Psychopharmacology
    year: 2004
    pubmed_id: "14994318"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/14994318/"
    study_type: randomized_controlled_trial
    design: double_blind_placebo_controlled_crossover
    sample_size: 85
    duration: "4 weeks"
    intervention:
      ginkgo_dose: "120 mg"
      bacopa_dose: "300 mg"
      combined_daily_dose: "120 mg Ginkgo + 300 mg Bacopa"
    key_findings:
      result: "No significant cognitive enhancing effects at this dose and duration"
      interpretation: "Combination may require higher doses or longer duration"

