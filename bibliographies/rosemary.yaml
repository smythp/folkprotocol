      - "Ursolic acid"
      - "Betulinic acid"
    other:
      - "Rosmanol"

  standardized_extracts:
    - "Rosemary extract standardized to 20% carnosic acid (commercial products)"
    - "Combined carnosic acid and carnosol content up to 33%"
    - "Rosmarinic acid 2.5-5 mg per capsule (clinical trials)"
    - "Diterpenes (carnosic acid + carnosol) 4-8 mg per dose (clinical trials)"

