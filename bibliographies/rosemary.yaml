# ACTIVE CONSTITUENTS AND STANDARDIZATION

phytochemistry:
  primary_active_compounds:
    phenolic_diterpenes:
      - compound: "Carnosic acid"
        content_dried_leaf: "1.5-2.5%"
        standardization_levels: "Up to 20% in extracts (commonly standardized level)"
        bioavailability: "40.1% at 360 min (rat study); 65.09% absolute (alternate study)"
        notes: "Primary antioxidant; higher bioavailability than rosmarinic acid due to increased glucuronidation"
      - compound: "Carnosol"
        content: "Present in rosemary extracts"
        notes: "Acts through different mechanisms than carnosic acid"
    phenolic_acids:
      - compound: "Rosmarinic acid"
        content_dried_plant: "21.13 ± 0.56 mg/g (from Azizi 2022 study)"
        metabolism: "Metabolized by gut microflora into simple phenolic units"
        elimination: "Primarily renal excretion"
        notes: "Lower bioavailability than carnosic acid"
