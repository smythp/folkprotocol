# SAFETY DATA

safety_profile:
  general_safety: "Generally recognized as safe at normal culinary and therapeutic doses"

  no_observed_adverse_effect_level:
    - study: "13-week repeated oral dose toxicity in rats"
      noael: ">4000 mg/kg/day in both sexes (rosemary concentrate with 50% ursolic acid)"
      reference: "Cited in toxicity reviews"

  clinical_trial_adverse_events:
    - trial: "Kuwata 2025 (high-dose safety study)"
      dose: "25 mg rosmarinic acid + 40 mg diterpenes daily"
      duration: "4 weeks"
      sample: "22 adults"
      findings: "No clinically relevant adverse events or abnormal laboratory findings"

    - trial: "Draelos 2025 (skin quality)"
      sample: "104 women"
      duration: "12 weeks"
      findings: "Well tolerated; one participant discontinued due to moderate GI upset possibly related to treatment; six possibly related transient GI events, all resolved"

    - trial: "Lin 2024 meta-analysis (ginger, but relevant for comparison)"
      finding: "Only 2.8% of patients experienced dizziness with herbal treatment"

  contraindications_and_warnings:
    high_chronic_doses:
      - "Hepatorenal effects: atrophic/degenerative changes, elevated BUN and liver enzymes"
      - "Reproductive toxicity: decreased spermatogenesis, testosterone, sperm density/motility"
      - "Genotoxicity and teratology: DNA fragmentation, apoptotic bodies, fetal anomalies"

    allergic_reactions:
      - "Contact dermatitis from prolonged topical application"
      - "Hypersensitivity reactions to essential oil compounds"
      - "Rare cases of anaphylaxis reported"

    pregnancy_lactation: "Caution warranted; see HMPC monograph section 4.6"

    scalp_application: "May cause itching (less than minoxidil 2%)"

  drug_interactions: "Not extensively documented in provided studies; consult comprehensive resources"

