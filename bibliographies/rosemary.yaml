# NOTES

notes:
  - "Taxonomy update: Rosmarinus officinalis L. has been reclassified as Salvia rosmarinus Spenn. in recent phylogenetic analysis"
  - "Active constituents responsible for biological activity: phenolic diterpenes (carnosic acid, carnosol), phenolic acids (rosmarinic acid), and triterpenes (ursolic acid, betulinic acid)"
  - "Dose-response relationship: Lower doses (750 mg) beneficial for cognition; very high doses (6000 mg) showed impairing effects"
  - "Bioavailability hierarchy: Carnosic acid has higher oral bioavailability than rosmarinic acid due to increased glucuronidation"
  - "Primary metabolism: Gut microflora metabolize rosmarinic acid into simpler phenolic units"
  - "Elimination routes: Rosmarinic acid primarily renal; carnosic acid primarily fecal"
  - "Standardization: Commercial extracts commonly standardized to 20% carnosic acid; clinical trials used various formulations"
  - "Safety emphasis: Generally safe at normal doses; caution with chronic/high doses due to organ toxicity and reproductive effects"
  - "Research gaps: More human studies needed for immunity claims; long-term safety data limited for high-dose chronic use"
