# ── Regulatory Monographs and Pharmacopoeia ──────────────────────────────────

regulatory_documents:
  - authority: "World Health Organization (WHO)"
    status: "No WHO monograph published for pau d'arco / Handroanthus impetiginosus / Tabebuia impetiginosa as of 2026-03-06"
    note: >
      WHO Monographs on Selected Medicinal Plants (Volumes 1–4, 1999–2009) do not include
      pau d'arco. Widespread traditional use and commercial prominence have not been
