  # ── Safety / Toxicology Studies ─────────────────────────────────────────────

  - id: lemos_2012_genotoxicity
    title: "Genotoxic effects of Tabebuia impetiginosa (Mart. Ex DC.) Standl. (Lamiales, Bignoniaceae) extract in Wistar rats"
    authors:
      - Lemos OA
      - Sanches JCM
      - Silva ÍEF
      - Silva MLA
      - Vinhólis AHC
      - Felix MAP
      - Santos RA
      - Cecchi AO
    year: 2012
    journal: Genetics and Molecular Biology
    volume: 35
    issue: 2
    pages: "498-502"
    doi: 10.1590/S1415-47572012005000030
    pmid: 22888300
    pmcid: PMC3389539
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/22888300/
    study_type: In Vivo Genotoxicity Study (Animal)
    animal_model: Wistar rats
    method: "Alkaline comet assay (single-cell gel electrophoresis) in blood and liver cells"
    key_findings:
      - "100 mg/kg: no significant DNA damage vs negative control"
      - "300 mg/kg: significant increase in DNA damage vs negative control"
      - "500 mg/kg: highest genotoxic response; dose-dependent relationship confirmed"
      - "DNA damage index in liver at 500 mg/kg: 230.6 (vs 46.3 in negative control)"
      - "Liver cells showed substantially higher DNA damage than blood cells at 500 mg/kg"
    conclusion: "T. impetiginosa extract is genotoxic in rats at doses ≥300 mg/kg; no genotoxicity at 100 mg/kg"
    notes: >
      Rat oral dose of 100 mg/kg approximates human doses when allometrically scaled.
      The single human trial dose (1050 mg/day in ~70 kg adult ≈ 15 mg/kg) falls well below
      the genotoxic threshold identified here. No human genotoxicity data exist.

