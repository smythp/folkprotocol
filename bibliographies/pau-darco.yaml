  - id: mcclure_2022_dysmenorrhea
    title: "Safety and tolerability of Pau d'Arco (Tabebuia avellanedae) for primary dysmenorrhea: A single-arm, open-label trial on adults ages 18–45"
    authors:
      - McClure C
      - Bollen M
      - Buttolph L
      - Stack E
      - Langley BO
      - Hanes D
      - Wright KM
