    volume: 9
    issue: 3
    pages: "159-166"
    doi: 10.1016/j.aimed.2022.04.003
    pmid: 36960315
    pmcid: PMC10032363
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/36960315/
    study_type: Single-Arm Open-Label Pilot Trial
    design: "Uncontrolled prospective safety/tolerability; no comparator arm"
    sample_size: 12  # 9 completers (75% completion)
    population: "Healthy women ages 18–45 with primary dysmenorrhea"
    intervention: "Encapsulated Tabebuia avellanedae 1050 mg/day for 8 weeks"
    key_findings:
      - "75% of completers (9/12) experienced adverse events; none FDA-classified as serious"
      - "Pain intensity: significant decrease at first dose (p<0.01), 4 weeks (p<0.01), 8 weeks (p<0.01)"
      - "Pain interference, quality of life, sexual function: nonsignificant trend toward improvement"
      - "Laboratory markers (prothrombin time, CBC, hepatic/renal panels): most within normal range; few mild clinically insignificant abnormalities"
      - "No serious adverse events; no clinically significant coagulation changes"
    conclusion: "Generally safe with moderate tolerability; significant pain reduction—pilot data only (no control group)"
    limitations:
      - "No control group; no blinding"
      - "Extremely small sample (n=12; 9 completers)"
      - "Preparation not standardized for naphthoquinone content"
      - "8-week follow-up only; no long-term safety data"
    notes: "First (and only as of 2026) published human clinical trial of pau d'arco for a primary traditional indication"

