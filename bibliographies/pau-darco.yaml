  - id: block_1974_lapachol_phase1
    title: "Early clinical studies with lapachol (NSC-11905)"
    authors:
      - Block JB
      - Serpick AA
      - Miller W
      - Wiernik PH
    year: 1974
    journal: Cancer Chemotherapy Reports Part 2
    volume: 4
    issue: 4
    pages: "27-28"
    pmid: 4614904
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/4614904/
    study_type: NCI Phase I Clinical Trial
    compound: "Lapachol (NSC-11905) — primary naphthoquinone from pau d'arco"
    design: "NCI phase I dose-escalation study"
    population: "Cancer patients including chronic myelocytic leukemia"
    key_findings:
      - "Therapeutic blood levels of lapachol could not be achieved without unacceptable toxicity"
      - "Primary toxicities: nausea, vomiting, anti-vitamin K activity (anticoagulant effect)"
      - "Mechanism: inhibition of vitamin K epoxide reductase and vitamin K quinone reductase (similar to warfarin)"
      - "IND (Investigational New Drug) status closed by NCI 1970"
      - "Concentrations required for antitumor efficacy produce unacceptable toxicity"
    conclusion: "Lapachol terminated from clinical development; no antitumor response demonstrated; anticoagulant risk is key safety concern"
    significance: "Only published Phase I human data on lapachol; establishes anticoagulant risk as primary safety concern for high-dose naphthoquinone exposure"

