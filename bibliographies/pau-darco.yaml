# ── Dosing and Standardization ───────────────────────────────────────────────

dosing_summary:
  clinical_trial_doses:
    - condition: "Primary dysmenorrhea"
      dose: "1050 mg/day encapsulated Tabebuia avellanedae bark"
      duration: "8 weeks"
      source: mcclure_2022_dysmenorrhea
      notes: "Preparation not standardized for naphthoquinone content"

    - condition: "Oral mucositis prophylaxis (head and neck radiotherapy)"
      dose: "Orasol Plus lapacho-based solution three times daily"
      duration: "Duration of radiotherapy course"
      source: giacomelli_2015_mucositis
      notes: "Multi-ingredient product; lapacho content not standardized or specified"

  traditional_dosing:
    - preparation: "Bark decoction (inner bark, traditional South American)"
      dose_range: "2–4 g dried bark per cup"
      frequency: "One to three cups daily"
      notes: "Traditional preparation; low naphthoquinone bioavailability expected from aqueous extraction"

    - preparation: "Standardized encapsulated extract"
      dose_range: "1050 mg/day (from McClure et al. 2022 dysmenorrhea trial)"
      notes: "Only human trial dose; naphthoquinone content not reported"

  standardization:
    marker_compounds:
      - name: "Lapachol (2-hydroxy-3-(3-methyl-2-butenyl)-1,4-naphthoquinone)"
        role: "Primary naphthoquinone; historical antitumor interest; anticoagulant risk at high doses"
        notes: "No standardization benchmarks established for commercial botanical preparations"

      - name: "Beta-lapachone"
        role: "Primary anti-tumor naphthoquinone; NQO1 bioactivatable; developed as isolated drug ARQ 501/761"
        notes: "Content in botanical preparations not standardized"

    quality_concerns:
      - "Commercial products show high inter-product variability in naphthoquinone content (Gómez Castellanos 2009)"
      - "Species identity often mislabeled in commerce (T. impetiginosa, T. avellanedae, H. impetiginosus used interchangeably)"
      - "Lapachol is poorly water-soluble; traditional aqueous decoctions likely deliver very low naphthoquinone doses"
      - "Commercial pills and syrups show dramatically reduced bioactivity vs methanolic extracts in vitro (Pires et al. 2015)"

# ── Safety Profile Summary ───────────────────────────────────────────────────

safety:
  overall: "Thin human safety data; no serious adverse events in the one small pilot trial (n=9, 8 weeks)"

  human_trial_safety:
    - "McClure 2022 (n=9 completers, 1050 mg/day, 8 weeks): 75% mild AE rate; no serious AEs; no clinically significant coagulation changes"
    - "Giacomelli 2015 (n=40, lapacho-based solution): well tolerated; no serious AEs related to product"

  anticoagulant_risk:
    - "Lapachol inhibits vitamin K epoxide reductase (warfarin-like mechanism); NCI Phase I terminated for this toxicity"
    - "Whole-bark tea may partially compensate via co-occurring pro-vitamin K compounds (Gómez Castellanos 2009)"
    - "Clinical magnitude of anticoagulant effect at botanical doses uncharacterized in humans"

  genotoxicity:
    - "Genotoxic in rats at ≥300 mg/kg by comet assay (Lemos 2012); no effect at 100 mg/kg"
    - "Human dose of 1050 mg/day (~15 mg/kg in 70 kg adult) falls below rat genotoxic threshold"
    - "No human genotoxicity data exist"

  contraindications:
    - Pregnancy (fetotoxic in animal studies)
    - Concurrent anticoagulant/antiplatelet therapy
    - Immunosuppressed patients should use with caution (IL-2-independent T-cell suppression documented)

  drug_interactions:
    - "Anticoagulants (warfarin, heparin, NSAIDs): additive bleeding risk; mechanism: vitamin K antagonism by lapachol"
    - "Immunosuppressants: theoretical additive immunosuppression (aqueous extract IL-2-independent T-cell suppression)"

# ── Key Research Gaps ────────────────────────────────────────────────────────

research_needs:
  - "No RCTs for any pau d'arco preparation for any indication as of 2026-03-06"
  - "No human pharmacokinetic studies for whole-bark extract or constituent bioavailability"
  - "No dose-finding studies for whole-herb preparation in humans"
  - "No standardized extract definition (marker compound and % content)"
  - "No long-term human safety studies (>8 weeks)"
  - "No human genotoxicity data"
  - "Drug interaction studies with anticoagulants in humans absent"
  - "Lapachol anticoagulant risk at botanical doses uncharacterized in humans"

notes: |
  This bibliography covers all published human clinical evidence for pau d'arco (Handroanthus
  impetiginosus / Tabebuia impetiginosa / T. avellanedae) as of 2026-03-06. Key points:

  1. Evidence base is extremely thin: two small single-arm human trials only; no RCTs.
  2. Isolated constituent trials (lapachol, ARQ 501/761) are included as the only human
     PK/safety data for the primary active compound class; they are NOT equivalent to
     the botanical.
  3. No regulatory monograph from any major authority (WHO, Commission E, EMA/HMPC,
     ESCOP, AHP, USP) has been published for this herb.
  4. Standardization of commercial preparations is a significant unsolved problem;
     naphthoquinone content is highly variable and largely uncharacterized.
  5. Anticoagulant interaction potential via lapachol/vitamin K antagonism is the
     primary safety concern supported by mechanistic data.
  6. Traditional decoction doses appear below the rat genotoxic threshold; no human
     genotoxicity data exist.

