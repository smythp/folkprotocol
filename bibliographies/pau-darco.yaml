---
herb: "Pau d'Arco"
botanical_names:
  - "Handroanthus impetiginosus (Mart. ex DC.) Mattos"
  - "Tabebuia impetiginosa (Mart. ex DC.) Standl."
  - "Tabebuia avellanedae Lorentz ex Griseb."
last_updated: 2026-03-06

notes_on_scope: >
  Pau d'arco has a rich South American ethnobotanical tradition and generated intense
  pharmaceutical interest from the 1960s onward. Two clinical directions developed in
  parallel: (1) isolated constituent lapachol/beta-lapachone as anticancer drug candidates
  through NCI and private sector pipelines; (2) inner-bark preparations as traditional
  whole-herb supplements. The human clinical evidence base is very thin: no completed RCTs
  exist for the herb itself. Only one single-arm safety trial (n=12, 2022) and one Phase II
  single-arm mucositis study (n=40, 2015) represent published human trials with standardized
  preparations. Lapachol failed NCI Phase I (1974) due to anticoagulant toxicity.
  Synthetic beta-lapachone analogues (ARQ 501/761) reached Phase I/II as cancer drugs but
  are not equivalent to the botanical. No WHO monograph, Commission E positive assessment,
  EMA/HMPC assessment, or ESCOP monograph has been published for pau d'arco.

