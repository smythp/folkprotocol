key_takeaways:
  strongest_evidence:
    - "Upper respiratory tract infections (7000+ participants across 33 RCTs)"
    - "Safety profile (13 studies meta-analysis: serious AEs 0.02/1000 patients)"

  emerging_applications:
    - "Ulcerative colitis (HMPL-004 1800mg: 60% response vs 40% placebo, p=0.0183)"
    - "Osteoarthritis pain (ParActin 300-600mg: significant WOMAC improvement)"
    - "Multiple sclerosis fatigue (44% FSS reduction at 12 months)"
    - "Rheumatoid arthritis (significant joint count and functional improvement)"

  pharmacokinetic_insights:
    - "Poor oral bioavailability (~1.19% in rats); non-linear dose-proportionality"
    - "Tmax 1.5-2 hours; half-life 6.6 hours"
    - "Bioavailability enhanced 131-196% with β-cyclodextrin or SDS"
    - "Glucuronidation primary metabolic pathway"

  safety_considerations:
    - "Herbal preparations essentially safe (mild GI and skin reactions)"
    - "Injectable andrographolide derivatives: 4.04% ADR rate, 55 anaphylactic shocks, 3 deaths"
    - "Contraindicated in pregnancy (animal abortifacient data) and lactation"
    - "No hepatotoxicity in clinical trials; hepatoprotective in animal studies"

  dosing_guidance:
    - "URTI: 48-60mg andrographolides/day divided doses"
    - "COVID-19: 180-360mg andrographolide/day (limited benefit)"
    - "Ulcerative colitis: HMPL-004 1800mg/day most effective"
    - "Osteoarthritis: ParActin 300-600mg/day"
    - "MS fatigue: 340mg/day dried extract"

  quality_standards:
    - "Standardize to 30% total andrographolides (typical)"
    - "Monitor 4 biomarkers: andrographolide, andrograpanin, neo-andrographolide, 14-deoxy-11,12-didehydroandrographolide"
    - "USP specification: 14-deoxy-11,12-didehydroandrographolide ≤15% of total diterpene lactones"
