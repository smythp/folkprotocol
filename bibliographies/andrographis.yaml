bioavailability_notes:
  - "Andrographolide exhibits poor oral bioavailability (~1.19% in rats)"
  - "Non-linear dose-proportionality: doubling dose does not double blood levels"
  - "Peak plasma levels reached at 1.5-2 hours post-administration"
  - "Half-life: approximately 6.6 hours in humans"
  - "Bioavailability can be enhanced 131-196% with β-cyclodextrin or SDS solubilizers"
  - "Plasma protein binding: 55% (rat studies)"
  - "Low water solubility limits bioavailability"

safety_summary:
  general_safety: "Herbal preparations generally safe; adverse events mild and infrequent"
  serious_adverse_events: "Extremely rare (0.02 per 1000 patients from RCT meta-analysis)"
  common_mild_effects:
    - "Gastrointestinal disorders (most common)"
    - "Skin reactions (mild, transient)"
    - "Mild diarrhea (resolves within days)"

  injectable_derivatives:
    caution: "Andrographolide derivative injections carry risk of life-threatening reactions"
    serious_reactions:
      - "55 cases anaphylactic shock"
      - "3 deaths attributed to injections"
      - "Overall ADR rate 4.04% for injectable forms"
    recommendation: "Avoid injectable forms; use oral herbal preparations"

  contraindications:
    - "Pregnancy"
    - "Lactation"

  special_warnings:
    - "Nephrotoxicity concerns noted in comprehensive reviews (easily ignored clinical issue)"
    - "Reproductive toxicity concerns (easily ignored clinical issue)"
    - "One anaphylactic reaction reported in HIV trial (interrupted at 6 weeks)"

  high_dose_safety:
    - "Doses up to 360 mg/day andrographolide tolerated without serious adverse events"
    - "Adverse events at high doses: mild intensity, infrequent, reversible"
    - "No hepatic or renal toxicity in COVID-19 trials at 180 mg/day for 5 days"
    - "4.2g/day crude herb for 3 days: all clinical parameters remained normal"

