research_gaps:
  - "Current extensive clinical data lack sufficient rigor and documented details"
  - "Poor study quality and heterogeneity in many trials limit confidence"
  - "Need for larger, higher-quality RCTs with standardized preparations"
  - "Long-term safety data needed, especially regarding nephrotoxicity and reproductive effects"
  - "Mechanism studies needed to understand non-linear bioavailability"
  - "Optimal extraction methods and formulations for enhanced bioavailability"
  - "Dose-response relationships need further clarification"

notes:
  - "Andrographis paniculata is official in WHO Volume 2 monograph (2002) and USP"
  - "No Commission E monograph exists (herb not traditionally used in German phytotherapy)"
  - "Primary traditional use: upper respiratory infections, supported by modern clinical evidence"
  - "Safety profile favors oral herbal preparations over injectable derivative forms"
  - "Standardization to andrographolide content (typically 30%) improves quality consistency"
  - "Poor bioavailability remains significant challenge; formulation strategies under investigation"
  - "Most robust evidence for: URTI symptom relief, anti-inflammatory effects"
  - "Emerging evidence for: rheumatoid arthritis, ulcerative colitis, osteoarthritis, MS fatigue"
  - "COVID-19 studies show limited clinical benefit but good safety profile"
  - "Non-linear bioavailability: doubling dose does not proportionally increase plasma levels"
  - "Traditional use in Ayurveda (Kalmegh) and Traditional Chinese Medicine (Chuan Xin Lian)"
  - "Animal studies show hepatoprotective rather than hepatotoxic properties"
  - "Contraindicated in pregnancy due to abortifacient effects in animal studies"
  - "Main bioactive: andrographolide (diterpenoid lactone); secondary: 14-deoxyandrographolide, neoandrographolide"

