regulatory_monographs:
  - id: who_2002
    title: "WHO monographs on selected medicinal plants, Volume 2 - Herba Andrographidis"
    organization: World Health Organization
    year: 2002
    type: regulatory_monograph
    location: Geneva, Switzerland
    definition: "Dried aerial parts of Andrographis paniculata (Burm. f.) Nees (Acanthaceae)"
    traditional_uses_clinical_data_supported:
      - Prophylaxis and symptomatic treatment of upper respiratory infections (common cold)
      - Uncomplicated sinusitis, bronchitis, and pharyngotonsillitis
      - Lower urinary tract infections
      - Acute diarrhea
    dosage_recommendations:
      - condition: pyrexia
        dose: "3g crude drug decoction, twice daily"
      - condition: common_cold
        dose: "1.5-3.0g powdered crude drug three times daily, after meals and at bedtime"
      - condition: diarrhea
        dose: "3-9g crude drug decoction as single dose as needed, or two 500mg tablets four times daily after meals"
    contraindications:
      - Pregnancy
      - Lactation
    url: "https://www.ethnopharmacologia.org/bibliotheque-ethnopharmacologie/who-monographs-on-selected-medicinal-plants-volume-2/"
    isbn: "9789241545372"
    notes: "Approved by 120+ experts in 50+ countries; includes pharmacopoeial quality assurance and clinical applications"

