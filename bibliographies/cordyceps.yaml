# Cordyceps Bibliography
# Compiled from PubMed clinical studies, systematic reviews, and pharmacopoeia entries
# Focus: dosing, bioavailability, safety, standardized extracts

meta:
  species:
    primary: Cordyceps sinensis (Berk.) Sacc. / Ophiocordyceps sinensis
    secondary: Cordyceps militaris (L.) Fr.
  common_names:
    - Dong Chong Xia Cao (冬虫夏草)
    - Winter Worm Summer Grass
    - Caterpillar Fungus
    - Yarsagumba (Tibetan)
  family: Ophiocordycipitaceae
  compiled_date: 2026-01-15

regulatory_monographs:
  - id: chinese_pharmacopoeia_1964
    title: "Chinese Pharmacopoeia - Cordyceps sinensis (Dong Chong Xia Cao)"
    organization: Chinese Pharmacopoeia Commission
    year: 1964
    type: regulatory_monograph
    status: "Official herbal drug since 1964"
    definition: "Dried fungus-larva complex of Ophiocordyceps sinensis infecting Hepialus larvae"
    traditional_properties:
      taste: sweet
      nature: neutral
      meridians: "Lung and Kidney"
    traditional_uses:
      - "Replenish kidney (补肾)"
      - "Soothe lung (润肺)"
      - "Stop bleeding (止血)"
      - "Eliminate phlegm (化痰)"
    clinical_applications:
      - "Fatigue and weakness"
      - "Chronic cough"
      - "Hyposexuality"
      - "Asthenia after severe illness"
      - "Renal dysfunction and renal failure"
    url: "https://www.ncbi.nlm.nih.gov/books/NBK92758/"
    notes: "Only Cordyceps sinensis officially recorded in Chinese Pharmacopoeia; wild yield decreased >90% in past 25 years; price reached ~US$25,000/kg in 2007"

  - id: commission_e_status
    title: "Commission E Monograph Status"
    organization: German Commission E
    type: regulatory_note
    status: "No monograph published"
    notes: "Commission E did not evaluate Cordyceps species; primarily assessed herbs used in German phytotherapy; Cordyceps is primarily an Asian medicinal fungus"

  - id: who_status
    title: "WHO Monograph Status"
    organization: World Health Organization
    type: regulatory_note
    status: "No specific WHO monograph found"
    notes: "No official WHO monograph identified for Cordyceps sinensis or C. militaris as of 2025; primarily documented in Chinese traditional medicine sources"

