      - Baseline
      - 2 weeks post-start
      - Immediately post-intervention
      - 2 weeks post-completion
    key_findings: "After intervention, sleep quality in treatment group significantly better than controls (P<0.05)"
    safety: "Can be used as safe modality for promoting elderly sleep; no detailed adverse events reported"

