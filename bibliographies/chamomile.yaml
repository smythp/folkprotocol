# Randomized Controlled Trials - Generalized Anxiety Disorder
rct_generalized_anxiety:
  - title: "Long-term chamomile (Matricaria chamomilla L.) treatment for generalized anxiety disorder: A randomized clinical trial"
    authors:
      - Jun J Mao
      - Sharon X Xie
      - John R Keefe
      - Irene Soeller
      - Qing S Li
      - Jay D Amsterdam
    year: 2016
    pmid: 27912875
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/27912875/
    study_design: "Two-phase RCT: open-label Phase 1, double-blind placebo-substitution Phase 2"
    sample_size:
      enrolled: 179
      phase1_completers_responders: 93
      phase2_randomized: 93
      phase2_chamomile: 46
      phase2_placebo: 47
    dosing:
      amount: "1500 mg daily"
      formulation: "500 mg capsules, three times daily"
      phase1_duration: "12 weeks"
      phase2_duration: "26 weeks"
    extract_standardization: "Pharmaceutical grade extract with HPLC fingerprinting confirming apigenin-7-glucoside and 7-methoxycoumarin"
    primary_outcome: "Time to symptom relapse (Cox proportional hazards)"
    key_findings:
      relapse_rate_chamomile: "15.2% (7/46)"
      relapse_rate_placebo: "25.5% (12/47)"
      mean_time_to_relapse_chamomile: "11.4 ± 8.4 weeks"
      mean_time_to_relapse_placebo: "6.3 ± 3.9 weeks"
      hazard_ratio: "0.52 (95% CI, 0.20-1.33; P=0.16) - non-significant"
    safety: "Both treatments had similar low adverse event rates"

  - title: "A randomized, double-blind, placebo-controlled trial of oral Matricaria recutita (chamomile) extract therapy for generalized anxiety disorder"
    authors:
      - Jay D Amsterdam
      - Yimei Li
      - Irene Soeller
      - Kenneth Rockwell
      - Jun James Mao
      - Justine Shults
    year: 2009
    pmid: 19593179
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/19593179/
    study_design: "Randomized, double-blind, placebo-controlled trial"
    sample_size:
      enrolled: 61
      randomized: 57
      chamomile: 28
      placebo: 29
    duration: "8 weeks"
    dosing_notes: "Specific mg/day not provided in abstract"
    primary_outcome: "Hamilton Anxiety Rating (HAM-A) scores"
    key_findings:
      ham_a: "Significantly greater reduction in mean total HAM-A score during chamomile vs placebo (P = 0.047)"
      response_50_percent: "Positive trend for 50%+ reduction in baseline HAM-A scores"
    secondary_outcomes:
      - Beck Anxiety Inventory
      - Psychological Well Being scores
      - Clinical Global Impression Severity scores
    adverse_events: "One patient per group discontinued due to AEs; no significant difference in AE frequency (P = 0.417)"
    significance: "First controlled clinical trial of chamomile extract for GAD; modest anxiolytic activity in mild-moderate GAD"

  - title: "Short-term open-label chamomile (Matricaria chamomilla L.) therapy of moderate to severe generalized anxiety disorder"
    authors:
      - John R Keefe
      - Jun J Mao
      - Irene Soeller
      - Qing S Li
      - Jay D Amsterdam
    year: 2016
    pmid: 27912871
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/27912871/
    study_design: "Open-label phase of RCT"
    sample_size: 179 subjects with moderate-severe GAD
    dosing: "1500 mg/day pharmaceutical-grade chamomile extract"
    duration: "Up to 8 weeks"
    key_findings:
      response_rate: "58.1% met clinical response criteria"
      gad7_change: "β=-8.4 (95% CI=-9.1 to -7.7) - significant improvement"
      secondary_measures: "Statistically significant and clinically meaningful reductions across HAM-A, Beck Anxiety Inventory, Psychological General Well Being Index"
    safety:
      treatment_emergent_aes: "11.7% of subjects"
      serious_aes: "None"
      premature_discontinuation: "15.6%"
    conclusion: "Meaningful symptom reduction comparable to conventional anxiolytic medications with favorable safety profile"

