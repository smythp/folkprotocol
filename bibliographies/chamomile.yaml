# Notes and Caveats
notes:
  - "Standardization to 1.2% apigenin is common in clinical trials"
  - "Pharmaceutical-grade extracts with HPLC fingerprinting provide highest quality control"
  - "European Pharmacopoeia requires ≥4 mL/kg blue essential oil"
  - "Essential oil content varies widely (0.24-2.0%) based on growing conditions and processing"
  - "Over 120 chemical constituents identified; synergistic effects likely"
  - "Traditional use basis for EMA approval; more RCT data needed for some indications"
  - "Quality control remains concern in commercial dietary supplements"
  - "Allergic reactions possible, especially in Asteraceae-sensitive individuals"
  - "Topical preparations carry higher sensitization risk than oral preparations"
  - "Most clinical trials show favorable safety profile comparable to placebo"
  - "Dose ranges vary significantly by indication: 270-1500 mg/day oral extracts"
  - "Traditional tea preparation (~3g flowers) differs from standardized extract dosing"
  - "More toxicity and long-term safety studies recommended"
  - "Mechanism of action includes anti-inflammatory, anti-spasmodic, anxiolytic, and hormonal modulation effects"
  - "Listed in 26 country pharmacopeias; WHO, Commission E, and ESCOP monographs available"
