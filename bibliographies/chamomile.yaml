---
herb: Chamomile (Matricaria chamomilla / Matricaria recutita)
last_updated: 2026-01-08

# Official Monographs and Pharmacopoeia
official_monographs:
  - source: European Medicines Agency (EMA)
    type: European Union Herbal Monograph
    title: "Matricariae flos (Chamomile flower)"
    year: 2015
    url: https://www.ema.europa.eu/en/medicines/herbal/matricariae-flos
    indications:
      - Minor gastro-intestinal complaints (bloating, minor spasms)
      - Relief of common cold symptoms
      - Minor oral and throat ulcers/inflammations
      - Skin irritation, sunburn, superficial wounds, minor boils
      - Irritation of genital and anal areas (after medical evaluation)
    age_recommendation: "Adults and adolescents (above 12 years); some preparations for children under 12"
    contraindications:
      - Allergy to Matricaria or Asteraceae family plants
      - Severe cardiac/circulatory conditions (full baths)
      - Open wounds, extensive skin damage, acute skin disease (baths)
      - High fever, severe infections (baths)
    adverse_effects: "Allergic reactions, sometimes severe, reported following contact with liquid preparations; frequency undetermined"
    evidence_basis: "Traditional use (30+ years documented, ≥15 years in EU)"

  - source: World Health Organization (WHO)
    type: Monograph
    title: "Flos chamomillae"
    publication: "WHO Monographs on Selected Medicinal Plants"
    year: 1999
    publisher: "World Health Organization, Geneva"
    content_notes: "Provides common names, botanical/microscopic descriptions, specifications for essential oil, purity tests (microbes, pesticides, heavy metals), uses supported by clinical data"
    drug_definition: "Dry flowering heads of C. recutita (L.) Rauschert (synonyms: M. chamomilla, M. recutita L., M. suaveolens)"

  - source: German Commission E
    type: Monograph
    title: "Matricariae flos"
    preparation_method: "Pour 150 mL boiling water over heaped tablespoon (~3 g) flower heads, steep covered 5-10 min before straining"
    main_constituents: "(-)-α-bisabolol or (-)-α-bisabololoxides A and B in essential oil"
    recognition: "Listed in 26 country pharmacopeias (Germany, Belgium, France, UK); mentioned in ESCOP monographs"

  - source: European Pharmacopoeia
    type: Quality Standard
    essential_oil_requirement: "≥4 mL/kg blue essential oil"

  - source: US FDA
    type: Recognition Status
    status: "Generally Recognized as Safe (GRAS)"
    category: "Spice, seasoning, or flavoring agent in food"

  - source: Alternative Medicine Review
    type: Monograph
    title: "Matricaria chamomilla (German chamomile). Monograph"
    journal: Alternative Medicine Review
    year: 2008
    volume: 13
    issue: 1
    pages: "58-62"
    pmid: 18377104
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/18377104/
    notes: "Full abstract not available on PubMed"

# Chemical Constituents and Standardization
chemical_profile:
  total_constituents: ">120 constituents identified"
  essential_oil_content: "0.24-2.0% of dried flowers"
  essential_oil_color: "Blue"
  key_essential_oil_components:
    - name: "(-)-α-bisabolol"
      percentage: "Part of 50-65% of total volatile oil"
    - name: "Chamazulene"
      percentage: "Part of 50-65% of total volatile oil"
    - name: "Bisabolone oxide A"
    - name: "β-farnesene"

  flavonoids:
    total_content: "Up to 8% flavone glycosides"
    key_compounds:
      - name: "Apigenin 7-glucoside (apigenin-7-O-glucoside)"
        role: "Primary marker compound for standardization"
      - name: "Apigenin 7-glucoside 6'-acetyl derivative"
      - name: "Luteolin glucosides"
      - name: "Quercetin glycosides"

  other_constituents:
