      content: "Up to 10%"
    - name: "Coumarins"
      content: "~0.1%"
    - name: "Choline"
      content: "Up to 0.3%"
    - name: "Phenolic acids"
    - name: "Organic acids"
    - name: "Terpenes"

  standardization_marker: "Apigenin content (typically 1.2%)"

# Systematic Reviews and Meta-Analyses
systematic_reviews:
  - title: "Therapeutic efficacy and safety of chamomile for state anxiety, generalized anxiety disorder, insomnia, and sleep quality: A systematic review and meta-analysis of randomized trials and quasi-randomized trials"
    authors:
      - Truong Hong Hieu
      - Mahmoud Dibas
      - Kadek Agus Surya Dila
      - Nourin Ali Sherif
      - Muhammad Usman Hashmi
      - Mostafa Mahmoud
      - Nguyen Thi Thuy Trang
      - Lava Abdullah
      - Thai Le Ba Nghia
      - Mai Nhu Y
      - Kenji Hirayama
      - Nguyen Tien Huy
    year: 2019
    pmid: 31006899
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/31006899/
    study_type: Systematic review and meta-analysis
    trials_included: 12 RCTs
    conditions: "State anxiety, generalized anxiety disorder, insomnia, sleep quality"
    key_findings:
      sleep_quality:
        result: "Significant improvement"
        statistic: "SMD -0.73 (95% CI [-1.23, -0.23], P < 0.005)"
      generalized_anxiety_disorder:
        scale: HAM-A
        week_2: "MD = -1.43, P = 0.007"
        week_4: "MD = -1.79, P = 0.0097"
      state_anxiety: "Three trials showed no significant difference"
      insomnia: "One trial found no change in insomnia severity"
    safety: "Mild adverse events reported by only 3 RCTs; favorable safety profile"

  - title: "Effects of chamomile (Matricaria chamomilla L.) on sleep: A systematic review and meta-analysis of clinical trials"
    authors:
      - Asma Kazemi
      - Sara Shojaei-Zarghani
      - Parham Eskandarzadeh
      - Mohammad Hashem Hashempur
    year: 2024
    pmid: 39106912
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/39106912/
    study_type: Systematic review and meta-analysis
    trials_included: 10 clinical trials
    sample_size: 772 participants
    key_findings:
      psqi_score:
        result: "Significant reduction"
        statistic: "WMD: -1.88 (95% CI: -3.46, -0.31)"
        studies: 5
      sleep_onset: "Improved in 3 of 4 studies"
      awakenings: "Improved number of awakenings in 2 of 3 studies"
      no_effect_on:
        - Sleep duration
        - Sleep efficiency percentage
        - Daytime functioning measures
    safety: "No adverse events reported in any studies"

  - title: "Anti-inflammatory effect of chamomile from randomized clinical trials: a systematic review and meta-analyses"
    authors:
      - Jason Valmy
      - Stephanie Greenfield
      - Satoru Shindo
      - Toshihisa Kawai
      - Jorge Cervantes
      - Bo-Young Hong
    year: 2025
    pmid: 40665590
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/40665590/
    study_type: Systematic review and meta-analysis
    trials_included: 11 RCTs
    key_findings:
      pain_reduction:
        result: "Statistically significant"
        statistic: "Pooled MD -0.61 (95% CI: -0.76 to -0.46)"
      mucosal_inflammation:
        result: "Statistically significant reduction"
        statistic: "Pooled MD -0.70 (95% CI: -1.25 to -0.15)"
      pain_bleeding_combined:
        result: "Non-significant"
        statistic: "Pooled MD -1.57"
      antimicrobial:
        result: "No significant effect"
        statistic: "Pooled MD -3.90"
    conclusion: "Low-risk antimicrobial and anti-inflammatory agent; warrants larger future studies"

  - title: "The effect of chamomile consumption on glycemic markers in humans and animals: a systematic review and meta-analysis"
    authors:
      - Akhgarjand C
      - Moludi J
      - Ebrahimi-Mousavi S
      - Bagheri A
      - Ghorbani Bavani N
      - Beigmohammadi MT
      - Malekahmadi M
    year: 2024
    pmid: 38932814
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/38932814/
    study_type: Systematic review and meta-analysis
    human_rcts: 4
    animal_studies: 8
    key_findings:
      fasting_blood_glucose_humans:
        result: "Favorable effect"
        statistic: "SMD -0.65 (95% CI: -1.00 to -0.29, p<0.001)"
      hba1c_humans:
        result: "Favorable effect"
        statistic: "SMD -0.90 (95% CI: -1.39 to -0.40, p<0.001)"
      blood_glucose_animals:
        statistic: "SMD -4.37 (95% CI: -5.76 to -2.98, p<0.001)"
      dose_response_animals: "Each 100 mg/d increase lowered glucose ~54.35 mg/dL (p<0.001)"
