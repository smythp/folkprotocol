# RCTs - Sleep and Insomnia
rct_sleep:
  - title: "Preliminary examination of the efficacy and safety of a standardized chamomile extract for chronic primary insomnia: a randomized placebo-controlled pilot study"
    authors:
      - Suzanna M Zick
      - Benjamin D Wright
      - Ananda Sen
      - J Todd Arnedt
    year: 2011
    pmid: 21939549
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/21939549/
    study_design: "Randomized, double-blind, placebo-controlled pilot trial"
    sample_size: 34 patients (ages 18-65) with DSM-IV primary insomnia
    dosing: "270 mg chamomile extract twice daily (540 mg/day total)"
    duration: "28 days"
    primary_outcomes: "No significant differences in total sleep time, sleep efficiency, sleep latency, wake after sleep onset, sleep quality, number of awakenings"
    secondary_outcomes: "Modest advantage on daytime functioning (not statistically significant); small-to-moderate effect sizes; moderate favorable effects on sleep latency and fatigue severity"
    safety: "No differences in adverse events between chamomile and placebo groups"

  - title: "The effects of chamomile extract on sleep quality among elderly people: A clinical trial"
    authors:
      - Mohsen Adib-Hajbaghery
      - Seyedeh Nesa Mousavi
    year: 2017
    pmid: 29154054
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/29154054/
    study_design: "Single-blind randomized controlled trial"
    sample_size: 60 elderly participants (aged 60+)
    dosing: "200 mg chamomile extract capsules twice daily (400 mg/day)"
    duration: "28 consecutive days"
