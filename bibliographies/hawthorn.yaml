# Standardization and Quality Control

standardization:
  primary_markers: "Oligomeric procyanidins (OPC)"
  ws1442_specification:
    extract_ratio: "4-6.6:1 (leaves with flowers)"
    extraction_solvent: "Ethanol 45% (w/w)"
    standardization_range: "17.3-20.1% oligomeric procyanidins"
  li132_specification:
    extraction_solvent: "Methanolic extract"
    standardization: "2.2% flavonoids"
  regulatory_standards:
    european_pharmacopoeia: "Requires oligomeric procyanidins content standardization"
    analytical_methods: "UHPLC with fluorimetric detection, ICH-Q2 validated"
    procyanidin_range: "DP 2-10 plus polymer fraction"

# Dosing Information from Clinical Studies

clinical_dosing:
  heart_failure:
    ws1442:
      - "450 mg twice daily (900 mg/day)"
      - "900 mg/day for 24 months (SPICE trial)"
    li132:
      - "600 mg daily (3 dragées)"
      - "160-1800 mg daily range across studies"
  duration:
    minimum_effective: "12 weeks for blood pressure effects"
    typical_trials: "8 weeks to 6 months"
    long_term_studies: "Up to 24 months"
  onset: "Slow-acting herb requiring at least 4-8 weeks for full benefit"

# Traditional Uses

traditional_uses:
  primary: "Cardiovascular support"
  historical:
    - Heart failure
    - Hypertension
    - Indigestion
    - Dysmenorrhea
    - Osteoporosis
  parts_used:
    - "Leaf with flower (most studied and approved)"
    - "Berries (traditional use)"
    - "Individual leaves or flowers (limited support)"

# Summary of Evidence Quality

evidence_summary:
  systematic_reviews: 4
  meta_analyses: 2
  large_rcts: "2 (SPICE n=2681, HERB CHF n=120)"
  total_patients_safety: ">7,000 across multiple studies"
  regulatory_approvals:
    - "German Commission E (1978)"
    - "European Medicines Agency"
  pharmacopoeias: "British, American, European, WHO"

  key_conclusions:
    efficacy:
      - "Benefit demonstrated in older trials and meta-analyses for NYHA I-II heart failure"
      - "Recent HERB CHF trial (2009) showed no benefit with contemporary standard therapy"
      - "SPICE trial showed no significant benefit on primary endpoint but subgroup benefits"
      - "Blood pressure reduction in mild hypertension with ≥12 weeks treatment"
    safety:
      - "Very favorable safety profile"
      - "Well-tolerated in studies up to 24 months"
      - "Adverse events infrequent, mild to moderate"
      - "No drug interactions observed in trials"
      - "No reproductive toxicity in animal studies at 56x human dose"
    bioavailability:
      - "Epicatechin absorbed in parent form (10.9% extract, 34.2% pure compound)"
      - "Most flavonoids have limited oral bioavailability"
      - "Vitexin-2''-O-rhamnoside: high permeability, passive diffusion, 3.57% bioavailability"
      - "P-glycoprotein efflux affects absorption"
    standardization:
      - "Oligomeric procyanidins are primary active markers"
      - "WS 1442 and LI 132 are well-characterized extracts"
      - "European Pharmacopoeia requires OPC standardization"
      - "337 chemical compounds identified as of 2023"

# Research Gaps Identified

research_gaps:
  - "Efficacy in context of contemporary evidence-based heart failure therapy unclear"
  - "Optimal effective dosage not fully established"
  - "Correlation between traditional uses (indigestion, dysmenorrhea, osteoporosis) and modern pharmacology insufficient"
  - "Need for more studies on blood pressure effects with adequate sample sizes"
  - "Human pharmacokinetic studies needed to verify safety interpretations from animal studies"

