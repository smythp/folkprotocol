    adverse_events: "None in either group"

  # Pharmacokinetic Studies

  - id: chang2005
    type: pharmacokinetic-study
    title: "Comparison of the pharmacokinetics of hawthorn phenolics in extract versus individual pure compound"
    authors:
      - Chang Q
      - Zuo Z
      - Ho WKK
      - Chow MSS
    journal: Journal of Clinical Pharmacology
    year: 2005
    volume: 45
    issue: 1
    pages: 106-112
    pubmed_id: 15601812
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/15601812/
    animal_model: "Male Sprague-Dawley rats (n=5 per group)"
    compounds_tested:
      - "(-)-Epicatechin"
      - "Chlorogenic acid"
      - "Hyperoside"
      - "Isoquercitrin"
    administration_routes:
      - Oral
      - Intravenous
    key_findings:
      oral:
        - "Only epicatechin was absorbed from either extract or pure compound"
        - "Pharmacokinetics generally not significantly different between extract and pure compound"
      intravenous:
        - "Extract formulation produced higher plasma concentrations"
        - "Larger area under curve"
        - "Longer elimination half-life"
        - "Smaller volume of distribution"
        - "Lower total body clearance compared to pure compounds"
      mechanism: "Co-occurring components in hawthorn phenolic extract affect systemic behavior"

  - id: zuo2006
    type: absorption-study
    title: "Intestinal absorption of hawthorn flavonoids--in vitro, in situ and in vivo correlations"
    authors:
      - Zuo Z
      - Zhang L
      - Zhou L
      - Chang Q
      - Chow M
    journal: Life Sciences
    year: 2006
    volume: 79
    issue: 26
    pages: 2455-2462
    pubmed_id: 16989871
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/16989871/
    study_methods:
      in_vitro: "Caco-2 monolayer cell model"
      in_situ: "Rat intestinal perfusion model"
      in_vivo: "Pharmacokinetic studies in Sprague-Dawley rats"
    compounds_studied:
      - Hyperoside
      - Isoquercitrin
      - Epicatechin
    key_findings:
      permeability: "All three flavonoids have quite limited permeabilities"
      absorption: "Epicatechin only compound detected in plasma after oral hawthorn extract"
      metabolism: "EC and isoquercitrin showed more extensive metabolism in in situ and in vivo vs Caco-2"
      interactions: "Co-occurring components in extract may not significantly affect intestinal absorption"

  - id: xu2008
    type: absorption-study
    title: "Assessment of intestinal absorption of vitexin-2''-O-rhamnoside in hawthorn leaves flavonoids in rat using in situ and in vitro absorption models"
    authors:
      - Xu YA
      - Fan G
      - Gao S
      - Hong Z
    journal: Drug Development and Industrial Pharmacy
    year: 2008
    volume: 34
    issue: 2
    pages: 164-170
    pubmed_id: 18302035
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/18302035/
    animal_model: Rat
    compound: "Vitexin-2''-O-rhamnoside"
    permeability_classification: "High permeability class drug (per BCS)"
    effective_permeability:
      value: "(2.18 ± 0.48) to (2.48 ± 0.33) × 10⁻⁵ cm/s"
      location: "Rat jejunal perfusion"
      concentration_dependent: "Range tested"
    transport_mechanisms:
      primary: "Passive diffusion dominates absorptive transport"
      efflux: "Absorption and secretion mediated by P-glycoprotein (P-gp)"
      regional_variation: "No significant differences across intestinal segments (duodenum, jejunum, ileum, colon)"
      enhancement: "P-gp inhibitors (verapamil, digoxin) significantly enhanced absorption and permeability"

  # Safety and Toxicology Studies

  - id: yao2008
    type: reproductive-toxicity-study
    title: "A reproductive screening test of hawthorn"
    authors:
      - Yao M
      - Ritchie HE
      - Brown-Woodman PD
    journal: Journal of Ethnopharmacology
    year: 2008
    volume: 118
    issue: 1
    pages: 127-132
    pubmed_id: 18485639
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/18485639/
    animal_model: "Pregnant rats"
    dosing:
      dose_level: "56 times the human dose"
      route: "Daily gavage"
      test_periods:
        - "GD 1-8 (early pregnancy)"
        - "GD 8-15 (organogenesis period)"
    evaluation:
      in_vivo: "Fetuses examined GD 20 for external, internal, skeletal malformations"
      in_vitro: "Rat embryos cultured with hawthorn extract for 26 hours"
    results: "Hawthorn did not have adverse effect on embryonic development in vivo or in vitro"
    interpretation: "Safety at recommended doses may be due to low bioavailability of some constituents when taken orally"
    recommendation: "Pharmacokinetic studies recommended to verify safety in humans"
    contraindication: "Clinically contraindicated in pregnancy (precautionary)"

