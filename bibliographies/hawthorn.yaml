    study_design: "Randomized, double-blind, placebo-controlled"
    sample_size: 143
    demographics:
      men: 72
      women: 71
      mean_age: "64.8 ± 8.0 years"
    treatment_arms:
      active: 69
      placebo: 74
    dosing:
