      - "Alleviated disabling symptoms"
      - "Improved health-related quality of life"
      - "Enhanced maximum workload vs placebo"
      - "Reduced von Zerssen Complaints scores"
      - "Improved Kansas City Cardiomyopathy Questionnaire metrics"
    safety:
      drug_interactions: "None observed"
      specific_adverse_reactions: "None known to date"
      profile: "Very favorable safety profile as monotherapy and add-on therapy"
    conclusion: "Benefit-risk assessment for WS 1442 is positive"

  # Randomized Controlled Trials

  - id: zick2009
    type: rct
    title: "Hawthorn Extract Randomized Blinded Chronic Heart Failure (HERB CHF) trial"
    acronym: HERB CHF
    authors:
      - Zick SM
      - Vautaw BM
      - Gillespie B
      - Aaronson KD
    journal: European Journal of Heart Failure
    year: 2009
    volume: 11
    issue: 10
    pages: 990-999
    pubmed_id: 19789403
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/19789403/
    pmc_url: https://pmc.ncbi.nlm.nih.gov/articles/PMC2754502/
    study_design: "Randomized, double-blind, placebo-controlled"
    sample_size: 120
    patient_population: "Ages ≥18 years with NYHA class II-III heart failure on standard medical therapy"
    dosing:
      compound: Hawthorn extract
      dose: "450 mg twice daily"
      duration: "6 months"
      comparison: Placebo
    primary_outcome:
      measure: "Change in 6-minute walk distance at 6 months"
      result: "No significant difference (P = 0.61)"
    secondary_outcomes:
      - "Quality of life: no significant differences"
      - "Functional capacity: no significant differences"
      - "Neurohormones: no significant differences"
      - "Oxidative stress: no significant differences"
      - "Inflammation: no significant differences"
      - "Modest improvement in LVEF favored hawthorn (P = 0.04)"
    adverse_events: "More adverse events in hawthorn group (P = 0.02), though most non-cardiac"
    conclusion: "Hawthorn provides no symptomatic or functional benefit when given with standard medical therapy"
    note: "Negative trial; represents contemporary evidence-based heart failure therapy context"

  - id: holubarsch2008
    type: rct
    title: "The efficacy and safety of Crataegus extract WS 1442 in patients with heart failure: the SPICE trial"
    acronym: SPICE
    full_name: "Survival and Prognosis: Investigation of Crataegus Extract WS 1442"
    authors:
      - Holubarsch CJF
      - Colucci WS
      - Meinertz T
      - Gaus W
      - Tendera M
    journal: European Journal of Heart Failure
    year: 2008
    volume: 10
    issue: 12
    pages: 1255-1263
    pubmed_id: 19019730
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/19019730/
    protocol_pmid: 11113721
    study_design: "Randomized, double-blind, placebo-controlled, multicenter"
    sample_size: 2681
    patient_population: "NYHA class II or III heart failure with LVEF ≤35%"
    treatment_arms:
      active: 1338
      placebo: 1343
    dosing:
      compound: "Crataegus Special Extract WS 1442"
      dose: "900 mg/day"
      standardization: "84.3 mg oligomeric procyanidins"
      duration: "24 months"
    primary_endpoint:
      measure: "Time to first cardiac event"
      ws1442_result: "620 days average; 27.9% event rate"
      placebo_result: "606 days average; 28.9% event rate"
      hazard_ratio: "0.95 (95% CI: 0.82-1.10)"
      p_value: 0.476
      significance: "Not statistically significant"
    secondary_findings:
      - "Cardiac mortality trended lower with WS 1442 (9.7% at month 24) but not significant (p=0.269)"
      - "In patients with LVEF ≥25%, WS 1442 reduced sudden cardiac death by 39.7% (HR 0.59; p=0.025)"
    safety: "Adverse events comparable in both groups"

  - id: degenring2003
    type: rct
    title: "A randomised double blind placebo controlled clinical trial of a standardised extract of fresh Crataegus berries (Crataegisan) in the treatment of patients with congestive heart failure NYHA II"
    authors:
