herb: Hawthorn (Crataegus spp.)
scientific_names:
  - Crataegus oxyacantha
  - Crataegus monogyna
  - Crataegus laevigata
  - Crataegus pinnatifida

sources:
  # Systematic Reviews and Meta-Analyses

  - id: pittler2003
    type: meta-analysis
    title: "Hawthorn extract for treating chronic heart failure: meta-analysis of randomized trials"
    authors:
      - Pittler MH
      - Schmidt K
      - Ernst E
    journal: American Journal of Medicine
    year: 2003
    volume: 114
    issue: 8
    pages: 665-674
    pubmed_id: 12798455
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/12798455/
    study_details:
      trials_included: 13
      trials_analyzed: 8
      total_patients: 632
      patient_population: "Chronic heart failure NYHA classes I-III"
    key_findings:
      - "Maximal workload increased by weighted mean of 7 Watts (95% CI: 3-11 Watts; P < 0.01; n=310)"
      - "Pressure-heart rate product decreased by weighted mean of -20 (95% CI: -32 to -8; n=264)"
      - "Dyspnea and fatigue improved significantly with hawthorn treatment vs placebo"
      - "Adverse events infrequent, mild, and transient (nausea, dizziness, GI complaints)"
    conclusion: "Significant benefit from hawthorn extract as adjunctive treatment for chronic heart failure"

  - id: daniele2006
    type: systematic-review
    title: "Adverse-event profile of Crataegus spp.: a systematic review"
    authors:
      - Daniele C
      - Mazzanti G
      - Pittler MH
      - Ernst E
    journal: Drug Safety
    year: 2006
    volume: 29
    issue: 6
    pages: 523-535
    pubmed_id: 16752934
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/16752934/
    study_details:
      trials_analyzed: 24
      total_patients: 5577
      duration_range: "3 to 24 weeks"
      dose_range: "160-1800 mg daily"
    adverse_events:
      gastrointestinal: 24
      dizziness_vertigo: 15
      palpitations: 11
      headache: 9
      migraine: 8
      total_events: 166
      severity: "Mostly mild to moderate; 8 severe events with LI 132 extract"
    conclusion: "Hawthorn is well tolerated; some severe adverse events reported suggest further studies needed"

  - id: cloud2020
    type: systematic-review
    title: "The effect of hawthorn (Crataegus spp.) on blood pressure: A systematic review"
    authors:
      - Cloud AME
      - Vilcins D
      - McEwen BJ
    journal: Advances in Integrative Medicine
    year: 2020
    volume: 7
    issue: 3
    pages: 167-175
    key_findings:
      - "Hawthorn can significantly lower blood pressure in people with mild hypertension"
      - "Minimum treatment duration of 12 weeks required for effect"
      - "Studies were few and too heterogeneous to allow meta-analysis"
    databases_searched: "AMED, CINAHL, EMBASE, PubMed, Cochrane Central"
    search_date: "Up to September 2016"

  - id: szikora2025
