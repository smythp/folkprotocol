        cmax_improvement: "15.8 ± 2.6 vs 1.67 ± 0.41 ng/mL"
        overall_absorption: "Approximately six-fold superior to standard berberine"
        solubility: "Aqueous solubility increased 1.4-fold"
        permeability: "Caco-2 cell: 7.18 × 10⁻⁵ vs 4.93 × 10⁻⁶ cm/s"
        safety: "No adverse reactions reported"

