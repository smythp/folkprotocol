# PHARMACOKINETICS AND BIOAVAILABILITY

pharmacokinetics:

  bioavailability_review:
    - id: liu_2016
      title: "Research progress on berberine with a special focus on its oral bioavailability"
      authors: "Chang-Shun Liu, Yu-Rong Zheng, Ying-Feng Zhang, Xiao-Ying Long"
