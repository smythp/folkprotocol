      year: 2008
      pubmed_id: "18442638"
      pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/18442638/"
      study_type: "Randomized controlled trial (two studies)"
      sample_size: "Study A: 36 newly diagnosed T2D; Study B: 48 poorly controlled T2D"
      dose: "0.5 g three times daily (total 1.5 g/day)"
      duration: "3 months"
      comparison: "Study A: berberine vs metformin"
      key_findings:
        study_a_hba1c: "Decreased from 9.5% to 7.5% (P<0.01)"
        study_a_fbg: "Reduced from 10.6 to 6.9 mmol/L (P<0.01)"
