      year: 2016
      pubmed_id: "26851175"
      pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/26851175/"
      study_type: "Review"
      key_findings:
        poor_bioavailability: "Oral delivery challenged by poor bioavailability (<1%)"
        absolute_bioavailability: "0.37% in animal studies"
        limiting_factors:
          - "Poor solubility"
          - "Low permeability"
          - "P-glycoprotein (P-gp) efflux"
          - "Hepatic-intestinal metabolism"
        main_barrier: "Intestinal first-pass effect"
      conclusion: "Considerable challenges due to poor oral bioavailability; need for improved formulations"

  enhanced_formulation:
