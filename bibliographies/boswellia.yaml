      evidence_level: "Strong (multiple RCTs and meta-analyses)"
      typical_outcomes: "Pain reduction 40-60%, function improvement 40-70%"

    - condition: "Ulcerative colitis"
      evidence_level: "Moderate (RCT showing 82% remission rate)"
      comparator: "Similar to sulfasalazine (75% remission)"

    - condition: "Bronchial asthma"
      evidence_level: "Moderate (RCT showing 70% improvement rate)"
      typical_outcomes: "Improved FEV₁, FVC, PEFR; reduced attack frequency"

    - condition: "Peritumoral brain edema"
      evidence_level: "Moderate (RCT showing 60% with >75% edema reduction)"
      regulatory: "EU orphan drug designation (2002)"

  emerging:
    - condition: "Crohn's disease"
      evidence_level: "Limited (one negative RCT for maintenance therapy)"
      notes: "Good safety profile but lack of efficacy for maintaining remission"

    - condition: "Rheumatoid arthritis"
      evidence_level: "Preliminary (preclinical and pilot studies)"
      notes: "Promising anti-inflammatory effects but limited clinical trial data"

active_compounds:
  primary_boswellic_acids:
    - "11-keto-β-boswellic acid (KBA)"
    - "3-acetyl-11-keto-β-boswellic acid (AKBA)"
    - "β-boswellic acid (BBA)"
    - "α-boswellic acid (αBA)"
    - "Acetyl-β-boswellic acid (AβBA)"
    - "Acetyl-α-boswellic acid (AαBA)"

  marker_compounds:
    quality_control:
      - "KBA (European Pharmacopoeia, Indian Pharmacopoeia)"
      - "AKBA (European Pharmacopoeia, Indian Pharmacopoeia)"

    standardization_targets:
      - "20% AKBA (Aflapin®)"
      - "30% AKBA (Boswellin®)"

mechanisms_of_action:
  anti_inflammatory:
    - "Inhibition of microsomal prostaglandin E synthase-1"
    - "Inhibition of cathepsin G"
    - "5-lipoxygenase inhibition (questioned in recent research)"
    - "NLRP3 inflammasome suppression"
    - "Reduction of inflammatory cytokines (IL-1β, IL-6, TNF-α, IFN-γ, PGE2)"
    - "Increased anti-inflammatory cytokine (IL-10)"

  antioxidant:
    - "Beneficial effects on oxidative stress markers (LPO, GSH, catalase, SOD)"
    - "Reduction of nitric oxide levels"

  immunomodulatory:
    - "Modulation of immune system response"
    - "Effects on eosinophil counts"
    - "Regulation of IFN-γ and IL-4 levels"

notes:
  - "Boswellia serrata demonstrates consistent efficacy for osteoarthritis with strong evidence from multiple systematic reviews and RCTs"
  - "Enhanced bioavailability formulations (Aflapin®, phytosomes, delivery technologies) show superior efficacy at lower doses"
  - "Excellent safety profile with hepatotoxicity likelihood score of E (unlikely)"
  - "Most common adverse effects are mild, transient gastrointestinal symptoms"
  - "Poor bioavailability of boswellic acids remains a challenge requiring specialized formulations"
  - "Minimum treatment duration of 4 weeks recommended for osteoarthritis"
  - "Early response possible (improvements seen as early as day 5 in some studies)"
  - "Official recognition in Indian Pharmacopoeia, Ayurvedic Pharmacopoeia, and European Pharmacopoeia"
  - "Orphan drug designation by EMA for peritumoral brain edema (2002)"
  - "Standardization to AKBA and KBA content critical for quality and efficacy"

research_gaps:
  - "Limited head-to-head comparisons between different Boswellia extracts and formulations"
  - "Need for more clinical trials in rheumatoid arthritis"
  - "Optimal dosing and duration studies for specific conditions"
  - "Long-term safety data (>1 year)"
  - "Pediatric safety and efficacy data"
  - "Pregnancy and lactation safety data"
  - "Drug interaction studies"
  - "Bioavailability enhancement mechanisms and optimal formulation strategies"
