      study_design: "Double-blind, randomized, placebo-controlled, three-arm, multi-center trial"
      sample_size:
        recruited: 105
        completed: 98
        per_group: 35
      intervention:
        extract: "Boswellin® Super (standardized Boswellia serrata extract)"
