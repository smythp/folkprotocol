bioavailability_challenges:
  issues:
    - "Poor oral bioavailability of boswellic acids, particularly AKBA and KBA"
    - "Very low steady-state concentrations in human plasma"
    - "AKBA often undetectable after single-dose administration"
    - "Limited systemic absorption in both animals and humans"

  solutions:
    - "Lecithin formulation (phytosome technology)"
    - "Enhanced delivery systems (FenuMat®, Aflapin®)"
    - "Standardization to specific boswellic acid content"
    - "Co-delivery with absorption enhancers"

