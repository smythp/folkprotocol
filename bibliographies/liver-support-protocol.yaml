      paracetamol, thioacetamide, and CCl4-induced hepatic damage.
    comparative_herb: "silymarin"

  - title: "A study of standardized extracts of Picrorhiza kurroa in experimental NAFLD"
    url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC3087357/"
    study_type: "Experimental NAFLD study"
    findings: |
      Compared to standard dose of silymarin, P. kurroa reduced liver lipid content more
      significantly at 400mg/kg dose.

  - title: "Clinical pilot study"
    sample_size: "30 patients, mild chronic hepatitis"
    intervention: "500 mg standardized extract for 12 weeks"
    findings: "Significant improvement in mild chronic hepatitis"

  - title: "Hepatoprotective mechanisms of kutkin"
    findings: |
      Hepatoprotective activity mainly due to suppression of xanthine oxidase inhibitors,
      metal-ion chelators, oxygen anion generation, free radical scavenging, and
      anti-lipid peroxidation.
    mechanisms: [xanthine_oxidase_inhibition, metal_chelation, free_radical_scavenging, anti_lipid_peroxidation]

# TRADITIONAL CHINESE MEDICINE FORMULAS

traditional_formulas:

  - title: "Xiao Chai Hu Tang (Minor Bupleurum, Sho-saiko-to) for chronic hepatitis B"
    journal: "Cochrane Review"
    url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC6513413/"
    url2: "https://pmc.ncbi.nlm.nih.gov/articles/PMC6953322/"
    study_type: "Cochrane systematic review"
    sample_size: "10 RCTs, 934 participants"
    intervention_duration: "3 to 8 months"
    composition: "Bupleurum-containing formula from Treatise on Febrile Disease (~280 AD)"
    findings: |
      All trials compared Xiao Chai Hu Tang with no intervention. Assessed heterogeneous
      forms of the formula. All trials at high risk of bias, certainty of evidence very low
      for all outcomes.
    conditions: [chronic_hepatitis_B]
    quality: "High risk of bias"
    safety_note: "Increased liver injury risk with >19g bupleurum in hepatitis B patients"

  - title: "The Medicinal Plant Pair Bupleurum chinense-Scutellaria baicalensis in Alcoholic Liver Injury"
    year: 2019
    journal: "Frontiers in Pharmacology"
    url: "https://www.frontiersin.org/journals/pharmacology/articles/10.3389/fphar.2019.00254/full"
    pmc: "https://pmc.ncbi.nlm.nih.gov/articles/PMC6445227/"
    study_type: "Metabolomics and metallomics analysis"
    traditional_source: "Shanghan Lun (Treatise on Cold Damage Diseases)"
    findings: |
      One of most common herbal pairs used in clinical trials to treat hepatic disease.
      Originally recorded in ancient Chinese medical texts.
    traditional_pairing: "Bupleurum chinense + Scutellaria baicalensis"
    conditions: [alcoholic_liver_injury]

  - title: "Bupleurum marginatum in Liver Fibrosis"
    url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC5968385/"
    study_type: "Pharmacological evaluation with differential proteomics and network pharmacology"
    findings: |
      Promising therapeutic for liver fibrosis. Evaluated effects on DMN-induced liver
      fibrosis in rats.
    conditions: [liver_fibrosis]

  - title: "Radix Bupleuri effects on NAFLD"
    url: "https://www.sciencedirect.com/science/article/abs/pii/S0378874124013047"
    study_type: "Integrative transcriptomics and lipidomics"
    findings: |
      Effects on lipid-lowering and liver protection established, but role in high-fat
      diet-induced NAFLD development remains unclear. Research ongoing.

  - title: "Xiao Yao San clinical evidence"
    journal: "Frontiers in Pharmacology"
    url: "https://www.frontiersin.org/journals/pharmacology/articles/10.3389/fphar.2023.1169292/full"
    study_type: "Systematic review with meta-analysis and trial sequential analysis"
    composition: "8 herbs including Bupleuri radix (Chai Hu), Angelicae radix, Paeoniae radix alba, Atractylodis rhizome, Poria cocos, Zingiberis rhizome, Menthae haplocalycis, Glycyrrhizae radix"
    historical_source: "Song Dynasty (1078-1085 AD)"
    sample_size: "14 trials, 1,256 patients for anxiety treatment"
    findings: |
      3 trials compared oral Xiao Yao San to anxiolytic medication; 11 trials compared
