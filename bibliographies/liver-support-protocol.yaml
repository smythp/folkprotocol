# KEY TAKEAWAYS

summary_conclusions:
  - "Silymarin (milk thistle) has most extensive clinical evidence for liver protection across multiple conditions"
  - "Artichoke and green tea (EGCG) have strong evidence specifically for NAFLD"
  - "NAC is well-established for drug-induced liver injury, emerging for NAFLD"
  - "Curcumin shows promise but bioavailability remains challenge"
  - "Schisandra has excellent mechanistic data via Nrf2 and multiple pathways"
  - "Traditional formulas (Xiao Chai Hu Tang, Bupleurum combinations) have cultural importance but often low-quality evidence"
  - "Head-to-head comparative trials are rare - mostly indirect comparisons"
  - "Monotherapy with silymarin may be superior to combinations in some cases"
  - "Nrf2 pathway activation is common mechanism across many hepatoprotective herbs"
  - "Dandelion widely used traditionally but lacks human clinical trials"
  - "Safety profiles generally favorable for most herbs at recommended doses"
  - "Research gaps: larger trials, longer duration, combination optimization, head-to-head comparisons needed"
