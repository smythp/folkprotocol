# GREEN TEA (EGCG) RESEARCH

green_tea_egcg:

  - title: "Green Tea and Epigallocatechin Gallate (EGCG) for the Management of NAFLD: Insights into Oxidative Stress and Antioxidant Mechanism"
    year: 2021
    url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC8301033/"
    study_type: "Review of RCTs, systematic reviews, and meta-analyses"
    findings: |
      Accumulative evidence reveals beneficial functions of green tea and EGCG in preventing
      and managing NAFLD with acceptable safety. EGCG supplementation (300-800 mg/day for
      8-24 weeks) associated with significant improvements in liver biomarkers, insulin
      resistance, lipid metabolism, and body composition.
    dosage: "300-800 mg EGCG daily for 8-24 weeks"
    conditions: [NAFLD]

  - title: "Green Tea Extract for NAFLD Liver Enzymes"
    url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC4763469/"
    study_type: "Double-blind RCT"
    sample_size: "80 obese NAFLD patients"
    intervention: "500 mg GTE tablet per day for 90 days"
    location: "Isfahan University, Iran, 2013-2014"

  - title: "Salubrious Effects of Green Tea Catechins on Fatty Liver Disease: A Systematic Review"
    year: 2022
    journal: "MDPI"
    url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC8949532/"
    url2: "https://www.mdpi.com/2305-6320/9/3/20"
    study_type: "Systematic review"
    sample_size: "21 human studies"
    findings: |
      Studies evaluated catechins, green tea, EGCG in humans with NAFLD. Majority conducted
      over 12 weeks as randomized, double-blind, placebo-controlled trials. Evaluated
      clinicopathologic findings, lipid/carbohydrate metabolism, inflammation, oxidative
      stress, and liver damage.

  - title: "NASH patients treated with green tea extract"
    sample_size: "38 NASH patients"
    intervention: "100 mg green tea extract, 2 tablets/time, 3 times/day, 6 months"
    findings: |
      Significantly improved BMI, visceral/subcutaneous fat ratio, liver/spleen ratio,
      glucose, lipids, ALT, AST, and hs-CRP.

  - title: "Chinese NAFLD trial with tea polyphenol gummy tablets"
    year: 2024
    sample_size: "20 NAFLD patients from 3 mainland China hospitals"
    intervention: "2 tea polyphenol gummy tablets daily (total 300 mg EGCG)"
    diagnostic: "CAP > 244 dB/m on transient elastography"

  - title: "Green tea polyphenols and Nrf2 pathway activation"
    journal: "Frontiers in Nutrition"
    year: 2022
    url: "https://www.frontiersin.org/journals/nutrition/articles/10.3389/fnut.2022.836112/full"
    findings: |
      Green tea polyphenols upregulate Nrf2 signaling pathway, suppress oxidative stress
      and inflammation markers in liver aging. Maintained balance in redox and inflammation,
      reduced cellular oxidative stress, improved antioxidant enzyme activities.
    mechanisms: [Nrf2_activation, antioxidant, anti_inflammatory]

# N-ACETYLCYSTEINE (NAC) RESEARCH

n_acetylcysteine:

  - title: "The efficacy of N-acetylcysteine in improving liver function: A systematic review and meta-analysis of controlled clinical trials"
    year: 2023
    url: "https://www.sciencedirect.com/science/article/abs/pii/S2213434423000154"
    study_type: "Systematic review and meta-analysis of RCTs"
    findings: |
      NAC administration might have favorable effects on albumin and total bilirubin levels,
      indicating potency to improve liver function under special circumstances. Larger clinical
      trials with various dosage ranges required.

  - title: "N-Acetylcysteine Improves Liver Function in Patients with Non-Alcoholic Fatty Liver Disease"
    url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC3270338/"
    study_type: "Clinical trial"
    intervention: "NAC 600 mg every 12 hours vs vitamin C 1000 mg every 12 hours"
    findings: |
      Oral NAC (600 mg for 12h) for 3 months resulted in decreased ALT and spleen size
      compared to vitamin C. NAC can decrease serum ALT.
    conditions: [NAFLD]

  - title: "N-Acetylcysteine (NAC): Impacts on Human Health"
    url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC8234027/"
    study_type: "Comprehensive review"
    findings: |
      Primary role as antioxidant stems from ability to increase intracellular glutathione (GSH),
      the most crucial biothiol for cellular redox balance. Hepatoprotective effects by
      increasing intracellular glutathione particularly in liver and through antioxidant
      properties counteracting oxidative stress and inflammation.
    mechanisms: [glutathione_precursor, antioxidant, anti_inflammatory]

  - title: "Drug‐Induced Liver Injury: Clinical Evidence of N‐Acetyl Cysteine Protective Effects"
    year: 2021
    journal: "Oxidative Medicine and Cellular Longevity"
    url: "https://onlinelibrary.wiley.com/doi/10.1155/2021/3320325"
    findings: |
      NAC at 150 mg/kg over 1h, then 12.5 mg/kg/h for 4h, then 6.25 mg/kg/h for remaining
      67h reduced mortality and shortened hospital stay in patients with non-acetaminophen-induced
      acute liver failure.
    conditions: [drug_induced_liver_injury, acute_liver_failure]

  - title: "Acetylcysteine - LiverTox"
    url: "https://www.ncbi.nlm.nih.gov/books/NBK548401/"
    safety: "Hepatoprotective agent, not linked to serum enzyme elevations or clinically apparent acute liver injury"
    dosage_safety: "No side effects up to 3 g/day, rapidly absorbed in animals and humans"

# DANDELION (TARAXACUM OFFICINALE) RESEARCH

dandelion:

  - title: "The Role of Dandelion (Taraxacum officinale) in Liver Health and Hepatoprotective Properties"
    year: 2025
    journal: "Pharmaceuticals (MDPI)"
    url: "https://www.mdpi.com/1424-8247/18/7/990"
    pmc: "https://pmc.ncbi.nlm.nih.gov/articles/PMC12299503/"
    pubmed: "https://pubmed.ncbi.nlm.nih.gov/40732279/"
    study_type: "Review"
    findings: |
      Limited clinical studies on hepatoprotective effects exist. Some evidence in human
      studies confirms potency in liver protection. Preclinical studies show protection
