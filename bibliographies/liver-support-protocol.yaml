# CLINICAL RECOMMENDATIONS BASED ON EVIDENCE

evidence_based_recommendations:

  first_line_herbs_strongest_evidence:
    - "Milk thistle (silymarin) - Most extensive clinical evidence for NAFLD, cirrhosis, general liver support"
    - "Artichoke - Strong evidence for liver enzyme reduction in NAFLD"
    - "Green tea (EGCG) - Well-studied for NAFLD with metabolic benefits"
    - "NAC - Established for drug-induced injury, emerging evidence for NAFLD"

  second_line_evidence_based:
    - "Curcumin - Promising for NAFLD but bioavailability challenges; use enhanced formulations"
    - "Schisandra - Strong mechanistic data, good safety profile, often used in combinations"
    - "Licorice - Specific uses for viral hepatitis and alcoholic liver disease; requires monitoring"

  traditional_use_limited_clinical_evidence:
    - "Dandelion - Extensive traditional use, preclinical promise, but lacks human trials"
    - "Bupleurum formulas - Traditional importance but low-quality clinical evidence; safety concerns"
    - "Phyllanthus - Variable results for hepatitis B; more research needed"

  promising_needs_more_research:
    - "Picrorhiza kurroa - Comparable to silymarin in animal models; needs larger human trials"

# COMBINATION STRATEGIES

combination_approaches:

