# DOSAGE RANGES FROM CLINICAL TRIALS

clinical_dosages:

  silymarin:
    range: "140-800 mg/day"
    typical: "420 mg/day (divided doses)"
    duration: "8-24 weeks in most trials"
    standardization: "Standardized to 70-80% silymarin content"

  curcumin:
    range: "500-3000 mg/day"
    typical: "1000-1500 mg/day"
    duration: "8-12 weeks minimum"
    note: "Enhanced bioavailability formulations may require lower doses"

  artichoke:
    typical: "2700 mg extract daily"
    duration: "2-3 months"
    standardization: "Standardized to caffeoylquinic acids"

  schisandra:
    note: "Often used in combination formulas; specific monotherapy dosing less established"
    traditional_dose: "1.5-9 g dried fruit"

  licorice_glycyrrhizin:
    range: "1000 mg/day licorice root extract"
    duration: "12 weeks"
    safety_note: "Monitor for hypertension and hypokalemia; limit long-term use"

  green_tea_EGCG:
    range: "300-800 mg EGCG/day"
    typical: "500 mg green tea extract (providing ~250-300mg EGCG)"
    duration: "8-24 weeks"

  NAC:
    NAFLD_dose: "600 mg every 12 hours (1200 mg/day)"
    duration: "3 months minimum"
    acute_liver_injury: "150 mg/kg loading, then continuous infusion (hospital protocol)"
    safety: "Up to 3 g/day studied with no significant adverse effects"

  picrorhiza:
    clinical_trial_dose: "500 mg standardized extract"
    duration: "12 weeks"
    experimental_dose: "400 mg/kg showed superiority to silymarin in animal models"

  phyllanthus:
    hepatitis_B_dose: "Various formulations, typically 30 days treatment"
    note: "Dosing highly variable across studies"

# SAFETY CONSIDERATIONS

safety_profiles:

  generally_recognized_as_safe:
    herbs: [milk_thistle, artichoke, dandelion, schisandra, green_tea, NAC]
    note: "Few adverse effects in clinical trials at recommended doses"

  requires_monitoring:
    - herb: "licorice/glycyrrhizin"
      concerns: [hypertension, hypokalemia, edema]
      recommendation: "Limit duration, monitor blood pressure and electrolytes"

    - herb: "bupleurum"
      concerns: "Increased liver injury risk with >19g in hepatitis B patients"
      recommendation: "Use lower doses, avoid in active hepatitis B, monitor liver enzymes"

    - herb: "green_tea_EGCG"
      concerns: "High doses (>800mg EGCG) may cause liver enzyme elevation"
      recommendation: "Stay within 300-800mg EGCG range, take with food"

  contraindications:
    - "Acute severe liver failure - consult hepatologist before herbal therapy"
    - "Pregnancy/lactation - insufficient safety data for most herbs"
    - "Scheduled surgery - discontinue 2 weeks prior (bleeding risk with some herbs)"

