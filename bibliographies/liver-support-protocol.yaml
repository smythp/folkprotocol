  - title: "Glycyrrhizic Acid in the Treatment of Liver Diseases: Literature Review"
    url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC4052927/"
    findings: |
      Glycyrrhizin suppresses elevations in liver enzymes when liver becomes diseased or damaged.
      Has variety of pharmacological activities. Used clinically for chronic hepatitis C in China
      and Japan for over 20 years.
    active_compound: "glycyrrhizic_acid (glycyrrhizin)"
