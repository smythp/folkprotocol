  - title: "Protective Effects of Taraxacum officinale L. (Dandelion) Root Extract in Experimental Acute on Chronic Liver Failure"
    year: 2021
    journal: "Antioxidants (MDPI)"
    url: "https://www.mdpi.com/2076-3921/10/4/504"
    pmc: "https://pmc.ncbi.nlm.nih.gov/articles/PMC8063808/"
    pubmed: "https://pubmed.ncbi.nlm.nih.gov/33804908/"
    study_type: "Preclinical (animal model)"
    findings: |
      Treatment with dandelion root extract reduced serum liver injury markers (AST, ALT,
      ALP, GGT, total bilirubin), renal tests (creatinine, urea), and oxidative stress
      markers (TOS, OSI, MDA, NO, 3NT).
    mechanisms: [antioxidant, anti_inflammatory]

  - title: "Hepatoprotection by dandelion and mechanisms"
    journal: "Asian Pacific Journal of Tropical Biomedicine"
    year: 2020
    url: "https://journals.lww.com/aptb/fulltext/2020/10010/hepatoprotection_by_dandelion__taraxacum.1.aspx"
    findings: |
      Most relevant bioactive compound is taraxasterol, which modulates inflammatory and
      oxidative stress pathways, helping prevent liver damage. ESCOP monographs certify
      action of root as restorer of liver and biliary function.
    active_compound: "taraxasterol"
    regulatory_recognition: "ESCOP monograph"
    note: "Large human clinical studies essential - current evidence mainly preclinical"

# PHYLLANTHUS AMARUS RESEARCH

phyllanthus:

  - title: "Effect of Phyllanthus amarus on chronic carriers of hepatitis B virus"
    year: 1988
    journal: "Lancet"
    pubmed: "https://pubmed.ncbi.nlm.nih.gov/2901611/"
    url: "https://www.sciencedirect.com/science/article/abs/pii/S0140673688924166"
    study_type: "Clinical trial"
    sample_size: "37 treated, 23 placebo"
    intervention: "P. amarus for 30 days"
    findings: |
      22 of 37 (59%) treated patients lost HBsAg vs 1 of 23 (4%) placebo controls.
      Follow-up up to 9 months - no cases had HBsAg returned.
    conditions: [chronic_hepatitis_B]

  - title: "Efficacy of Phyllanthus amarus for eradication of hepatitis B virus in chronic carriers"
    pubmed: "https://pubmed.ncbi.nlm.nih.gov/1791391/"
    study_type: "Clinical trial"
    sample_size: "30 P. amarus, 25 interferon-alfa"
    intervention: "3 months treatment"
    findings: |
      HBeAg converted to negative in 42.3%, HBV DNA disappeared in 47.8% of patients
      treated with P. amarus.

  - title: "Mixed results in Thai study"
    study_type: "RCT"
    sample_size: "65 adult asymptomatic chronic HBV carriers"
    findings: |
      Only 6% conversion rate of HBsAg at day 30. P. amarus had minimal effect on
      eradication of HBsAg from Thai adult asymptomatic chronic carriers.
