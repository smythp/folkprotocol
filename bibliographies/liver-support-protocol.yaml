    journal: "Frontiers in Pharmacology"
    url: "https://www.frontiersin.org/journals/pharmacology/articles/10.3389/fphar.2024.1443667/full"
    study_type: "Review"
    sample_size: "22 RCTs, 1,947 patients"
    findings: |
      Suggested beneficial effects of P. amarus in clearing HBsAg compared with no
      intervention or other herbal compounds.

  - title: "Phyllanthin hepatoprotective mechanisms"
    url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC3940533/"
    findings: |
      Significant liver-protecting role due to active ingredient phyllanthin. Therapy
      decreases lipid peroxidation and increases antioxidant activity, protecting liver
      from free radical damage.
    active_compound: "phyllanthin"
    mechanisms: [antioxidant, lipid_peroxidation_reduction]
    safety: "Few or no toxic effects, no serious adverse events reported"

# PICRORHIZA KURROA (KUTKI) RESEARCH

