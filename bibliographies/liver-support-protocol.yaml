# SYSTEMATIC REVIEWS AND META-ANALYSES

systematic_reviews:

  - title: "Natural Products as Hepatoprotective Agents—A Comprehensive Review of Clinical Trials"
    authors: "Multiple authors"
    year: 2024
    journal: "Plants (MDPI)"
    url: "https://www.mdpi.com/2223-7747/13/14/1985"
    pubmed: "https://pubmed.ncbi.nlm.nih.gov/39065511/"
    study_type: "Comprehensive review of clinical trials"
    findings: |
      Examined 13 natural products including plants, compounds, algae, probiotics, and vitamins.
      Artichoke, berberine, chlorella, chicory, green tea, probiotics, phospholipids, schisandra,
      silymarin, spirulina, and vitamin D decreased liver enzymes. Cinnamon and turmeric showed
      unconvincing effects. Natural products may improve hepatic outcomes in NAFLD, NASH, and other
      liver disorders. Further studies and meta-analyses needed.
    key_herbs: [artichoke, berberine, schisandra, silymarin, green tea]

  - title: "A Scoping Review on Hepatoprotective Mechanism of Herbal Preparations through Gut Microbiota Modulation"
    authors: "Multiple authors"
    year: 2024
    journal: "Molecules (MDPI)"
    url: "https://www.mdpi.com/1467-3045/46/10/682"
    study_type: "Scoping review"
    findings: |
      55 articles included from 1841 records. Focused on NAFLD, NASH, and hepatic steatosis
      involving gut microbiota modulation. Herbal preparations protect liver through gut-liver axis.
    focus_conditions: [NAFLD, NASH, hepatic steatosis]

  - title: "Hepatoprotective activity of medicinal plants, their phytochemistry, and safety concerns: a systematic review"
    authors: "Multiple authors"
    year: 2024
    journal: "De Gruyter"
    url: "https://www.degruyterbrill.com/document/doi/10.1515/znc-2024-0116/html"
    study_type: "Systematic review"
    findings: |
      Secondary metabolites including alkaloids, flavonoids, phenolic compounds, terpenoids,
      steroids, saponins, tannins, and anthraquinones play crucial roles in hepatoprotection.
      Prominent phytoconstituents: silymarin, quercetin, luteolin, glycyrrhizin, curcumin,
      gallic acid, chebulic acid, catechin, aloin, emodin, liquiritin, liquiritigenin.
    key_compounds: [silymarin, quercetin, luteolin, glycyrrhizin, curcumin, catechin]

# MILK THISTLE (SILYMARIN) RESEARCH

milk_thistle_silymarin:

  - title: "Administration of silymarin in NAFLD/NASH: A systematic review and meta-analysis"
    authors: "Multiple authors"
    year: 2024
    journal: "Annals of Hepatology"
    pubmed: "https://pubmed.ncbi.nlm.nih.gov/38579127/"
    url: "https://www.sciencedirect.com/science/article/pii/S1665268123002776"
    study_type: "Systematic review and meta-analysis"
    sample_size: "26 RCTs, 2,375 patients"
    findings: |
      Silymarin can regulate energy metabolism, attenuate liver damage, and improve liver
      histology in NAFLD patients. Attenuated liver injury with decreased ALT and AST levels.
    conditions: [NAFLD, NASH]

  - title: "Impact of Silymarin Supplements on Liver Enzyme Levels: A Systematic Review"
    authors: "Multiple authors"
    year: 2023
    journal: "PMC"
    url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC10667129/"
    study_type: "Systematic review"
    sample_size: "29 RCTs, 3,846 participants"
    findings: |
      Silymarin supplements exhibit potential for hepatoprotection by ameliorating liver enzyme
      levels across diverse conditions. Impact on liver enzymes appeared context-dependent, with
      notable decreases in patients with NAFLD.

  - title: "Milk thistle for the treatment of liver disease: a systematic review and meta-analysis"
    authors: "Multiple authors"
    year: 2002
    journal: "American Journal of Medicine"
    pubmed: "https://pubmed.ncbi.nlm.nih.gov/12427501/"
    url: "https://www.sciencedirect.com/science/article/abs/pii/S0002934302012445"
    study_type: "Systematic review and meta-analysis"
    sample_size: "14 trials"
    findings: |
      Overall mortality odds ratio of 0.8 (not statistically significant). No clear reduction
      in mortality, improvements in liver biopsy histology, or biochemical markers. Data too
      limited to exclude substantial benefit or harm.
    note: "Classic study with mixed results"

  - title: "An updated systematic review with meta-analysis for the clinical evidence of silymarin"
    authors: "Multiple authors"
    year: 2008
    pubmed: "https://pubmed.ncbi.nlm.nih.gov/18334810/"
    study_type: "Meta-analysis"
    findings: |
      In liver cirrhosis (mostly alcoholic): total mortality 16.1% with silymarin vs 20.5%
      placebo; liver-related mortality 10.0% with silymarin vs 17.3% placebo (p=0.01).
    conditions: [liver cirrhosis, alcoholic liver disease]

  - title: "Milk Thistle: Effects on Liver Disease and Cirrhosis - AHRQ Evidence Report"
    url: "https://www.ncbi.nlm.nih.gov/books/NBK11896/"
    findings: |
      Hepatoprotective through antioxidant activity, toxin blockade, enhanced protein synthesis,
      antifibriotic activity, and possible anti-inflammatory or immunomodulating effects.
    mechanisms: [antioxidant, toxin_blockade, protein_synthesis, antifibriotic, anti_inflammatory]

# TURMERIC (CURCUMIN) RESEARCH

turmeric_curcumin:

  - title: "Effects of curcumin/turmeric supplementation on liver function in adults: A GRADE-assessed systematic review and dose–response meta-analysis"
    authors: "Multiple authors"
    year: 2023
    url: "https://www.sciencedirect.com/science/article/pii/S0965229923000390"
    study_type: "Systematic review and dose-response meta-analysis"
    findings: |
      Significant improvement in AST and ALT with pooled mean differences of −3.90 units/L
      and −5.61 units/L respectively. Dose-response relationship evaluated.

  - title: "Curcumin in Liver Diseases: A Systematic Review of the Cellular Mechanisms of Oxidative Stress and Clinical Perspective"
    year: 2018
    url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC6073929/"
    study_type: "Systematic review"
    findings: |
      Curcumin exerts remarkable protective effects through various cellular and molecular
      mechanisms. Effective in oxidative-associated liver diseases.
    mechanisms: [antioxidant, anti_inflammatory, cellular_protection]

  - title: "Effects of curcumin in patients with non-alcoholic fatty liver disease: A systematic review and meta-analysis"
    year: 2024
    url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC11089474/"
    study_type: "Systematic review and meta-analysis"
    findings: |
      Curcumin supplementation reduced AST, ALT, and total cholesterol in NAFLD patients.
      Improved NAFLD severity and increased liver steatosis resolution on ultrasound.
      Liver sonography showed curcumin improved NAFLD grade to 78.9%.
    conditions: [NAFLD]
    imaging_improvements: true

  - title: "Therapeutic effects of curcumin supplementation on liver enzymes of nonalcoholic fatty liver disease patients: A systematic review and meta‐analysis"
    authors: "Ebrahimzadeh et al"
    year: 2025
    journal: "Food Science & Nutrition"
    url: "https://onlinelibrary.wiley.com/doi/full/10.1002/fsn3.4144"
    study_type: "Systematic review and meta-analysis"
    quality_of_evidence: "Low for AST and ALT, very low for GGT"
    limitations: "Small sample sizes, limited follow-up, methodological limitations"

  - title: "The impact of turmeric or its curcumin extract on nonalcoholic fatty liver disease: a systematic review of clinical trials"
    year: 2019
    pubmed: "https://pubmed.ncbi.nlm.nih.gov/31015871/"
    url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC6463416/"
    study_type: "Systematic review of clinical trials"
    findings: |
      Curcumin is a promising but not proven treatment for NAFLD. ALT, AST, and NAFLD
      severity reduced with curcumin use.

# SCHISANDRA RESEARCH

schisandra:

  - title: "Efficacy of Schisandra chinensis in liver injury: a systematic review and preclinical meta-analysis"
    authors: "Multiple authors"
    year: 2025
    journal: "Frontiers in Pharmacology"
    url: "https://www.frontiersin.org/journals/pharmacology/articles/10.3389/fphar.2025.1627081/full"
    study_type: "Systematic review and meta-analysis"
    sample_size: "54 animal studies"
    findings: |
      Schisandra chinensis exhibits hepatoprotective effects through antioxidant, anti-inflammatory,
      anti-apoptotic, and autophagy-modulating activities. Bioactive compounds significantly reduced
      ALT, AST, and ALP in liver injury models.
    mechanisms: [antioxidant, anti_inflammatory, anti_apoptotic, autophagy_modulation]

  - title: "Schisandra chinensis in Liver Disease: Exploring the Mechanisms and Therapeutic Promise"
    url: "https://www.scientificarchives.com/article/schisandra-chinensis-in-liver-disease-exploring-the-mechanisms-and-therapeutic-promise-of-an-ancient-chinese-botanical"
    study_type: "Comprehensive review"
    findings: |
      Multiple signaling pathways involved: Nrf2, NF-κB, NLRP3 inflammasome-mediated pyroptosis.
      Also involves AMPK, ER stress, SREBP-1c, autophagy, TGF-β, MAPK, microRNA, heat shock
      proteins, and pregnane X receptor signaling pathways.
    mechanisms: [Nrf2, NF_kB, NLRP3, AMPK, ER_stress, autophagy]

  - title: "A comprehensive review of Schisandra chinensis lignans: pharmacokinetics, pharmacological mechanisms, and future prospects"
    year: 2025
    journal: "Chinese Medicine"
    url: "https://link.springer.com/article/10.1186/s13020-025-01096-z"
    study_type: "Comprehensive review"
    findings: |
      Lignans are main active components for liver disease treatment. Schisandra enhances
      glutathione, superoxide dismutase, catalase, and other endogenous antioxidant enzymes.
      Increases intracellular GSH and stimulates synthesis in hepatocytes. Inhibits p38 MAPK
      and ERK phosphorylation, lowering TNF-α, IL-6, and IL-1β levels.
    active_compounds: [lignans, schizandrin_C, picroside]

  - title: "Lignans are the main active components of Schisandrae Chinensis Fructus for liver disease treatment: a review"
    year: 2024
    url: "https://www.sciencedirect.com/science/article/pii/S2213453024001824"
    study_type: "Review"
    findings: |
      Lignans achieve hepatoprotective effects by regulating lipid metabolism, anti-fibrosis,
      anti-inflammation, anti-oxidation, and anti-tumor activities. Increases CYP450 enzymes
      (CYP3A, CYP2E1) improving hepatic clearance of toxins and drugs.
    mechanisms: [lipid_metabolism, anti_fibrosis, detoxification_enhancement]

