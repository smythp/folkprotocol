  - id: kim2021_anxiety_depression
    authors: "Kim M, Nam ES, Lee Y, Kang HJ"
    title: "Effects of Lavender on Anxiety, Depression, and Physiological Parameters: Systematic Review and Meta-Analysis"
    journal: "Asian Nursing Research (Korean Society of Nursing Science)"
    year: 2021
    volume: "15"
    issue: "5"
    pages: "279-290"
    pmid: "34775136"
    doi: null
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/34775136/"
