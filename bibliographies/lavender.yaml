# SAFETY PROFILE SUMMARY

safety_profile:
  general: |
    - Generally well tolerated across multiple studies
    - FDA GRAS status for food use
    - EMA and WHO recognize traditional medicinal use

  common_adverse_effects: |
    - Mild gastrointestinal symptoms (eructation most common with oral Silexan)
    - No sedation or withdrawal symptoms at therapeutic doses
    - Rare contact dermatitis with topical application

  drug_interactions: |
    - No clinically significant CYP450 enzyme interactions (CYP1A2, 2C9, 2C19, 2D6, 3A4)
    - No documented interactions with oral contraceptives
    - Low risk of drug-drug interactions

  contraindications: |
    - Contact allergy/sensitization (uncommon but documented)
    - Commission E lists no known contraindications

  special_populations: |
    - Endocrine effects: Recent large studies show no increased risk in children
    - In vitro studies suggest minimal estrogenic/androgenic activity
    - Earlier concerns about gynecomastia not supported by recent population data
    - Topical use around breast area: Caution advised despite low risk

  toxicity: |
    - In vitro cytotoxicity at 0.25% concentration (clinical relevance unclear)
    - One case report of anticholinergic syndrome from excessive lavender tea consumption
    - Overall safety profile favorable compared to conventional anxiolytics/antidepressants

# CLINICAL PRACTICE NOTES

clinical_notes:
  comparative_efficacy: |
    - Silexan 80-160 mg comparable to lorazepam 0.5 mg and paroxetine 20 mg for GAD
    - Silexan 80 mg comparable to sertraline 50 mg for mild-to-moderate depression
    - Aromatherapy provides rapid anxiolytic effects within minutes to hours
    - Oral Silexan preferred for sustained long-term treatment (weeks to months)

  onset_of_action: |
    - Aromatherapy: Immediate to within hours
    - Oral Silexan: 2 weeks for anxiolytic effects to emerge
    - Sleep improvements: Within days to 1 week

  treatment_selection: |
    - Acute anxiety/stress: Aromatherapy/inhalation preferred
    - Chronic anxiety disorders: Oral Silexan 80 mg daily
    - Sleep disturbance: Either route effective; aromatherapy for acute, oral for sustained
    - Comorbid conditions: Silexan shows benefits for anxiety + depression, anxiety + sleep, functional GI symptoms

  quality_of_evidence: |
    - Anxiety: Strong (multiple large RCTs, meta-analyses, active comparators)
    - Depression: Moderate to strong (RCTs including active comparators, meta-analyses)
    - Sleep: Moderate (multiple RCTs, meta-analysis, heterogeneous methods)
    - Stress: Moderate (meta-analysis of 21 studies)
    - Safety: Strong (large studies, drug interaction studies, population cohorts)

