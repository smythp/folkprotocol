    quality: "Meta-analytic synthesis with moderator analysis"

  - id: donelli2019_anxiety
    authors: "Donelli D, Antonelli M, Bellinazzi C, Gensini GF, Firenzuoli F"
    title: "Effects of lavender on anxiety: A systematic review and meta-analysis"
    journal: "Phytomedicine"
    year: 2019
    volume: "65"
    pages: "153099"
    pmid: "31655395"
    doi: null
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/31655395/"
    study_type: "Systematic review and meta-analysis"
    trials_included: 90
    rct_count: 65
    non_randomized: 25
    meta_analysis_rcts: 37
    participants: "9,193 total (7,993 in RCTs + 1,200 in non-randomized); 3,964 in meta-analysis"
    key_findings: |
      - Lavender inhalation reduced anxiety: Hedges' g = -0.73 [95% CI -1.00 to -0.46], p < 0.00001
      - State anxiety (STAI-State) reduction: mean difference = -5.99 [95% CI -9.39 to -2.59], p < 0.001
      - Trait anxiety (STAI-Trait) reduction: mean difference = -8.14 [95% CI -14.44 to -1.84], p < 0.05
      - Massage with lavender oil: Hedges' g = -0.66 [95% CI -0.97 to -0.35], p < 0.0001
      - Oral Silexan® 80mg showed benefit on Hamilton Anxiety Scale
    subgroup_analyses: "Results stratified by administration route (inhalation, oral, massage)"
    quality: "Large comprehensive review with 90 studies"

  - id: ghavami2022_stress
    authors: "Ghavami T, Kazeminia M, Rajati F"
    title: "The effect of lavender on stress in individuals: A systematic review and meta-analysis"
    journal: "Complement Ther Med"
    year: 2022
    volume: "68"
    pages: "102832"
    pmid: "35429599"
    doi: null
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/35429599/"
    study_type: "Systematic review and meta-analysis"
    trials_included: 21
    participants: "791 in intervention groups, 804 in control groups"
    key_findings: |
      - Overall stress reduction: SMD 0.63 ± 0.13 (95% CI), P < 0.001
      - L. angustifolia species showed highest effect: SMD 0.73 ± 0.22
      - Student populations demonstrated strongest results: SMD 2.27 ± 1.34
      - Perceived Stress Scale measurement: SMD 0.82 ± 0.42
      - Lavender significantly reduces stress and could be integrated into stress management programs
    heterogeneity: "Random Effects model applied, I² index assessed"
    quality: "21 studies, meta-analysis with subgroup analyses"

