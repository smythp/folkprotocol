key_findings_summary: |
  1. EFFICACY:
     - Anxiety: Strong evidence (multiple meta-analyses, Hedges' g -0.65 to -0.73)
     - Depression: Moderate evidence (meta-analysis SMD -0.66, p<0.001)
     - Stress: Good evidence (meta-analysis SMD 0.63, p<0.001)
     - Sleep: Moderate evidence (meta-analysis SMD -0.56, p=0.005)

  2. DOSING:
     - Oral Silexan: 80 mg daily (standard), 160 mg daily (studied)
     - Aromatherapy: 55 μl patches or 15-minute inhalation sessions
     - Duration: 6-10 weeks for oral, acute to 7 days for aromatherapy

  3. SAFETY:
     - Well tolerated overall
     - No significant CYP450 interactions
     - Mild GI effects (eructation) most common with oral
     - Low risk of contact sensitization with topical
     - No confirmed endocrine disruption risk in recent large studies

  4. COMPARATIVE EFFECTIVENESS:
     - Oral Silexan comparable to lorazepam, paroxetine, sertraline
     - Aromatherapy superior for acute/short-term use
     - Oral Silexan preferred for long-term treatment

  5. STANDARDIZATION:
     - Silexan: Pharmaceutical-grade standardized preparation
     - EMA and European Pharmacopoeia provide quality standards
     - Commission E monograph specifies minimum essential oil content
