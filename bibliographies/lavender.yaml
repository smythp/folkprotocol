# DRUG INTERACTION AND PHARMACOKINETICS STUDIES

drug_interactions:
  - id: doroshyenko2013_cyp450
    authors: "Doroshyenko O, Rokitta D, Zadoyan G, Klement S, Schläfke S, Dienel A, Gramatté T, Lück H, Fuhr U"
    title: "Drug cocktail interaction study on the effect of the orally administered lavender oil preparation silexan on cytochrome P450 enzymes in healthy volunteers"
    journal: "Drug Metabolism and Disposition"
    year: 2013
    volume: "41"
    issue: "5"
    pages: "987-993"
    pmid: "23401474"
    doi: null
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/23401474/"
    study_design: "Double-blind, randomized, 2-fold crossover trial"
    sample_size: 16
    population: "Healthy male and female Caucasians"
    intervention: "Silexan 160 mg once daily for 11 days"
    enzymes_tested: "CYP1A2, CYP2C9, CYP2C19, CYP2D6, CYP3A4"
    probe_drugs: "Cocktail of probe substrates for each CYP enzyme"
    key_findings: |
      - Repeated silexan (160 mg/day) has no clinically relevant inhibitory or inducing effects on CYP1A2, 2C9, 2C19, 2D6, and 3A4 enzymes in vivo
      - No significant interactions with most enzyme phenotyping metrics
      - Omeprazole (CYP2C19) showed minor variability, likely inherent pharmacokinetic fluctuation
    clinical_significance: "Low risk of drug-drug interactions via major CYP pathways"
    quality: "Rigorous crossover design with multiple CYP enzymes tested"

# SAFETY STUDIES

safety_studies:
  - id: lavender2004_cytotoxicity
    authors: "Prashar A, Locke IC, Evans CS"
    title: "Cytotoxicity of lavender oil and its major components to human skin cells"
    journal: "Cell Proliferation"
    year: 2004
    volume: "37"
    issue: "3"
    pages: "221-229"
    pmid: "15144499"
    doi: null
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/15144499/"
    study_type: "In vitro cytotoxicity study"
    cell_types: "Human endothelial cells and fibroblasts"
    findings: |
      - Lavender oil cytotoxic to human skin cells at 0.25% (v/v) concentration in all cell types tested
      - Linalool may be the active component responsible for cytotoxicity
      - In vitro findings; clinical relevance unclear
    implications: "Concerns about potential irritant or allergenic skin reactions with topical use"

