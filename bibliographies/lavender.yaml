bibliography_notes: |
  This bibliography focuses on high-quality clinical evidence for Lavandula angustifolia (lavender) including:
  - Systematic reviews and meta-analyses with quantitative effect sizes
  - Randomized controlled trials with standardized preparations (especially Silexan)
  - Dosing studies with specific mg/day or administration protocols
  - Bioavailability and pharmacokinetics research
