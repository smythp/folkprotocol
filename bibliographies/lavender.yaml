    journal: "Asian Nursing Research (Korean Society of Nursing Science)"
    year: 2019
    volume: "13"
    issue: "4"
    pages: "295-305"
    pmid: "31743795"
    doi: null
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/31743795/"
    study_type: "Systematic review and meta-analysis"
    trials_included: 22
    participants: null
    key_findings: |
      - Self-rated anxiety: Hedges' ĝ = -0.65 (95% CI, -0.84 to -0.46)
      - Systolic blood pressure: ĝ = -0.22 (95% CI, -0.43 to -0.02)
      - Heart rate: ĝ = -0.53 (95% CI, -0.74 to -0.32)
