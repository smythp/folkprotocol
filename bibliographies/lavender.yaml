  - id: sayed2020_routes
    authors: "Sayed AM, Morsy S, Tawfik GM, Naveed S, Minh-Duc NT, Hieu TH, Ali ZA, Shinkar A, Doheim MF, Hashan MR, Huy NT"
    title: "The best route of administration of lavender for anxiety: a systematic review and network meta-analysis"
    journal: "General Hospital Psychiatry"
    year: 2020
    volume: "64"
    pages: "26-32"
    pmid: "32088511"
    doi: null
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/32088511/"
    study_type: "Systematic review and network meta-analysis"
    trials_included: 40
    quantitative_analysis: 32
    participants: null
    routes_compared: "Aromatherapy/inhalation, oral (Silexan 80mg), topical/massage, foot bath"
    key_findings: |
      - Short-term (first week): Aromatherapy superior, SMD = -0.57 (95% CI -1.14 to 0.01), P-score = 0.72
      - Long-term: Silexan (oral) 80mg most favorable, first rank probability = 0.116
