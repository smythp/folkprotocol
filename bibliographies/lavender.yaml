# RANDOMIZED CONTROLLED TRIALS - ORAL SILEXAN

rcts_silexan:
  - id: kasper2014_gad_paroxetine
    authors: "Kasper S, Gastpar M, Müller WE, Volz HP, Möller HJ, Schläfke S, Dienel A"
    title: "Lavender oil preparation Silexan is effective in generalized anxiety disorder--a randomized, double-blind comparison to placebo and paroxetine"
    journal: "International Journal of Neuropsychopharmacology"
    year: 2014
    volume: "17"
    issue: "6"
    pages: "859-869"
    pmid: "24456909"
    doi: null
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/24456909/"
    study_design: "Randomized controlled trial, double-blind, double-dummy, multicenter"
    sample_size: 539
    population: "Adults with generalized anxiety disorder (DSM-5, HAMA ≥18)"
    intervention:
      silexan_160mg: "160 mg daily, oral"
      silexan_80mg: "80 mg daily, oral"
      paroxetine: "20 mg daily"
      placebo: "Matched placebo"
    duration: "10 weeks"
    primary_outcome: |
      Hamilton Anxiety Scale total score reductions:
      - Silexan 160mg: 14.1 ± 9.3 points (p < 0.01 vs placebo)
      - Silexan 80mg: 12.8 ± 8.7 points (p < 0.01 vs placebo)
      - Paroxetine: 11.3 ± 8.0 points (p = 0.10 vs placebo)
      - Placebo: 9.5 ± 9.0 points
    response_rates: |
      Response (≥50% reduction):
      - Silexan 160mg: 60.3%
      - Silexan 80mg: 51.9%
      - Paroxetine: 43.2%
      - Placebo: 37.8%
    safety: |
      Adverse event incidence densities per day:
      - Silexan 160mg: 0.006
      - Silexan 80mg: 0.008
      - Paroxetine: 0.011
      - Placebo: 0.008
    quality: "Large multicenter RCT with active and placebo controls"

