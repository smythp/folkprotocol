# KEY ACTIVE CONSTITUENTS

active_constituents:
  primary_gingerols:
    - name: "6-gingerol"
      content_at_1g_extract: "21.52 mg (in 5% standardized extract)"
      bioavailability: "Extensively metabolized; detected only as glucuronide/sulfate conjugates"
      pharmacokinetics:
        cmax: "0.85 ± 0.43 µg/mL (at 2g dose)"
        tmax: "65-75 minutes"
        half_life: "<2 hours"

    - name: "8-gingerol"
      content_at_1g_extract: "7.20 mg"
      bioavailability: "Detected as conjugates only"
      pharmacokinetics:
        cmax: "0.23 ± 0.16 µg/mL (at 2g dose)"
        tmax: "65-75 minutes"
        half_life: "<2 hours"

    - name: "10-gingerol"
      content_at_1g_extract: "16.76 mg"
      bioavailability: "Some free form detected in plasma"
      pharmacokinetics:
        cmax_free: "9.5 ± 2.2 ng/mL to 160.49 ng/mL (varies by study/formulation)"
        tmax: "38-60 minutes"
        half_life: "1-3 hours (up to 336 min in some studies)"

  shogaols:
    - name: "6-shogaol"
      content_at_1g_extract: "3.68 mg"
      bioavailability: "Some free form detected in plasma"
      pharmacokinetics:
        cmax_free: "13.6 ± 6.9 ng/mL to 453.40 ng/mL (varies by study/formulation)"
        tmax: "30-60 minutes"
        half_life: "149-180 minutes"
      note: "Higher concentrations detected than gingerols in some studies"

  volatile_oils:
    requirement_usp: "≥1.5% in medicinal-grade ginger"

# NOTES AND CONSIDERATIONS

notes:
  - "Gingerols and shogaols undergo extensive first-pass metabolism; primarily appear as glucuronide and sulfate conjugates rather than free forms"
  - "Standardized extracts typically contain 5% gingerols for clinical use"
  - "Dose-response relationships appear nonlinear for some indications"
  - "Safety profile generally favorable; most adverse effects are mild gastrointestinal symptoms"
  - "Evidence quality varies: strongest for nausea/vomiting, inflammation, and metabolic effects"
  - "Maximum safe dosage and long-term safety in pregnancy require further study"
  - "Traditional use spans over 200 years, with modern clinical evidence supporting many traditional applications"
  - "Steaming or drying processes can alter gingerol-to-shogaol ratios"

