---
# Bibliography: Rhodiola rosea (Roseroot, Golden Root, Arctic Root)
# Clinical studies, systematic reviews, pharmacokinetics, safety, and regulatory monographs
# Compiled: 2025-12-31

herb_name: Rhodiola rosea
common_names:
  - Roseroot
  - Golden Root
  - Arctic Root
  - Rhodiola
plant_part: rhizome and root (rhizoma et radix)

# Key active constituents for standardization
standardization_markers:
  primary:
    - salidroside
    - rosavin
    - rosarin
    - rosin
  pharmacopoeia_requirements:
    usp:
      salidroside_min: "0.08%"
      phenylpropanoids_min: "0.3%"
      note: "phenylpropanoids comprise rosavin, rosarin, and rosin"
    russian_pharmacopoeia:
      salidroside_min: "0.8%"
      phenylpropanoids_min: "1.0%"
      note: "significantly higher requirements than USP"

# SYSTEMATIC REVIEWS AND META-ANALYSES
systematic_reviews:
  - id: wang_2025_meta
    title: "The effect of Rhodiola rosea supplementation on endurance performance and related biomarkers: a systematic review and meta-analysis"
    authors:
      - Wang, Xiaolin
      - Yang, Xuezhen
      - Gao, Zhendong
      - Zeng, Jin
      - Liu, Yutong
    journal: Frontiers in Nutrition
    year: 2025
    volume: 12
    pages: "1645346"
    doi: 10.3389/fnut.2025.1645346
    pmid: 41080184
    study_type: systematic review and meta-analysis
    search_date: "March 20, 2025"
    sample_size: "26 RCTs, 668 participants"
    findings: "Significantly improved endurance-related outcomes including VO2max, time to exhaustion, and time trial performance. Enhanced antioxidant enzymes and reduced oxidative stress. No significant effect on inflammatory markers."
    conclusions: "Rhodiola rosea supplementation is an effective ergogenic aid for enhancing endurance performance and improving physiological biomarkers related to oxidative stress, muscle damage, and metabolic efficiency, though heterogeneity across studies warrants cautious interpretation"
    focus_areas:
      - endurance performance
      - oxidative stress biomarkers
      - antioxidant capacity
      - muscle damage markers
      - metabolic markers
      - VO2max
      - time to exhaustion

  - id: li_2025_heart_failure
    title: "Standardized Rhodiola rosea injection for left ventricular remodeling and inflammation in patients with HFrEF: a systematic review and meta-analysis"
    journal: Frontiers in Pharmacology
    year: 2025
    doi: 10.3389/fphar.2025.1536686
    study_type: systematic review and meta-analysis
    indication: "Heart failure with reduced ejection fraction (HFrEF)"
    findings: "Standardized Rhodiola rosea injection for left ventricular remodeling and inflammation"
    focus_areas:
      - cardiovascular health
      - heart failure
      - left ventricular remodeling
      - inflammation

  - id: zhao_2025_altitude
    title: "Efficacy and safety of Rhodiola crenulata extract in the treatment of acute high altitude disease, based on studies involving populations in China: A systematic review and meta-analysis"
    journal: Frontiers in Pharmacology
    year: 2025
    doi: 10.3389/fphar.2025.1595953
    study_type: systematic review and meta-analysis
    search_date: "Prior to September 2024"
    species: Rhodiola crenulata
    indication: acute high altitude disease
    population: "Chinese populations"
    findings: "Efficacy and safety of Rhodiola crenulata extract for treatment of acute high altitude disease"
    focus_areas:
      - high altitude adaptation
      - acute mountain sickness

  - id: lu_2022_exercise
    title: "Effects of Rhodiola Rosea Supplementation on Exercise and Sport: A Systematic Review"
    authors:
      - Lu, Yao
      - Deng, Bin
      - Xu, Luhua
      - Liu, Hanjiao
      - Song, Yinzhi
      - Lin, Fengxia
    journal: Frontiers in Nutrition
    year: 2022
    volume: 9
    pages: "856287"
    doi: 10.3389/fnut.2022.856287
    pmid: 35464040
    study_type: systematic review
    sample_size: "10 studies"
    findings: "Positive effect on athletic ability and sports performance. Reduced post-exercise pain and muscle damage. Enhanced antioxidant capacity, reduced oxidative stress, improved explosive power. No obvious adverse reactions reported."
    safety: "No obvious adverse reactions reported"
    focus_areas:
      - athletic performance
      - muscle damage
      - antioxidant capacity
      - exercise recovery

  - id: sanz_barrio_2023_sports
    title: "Rhodiola rosea supplementation on sports performance: A systematic review of randomized controlled trials"
    authors:
      - Sanz-Barrio, Patricia M
      - Noreen, Eric E
      - Gilsanz-Estebaranz, Laura
      - Lorenzo-Calvo, Jorge
      - Martínez-Ferrán, María
      - Pareja-Galeano, Helios
    journal: Phytotherapy Research
    year: 2023
    volume: 37
    issue: 10
    pages: 4414-4428
    doi: 10.1002/ptr.7950
    pmid: 37495266
    study_type: systematic review
    sample_size: "13 studies, 263 participants (198 men, 65 women, ages 18-65)"
    supplementation_protocols:
      - "2 studies: acute supplementation"
      - "5 studies: chronic supplementation"
      - "6 studies: combined acute and chronic"
    findings: "Heterogenous results. 11 studies with positive effects, 2 studies with no effect on RPE, heart rate, antioxidant capacity, blood lactate, creatine kinase, or CRP."
    focus_areas:
      - sports performance
      - rating of perceived exertion
      - biomarkers

  - id: hung_2011_efficacy
    title: "The effectiveness and efficacy of Rhodiola rosea L.: a systematic review of randomized clinical trials"
    authors:
      - Hung, Shao Kang
      - Perry, Rachel
      - Ernst, Edzard
    journal: Phytomedicine
    year: 2011
    volume: 18
    issue: 4
    pages: 235-244
    doi: 10.1016/j.phymed.2010.08.014
    pmid: 21036578
    study_type: systematic review
    sample_size: "11 RCTs"
    findings: "R. rosea may have beneficial effects on physical performance, mental performance, and certain mental health conditions. Only few mild adverse events reported."
    safety: "Only few mild adverse events reported"
    study_breakdown:
      - "6 trials: physical performance"
      - "4 trials: mental performance"
      - "2 trials: mental health conditions"
    conclusions: "More independent research warranted due to limited replication"
    focus_areas:
      - physical performance
      - mental performance
      - mental health

  - id: ishaque_2012_fatigue
    title: "Rhodiola rosea for physical and mental fatigue: a systematic review"
    authors:
      - Ishaque, Sana
      - Shamseer, Larissa
      - Bukutu, Cecilia
      - Vohra, Sunita
    journal: BMC Complementary and Alternative Medicine
    year: 2012
    volume: 12
    pages: "70"
    doi: 10.1186/1472-6882-12-70
    pmid: 22643043
    study_type: systematic review
    sample_size: "11 studies (10 RCTs, 1 CCT), screened from 206 articles"
    findings: "Mixed results. 2 of 6 physical fatigue trials showed benefit. 3 of 5 mental fatigue trials demonstrated effectiveness. Methodological flaws limit accurate assessment of efficacy."
    quality_assessment: "All included studies exhibited high risk of bias or reporting flaws"
    conclusions: "Future research needs rigorous, well-designed trials"
    focus_areas:
      - physical fatigue
      - mental fatigue
      - methodological quality

  - id: li_2021_quality
    title: "Quality Evaluation of Randomized Controlled Trials of Rhodiola Species: A Systematic Review"
    authors:
      - Li, Xiuzhu
      - Chen, Weijie
      - Xu, Yingqi
      - Liang, Zuanji
      - Hu, Hao
      - Wang, Shengpeng
      - Wang, Yitao
    journal: Evidence-Based Complementary and Alternative Medicine
    year: 2021
    volume: 2021
    pages: "9989546"
    doi: 10.1155/2021/9989546
    pmid: 34306163
    study_type: systematic review
    sample_size: "39 RCTs of Rhodiola species, including 23 RCTs of R. rosea"
    quality_assessment: "Methodological quality moderate or good. 5 of 10 RCTs reached >3 points on Jadad score. Lack of independent replications."
    focus_areas:
      - trial quality
      - methodological assessment

# RANDOMIZED CONTROLLED TRIALS - STANDARDIZED EXTRACTS

clinical_trials_standardized_extracts:
  shr5:
