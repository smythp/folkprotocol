        volume: 10
        issue: 2-3
        pages: 95-105
        doi: 10.1078/094471103321659780
        pmid: 12725561
        study_design: "randomized, double-blind, placebo-controlled"
        sample_size: "161 cadets, ages 19-21"
        dosing:
          - "Standard dose vs 50% higher dose vs placebo"
        findings: "Both doses showed statistically highly significant antifatigue effect (p<0.001). No significant difference between dosage groups, with possible trend favoring lower dose."
        indication: mental work capacity and fatigue

      - id: olsson_2009_stress_fatigue
        title: "A randomised, double-blind, placebo-controlled, parallel-group study of the standardised extract shr-5 of the roots of Rhodiola rosea in the treatment of subjects with stress-related fatigue"
        authors:
          - Olsson, Erik M
          - von Schéele, Bo
          - Panossian, Alexander G
        journal: Planta Medica
        year: 2009
        volume: 75
        issue: 2
        pages: 105-112
        doi: 10.1055/s-0028-1088346
        pmid: 19016404
        study_design: "randomized, double-blind, placebo-controlled, parallel-group"
        sample_size: "60 individuals"
        dosing:
          - "576 mg extract/day (4 tablets)"
          - "Placebo group"
        findings: "Repeated administration of SHR-5 exerts anti-fatigue effect, increases mental performance (especially concentration), and decreases cortisol response to awakening stress in burnout patients."
        biomarkers: "Decreased cortisol response to awakening stress"
        indication: stress-related fatigue and burnout

  ws1375:
