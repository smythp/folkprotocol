# DOSING STUDIES AND PROTOCOLS

dosing_studies:
  acute_protocols:
    typical_dose: "200-400 mg, 60 minutes before activity"
    studies:
      - reference: noreen_2013_endurance
        dose: "3 mg/kg body weight"
        timing: "60 minutes pre-exercise"
        finding: "Improved 6-mile time trial performance"

      - reference: de_bock_2004_endurance
        dose: "~200 mg (1% salidroside, 3% rosavin)"
        timing: "60 minutes pre-exercise"
        finding: "Improved endurance capacity"

    summary: "Acute supplementation approximately 200 mg, 60 minutes before exercise, may be effective for endurance performance"

  chronic_protocols:
    typical_dose: "200-600 mg daily"
    typical_duration: "4-8 weeks"
    studies:
      - reference: edwards_2012_stress
        dose: "200 mg twice daily (400 mg/day)"
        duration: "4 weeks"
        finding: "Effective for life-stress symptoms"

      - reference: lekomtseva_2017_fatigue
        dose: "400 mg daily (2 × 200 mg)"
        duration: "8 weeks"
        finding: "Greatest change after 1 week, continued improvement to week 8"

      - reference: olsson_2009_stress_fatigue
        dose: "576 mg/day (4 tablets)"
        duration: "study duration"
        finding: "Anti-fatigue effect, improved concentration, reduced cortisol response"

      - reference: jowko_2018_mental_physical
        dose: "600 mg/day"
        duration: "4 weeks"
        finding: "Mental and physical performance benefits"

    dose_comparison:
      reference: shevtsov_2003_mental_work
      finding: "Standard vs 50% higher dose showed no significant difference, possible trend favoring lower dose"

    summary: "Chronic supplementation 200-600 mg daily for 4-8 weeks commonly used. Higher doses (1500-2400 mg/day) for 4-30 days have shown ergogenic effects in recent trials."

  dose_response_note: "Evidence suggests lower doses (340-400 mg/day) may be as effective as higher doses (680 mg/day) for some indications"

