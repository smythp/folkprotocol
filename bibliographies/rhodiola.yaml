# BIBLIOGRAPHY COMPILATION METADATA

search_metadata:
  search_date: "2025-12-31"
  databases_searched:
    - PubMed
    - PubMed Central (PMC)
    - European Medicines Agency (EMA)
    - United States Pharmacopoeia
    - Health Canada Natural Health Products Database

  search_strategy: |
    Comprehensive search for clinical studies ON rhodiola (not just mentioning it).
    Focused on:
    - Systematic reviews and meta-analyses of Rhodiola
    - Randomized controlled trials using Rhodiola extract/standardized preparations
    - Regulatory monographs (EMA, USP, Russian Pharmacopoeia, Health Canada)
    - Traditional pharmacopoeia entries
    - Dosing and dose-response studies
    - Pharmacokinetics and bioavailability studies
    - Safety profiles and adverse effects
    - Standardized extract formulations (especially SHR-5, WS® 1375)
    - Drug interaction studies
    - Quality and authenticity assessments

  inclusion_criteria:
    - Clinical trials in humans
    - Systematic reviews and meta-analyses
    - Pharmacokinetic studies with human relevance
    - Regulatory/official monographs
    - Quality and standardization studies
    - Preclinical studies highly relevant to human translation

  exclusion_criteria:
    - Preclinical-only studies without clear human relevance
    - Studies merely mentioning Rhodiola without it being primary focus
    - Low-quality reviews without systematic methodology

  key_search_terms:
    - "Rhodiola rosea clinical trial"
    - "Rhodiola rosea systematic review meta-analysis"
    - "Rhodiola rosea randomized controlled trial RCT"
    - "Rhodiola rosea pharmacokinetics bioavailability"
    - "Rhodiola rosea dosing standardized extract"
    - "Rhodiola rosea safety adverse effects"
    - "Rhodiola rosea SHR-5"
    - "Rhodiola rosea salidroside rosavin"
    - "Rhodiola rosea monograph pharmacopoeia"

  coverage_period: "Comprehensive coverage through December 2025, including latest 2025 publications"
