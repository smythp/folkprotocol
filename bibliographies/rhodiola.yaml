        pmid: 17990195
        study_design: "Phase III, randomized, double-blind, placebo-controlled"
        duration: "6 weeks"
        sample_size: "89 patients"
        dosing:
          - "Group A (n=31): 340 mg/day SHR-5"
          - "Group B (n=29): 680 mg/day SHR-5"
          - "Group C (n=29): placebo"
        findings: "Groups A and B showed significant improvement in overall depression, insomnia, emotional instability, and somatization vs placebo. No serious side effects."
        safety: "No serious side effects reported in any group"
        indication: mild to moderate depression

      - id: shevtsov_2003_mental_work
