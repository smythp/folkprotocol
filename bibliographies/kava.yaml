safety_and_hepatotoxicity:
  - title: "Kava hepatotoxicity--a clinical review"
    authors:
      - Teschke R
    year: 2010
    journal: "Annals of Hepatology"
    pubmed_id: "20720265"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/20720265/"
    study_type: "Clinical review"
    cases_analyzed: 14
    extract_types:
      aqueous: 3
      ethanolic: 5
      acetonic: 4
      mixed: 2
    key_findings:
      - finding: "Causality highly probable in 1 patient, probable in 4, possible in 9"
      - finding: "Risk factors: overdose, prolonged treatment, comedication with synthetic drugs and dietary supplements"
      - finding: "Hepatotoxicity occurred regardless of extraction solvent"
      - finding: "Poor raw material quality identified as contributing factor"

  - title: "Kava hepatotoxicity in traditional and modern use: the presumed Pacific kava paradox hypothesis revisited"
    authors:
      - Teschke R
      - Sarris J
      - Schweitzer I
    year: 2012
    journal: "British Journal of Clinical Pharmacology"
    volume: 73
    issue: 2
    pages: "170-174"
    study_type: "Literature review and critical analysis"
    key_findings:
      - finding: "Pacific kava paradox no longer valid - traditional aqueous extracts can also be hepatotoxic"
      - finding: "Cases documented from New Caledonia, Australia, USA, and Germany with aqueous extracts"
      - finding: "Poor quality raw material caused by mould hepatotoxins (Aspergillus aflatoxins, ochratoxin A) likely primary source"
      - finding: "Bacterial contamination (Bacillus cereus) also identified"
      - finding: "Advocates rigorous quality testing and Pan-Pacific manufacturing standards"

  - title: "Safety review of kava (Piper methysticum) by the Natural Standard Research Collaboration"
    authors:
