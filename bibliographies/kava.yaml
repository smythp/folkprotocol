    study_type: "Clinical survey with quantitative causality assessment"
    cases_analyzed: 26
    key_findings:
      - finding: "Causality unassessable, unrelated, or excluded in 16 patients due to temporal or confounding factors"
      - finding: "Only 1 patient adhering to recommendations (≤120 mg kavapyrones daily, ≤3 months duration) experienced probable kava-related liver injury"
      - finding: "Among patients with overdose or extended treatment: causality possible (3 cases) or probable (1 case)"
      - finding: "Kava taken as recommended associated with rare hepatotoxicity"
      - finding: "Overdose, prolonged use, and concurrent medications increase risk"

  - title: "Kava extracts: safety and risks including rare hepatotoxicity"
