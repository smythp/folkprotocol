    - range: "WS1490 extract: 150-200 mg per day"
      context: "Standardized German pharmaceutical extract"
  duration_recommendations:
    - "≤3 months for continuous use (based on hepatotoxicity prevention)"
    - "4-6 weeks typical in most clinical trials"
    - "Onset of effect: typically after 1-8 weeks of use"
  administration:
    - "Typically divided into 2-3 doses per day"
    - "Food reduces absorption - consider taking on empty stomach"
    - "Aqueous extracts preferred over ethanolic or acetone extracts for safety"

