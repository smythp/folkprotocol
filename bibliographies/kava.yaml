  - title: "The Kava Anxiety Depression Spectrum Study (KADSS): a randomized, placebo-controlled crossover trial using an aqueous extract of Piper methysticum"
    authors:
      - Sarris J
      - Kavanagh DJ
      - Byrne G
      - Bone KM
      - Adams J
      - Deed G
    year: 2009
    journal: "Psychopharmacology (Berlin)"
    pubmed_id: "19430766"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/19430766/"
    study_type: "Double-blind, placebo-controlled crossover trial"
    sample_size: 60
    duration_weeks: 3
    dosing: "Five kava tablets daily containing 250 mg kavalactones per day"
    key_findings:
      - finding: "Hamilton Anxiety Scale reduction: -9.9 (kava) vs -0.8 (placebo) in phase one"
      - finding: "Hamilton Anxiety Scale reduction: -10.3 (kava) vs +3.3 (placebo) in phase two"
      - finding: "Pooled effect of kava vs placebo across phases highly significant"
        p_value: "p < 0.0001"
        effect_size: "d = 2.24"
      - finding: "Significant reductions in Beck Anxiety Inventory and Montgomery-Asberg Depression Rating Scale scores"
      - finding: "No serious adverse effects or clinical hepatotoxicity observed"
      - finding: "Equivalent efficacy for anxiety with comorbid depression"

  - title: "Treatment of anxiety, tension and restlessness states with Kava special extract WS 1490 in general practice: a randomized placebo-controlled double-blind multicenter trial"
