      - finding: "Positive reexposure test confirmed kava is potentially hepatotoxic"
      - finding: "Risk factors: overdose, prolonged treatment, comedication with synthetic drugs and dietary supplements"

  - title: "Kava hepatotoxicity solution: A six-point plan for new kava standardization"
