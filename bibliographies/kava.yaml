  - "Extraction method, dosing, duration, and patient population affect outcomes"
  - "Aqueous extracts of noble cultivar rhizomes appear to have best safety profile"
  - "Hepatotoxicity is rare when recommendations followed but risk increases with overdose, prolonged use, or poor quality material"
