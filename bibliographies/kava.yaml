dosing_guidelines:
  summary: "Clinical trials have used varying doses of standardized kava extracts"
  common_dosing_ranges:
    - range: "120-250 mg kavalactones per day"
      context: "Most common therapeutic dose in clinical trials"
    - range: "150-300 mg kavalactones per day"
      context: "Range used in anxiety disorder treatment"
    - range: "≤250 mg kavalactones per day"
      context: "Recommended maximum for medicinal use (Teschke & Lebot 2011)"
    - range: "WS1490 extract: 150-200 mg per day"
      context: "Standardized German pharmaceutical extract"
  duration_recommendations:
    - "≤3 months for continuous use (based on hepatotoxicity prevention)"
    - "4-6 weeks typical in most clinical trials"
    - "Onset of effect: typically after 1-8 weeks of use"
  administration:
    - "Typically divided into 2-3 doses per day"
    - "Food reduces absorption - consider taking on empty stomach"
    - "Aqueous extracts preferred over ethanolic or acetone extracts for safety"

kavalactone_composition:
  major_kavalactones:
    - "Kavain"
    - "Dihydrokavain"
    - "Methysticin"
    - "Dihydromethysticin"
    - "Yangonin"
    - "Desmethoxyyangonin"
  bioavailability_ranking: "dihydrokavain > dihydromethysticin > kavain > methysticin > yangonin"
  time_to_peak: "1-3 hours after oral administration"

quality_considerations:
  extraction_methods:
    - type: "Aqueous (water) extraction"
      notes: "Traditional preparation method, recommended for safety"
    - type: "Acetone extraction (WS1490)"
      notes: "Most studied pharmaceutical extract"
    - type: "Ethanolic extraction"
      notes: "Common but may have higher hepatotoxicity risk"
  plant_material_quality:
    - consideration: "Use noble kava cultivars (e.g., Borogu)"
    - consideration: "Plant age: at least 5 years old at harvest"
    - consideration: "Use peeled and dried rhizomes and roots only"
    - consideration: "Avoid aerial parts (leaves, stems) - associated with toxicity"
  standardization:
    - "Products should be standardized to total kavalactone content"
    - "Typical standardization: 30-70% kavalactones"
    - "Individual kavalactone profile varies by cultivar"

notes:
  - "Evidence is mixed on efficacy, with some high-quality trials showing benefit and others not"
  - "Extraction method, dosing, duration, and patient population affect outcomes"
  - "Aqueous extracts of noble cultivar rhizomes appear to have best safety profile"
  - "Hepatotoxicity is rare when recommendations followed but risk increases with overdose, prolonged use, or poor quality material"
  - "Drug interactions possible via CYP450 enzyme system"
  - "Traditional Pacific Island use has long safety record when prepared properly"
  - "Modern commercial extracts vary widely in quality and composition"
