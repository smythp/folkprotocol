# Kava (Piper methysticum) Bibliography
# Clinical studies, systematic reviews, and monographs
# Focus: dosing, bioavailability, safety profiles, standardized extracts

systematic_reviews_and_meta_analyses:
  - title: "Efficacy of kava extract for treating anxiety: systematic review and meta-analysis"
    authors:
      - Pittler MH
      - Ernst E
    year: 2000
    journal: "Journal of Clinical Psychopharmacology"
    pubmed_id: "10653213"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/10653213/"
    study_type: "Systematic review and meta-analysis"
    studies_included: 7
    studies_in_meta_analysis: 3
    key_findings:
      - finding: "Kava extract was superior to placebo with weighted mean difference of 9.69 points on Hamilton Rating Scale for Anxiety"
        confidence_interval: "95% CI: 3.54-15.83"
      - finding: "Represents an herbal treatment option for anxiety worthy of consideration"

  - title: "Meta-analysis of the efficacy of the acetonic kava-kava extract WS1490 in patients with non-psychotic anxiety disorders"
    authors:
      - Witte S
      - Loew D
      - Gaus W
    year: 2005
    journal: "Phytotherapy Research"
    pubmed_id: "15934028"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/15934028/"
    study_type: "Meta-analysis"
    studies_included: 6
    key_findings:
      - finding: "Effective success rate OR=3.3"
        confidence_interval: "95% CI: 2.09-5.22"
      - finding: "Treatment group improved by approximately 5.94 points on Hamilton Anxiety Rating Scale compared to controls"
      - finding: "Greater response rates in females and younger patients"
      - finding: "No publication bias, no remarkable heterogeneity, high methodological standards"
      - finding: "WS1490 represents viable alternative to conventional pharmaceutical treatments"

  - title: "Kava: a comprehensive review of efficacy, safety, and psychopharmacology"
    authors:
      - Sarris J
      - LaPorte E
      - Schweitzer I
    year: 2011
    journal: "Australian and New Zealand Journal of Psychiatry"
    pubmed_id: "21073405"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/21073405/"
    study_type: "Comprehensive review"
    key_findings:
      - finding: "Significant result in 4 of 6 studies reviewed"
        effect_size: "mean Cohen's d = 1.1"
      - finding: "Anxiolytic mechanisms: modulation of GABA activity via alteration of lipid membrane structure and sodium channel function, MAO-B inhibition, noradrenaline and dopamine re-uptake inhibition"
      - finding: "Recommends traditional water soluble extracts of rhizome from appropriate cultivars"
      - finding: "Cautions: avoid concurrent alcohol use, caution with other psychotropics, avoid high doses before driving, routine liver function tests for regular users"

  - title: "The effectiveness and safety of Kava Kava for treating anxiety symptoms: A systematic review and analysis of randomized clinical trials"
    authors:
      - Smith K
      - Leiras C
    year: 2018
    journal: "Complementary Therapies in Clinical Practice"
    pubmed_id: "30396607"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/30396607/"
    study_type: "Systematic review"
    studies_included: 11
    studies_in_pooled_analysis: 5
    total_participants: 330
    key_findings:
      - finding: "Kava demonstrated superiority over placebo in 3 of 7 trials"
      - finding: "Risk ratio of 1.50 in favor of intervention from responder rates"
        confidence_interval: "95% CI: 1.12-2.01"
      - finding: "Adverse events matched placebo levels"
        p_value: "p = 0.574"
      - finding: "No hepatotoxicity marker elevation compared to baseline except in two studies"
      - finding: "Suitable as short-term treatment for anxiety, not replacement for prolonged anti-anxiety use"

  - title: "Neurocognitive effects of kava (Piper methysticum): a systematic review"
    authors:
      - LaPorte E
      - Sarris J
      - Stough C
      - Scholey A
    year: 2011
    journal: "Human Psychopharmacology"
    pubmed_id: "21437989"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/21437989/"
    study_type: "Systematic review"
    studies_included: 10
    acute_studies: 7
    chronic_studies: 3
    key_findings:
      - finding: "One acute study showed significantly improved visual attention and working memory processes"
      - finding: "Another acute study showed increased body sway"
      - finding: "One chronic study showed significantly impaired visual attention during high-cognitive demand"
      - finding: "Majority of evidence suggests kava has no replicated significant negative effects on cognition"
      - finding: "Proposed mechanisms: cognitive improvements from noradrenaline re-uptake inhibition in prefrontal cortex, balance effects from GABA pathway modulation"

  - title: "Kava for Generalized Anxiety Disorder: A Review of Current Evidence"
    authors:
      - Ooi SL
      - Henderson P
      - Pak SC
    year: 2018
    journal: "Journal of Alternative and Complementary Medicine"
    pubmed_id: "29641222"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/29641222/"
    study_type: "Meta-analysis and systematic review"
    articles_reviewed: 12
    key_findings:
      - finding: "Evidence supporting kava as effective treatment for GAD found in three controlled trials"
      - finding: "One trial showed kava performed no better than placebo"
      - finding: "Meta-analyses of 3 placebo-controlled trials (130 participants) showed modest benefits"
        effect_sizes: "0.59-0.99 (not statistically significant)"
      - finding: "Kava safe and well-tolerated for short-term (4-8 weeks) therapeutic use at 120-280 mg/day kavalactones"
      - finding: "Current evidence insufficient to confirm effect beyond placebo"

  - title: "Complementary and Alternative Medicine Treatments for Generalized Anxiety Disorder: Systematic Review and Meta-analysis of Randomized Controlled Trials"
    authors:
      - Barić H
      - Đorđević V
      - Cerovečki I
      - Trkulja V
    year: 2018
    journal: "Advances in Therapy"
    pubmed_id: "29508154"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/29508154/"
    study_type: "Systematic review and meta-analysis"
    key_findings:
      - finding: "Kava Kava: 4 quality trials with n=233 participants analyzed"
      - finding: "Network meta-regression suggested modest kava effect"
        effect: "Hamilton Anxiety scale score difference -3.24"
        confidence_interval: "95% CI: -6.65, 0.17"
        p_value: "p = 0.059"
      - finding: "Analysis included 139 participants in kava arms, 359 in placebo arms"

randomized_controlled_trials:
  - title: "Neuroimaging Insights: Kava's (Piper methysticum) Effect on Dorsal Anterior Cingulate Cortex GABA in Generalized Anxiety Disorder"
    authors:
      - Savage K
      - Sarris J
      - Hughes M
      - Bousman CA
      - Rossell S
      - Scholey A
      - Stough C
      - Suo C
    year: 2023
    journal: "Nutrients"
    pubmed_id: "37960239"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/37960239/"
    study_type: "Randomized controlled trial with neuroimaging"
    sample_size: 37
    kava_group: 20
    placebo_group: 17
    duration_weeks: 8
    dosing: "Kava standardized to 120 mg kavalactones twice daily (240 mg/day)"
    key_findings:
      - finding: "Kava group showed significant reduction in dorsal anterior cingulate cortex GABA versus placebo"
        p_value: "p = 0.049"
      - finding: "Baseline anxiety scores correlated positively with GABA levels"
      - finding: "dACC GABA could serve as biomarker for diagnosis and treatment response"
      - finding: "Well-tolerated with no serious adverse events"

  - title: "Effect of kava (Piper methysticum) on peripheral gene expression among individuals with generalized anxiety disorder: A post hoc analysis of a randomized controlled trial"
    authors:
      - Cribb L
      - Sarris J
      - Savage KM
      - Byrne GJ
      - Metri NJ
      - Scholey A
      - Stough C
      - Bousman CA
    year: 2023
    journal: "Phytotherapy Research"
    pubmed_id: "37767766"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/37767766/"
    study_type: "Randomized controlled trial (post hoc analysis)"
    sample_size_baseline: 71
    sample_size_8_weeks: 40
    key_findings:
      - finding: "Kava decreased expression of GABA receptor gene (GABRR2) and catechol-O-methyltransferase (COMT)"
      - finding: "Results did not withstand correction for multiple comparisons"
      - finding: "Supports kava mechanism involving GABAergic and catecholaminergic systems"
      - finding: "Baseline gene expression did not predict treatment response"

  - title: "Kavalactones support motivation to move during intensive training in males preparing for military special operations forces"
    authors:
      - Smith SY
      - Aylwin CF
      - Daniels TF
      - Greer JL
      - Kunces LJ
      - Lili L
      - Phipps SM
      - Schmidt CM
      - Schmidt JC
      - Schmidt MA
    year: 2024
    journal: "Journal of the International Society of Sports Nutrition"
    pubmed_id: "39010683"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/39010683/"
    study_type: "Randomized controlled trial, placebo-controlled crossover design"
    sample_size: 15
    duration: "Two 14-day loading periods separated by 10-day washout"
    dosing: "225 mg kavalactones nightly"
    key_findings:
      - finding: "Cortisol, sleep, and mood remained within normal parameters with no significant changes"
      - finding: "Between-group differences in 'Move' motivation emerged after 1 week"
        p_value: "p = 0.044"
      - finding: "Differences persisted through loading period"
        p_value: "p = 0.022"
      - finding: "Kavalactone-first group maintained stable motivation scores (range 21.0-28.6)"
      - finding: "Rest motivation unaffected across conditions"

  - title: "Kava in the treatment of generalized anxiety disorder: a double-blind, randomized, placebo-controlled study"
    authors:
      - Sarris J
      - Stough C
      - Bousman CA
      - Wahid ZT
      - Murray G
      - Teschke R
      - Savage KM
      - Dowell A
      - Ng C
      - Schweitzer I
    year: 2013
    journal: "Journal of Clinical Psychopharmacology"
    pubmed_id: "23635869"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/23635869/"
    study_type: "Double-blind, randomized, placebo-controlled trial"
    sample_size: 75
    completers: 58
    duration_weeks: 6
    dosing: "Aqueous kava extract providing 120-240 mg kavalactones per day depending on response"
    key_findings:
      - finding: "Statistically significant anxiety reduction versus placebo"
        p_value: "p = 0.046"
        effect_size: "Cohen's d = 0.62"
      - finding: "Among moderate-to-severe GAD cases, effect size increased"
        p_value: "p = 0.02"
        effect_size: "d = 0.82"
      - finding: "Remission rates: 26% in kava group versus 6% in placebo group"
        p_value: "p = 0.04"
      - finding: "GABA transporter polymorphisms predicted treatment response"
      - finding: "Well-tolerated with more headaches in treatment group"
        p_value: "p = 0.05"
      - finding: "No significant liver function test abnormalities"

  - title: "Kava for generalised anxiety disorder: A 16-week double-blind, randomised, placebo-controlled study"
    authors:
      - Sarris J
      - Byrne GJ
      - Bousman CA
      - Cribb L
      - Savage KM
      - Holmes O
      - Murphy J
      - Macdonald P
      - Short A
      - Nazareth S
      - Jennings E
      - Thomas SR
      - Ogden E
      - Chamoli S
      - Scholey A
      - Stough C
    year: 2020
    journal: "Australian and New Zealand Journal of Psychiatry"
    pubmed_id: "31813230"
