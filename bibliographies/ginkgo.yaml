# SAFETY AND PHARMACOVIGILANCE

safety_studies:
  - id: general_safety_profile
    source: "Multiple systematic reviews and RCTs"
    study_count: "18+ randomized controlled trials with 1985+ adults"
    key_findings: |
      - No higher bleeding risk associated with standardized Ginkgo biloba leaf extract
      - Based on hemostasis parameters and mean difference comparisons between treatment and placebo
      - Adverse event rates generally comparable to placebo across multiple trials
      - Excellent safety profile in patients with dementia and cognitive impairment
      - No serious adverse events in most trials
    typical_adverse_effects: "Minimal and comparable to placebo"
    drug_interactions: "No relevant CYP450 interactions at doses up to 240 mg daily"
    maximum_safe_dose: "240 mg daily based on multiple RCTs"
    contraindications: "Monitor for bleeding in patients on anticoagulants (precautionary)"

# DOSING RECOMMENDATIONS

dosing_guidelines:
  standard_doses:
    cognitive_support: "120-240 mg daily (divided or once daily)"
    alzheimers_dementia: "240 mg daily"
    mci_neuropsychiatric: "240 mg daily"
    cerebral_blood_flow: "120 mg daily (60 mg twice daily)"
    tinnitus: "120 mg twice daily (240 mg total)"
    peripheral_arterial_disease: "120-300 mg daily"
  formulation: "Standardized extract (EGb 761 or equivalent meeting pharmacopoeia standards)"
  duration:
    acute_effects: "Single doses of 240-360 mg show effects within 2.5-6 hours"
    chronic_effects: "22-26 weeks minimum for cognitive and functional benefits"
  bioavailability_notes: |
    - Ginkgolide half-lives: 1.7-2.2 hours
    - Maximum concentrations reached: 40-159 ng/ml depending on compound
    - Clearance values: 24.2-37.6 ml/min/kg

# QUALITY AND EVIDENCE ASSESSMENT

evidence_quality:
  high_quality_evidence:
    - "Cognitive function in dementia (multiple large RCTs, meta-analyses)"
    - "Safety profile (extensive RCT data, >2500 participants)"
    - "Standardized extract composition (pharmacopoeia specifications)"
  moderate_quality_evidence:
    - "Cerebral blood flow improvements (pilot studies, small samples)"
    - "Neuropsychiatric symptoms in MCI (limited RCTs)"
  low_quality_evidence:
    - "Peripheral arterial disease (mixed results, modest effect sizes)"
    - "Tinnitus (conflicting results, unclear clinical significance)"

  limitations:
    - "Many trials have unclear or high risk of bias"
    - "Heterogeneous protocols across studies"
    - "Limited independent replications of single studies"
    - "Most prevention trials show negative results"

