notes: |
  This bibliography focuses on clinical studies of Ginkgo biloba with emphasis on:
  - Standardized extracts (particularly EGb 761)
  - Randomized controlled trials with adequate sample sizes
  - Systematic reviews and meta-analyses
  - Dosing and pharmacokinetics
  - Safety profiles and drug interactions
  - Authoritative monographs (WHO, Commission E)

  Most high-quality evidence supports use in cognitive impairment and dementia at 240 mg daily.
  Safety profile is excellent with minimal adverse effects at recommended doses.
  Evidence for other indications (PAD, tinnitus) is mixed or negative.

  Standardization is critical - clinical trials use extracts meeting European/US pharmacopoeia standards
  with specific percentages of flavonoid glycosides (22-27%) and terpene lactones (5.4-6.6%).
