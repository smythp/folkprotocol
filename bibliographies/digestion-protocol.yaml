      - Hannah J Craven
      - Huiping Xu
      - Andrea Shin
    year: 2020
    journal: Clinical Gastroenterology and Hepatology
    volume: 19
    issue: 8
    pages: "1538-1553.e14"
    pubmed_id: 33347998
    pubmed_link: https://pubmed.ncbi.nlm.nih.gov/33347998/
    pmc_link: https://pmc.ncbi.nlm.nih.gov/articles/PMC8112831/
    trials_analyzed: 66
    participants: 6764
    herbs_studied:
      - Curcuma (with peppermint oil, caraway oil, fennel)
      - Tong-Xie-Yao-Fang (Chinese herbal formulas)
      - Boswellia carterii
      - Peppermint oil
      - Ginger
      - Berberine hydrochloride
      - Aloe vera
      - Melatonin
    condition: Irritable Bowel Syndrome
    key_findings:
      - "Herbal therapy for abdominal pain: SMD=0.47, 95% CI: 0.20-0.75"
      - "Herbal therapy overall response: RR=1.57 (NNT=5)"
      - "Dietary supplements: RR=1.95 (NNT=4)"
    quality_grade: "Low to Very Low (GRADE)"
    conclusion: "CAM therapies including herbal and dietary supplements may be beneficial for IBS symptoms"

  - id: tan_2020_herbal_fgid
