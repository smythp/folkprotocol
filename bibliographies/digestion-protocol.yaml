      - Jan Tack
      - Mengyu Zhang
      - Yuwen Li
      - Minhu Chen
      - Yinglian Xiao
    year: 2020
    journal: Journal of Gastroenterology and Hepatology
    volume: 35
    issue: 4
    pages: "544-556"
    pubmed_id: 31674057
    pubmed_link: https://pubmed.ncbi.nlm.nih.gov/31674057/
