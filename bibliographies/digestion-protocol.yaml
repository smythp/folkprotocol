---
protocol_name: Digestion Support
target_conditions:
  - Functional dyspepsia
  - Irritable bowel syndrome (IBS)
  - Bloating and gas
  - Nausea and vomiting
  - Functional constipation
  - GERD/acid reflux
  - Poor digestive function
bibliography_created: 2026-01-15
research_scope: Multi-herb comparative effectiveness, traditional formulas, mechanisms of action

# KEY FINDINGS SUMMARY

key_insights:
  strongest_evidence:
    - herb: Peppermint oil
      condition: IBS (especially pain and bloating)
      quality: Strong - multiple systematic reviews and meta-analyses

    - herb: STW-5 (Iberogast)
      condition: Functional dyspepsia and IBS
      quality: Strong - well-established efficacy, equivalence to conventional drugs

    - herb: Ginger
      condition: Acute vomiting (chemotherapy, postoperative, pregnancy)
      quality: Strong - consistent findings across multiple reviews
      note: Weaker evidence for nausea specifically

  comparative_findings:
    - comparison: Ginger vs. Peppermint vs. Caraway
      winner: Ginger (best overall), Peppermint (second), Caraway (third)
      study: Latif 2025
      condition: GI disturbances in TB patients

    - comparison: Curcumin vs. Omeprazole (PPI drug)
      result: Equivalent efficacy
      study: Kongkam 2023
      dose: 1,000 mg/day curcumin = 20 mg omeprazole
      significance: Landmark finding - herb matched pharmaceutical

    - comparison: Peppermint-Caraway vs. Cisapride (drug)
      result: Equivalent efficacy, better tolerability
      study: Madisch 1999

  mechanism_categories:
    carminatives: "Peppermint, fennel, ginger - gas expulsion via smooth muscle relaxation"
    bitters: "Gentian, dandelion, artichoke - stimulate digestive secretions via T2R receptors"
    anti_spasmodics: "Chamomile, peppermint - calcium channel blockade, K+ channel activation"
    anti_inflammatory: "Ginger, turmeric - COX-2 inhibition, NF-κB suppression"
    prokinetic: "Ginger, artichoke, Iberogast - accelerate gastric emptying"
    microbiome: "Polyphenol-rich herbs - prebiotic fermentation, SCFA production"

  synergistic_combinations:
    - "Ginger + Turmeric: Enhanced anti-inflammatory (RAW 264.7 cell studies)"
    - "Artichoke + Ginger: Improved gastric emptying (2015 Prodigest trial)"
    - "Peppermint + Caraway: Established combination for functional dyspepsia"

# SYSTEMATIC REVIEWS AND META-ANALYSES

systematic_reviews:

