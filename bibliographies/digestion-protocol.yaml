# HEAD-TO-HEAD COMPARATIVE TRIALS

comparative_trials:

  - id: latif_2025_three_herb_comparison
    type: Head-to-Head RCT (Three Herbs)
    title: "Comparative study on the prokinetic effects of ginger, caraway, and peppermint in relieving gastrointestinal disturbances in pulmonary TB patients: A clinical trial"
    authors:
      - Latif A
      - Ahmad H
      - Bashir I
    year: 2025
    journal: Food Science & Nutrition
    volume: 13
    issue: 6
    clinical_trial_id: NCT06157034
    pmc_link: https://pmc.ncbi.nlm.nih.gov/articles/PMC12104075/
    sample_size: 200
    completed: 189
    duration: "3 months intervention + 1 month washout"
    condition: "GI disturbances in pulmonary TB patients on anti-tuberculosis treatment"
    interventions:
      ginger: "500 mg twice daily (1 g/day)"
      caraway: "1,000 mg twice daily (2 g/day)"
      peppermint: "1.5 mL twice daily (3 mL/day)"
      placebo: "500 mg roasted starch twice daily"
    outcomes: "Rome IV criteria: postprandial distress, early satiation, epigastric pain/burning, nausea, vomiting, belching"
    results:
      winner: "Ginger (best overall)"
      second: "Peppermint"
      third: "Caraway"
      ginger_standouts:
        - "No vomiting recurrence"
        - "Highest phenolic content (1035.51 mgGAE/g)"
        - "Superior antioxidant capacity"
        - "Significant reduction in postprandial distress during washout"
    limitations:
      - "Specific population (TB patients)"
      - "Different dose amounts complicate direct comparison"
      - "Doses not standardized by weight/bioactivity"
    significance: "First true 3-way herbal comparison; ginger emerged as most effective"

  - id: freise_1999_peppermint_caraway_dose
    type: Dose Comparison RCT
    title: "Peppermint oil-caraway oil fixed combination in non-ulcer dyspepsia—comparison of the effects of enteric preparations"
    authors:
      - Freise J
      - Köhler S
    year: 1999
    journal: Pharmazie
    volume: 54
    issue: 3
    pages: "210-215"
    pubmed_id: 10192108
    pubmed_link: https://pubmed.ncbi.nlm.nih.gov/10192108/
    design: "Prospective, randomized, double-blind, reference-controlled multicenter trial"
    sample_size: 223
    analyzed: 213
    duration: "4 weeks"
    condition: "Non-ulcer dyspepsia (dysmotility type or idiopathic)"
    interventions:
      high_dose: "90 mg peppermint oil + 50 mg caraway oil (enteric-coated)"
      low_dose: "36 mg peppermint oil + 20 mg caraway oil (enteric-soluble)"
    results:
      pain_intensity: "Both equivalent: -3.6 vs -3.3 points (p < 0.001)"
      pain_frequency: "High dose superior (p = 0.04)"
      tolerability: "High dose better despite higher dose (enteric coating)"
    conclusion: "Higher dose (90/50 mg) superior for pain frequency with better tolerability"

  - id: madisch_1999_peppermint_vs_cisapride
    type: Equivalence Trial (Herb vs Drug)
    title: "Treatment of functional dyspepsia with a fixed peppermint oil and caraway oil combination preparation as compared to cisapride. A multicenter, reference-controlled double-blind equivalence study"
    authors:
      - Madisch A
      - Heydenreich CJ
      - Wieland V
      - Hufnagel R
      - Hotz J
    year: 1999
    journal: Arzneimittelforschung
    volume: 49
    issue: 11
    pages: "925-932"
    pubmed_id: 10604046
    pubmed_link: https://pubmed.ncbi.nlm.nih.gov/10604046/
    design: "Multicenter, randomized, double-blind equivalence trial"
    sample_size: 120
    analyzed: 118
    duration: "4 weeks"
    condition: "Functional dyspepsia"
    interventions:
      herbal: "90 mg peppermint + 50 mg caraway, 2 capsules daily (n=60)"
      drug: "Cisapride 10 mg three times daily (n=58)"
    results:
      pain_reduction: "4.62 points (herbal) vs 4.60 points (drug) - p = 0.021 (equivalent)"
      adverse_events: "12 events (herbal) vs 14 events (drug)"
    conclusion: "Therapeutic equivalence demonstrated; herbal combination viable alternative to pharmaceutical prokinetic"
    clinical_significance: "Establishes peppermint-caraway as drug-equivalent option"

  - id: kongkam_2023_curcumin_vs_omeprazole
    type: Three-Arm RCT (Herb vs Drug vs Combination)
    title: "Curcumin and proton pump inhibitors for functional dyspepsia: a randomised, double blind controlled trial"
    authors:
      - Kongkam P et al.
    year: 2023
    journal: BMJ Evidence-Based Medicine
    pubmed_id: 37696679
    pubmed_link: https://pubmed.ncbi.nlm.nih.gov/37696679/
    design: "Randomized, double-blind controlled trial"
    sample_size: 206
    completed: 151
    duration: "28 days treatment + 28 days follow-up"
    condition: "Functional dyspepsia"
    interventions:
      curcumin: "250 mg four times daily (total 1,000 mg/day)"
      omeprazole: "20 mg once daily"
      combination: "Both agents at above doses"
    primary_outcome: "Severity of Dyspepsia Assessment (SODA) score on days 28 and 56"
    results:
      curcumin_pain: "-8.07"
      omeprazole_pain: "-8.85"
      combination_pain: "-7.19"
      statistical_significance: "No significant differences among groups"
      adverse_events: "No serious adverse events in any group"
    conclusion: "Curcumin demonstrated EQUIVALENT EFFICACY to omeprazole with no synergistic benefit when combined"
    clinical_significance: "LANDMARK FINDING - herb matched pharmaceutical efficacy"
    note: "Curcumin at 1,000 mg/day appears viable alternative to PPIs for functional dyspepsia"

  - id: giacosa_2015_ginger_artichoke
    type: RCT (Combination vs Placebo)
    title: "The effect of ginger (Zingiber officinalis) and artichoke (Cynara cardunculus) extract supplementation on functional dyspepsia: A randomised, double-blind, and placebo-controlled clinical trial"
    authors:
      - Giacosa A et al.
    year: 2015
    journal: Evidence-Based Complementary and Alternative Medicine
    pubmed_id: 25954317
    pubmed_link: https://pubmed.ncbi.nlm.nih.gov/25954317/
    design: "Prospective, multicenter, double-blind, randomized, placebo-controlled, parallel-group trial"
    sample_size: 126
    supplementation: 65
    placebo: 61
    duration: "4 weeks"
    condition: "Functional dyspepsia"
    intervention: "Ginger + artichoke leaf extract combination (2 capsules daily before lunch and dinner)"
    results:
      day_14: "Significant improvement (p = 0.017) vs placebo (p = 0.513)"
      symptoms_improved: "Nausea, epigastric fullness, pain, bloating"
    note: "This tested combination vs placebo, not ginger vs artichoke head-to-head"
    conclusion: "Ginger-artichoke combination appears safe and efficacious"

  - id: holtmann_2003_artichoke
    type: RCT (Single Herb vs Placebo)
    title: "Efficacy of artichoke leaf extract in the treatment of patients with functional dyspepsia: a six-week placebo-controlled, double-blind, multicentre trial"
    authors:
      - Holtmann G
      - Adam B
      - Haag S
      - Collet W
      - Grünewald E
      - Windeck T
    year: 2003
    journal: Alimentary Pharmacology & Therapeutics
    volume: 18
    issue: "11-12"
    pages: "1099-1105"
    pubmed_id: 14653829
    pubmed_link: https://pubmed.ncbi.nlm.nih.gov/14653829/
    design: "Double-blind, RCT, placebo-controlled, multicenter"
    sample_size: 247
    analyzed: 244
    active: 129
    placebo: 115
    duration: "6 weeks"
    condition: "Functional dyspepsia"
    intervention: "Artichoke leaf extract 640 mg twice daily (2 × 320 mg t.i.d.)"
    results:
      symptom_improvement: "8.3 ± 4.6 (artichoke) vs 6.7 ± 4.8 (placebo), p < 0.01"
      quality_of_life: "-41.1 ± 47.6 (artichoke) vs -24.8 ± 35.6 (placebo), p < 0.01"
    conclusion: "Artichoke preparation significantly superior to placebo in symptom relief and quality of life"

# MECHANISM STUDIES

mechanism_studies:

  # Carminative Mechanisms

  - id: peppermint_calcium_channel
    herb: Peppermint
    latin_name: Mentha × piperita
    category: Carminative, Anti-spasmodic
    mechanism: Calcium channel blockade
    active_compound: Menthol
    description: "Menthol blocks calcium channels in smooth muscle cells, preventing muscle contraction"
    evidence_level: In vitro/in vivo
    studies:
      - finding: "Peppermint oil markedly attenuated contractile responses in guinea pig taenia coli to acetylcholine, histamine, 5-HT, and substance P"
        model: Guinea pig taenia coli
      - finding: "Potential-dependent calcium currents in rabbit jejunum smooth muscle cells were inhibited in concentration-dependent manner, similar to dihydropyridine calcium antagonists"
        model: Rabbit jejunum (whole cell clamp)
    references:
      - PMC8601825 - Antispasmodic Potential of Medicinal Plants
      - PMC6539827 - Antispasmodic Effect of Essential Oils

  - id: fennel_carminative
    herb: Fennel
    latin_name: Foeniculum vulgare
    category: Carminative, Anti-spasmodic
    mechanism: Gas expulsion and smooth muscle relaxation
    active_compounds:
      - Anethole
      - Fenchone
      - Estragole
    description: "Volatile oils provide potent carminative effects that help expel gas from intestinal tract; acts as antispasmodic, relaxing smooth muscles"
    clinical_evidence:
      - "Heated fennel therapy accelerated recovery of GI function postoperatively"
      - "Fennel oil eliminated infantile colic in 65% vs 23.7% placebo (RCT)"
    references:
      - https://www.sciencedirect.com/science/article/pii/S0039606020303524
      - PMC9269469

  # Bitter Mechanisms

  - id: gentian_bitter_pathway
    herb: Gentian
    latin_name: Gentiana lutea
    category: Bitter
    mechanism: Bitter taste receptor (T2R) activation
    active_compounds:
      - Gentiamarin
      - Gentiopicrin
      - Amarogentin
      - Swertiamarine
      - Gentianose
    pathway:
      - "T2R activation in GI tract"
      - "Vagal nerve stimulation"
      - "Gastrin release"
      - "HCl and pepsin secretion"
      - "Enhanced saliva, bile flow"
    classic_study:
      researcher: Moorhead
      year: 1915
      finding: "Gentian tincture caused marked increase in appetite and gastric secretion of HCl and pepsin in cachectic dogs"
      model: Canine
    references:
      - PMC4446506 - Bitters: Time for a New Paradigm
      - Frontiers in Physiology 2019

  - id: artichoke_bile_prokinetic
    herb: Artichoke
    latin_name: Cynara scolymus
    category: Bitter, Prokinetic
    mechanism: Bile production enhancement and gastric emptying acceleration
    active_compounds:
      - Cynaropicrin (sesquiterpene lactone)
      - Cynarin (caffeoylquinic acid)
    clinical_evidence:
      - study: Phytomedicine 2003
        finding: "Artichoke leaf extract significantly improved functional dyspepsia symptoms"
        model: RCT, human
      - study: 2015 Prodigest trial
        finding: "Artichoke + ginger made significant difference in delayed gastric emptying"
        model: Human clinical trial
    references:
      - Phytomedicine 2003
      - PMC7365888 - Herbal Therapies in Functional GI Disorders

  # Anti-Spasmodic Mechanisms

  - id: chamomile_dual_mechanism
    herb: Chamomile (German)
    latin_name: Matricaria chamomilla
    category: Anti-spasmodic, Anti-inflammatory
    mechanisms:
      calcium_blockade:
        description: "Alcoholic extract produces myorelaxant effects through Ca²⁺ channel blockade"
        evidence: In vitro
        model: Rabbit jejunum
      potassium_activation:
        description: "Activates K⁺ channels, causing smooth muscle relaxation; effect blocked by 4-aminopyridine"
        evidence: In vitro
        model: Rabbit jejunum
      histamine_ach_antagonism:
        description: "Inhibits spasm induced by histamine and acetylcholine"
        evidence: In vitro
        model: Guinea pig ileum
    active_compounds:
      - Bisabolol (sesquiterpene)
      - Flavonoids
    references:
      - PMC8601825 - Antispasmodic Potential of Medicinal Plants

  # Prokinetic and Anti-Inflammatory

  - id: ginger_multimechanism
    herb: Ginger
    latin_name: Zingiber officinale
    category: Carminative, Prokinetic, Anti-inflammatory
    active_compounds:
      - Gingerols
      - Shogaols (6-s, 8-s, 10-s)
    mechanisms:
      digestive_enzyme_stimulation:
        description: "Stimulates production of digestive enzymes and bile, aiding food breakdown"
        evidence: Clinical
      prokinetic:
        description: "Accelerates gastric emptying and stimulates antral contractions"
        evidence: Human clinical trials
        reference: PMC3016669
      anti_inflammatory:
        description: "Inhibits prostaglandin and leukotriene biosynthesis; reduces TNF, IL-6, GM-CSF, MCP-1"
        evidence: In vitro/in vivo
        synergy: "Ginger-turmeric combination synergistically attenuated inflammatory cytokines (RAW 264.7 cells)"
    clinical_studies:
      - "Accelerates gastric emptying in healthy volunteers (PMC3016669)"
      - "No irritant effect on gastric mucosa; selectively reduces inflammatory cytokines"
      - "2015 Prodigest study: artichoke + ginger improved delayed gastric emptying"
    references:
      - PMC3016669 - Effect of ginger on gastric motility and functional dyspepsia
      - Frontiers Pharmacology 2022 - Synergistic inhibition
      - PMC9229778 - Synergistic anti-inflammatory activity

  - id: turmeric_anti_inflammatory
    herb: Turmeric
    latin_name: Curcuma longa
    category: Anti-inflammatory
    active_compound: Curcumin
    mechanisms:
      cox2_inhibition:
        description: "Curcumin inhibits COX-2 enzyme that produces inflammatory prostaglandins"
        evidence: In vitro/in vivo
      pge2_suppression:
        description: "Crude organic extracts inhibited LPS-induced PGE2 production (IC50 = 0.92 μg/mL)"
        model: HL-60 cells
      nfkb_inhibition:
        description: "Turmeric-ginger combo significantly inhibited LPS-induced NF-κB p65 translocation"
        evidence: In vitro
      tlr4_pathway:
        description: "Inhibits activation of TLR4, TRAF6, phosphorylation of JNK and c-JUN"
      nrf2_enhancement:
        description: "Optimal combination enhanced Nrf2 and HO-1 protein expressions (antioxidant/anti-inflammatory)"
    synergy_with_ginger:
      finding: "Synergistic inhibition of TNF, IL-6, GM-CSF, MCP-1"
      model: RAW 264.7 cells
      reference: Frontiers Pharmacology 2022
    references:
      - Frontiers Pharmacology 2022; PMC9160922
      - PMC9229778 - Synergistic anti-inflammatory activity
      - NCBI Books NBK92752 - Turmeric, the Golden Spice

  # Microbiome Mechanisms

  - id: polyphenols_microbiome
    category: Prebiotic, Microbiome modulator
    herbs: "Polyphenol-rich herbs (turmeric, various spices, teas)"
    active_compounds:
      - Curcumin (turmeric)
      - Quercetin (various)
      - Trans-resveratrol (various)
      - Various polyphenols from spices, teas, herbs
    mechanisms:
      prebiotic_fermentation:
        description: "Only 5-10% absorbed in small intestine; 90-95% reaches colon where they interact with gut microbiota"
        evidence: Pharmacokinetic studies
      scfa_production:
        description: "Stimulate beneficial bacteria that produce short-chain fatty acids (acetate, propionate, butyrate)"
        evidence: Clinical/in vitro
      beneficial_bacteria:
        description: "Enriches Faecalibacterium, Eubacterium, Roseburia, Blautia (SCFA producers)"
        evidence: Clinical trials
      microbial_metabolites:
        description: "Gut bacteria transform polyphenols using PAZymes, producing bioactive low-MW phenolic metabolites"
        evidence: In vitro/in vivo
      anti_inflammatory_scfa:
        description: "SCFAs signal through GPCRs or HDAC inhibition, regulate T-cell differentiation to induce regulatory T-cells"
        evidence: Immunological studies
    key_finding: "Polyphenols now recognized as class of prebiotics alongside carbohydrates, minerals, PUFAs"
    clinical_benefits:
      - Gut barrier integrity
      - Immune modulation
      - Metabolic regulation
    references:
      - PMC8747136 - Polyphenols-Gut Microbiota: Transition to New Generation of Prebiotics
      - Frontiers Pharmacology 2018 - Gut Microbiota, SCFAs, Herbal Medicines
      - PMC12425962 - Gut microbiome-mediated health effects

  # Gut-Brain Axis

  - id: gut_brain_axis_mechanisms
    category: Gut-brain axis modulator
    mechanisms:
      vagus_activation:
        description: "Bitter receptors on tongue stimulate vagus nerve, sending parasympathetic signals throughout GI tract"
        pathway: "Bitter taste → vagus → gastrin, satiety hormones, gastric acid, pancreatic enzymes"
        evidence: Neurological
      serotonin_modulation:
        description: "~90% of body's serotonin synthesized in gut by enterochromaffin (EC) cells"
        mechanism: "Gut serotonin activates vagal afferents → NTS → DRN/LC modulation"
        evidence: Established physiology
      scfa_serotonin:
        description: "SCFAs enhance serotonin synthesis and vagal activity, shaping gut-brain communication"
        evidence: Recent 2024-2026 research
        year: 2024
      microbial_serotonin:
        description: "Bacterial strains influence serotonin: L. reuteri converts tryptophan → 5-HTP; L. plantarum stimulates EC cell secretion"
        evidence: In vitro/in vivo
      bidirectional:
        description: "Gut microbiota communicates with CNS via immune system, vagus, ENS, neuroendocrine system, circulation"
        evidence: Systems biology
    therapeutic_applications:
      - Prebiotics
      - Medicinal herbs
      - Probiotics
      - Synbiotics
      - Neurodegenerative diseases
      - Mood disorders
    recent_findings:
      - year: 2024
        finding: "Substances (including serotonin) from EEC cells diffuse to vagus nerve sensory endings in colon"
        significance: Clarified mechanism of gut-to-brain signaling
    references:
      - MDPI 2026 - Interaction of Vagus Nerve and Serotonin in Gut-Brain Axis
      - PMC11818468 - Interaction of Vagus Nerve and Serotonin
      - Nature 2024 - Microbiota-gut-brain axis and CNS diseases
      - Frontiers Microbiology 2025 - Microbiota-gut-brain axis mechanisms

# SYNERGISTIC COMBINATIONS

synergistic_combinations:

  - combination: Ginger + Turmeric
    effect: Enhanced anti-inflammatory
    mechanisms:
      - "Both inhibit prostaglandin pathways"
      - "Curcumin inhibits COX-2"
      - "Gingerols/shogaols + curcumin → enhanced cytokine suppression"
      - "Combination inhibits NF-κB, TLR4/TRAF6, JNK/c-JUN"
      - "Enhanced Nrf2/HO-1 expression"
    evidence: RAW 264.7 cells; multiple RCTs
    references:
      - Frontiers Pharmacology 2022
      - PMC9229778

  - combination: Artichoke + Ginger
    effect: Enhanced gastric emptying
    commercial_product: Prodigest
    evidence: "2015 human clinical trial on delayed gastric emptying"
    mechanisms:
      - "Artichoke: bile stimulation"
      - "Ginger: prokinetic + enzyme stimulation"

  - combination: Peppermint + Caraway
    effect: Enhanced functional dyspepsia relief
    evidence: Multiple RCTs showing equivalence to cisapride
    optimal_dose: "90 mg peppermint + 50 mg caraway"
    mechanisms:
      - "Peppermint: calcium channel blockade, smooth muscle relaxation"
      - "Caraway: carminative, gas expulsion"

  - combination: Polyphenols + Fiber
    effect: Enhanced SCFA production and microbiome diversity
    mechanisms:
      - "Both selectively fermented by gut microbes"
      - "Synergistic enrichment of beneficial bacteria"
      - "Increased butyrate production"
    benefits:
      - Gut barrier integrity
      - Immune modulation
      - Metabolic regulation

# RESEARCH GAPS AND FUTURE DIRECTIONS

research_gaps:
  comparative_trials:
    - "Very few true herb vs. herb head-to-head comparisons"
    - "TCM formulas never compared against each other in RCTs"
    - "Need: Ginger vs. Peppermint for functional dyspepsia at equivalent doses"
    - "Need: Curcumin vs. Ginger vs. Artichoke three-arm trial"
    - "Need: DGL vs. Chamomile vs. Combination for GERD"

  methodological:
    - "Bioequivalent dosing: standardize based on active constituent content"
    - "Longer follow-up: most trials 4-8 weeks; need 6-12 month studies"
    - "Subgroup analysis: determine which herbs work best for which symptom patterns"
    - "Component analysis: test multi-herb formulas vs. individual components"

  mechanistic:
    - "More human clinical trials on prokinetic herbs (most evidence from animal/in vitro)"
    - "Dose-response studies for individual herbs"
    - "Microbiome modulation: strain-specific effects of different herbs"
    - "Gut-brain axis: mechanistic studies on specific herbal compounds"
    - "Pharmacokinetics of polyphenol metabolites"

  quality:
    - "Overall evidence quality: low to very low (GRADE assessments)"
    - "High heterogeneity between studies"
    - "Standardization of herbal preparations and dosages needed"
    - "Better adverse event monitoring and reporting"
    - "More pediatric-focused research"

# CLINICAL RECOMMENDATIONS BASED ON EVIDENCE

clinical_recommendations:

  functional_dyspepsia:
    first_line:
      - name: Peppermint + Caraway oil
        dose: "90 mg peppermint + 50 mg caraway, twice daily"
        evidence: "Equivalent to cisapride (Madisch 1999)"
      - name: STW-5 (Iberogast)
        evidence: "Multiple RCTs, equivalent to prokinetics, superior tolerability"
    alternatives:
      - name: Curcumin
        dose: "250 mg four times daily (1,000 mg/day)"
        evidence: "Equivalent to omeprazole 20 mg (Kongkam 2023)"
      - name: Artichoke extract
        dose: "640 mg twice daily"
        evidence: "Superior to placebo (Holtmann 2003)"
      - name: Ginger + Artichoke combination
        evidence: "Significant improvement by day 14 (Giacosa 2015)"

  ibs:
    first_line:
      - name: Peppermint oil (enteric-coated)
        evidence: "Multiple systematic reviews; NNT=4 for global symptoms, NNT=7 for pain"
        note: "Avoid in GERD/hiatal hernia"
      - name: STW-5 (Iberogast)
        evidence: "Reduced IBS symptom score by 1.5 points vs placebo (p < 0.0004)"
    alternatives:
      - name: Chinese herbal medicine formulas
        evidence: "Positive meta-analyses but variable quality; higher adverse events than placebo"
        note: "Most evidence for diarrhea-predominant IBS"

  nausea_vomiting:
    acute_vomiting:
      - name: Ginger
        dose: "≤1 g/day for >3 days"
        evidence: "60% reduction in acute vomiting (CINV); equal to metoclopramide (PONV)"
        note: "Strong evidence for vomiting; weaker for nausea specifically"
    pregnancy:
      - name: Ginger
        evidence: "Evidence shows promise for pregnancy-related nausea and vomiting"

  bloating_gas:
    carminatives:
      - name: Peppermint oil
        mechanism: "Calcium channel blockade → smooth muscle relaxation"
      - name: Fennel
        mechanism: "Volatile oils expel gas, relax smooth muscles"
        pediatric: "Eliminated infantile colic in 65% vs 23.7% placebo"
      - name: Ginger
        mechanism: "Digestive enzyme stimulation, enhances motility"
        evidence: "Winner in 3-way comparison (Latif 2025)"

  gerd:
    options:
      - name: DGL (deglycyrrhizinated licorice)
        evidence: "Significant improvement in GERD-HRQL scores (p = 0.014)"
      - name: Chamomile
        mechanism: "Spasmolytic effect reduces acid reflux episodes"
        safety: "All adverse events self-limiting and non-serious (2,896 patients)"

  poor_digestion:
    bitters:
      - name: Gentian
        mechanism: "T2R activation → vagus → gastrin → HCl/pepsin"
        evidence: "Classic 1915 study in dogs; historical use"
      - name: Artichoke
        mechanism: "Bile production enhancement"
        evidence: "RCT in Phytomedicine 2003"

# SAFETY CONSIDERATIONS

safety_profile:

  generally_safe:
    - herb: STW-5 (Iberogast)
      adverse_rate: "0.04%"
      note: "No serious adverse events; similar to placebo"
    - herb: Chamomile
      note: "All adverse events self-limiting and non-serious (2,896 patients in 10 trials)"
    - herb: Herbal medicines for FGIDs generally
      note: "Adverse events similar to or lower than conventional medicines"
    - herb: Ginger
      note: "No irritant effect on gastric mucosa; selectively reduces inflammatory cytokines"

  cautions:
    - herb: Peppermint oil
      issue: "Higher adverse event rate than placebo (RR=1.57)"
      contraindication: "Avoid in GERD/hiatal hernia patients"
    - herb: Aloe vera
      issues:
        - "High dropout rates (29-57%)"
        - "Case reports of toxic hepatitis"
      recommendation: "Not recommended based on current evidence"
    - herb: Chinese herbal medicine (IBS)
      issue: "Higher adverse event rate than placebo"
      note: "No serious adverse events reported"

  overall_assessment: "Most herbal medicines for digestive disorders have acceptable safety profiles with adverse events generally mild and self-limiting. Quality of adverse event reporting often poor, limiting definitive safety conclusions."

# KEY TAKEAWAYS FOR CLINICIANS

clinical_takeaways:
  evidence_hierarchy:
    strongest:
      - Peppermint oil for IBS
      - STW-5 (Iberogast) for functional dyspepsia and IBS
      - Ginger for acute vomiting
    moderate:
      - Curcumin for functional dyspepsia (equivalent to omeprazole)
      - Peppermint-caraway combination for functional dyspepsia
      - Chinese herbal medicine for functional dyspepsia
    emerging:
      - Artichoke for functional dyspepsia
      - DGL for GERD
      - Polyphenol-rich herbs for microbiome modulation

  mechanism_based_selection:
    - "For gas/bloating: Choose carminatives (peppermint, fennel, ginger)"
    - "For poor secretion: Choose bitters (gentian, artichoke, dandelion)"
    - "For cramping: Choose anti-spasmodics (chamomile, peppermint)"
    - "For inflammation: Choose anti-inflammatories (ginger, turmeric)"
    - "For slow motility: Choose prokinetics (ginger, artichoke)"

  combination_strategies:
    - "Ginger + Turmeric for inflammatory digestive conditions"
    - "Artichoke + Ginger for delayed gastric emptying"
    - "Peppermint + Caraway for functional dyspepsia (drug-equivalent)"
    - "Multi-herb formulas (STW-5) for complex symptom patterns"

  personalization:
    - "Match herb mechanism to predominant symptom pattern"
    - "Consider synergistic combinations for complex presentations"
    - "Start with herbs with strongest evidence base"
    - "Be aware of contraindications (e.g., peppermint in GERD)"

# TRADITIONAL HERBAL FORMULAS

traditional_formulas:

  # Traditional Chinese Medicine

  tcm_formulas:

    - name: Liu Jun Zi Tang (六君子汤)
      english_name: Six Gentlemen Decoction
      tradition: Traditional Chinese Medicine (Yuan Dynasty)
      components:
        - Ren Shen (Panax ginseng) - Ginseng
        - Fu Ling (Poria cocos) - Hoelen/Poria mushroom
        - Bai Zhu (Atractylodis Macrocephalae) - Atractylodes
        - Gan Cao (Glycyrrhiza uralensis) - Licorice root
        - Ban Xia (Pinellia ternata) - Pinellia tuber
        - Chen Pi (Citri Reticulatae) - Aged tangerine peel
        - Sheng Jiang (Zingiber officinale) - Fresh ginger
        - Da Zao (Ziziphus jujuba) - Jujube
      variant: "Xiang Sha Liu Jun Zi Tang adds Mu Xiang (Costus) and Sha Ren (Amomum/Cardamom)"
      traditional_indications:
        - Functional dyspepsia
        - Chronic digestive weakness
        - Gastric discomfort with fatigue
        - Poor appetite
        - Spleen Qi deficiency (TCM)
      modern_clinical_studies:
        - study: J Ethnopharmacol 2024
          finding: "Xiangsha-Liujunzi-Tang enhances duodenal mucosal barrier by inhibiting MC/Tryptase/PAR-2 signaling in FD rats"
        - study: Front Pharmacol June 2024
          finding: "Systematic review and meta-analysis on efficacy and safety for functional dyspepsia"
        - finding: "Meta-analysis showed significantly better gastric emptying than placebo in FD patients"
        - study: 2023 RCT
          finding: "Effective for decreased digestive function in convalescent COVID-19 patients (double-blind, placebo-controlled)"
      mechanisms:
        - Improves gastric emptying
        - Reduces chronic dyspepsia symptoms
        - Enhances duodenal mucosal barrier function
        - Modulates gastrointestinal motility
      safety: "Satisfactory safety profile both in clinical studies and after hundreds of years of traditional use"
      references:
        - https://pmc.ncbi.nlm.nih.gov/articles/PMC3530827/
        - https://www.mskcc.org/cancer-care/integrative-medicine/herbs/xiang-sha-liu-jun-zi-tang

    - name: Bao He Wan (保和丸)
      english_name: Preserve Harmony Pill
      tradition: Traditional Chinese Medicine (Yuan Dynasty, created by physician Zhu Danxi)
      components:
        - Shan Zha (Crataegus pinnatifida) - Chinese hawthorn
        - Shen Qu - Medicated leaven (fermented combination)
        - Lai Fu Zi (Raphanus sativus) - Radish seed
        - Chen Pi (Citrus reticulata) - Aged tangerine peel
        - Zhi Ban Xia (Pinellia ternata) - Prepared pinellia
        - Fu Ling (Poria cocos) - Poria mushroom
        - Lian Qiao (Forsythia suspensa) - Forsythia fruit
        - Mai Ya (Hordeum vulgare) - Barley sprouts
      traditional_indications:
        - Food stagnation
        - Indigestion from overeating
        - Abdominal bloating
        - Gas and distension
        - Post-meal discomfort
      modern_clinical_studies:
        - "Commonly prescribed for GI disorders in post-surgery colon cancer patients"
        - "In mice fed high-protein/high-fat diet: anti-diarrheal effect by modulating intestinal lactase-producing bacteria"
        - "Inhibited growth of conditionally pathogenic bacteria Ralstonia in intestinal mucosa"
      mechanisms:
        - Promotes gastric emptying
        - Increases gastric acid secretion
        - Exerts anti-ulcer effects
        - Modulates intestinal microbiome composition
        - Reduces pathogenic bacteria
      references:
        - https://www.mskcc.org/cancer-care/integrative-medicine/herbs/bao-he-wan

    - name: Xiao Yao San (逍遥散)
      english_name: Free Wanderer Powder
      tradition: Traditional Chinese Medicine (Song Dynasty, 1078-1085 AD)
      components:
        - Chai Hu (Bupleurum chinense) - Bupleurum root
        - Dang Gui (Angelica sinensis) - Chinese angelica
        - Bai Shao (Paeonia lactiflora) - White peony root
        - Bai Zhu (Atractylodes macrocephala) - White atractylodes
        - Fu Ling (Poria cocos) - Poria mushroom
        - Sheng Jiang (Zingiber officinale) - Fresh ginger
        - Bo He (Mentha haplocalyx) - Peppermint
        - Gan Cao (Glycyrrhiza uralensis) - Licorice
      active_constituents:
        - Paeoniflorin
        - Ferulic acid
        - Glycyrrhizic acid
        - Liquiritin
        - Atractylenolide I
      traditional_indications:
        - Digestive disorders related to liver stagnation and spleen deficiency
        - Irritable bowel syndrome
        - Functional dyspepsia with stress component
        - Indigestion with emotional factors
        - Constipation
      modern_clinical_studies:
        - study: Biomedicine and Pharmacotherapy 2022
          finding: "Meta-analysis: XYS may reduce symptoms and recurrence rates in IBS, constipation, and indigestion"
        - "Effective for abdominal pain, abdominal distention, and diarrhea"
        - "Improves IBS symptom severity scores and quality of life"
        - "Antidepressant effects through modulation of inflammation-related receptors"
      mechanisms:
        - Improves GI motility by increasing motilin and 5-HT levels
        - Decreases somatostatin levels
        - Strengthens spleen and stomach function
        - Modulates AGE receptors
        - Addresses liver-spleen connection (TCM theory)
      references:
        - https://www.frontiersin.org/journals/pharmacology/articles/10.3389/fphar.2021.821802/full

    - name: Ping Wei San (平胃散)
      english_name: Calm the Stomach Powder
      tradition: Traditional Chinese Medicine
      components:
        - Cang Zhu (Atractylodes lancea) - Atractylodes rhizome
        - Hou Po (Magnolia officinalis) - Magnolia bark
        - Chen Pi (Citrus reticulata) - Tangerine peel
        - Gan Cao (Glycyrrhiza uralensis) - Licorice root
        - Sheng Jiang (Zingiber officinale) - Fresh ginger
        - Da Zao (Ziziphus jujuba) - Jujube
      traditional_indications:
        - Dyspepsia
        - Nausea
        - Abdominal pain
        - Anorexia
        - Dampness and stagnation in stomach and spleen
      modern_clinical_studies:
        - "Notably improved gastric emptying and intestinal transit"
        - "Significantly reduced gastric potential of hydrogen"
        - "Increased pepsin and lipase gene expression"
        - "Demonstrated anti-inflammatory and immune-boosting effects"
        - "Protects gut barrier and regulates water balance"
      mechanisms:
        - Produces membrane depolarization in interstitial cells of Cajal (GI pacemaker cells)
        - Enhances gastric motility
        - Protects intestinal barrier integrity
        - Prevents intestinal damage
        - Aids tissue repair in digestive disorders
      references:
        - https://pubmed.ncbi.nlm.nih.gov/11215844/

  # Ayurvedic Formulas

  ayurvedic_formulas:

    - name: Triphala (त्रिफला)
      english_name: Three Fruits
      tradition: Ayurveda (ancient India)
      components:
        - Haritaki (Terminalia chebula) - Chebulic myrobalan
        - Bibhitaki (Terminalia bellerica) - Belleric myrobalan
        - Amalaki (Phyllanthus emblica) - Indian gooseberry/Amla
      ratio: "1:1:1"
      bioactive_compounds:
        - Polyphenols (gallic acid, chebulagic acid, chebulinic acid)
        - Vitamin C
        - Flavonoids
        - Tannins
        - Phenolic acids
      traditional_indications:
        - Digestive disorders
        - Constipation
        - Detoxification
        - General health tonic
        - Rasayana (rejuvenative) in Ayurveda
      modern_clinical_studies:
        - study: Clinical trial ages 16-52 with GI disorders
          findings:
            - "Reduced mucous in stool and flatulence (p < 0.05)"
            - "Improved stool frequency (p < 0.05)"
            - "Improved stool yield (p < 0.001) and consistency"
        - study: Non-insulin-dependent diabetes
          finding: "5g Triphala powder for 45 days significantly lowered blood glucose"
        - "Validated for free radical scavenging, antioxidant, anti-inflammatory, immunomodulating effects"
      mechanisms:
        - Restores epithelium lining of digestive tract
        - Exhibits mild laxative properties facilitating colonic transit
        - Inhibits pancreatic glycolytic enzymes (α-amylase and α-glucosidase)
        - Modulates gut microbiome (promotes Bifidobacteria and Lactobacillus)
        - Inhibits undesirable gut microbes
        - Inhibits LPS-induced inflammatory responses
        - Suppresses NFκB transcription factor
        - Cytoprotective and antifungal properties
      additional_properties: "Appetite stimulation, gastric hyperacidity reduction, antipyretic, analgesic, antibacterial, antimutagenic, wound healing, hypoglycemic, hepatoprotective"
      references:
        - https://pmc.ncbi.nlm.nih.gov/articles/PMC5567597/
        - https://pmc.ncbi.nlm.nih.gov/articles/PMC6052535/

    - name: Hingvastak Churna
      english_name: Eight-Ingredient Asafoetida Powder
      tradition: Ayurveda (described by Sharangdhar and Vaidya Vagbhata)
      components:
        - Hing (Ferula asafoetida) - Asafoetida
        - Jeeraka (Cuminum cyminum) - Cumin seeds
        - Ajamoda (Apium graveolens) - Wild celery/Ajwain
        - Maricha (Piper nigrum) - Black pepper
        - Krishnajeeraka (Nigella sativa) - Black cumin/Nigella
        - Shunthi (Zingiber officinale) - Dried ginger
        - Pippali (Piper longum) - Long pepper
        - Saindhava Lavana - Mineral/Himalayan salt
        - "Some formulations include Methi (Trigonella foenum-graecum) - Fenugreek"
      traditional_indications:
        - Excess flatulence
        - Abdominal colic
        - Anorexia
        - Indigestion
        - Vata imbalance
        - Bloating
        - Joint diseases (Vata-related)
      modern_clinical_studies:
        - study: Int J Ayurveda Research 2021
          design: Open-label
          sample: 15 IBS patients
          duration: 28 days
          finding: "Improved stool consistency and reduced abdominal pain"
        - note: "Limited clinical evidence overall; more research needed"
      mechanisms:
        - Soothes vata in GI tract
        - Warming blend supporting healthy appetite
        - Ignites digestive fire (agni)
        - Promotes optimal nutrient absorption
        - Balances vata and kapha doshas
      dosage: "1-2 grams (¼ to ½ teaspoon) up to twice daily post-meals, with ghee or warm water"

    - name: Trikatu Churna
      english_name: Three Peppers/Spices
      tradition: Ayurveda
      components:
        - Shunthi (Zingiber officinale) - Dried ginger rhizome
        - Maricha (Piper nigrum) - Black pepper
        - Pippali (Piper longum) - Long pepper
      ratio: "Equal proportions"
      bioactive_compounds:
        - Piperine (3-5% in P. longum and P. nigrum)
        - Gingerols
        - Gingiberene
        - Shagols
      traditional_indications:
        - Tastelessness
        - Digestive impairment
        - Chronic rhinitis/sinusitis
        - Respiratory conditions
        - Obesity
        - Skin diseases
      modern_clinical_studies:
        - "Himalaya clinical studies: effective for indigestion, bloating, belching, and flatulence"
        - "Experimentally proven liver protection activity"
        - "Black pepper as bio-enhancer boosted turmeric absorption by 200-2000%"
      mechanisms:
        - Stimulates Agni (digestive fire)
        - Improves nutrient assimilation
        - Increases digestive juices in stomach
        - Influences liver to increase bile salt production
        - Natural bioavailability enhancers for other herbs/medications
        - Improves metabolic transformation
        - Prevents fat accumulation and burns accumulated fats
      references:
        - https://www.researchgate.net/publication/329129608_Trikatu

    - name: Lavanbhaskar Churna
      english_name: Salt-Based Digestive Powder
      tradition: Ayurveda (classical formulation)
      primary_components:
