# Safety and Toxicology Studies
safety_studies:
  - source: "EMA Assessment Report on Taraxacum officinale radix"
    year: 2016
    url: https://www.ema.europa.eu/en/documents/herbal-report/final-assessment-report-taraxacum-officinale-fh-wigg-radix_en.pdf
    study_type: "Regulatory safety assessment"
    acute_toxicity:
      - "Doses up to 1000 mg/kg body weight: no mortality via oral route"
      - "Doses of 1600, 2900, and 5000 mg/kg BW: no mortality"
      - "Extract showed very low toxicity up to 10 g/kg (per os) and 4 g/kg (intraperitoneal) in rats and mice"
      - "LD50 ranged between 500-5000 mg/kg (intraperitoneal)"
    undesirable_effects:
      - "Allergic reactions may occur"
      - "Most undesirable effects related to pollen allergies or leaf contact"
      - "Hives, asthma, and toxic epidermal necrosis reported"
      - "Sesquiterpene lactones (taraxinic acid) cause allergic contact dermatitis"
      - "Few reports: tachycardia, strong hypoglycemic effects, hypokalemia"
    reproductive_toxicity: "Tests on reproductive toxicity, genotoxicity and carcinogenicity have not been performed"
    pregnancy_lactation: "Use during pregnancy and lactation cannot be recommended due to no information on reproductive/developmental toxicity"
    contraindications:
      - "Bile duct obstruction"
      - "Cholangitis"
      - "Liver disease"
      - "Gallstones (due to possible stimulation on bile secretion)"
    pediatric_use: "Not recommended in children under 12 years due to lack of adequate data"
    overall_assessment: "Clinical safety data limited; no serious side effects reported to date; low toxicity with multi-target biological activity"

# Hepatoprotective Studies
hepatoprotective_studies:
  - authors: "Jia YY, Guan RF, Wu YH, et al."
    title: "Taraxacum mongolicum extract exhibits a protective effect on hepatocytes and an antiviral effect against hepatitis B virus in animal and human cells"
    journal: "Molecular Medicine Reports"
    year: 2014
    volume: "9"
    issue: "4"
    pages: "1381-1387"
    pmid: "24481875"
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/24481875/
    doi: "10.3892/mmr.2014.1925"
    study_type: "In vitro experimental research"
    cell_models:
      - "Chemically-injured neonatal rat hepatocytes"
      - "Duck hepatitis B virus (DHBV)-infected duck fetal hepatocytes"
      - "HBV-transfected HepG2.2.15 cells (human hepatoma cells)"
    dosage: "100 µg/mL concentration"
    key_findings:
      - "Markedly inhibited DHBV DNA replication"
      - "Reduced HBsAg and HBeAg levels with inhibition rates of 91.39% and 91.72% at 100 µg/mL"
      - "Protection rates of 42.2%, 34.6%, and 43.8% against D-galactosamine, thioacetamide, and tert-butyl hydroperoxide injury models"
    mechanisms:
      - "Operates through oxidative stress reduction"
      - "Blocks protein synthesis steps and DNA replication (antiviral)"

  - authors: "Abd El-Ghffar EA, El-Nashar HAS, Abu Zeid EH, Khamis T, Farag MR, Hussein EA, Di Cerbo A, Naiel MAE, Maodaa SN, Batiha GE, Mahmoud HI"
    title: "Protective Effects of Taraxacum officinale L. (Dandelion) Root Extract in Experimental Acute on Chronic Liver Failure"
    journal: "Antioxidants"
    year: 2021
    volume: "10"
    issue: "4"
    article: "504"
    pmid: "33804908"
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/33804908/
    pmc_url: https://pmc.ncbi.nlm.nih.gov/articles/PMC8063808/
    doi: "10.3390/antiox10040504"
    study_type: "Animal study - rat experimental model"
    model: "Acute on chronic liver failure (ACLF) in rats"
    groups: "Five groups of male Wistar rats"
    dosage: "Three doses tested: 200 mg, 100 mg, 50 mg/kg body weight/day"
    treatment_protocol: "Ethanolic dandelion root extract (TOERE) administered before ACLF induction"
    key_findings:
      - "All three doses significantly prevented ACLF-induced liver damage"
      - "100 mg TOERE/kg b.w./day had best inhibitory effect"
      - "Reduced serum liver injury markers: AST, ALT, ALP, GGT, total bilirubin"
      - "Reduced renal tests: creatinine, urea"
      - "Reduced oxidative stress tests"
    mechanisms: "Antioxidant and anti-inflammatory activities; taraxasterol modulates inflammatory and oxidative stress pathways"
    notes: "Hepatoprotective effects confirmed in animal studies; no clinical study on efficacy in humans exists"

