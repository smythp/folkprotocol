# Research Gaps and Limitations
research_gaps:
  - category: "Clinical Evidence"
    gap: "No well-controlled randomized clinical trials for most therapeutic applications"
    source: "Multiple systematic reviews and EMA assessment reports"
    notes: "Most current studies focus on in vitro cell experiments; research results lack clinical applicability"

  - category: "Standardization"
    gap: "Lack of standardized extracts and variable bioavailability"
    source: "Clinical translation remains limited"
    notes: "Rigorous preclinical studies and well-controlled clinical investigations urgently needed to validate efficacy, safety, and pharmacokinetics"

  - category: "Safety Data"
    gap: "Limited human safety data despite traditional use"
    specific_gaps:
      - "No data on reproductive and developmental toxicity"
      - "Tests on reproductive toxicity, genotoxicity and carcinogenicity have not been performed"
      - "Use during pregnancy and lactation cannot be recommended"
      - "No data in children under 12 years"

  - category: "Dosing"
    gap: "Precise prophylactic and treatment doses currently unknown"
    notes: "Effects on human hemostasis only evaluated in vitro; more randomized clinical trials with larger groups needed"

  - category: "Diabetes Applications"
    gap: "No completed human clinical trials examining effects on glucose in diabetic patients"
    notes: "Extensive in vitro, in vivo, and clinical research required to investigate pharmacological, physiological, and biochemical mechanisms underlying effects of dandelion-derived compounds on type 2 diabetes"

  - category: "Hepatoprotective Effects"
    gap: "No clinical studies on hepatoprotective efficacy despite strong preclinical evidence"
    notes: "Designing large human clinical studies essential given emerging evidence on hepatoprotective effects"

  - category: "Infectious Diseases"
    gap: "Limited information on oral bioavailability, pharmacological activities, and safety in humans for antimicrobial applications"
    notes: "Clinical evidence for activity of bioactive compounds still scant for infectious diseases"

