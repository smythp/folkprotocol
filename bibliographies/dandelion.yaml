# Notes
notes: |
  This bibliography focuses on clinical studies, systematic reviews, and official monographs for dandelion (Taraxacum officinale).

  KEY FINDINGS:
  - Only ONE human clinical trial found (Clare et al. 2009) on diuretic effects; all other studies are in vitro or animal models
  - Strong preclinical evidence for hepatoprotective, anti-inflammatory, antimicrobial, and antidiabetic effects
  - Lack of standardized extracts and comprehensive human clinical trials is major research gap
  - Traditional use well-documented (Commission E, EMA, WHO, Chinese Pharmacopoeia)
  - Safety profile appears favorable with low toxicity, though comprehensive reproductive/genotoxicity studies lacking
  - Drug interactions documented (particularly with ciprofloxacin)
  - Allergic reactions possible, particularly in those sensitive to Asteraceae family plants

  CRITICAL GAPS:
  - No human clinical trials for hepatoprotective, antidiabetic, antimicrobial, or anticancer applications
  - Precise therapeutic dosing not established for most conditions
  - Bioavailability data limited
  - Pregnancy/lactation safety not established
  - Pediatric use not established

  DOSING GUIDANCE (Traditional):
  - Root: 3-4 g or 10-15 drops tincture twice daily (Commission E)
  - Leaf: 4-10 g or 2-5 mL tincture three times daily (Commission E)
  - Infusion/decoction: 1.7-8.7 g in 250 mL water (EMA)
  - Duration: Maximum 2 weeks for leaf preparations (EMA)
