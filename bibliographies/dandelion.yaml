# Pharmacokinetic Studies
pharmacokinetic_studies:
  - authors: "Zhu M, Wong PY, Li RC"
    title: "Effects of taraxacum mongolicum on the bioavailability and disposition of ciprofloxacin in rats"
    journal: "Journal of Pharmaceutical Sciences"
    year: 1999
    volume: "88"
    issue: "6"
    pages: "632-634"
    pmid: "10350500"
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/10350500/
    study_type: "Pharmacokinetic study - animal (rats)"
    species: "Sprague Dawley rats"
    dosage:
      - "Ciprofloxacin: 20 mg/kg oral dose"
      - "Taraxacum mongolicum extract: 2 g crude drug/kg concomitant oral administration"
    key_findings:
      - "Maximum plasma concentration (Cmax) significantly lowered by 73% with concurrent herbal dosing"
      - "Distribution volume increased approximately 3-fold (92.0 vs 30.8 L/kg)"
      - "Half-life extended 3-fold (5.71 vs 1.96 hours)"
      - "Relative bioavailability (AUC0→∞) remained similar between groups"
    clinical_significance: "Demonstrates drug-drug interactions; implications of concomitant dosing should not be overlooked"

