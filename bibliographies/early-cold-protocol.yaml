---
# Early Cold / Immune Support Protocol Bibliography
# Focus: Prevention vs acute treatment, timing, comparative effectiveness
# Key herbs: Echinacea, Elderberry, Ginger, Astragalus, Andrographis
# Compiled: 2026-01-14

meta:
  topic: Early Cold and Immune Support
  focus_areas:
    - Prevention (daily during cold season) vs acute treatment (at first symptoms)
    - Timing: when to start, how long to take
    - Comparative effectiveness between herbs
    - "Kitchen sink" approach vs targeted single herb
  compiled_date: 2026-01-14

# ECHINACEA (Echinacea purpurea, E. angustifolia)

echinacea:
  summary: "Best evidence for prevention and reducing recurrence; may reduce cold incidence by 20-58% and duration by 0.5-1.4 days"

  systematic_reviews:
    - id: gancitano_2024
      title: "Echinacea Reduces Antibiotics by Preventing Respiratory Infections: A Meta-Analysis (ERA-PRIMA)"
      pubmed_id: "38667040"
      year: 2024
      trials: 30
      participants: 5652
      key_findings:
        prevention:
          monthly_rti_occurrence: "RR 0.68 (32% reduction)"
          patients_with_rti: "RR 0.75 (25% reduction)"
          recurrent_infections: "RR 0.60 (40% reduction)"
        complications: "RR 0.44 (56% reduction)"
        antibiotic_reduction: "70-80% reduction in antibiotic days"
      note: "Fresh alcoholic E. purpurea extracts showed strongest effects"

    - id: pham_2025
      title: "Efficacy and safety of Echinacea purpurea in treating upper respiratory infections in children"
      pubmed_id: "40311928"
      year: 2025
      trials: 9
      participants: 3169
      key_findings:
        incidence: "RR 0.81 (19% reduction)"
        antibiotic_use: "RR 0.18 (76% reduction)"
        otitis_media: "RR 0.56 (44% reduction)"
        adverse_events: "RR 1.38 (mild increase, but events remained mild)"

    - id: shah_2007
      title: "Evaluation of echinacea for prevention and treatment of common cold"
      pubmed_id: "17597571"
      year: 2007
      trials: 14
      key_findings:
        cold_incidence: "OR 0.42 (58% reduction)"
        duration: "-1.44 days"
      note: "Results consistent across formulations and study quality"

    - id: david_2019
      title: "Echinacea for prevention and treatment of URTI"
      pubmed_id: "31126553"
      year: 2019
      key_findings:
        prevention: "RR 0.78 (22% reduction) - modest preventive effect"
        treatment_duration: "-0.45 days (minimal impact)"
      conclusion: "Preventive effect present but clinical meaningfulness debatable"

  dosing:
    prevention:
      dose: "400-900 mg daily"
      duration: "up to 6 months continuous use studied safely"
    acute_treatment:
      loading_dose: "10,200-16,800 mg on day 1"
      maintenance: "2,400-5,100 mg daily for 4-7 days"
      note: "Higher initial loading doses associated with faster recovery"
    pediatric: "400 mg three times daily"
    forms: "Fresh alcoholic extracts from E. purpurea show strongest effects"

  timing:
    when_to_start: "At first symptoms, or preventively during cold season"
    duration_prevention: "Throughout cold season (fall/winter)"
    duration_acute: "5-10 days from symptom onset"
    best_window: "Most effective when started within 24-48 hours of symptoms"

  safety:
    short_term: "Good safety profile"
    long_term: "Up to 6 months studied without concerns"
    adverse_events: "GI upset, rashes (mild, transient)"
    rare: "Allergic reactions possible, caution in allergy/asthma patients"
    pregnancy: "Non-teratogenic but caution advised"


# ELDERBERRY (Sambucus nigra)

elderberry:
  summary: "Best evidence for acute treatment; may reduce cold/flu duration by 2-4 days when taken within 48 hours of symptoms"

  systematic_reviews:
    - id: hawkins_2019
      title: "Black elderberry supplementation effectively treats upper respiratory symptoms"
      pubmed_id: "30670267"
      year: 2019
      participants: 180
      effect_size: "1.717 (large effect)"
      key_findings:
        - "Substantially reduced upper respiratory symptoms"
        - "Large mean effect size across RCTs"
        - "Safer alternative to prescription drugs for routine colds"

    - id: wieland_2021
      title: "Elderberry for prevention and treatment of viral respiratory illnesses"
      pubmed_id: "33827515"
      year: 2021
      studies: 5
      key_findings:
        common_cold: "May not reduce risk of developing cold"
        duration: "May reduce duration and severity, evidence uncertain"
        influenza: "May reduce duration"
        vs_oseltamivir: "Lower risk of complications and adverse events"
        safety: "No evidence of immune overstimulation"

    - id: harnett_2020
      title: "Effects of Sambucus nigra on acute respiratory viral infections"
      pubmed_id: "32864330"
      year: 2020
      participants: 936
      key_findings:
        timing: "When taken within 48 hours of symptom onset"
        symptom_reduction: "50% within 2-4 days of treatment"
        effective_for: "fever, headache, nasal congestion, nasal discharge"
        unclear_for: "cough relief, antibiotic use reduction"

  clinical_trials:
    - id: zakay_rones_2004
      title: "Elderberry extract in treatment of influenza A and B"
      pubmed_id: "15080016"
      year: 2004
      participants: 60
      key_findings:
        duration_reduction: "Symptoms relieved 4 days earlier"
        rescue_medication: "Significantly less use"

    - id: tiralongo_2016
      title: "Elderberry reduces cold duration in air travelers"
      pubmed_id: "27023596"
      year: 2016
      participants: 312
      key_findings:
        cold_episode_days: "57 vs 117 (placebo)"
        duration: "4.75 days vs 6.88 days (-2 days)"
        symptom_severity: "21 vs 34 mean score"

    - id: macknin_2020
      title: "Elderberry for influenza in ER patients"
      pubmed_id: "32929634"
      year: 2020
      participants: 87
      note: "NEGATIVE RESULT - no benefit found"
      key_findings:
        time_to_relief: "5.3 days elderberry vs 4.9 days placebo (NS)"
      conclusion: "Conflicts with earlier positive trials; highlights research gaps"

  dosing:
    acute_treatment:
      syrup: "15 ml four times daily for 5 days"
      capsules: "600-900 mg daily (standardized 15-22% anthocyanins)"
      anthocyanins: "90-135 mg daily"
    prevention:
      priming: "600 mg daily for 10 days pre-travel/exposure"
      maintenance: "900 mg daily during exposure period"
    children_5_12: "15 ml twice daily for 5 days"

  timing:
    when_to_start: "Within 48 hours of symptom onset (critical!)"
    duration: "5 days for acute treatment"
    prevention: "Can be taken throughout cold season"
    note: "Unlike echinacea, elderberry can be taken year-round"

  safety:
    general: "Generally safe for short-term use"
    adverse_events: "Rare, mild (dry mouth, constipation, rash)"
    raw_berries: "Uncooked berries contain toxic cyanogenic glycosides - must be cooked"
    pregnancy: "Not recommended due to lack of safety data"


# ANDROGRAPHIS (Andrographis paniculata)

andrographis:
  summary: "Strong evidence for acute treatment; reduces symptom severity and duration; often called 'Indian Echinacea'"

  systematic_reviews:
    - id: hu_2017
      title: "Andrographis for symptomatic relief of acute RTIs"
      pubmed_id: "28783743"
      year: 2017
      trials: 33
      participants: 7175
      key_findings:
        effectiveness: "Beneficial for relieving symptoms and shortening time to resolution"
        vs_placebo_combination: "Mean difference 2.13 points on symptom severity (with Acanthopanax)"
        vs_placebo_alone: "Mean difference 10.85 points on symptom severity"
      limitations: "Poor study quality and heterogeneity"

    - id: coon_2004
      title: "Andrographis in symptomatic treatment of uncomplicated URTI"
      pubmed_id: "14748896"
      year: 2004
      conclusion: "More effective than placebo; appropriate alternative treatment for uncomplicated URTI"

  clinical_trials:
    - id: ap_bio_2023
      title: "AP-Bio (KalmCold) for common cold - Phase III"
      source: "ScienceDirect"
      year: 2023
      findings:
        200mg_400mg: "Significantly managed symptoms on Day 3"
        trend: "Decreased nasal mucous weight and IL-8"
        safety: "No safety concerns"

  dosing:
    acute_treatment:
      standardized_extract: "200-400 mg daily (standardized to andrographolide)"
      traditional: "1-6 g dried herb daily"
      combination: "Often combined with Siberian ginseng (Acanthopanax senticosus)"
    note: "AP-Bio/KalmCold studied at 200-400 mg/day"

  timing:
    when_to_start: "At first symptoms"
    duration: "3-10 days"
    note: "Popular in Scandinavia as cold/flu remedy"

  mechanism:
    active_compound: "Andrographolide"
    actions:
      - "Anti-inflammatory"
      - "Immune-stimulating"
      - "Inhibits viral entry and replication"
      - "Suppresses pro-inflammatory cytokines"
    limitations: "Low bioavailability, solubility, and stability"

  safety:
    general: "Good safety profile in clinical studies"
    adverse_events: "Generally mild"
    pregnancy: "Insufficient data - avoid"


# ASTRAGALUS (Astragalus membranaceus / Huang Qi)

astragalus:
  summary: "Traditional immune tonic; best for prevention, NOT acute treatment; immunomodulatory effects supported by meta-analysis"

  systematic_reviews:
    - id: karger_2023
      title: "Effect of Astragalus on Humoral and Cellular Immune Response"
      year: 2023
      studies: 19
      participants: 1094
      key_findings:
        inflammatory_markers: "Significant reduction in IL-2, IL-4, IL-6, IL-10, TNF-α, IFN-γ"
        cellular_immunity: "Increased CD3 levels and CD4/CD8 ratio"
        heterogeneity: "Substantial among studies"
      conclusion: "Supports immunomodulatory effects"

    - id: cochrane_2019
      title: "Oral Astragalus for preventing frequent ARTI in children"
      pubmed_id: "30993662"
      year: 2019
      note: "COCHRANE REVIEW - found NO studies meeting inclusion criteria"
      conclusion: "Gap in evidence; well-designed RCTs needed"

  clinical_evidence:
    - id: nephrotic_2013
      title: "Astragalus in prevention of URTI in children with nephrotic syndrome"
      pubmed_id: "23662131"
      year: 2013
      key_findings:
        rti_reduction: "23.9% vs 42.9% (RR 0.56)"
      note: "Specific population - children with nephrotic syndrome"

  dosing:
    prevention:
      granules: "2.25 g (equivalent to 15 g crude herb) twice daily"
      duration: "3-6 months minimum"
      general: "2.5-7.5 g daily generally safe for 1-3 months"
      maximum: "Up to 60 g/day for 4 months appears safe"
      caution: "Doses >28 g/day may cause immune suppression"

  timing:
    when_to_use: "Preventively when healthy, NOT during acute infection"
    traditional_guidance: "According to TCM, should NOT be taken during early stage of infections"
    season: "Best started before cold season (late summer/early fall)"
    duration: "Continuous use throughout cold season"

  mechanism:
    type: "Immune tonic / adaptogen"
    actions:
      - "Stimulates immune system"
      - "Immunomodulatory (balancing)"
      - "Contains polysaccharides and saponins"
    traditional_use: "Used in TCM to strengthen 'Wei Qi' (defensive energy)"

  safety:
    general: "Generally safe for long-term use"
    adverse_events: "Few reported"
    interactions: "May interact with immunosuppressants"
    pregnancy: "Insufficient data"


# GINGER (Zingiber officinale)

ginger:
  summary: "Limited direct evidence for cold/flu; strong anti-inflammatory effects; traditionally used as warming circulatory herb"

  systematic_reviews:
    - id: ari_2024
      title: "Safety and effectiveness of ginger for acute respiratory infections"
      year: 2024
      source: "ScienceDirect (PROSPERO: CRD42024562098)"
      eligible_trials: 1
      key_findings:
        quarantine_reduction: "2.4 days reduction (COVID-19 study)"
        note: "High risk of bias - more trials needed"
      conclusion: "Insufficient clinical data to validate efficacy"

    - id: anh_2020
      title: "Ginger on Human Health: 109 RCTs"
      pubmed_id: "31935866"
      year: 2020
      rcts: 109
      key_findings:
        strong_evidence: "Nausea/vomiting, inflammation, digestive function"
        cold_flu: "Not specifically evaluated; controversial"
        quality: "Only 39.4% met high quality criteria"

  inflammation_data:
    - id: morvaridzadeh_2020
      title: "Effect of ginger on inflammatory markers"
      pubmed_id: "32763761"
      year: 2020
      trials: 16
      participants: 1010
      key_findings:
        crp: "Significant reduction (SMD -5.11)"
        hs_crp: "Substantial decrease (SMD -0.88)"
        tnf_alpha: "Notable reduction (SMD -0.85)"
        il_6: "No significant impact"

  clinical_trial:
    - id: covid_2024
      title: "Ginger for COVID-19 outpatients"
      year: 2024
      journal: "Medicine"
      participants: 84
      dose: "1000 mg three times daily for 7 days"
      key_findings:
        viral_clearance: "No significant difference (41.6% vs 42.8%)"
        pulmonary_infiltrate: "Significantly reduced by day 7"

  dosing:
    general: "1-2 g dried ginger daily"
    for_inflammation: "1.5 g twice daily in warm water"
    tea: "Fresh ginger slices steeped in hot water"
    note: "Best used as supportive/adjunct rather than primary treatment"

  traditional_use:
    role: "Warming herb, circulatory stimulant, digestive"
    combination: "Often combined with other herbs in cold formulas"
    symptoms: "Particularly for chills, poor circulation, nausea"

  safety:
    general: "Generally safe"
    adverse_events: "Heartburn, GI discomfort at high doses"
    interactions: "May enhance effects of blood thinners"
    maximum: "4 g/day recommended limit"


# COMPARATIVE ANALYSIS

comparison:
  prevention_vs_acute:
    best_for_prevention:
      - herb: "Echinacea"
        evidence: "Strong (multiple meta-analyses)"
        effect: "20-58% reduction in cold incidence"
      - herb: "Astragalus"
        evidence: "Moderate (immunomodulatory support)"
        note: "Traditional preventive use; avoid during acute infection"

    best_for_acute_treatment:
      - herb: "Elderberry"
        evidence: "Strong"
        effect: "2-4 days reduction in duration"
        timing: "Must start within 48 hours"
      - herb: "Andrographis"
        evidence: "Strong (33 RCTs)"
        effect: "Significant symptom reduction"
      - herb: "Echinacea"
        evidence: "Moderate"
        effect: "0.5-1.4 days reduction"

    supportive_role:
      - herb: "Ginger"
        evidence: "Limited for cold/flu specifically"
        best_for: "Anti-inflammatory support, warming, nausea"

  timing_summary:
    echinacea:
      prevention: "Start before cold season"
      acute: "At first symptoms, loading dose day 1"
      duration: "5-10 days acute; months for prevention"
    elderberry:
      prevention: "Can take year-round"
      acute: "CRITICAL: within 48 hours of symptoms"
      duration: "5 days"
    andrographis:
      acute: "At first symptoms"
      duration: "3-10 days"
    astragalus:
      prevention: "Start before cold season when healthy"
      acute: "DO NOT USE during acute infection (TCM guidance)"
      duration: "Months"
    ginger:
      role: "Supportive, can use any time"
      duration: "Throughout illness"

  head_to_head:
    echinacea_vs_elderberry:
      echinacea: "Better for prevention, immune activation"
      elderberry: "Better for acute treatment, faster relief"
      combination: "Study showed elderberry + echinacea comparable to oseltamivir"
    monotherapy_vs_combination:
      evidence: "Combinations often studied (echinacea + elderberry, andrographis + Siberian ginseng)"
      practical: "Kitchen sink approach common in practice"
      note: "No clear evidence that combinations superior to single herbs at adequate doses"

  symptom_specific:
    fever_aches:
      first_choice: "Elderberry"
      alternative: "Andrographis"
    congestion:
      first_choice: "Elderberry"
      supportive: "Ginger (warming, circulation)"
    sore_throat:
      first_choice: "Andrographis"
      alternative: "Ginger tea"
    fatigue_weakness:
      acute: "Elderberry, Andrographis"
      prevention: "Astragalus, Echinacea"


