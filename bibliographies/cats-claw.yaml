# Key Research Gaps

research_needs:
  - "Human pharmacokinetic studies (currently only animal data)"
  - "Large-scale RCTs for specific conditions"
  - "Standardization protocols for POA/TOA ratios"
  - "Long-term safety data (>6 months)"
  - "Mechanism of action studies (non-COX pathways)"
  - "Optimal dosing for different conditions"
  - "Bioavailability enhancement strategies"

notes: |
  This bibliography focuses on clinical studies with human subjects, pharmacokinetic data,
  systematic reviews, and official monographs. Cat's claw shows promise for anti-inflammatory
  and immunomodulatory effects with good safety profile. Key considerations:

  1. Extract standardization critical - POA chemotype preferred
  2. Wide dosing range in studies (30-300 mg/day)
  3. Generally well-tolerated with minimal adverse effects
  4. No hepatotoxicity in clinical trials
  5. Limited high-quality human RCTs available
  6. Bioavailability of alkaloids ranges 27-69% (animal data)
  7. Species comparison: U. guianensis may be more potent for antioxidant/anti-inflammatory effects

  Clinical evidence strongest for:
  - Rheumatoid arthritis (modest benefit)
  - Osteoarthritis (pain with activity)
  - Quality of life in cancer patients
  - Reducing chemotherapy-induced neutropenia (breast cancer)

  Insufficient evidence for:
  - Colorectal cancer chemotherapy side effects
  - Aromatase inhibitor-induced arthralgia
