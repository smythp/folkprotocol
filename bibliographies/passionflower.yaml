standardization_and_bioavailability:
  standardization:
    common_standards:
      - "3.5% flavonoids as vitexin"
      - "2.5-4% flavonoids as isovitexin"
      - "European Pharmacopoeia: minimum 1.5% total flavonoids expressed as vitexin"
    major_flavonoid_compounds:
      - vitexin
      - isovitexin
      - orientin
      - homoorientin
      - rutoside
      - hyperoside
      - luteolin
      - kaempferol
      - kaempferitrin
      - isoorientin
    quantitative_content:
      - "Vitexin: 0.867 ± 0.011%"
      - "Total flavonoids (as vitexin): 3.762 ± 0.049%"
      - "Isovitexin: 1.198 g% (major flavonoid in fluidextract)"
    analytical_methods:
      technique: "Reverse phase HPLC-UV"
      column: "Atlantis C18 (250 mm × 4.6 mm × 5 μm)"
      wavelength: "330 nm (quantification), 350 nm (detection)"
      mobile_phase: "0.01% formic acid solution and methanol:acetonitrile (25:75)"
  bioavailability:
    status: "Lack of pharmacokinetic data"
    limitations:
      - "No data on gastrointestinal absorption"
      - "No data on protein binding"
      - "No data on plasma clearance"
      - "Phytochemicals have varying absorption and solubility characteristics"
    notes: "In vitro and in vivo effects do not always correlate to clinical studies due to bioavailability, metabolism, and species differences"

clinical_evidence_summary:
  strengths:
    - "Multiple RCTs demonstrate anxiolytic effects comparable to benzodiazepines"
    - "Good safety profile with minimal adverse effects in most studies"
    - "No hepatotoxicity documented despite widespread use"
    - "No memory impairment unlike benzodiazepines"
    - "Effective for perioperative anxiety without excessive sedation"
    - "Positive monographs from WHO, Commission E, ESCOP, EMA"
    - "Listed in multiple national pharmacopoeias"
  weaknesses:
    - "High heterogeneity prevents meta-analysis"
    - "Many studies have small sample sizes"
    - "Poor methodological details in some trials (extract ratio, blinding, randomization)"
    - "No pharmacokinetic data available"
    - "Lack of standardization across products"
    - "Clinical evidence remains limited compared to synthetic anxiolytics"
    - "Optimal dose and frequency not firmly established"
  typical_doses_used_in_trials:
    - "45-60 drops daily (liquid extract)"
    - "260-500 mg orally (standardized extract)"
    - "600 mg daily (aerial parts extract for sleep/stress)"
    - "4-8 g daily (crude herb)"
  adverse_effects:
    common:
      - "Drowsiness"
      - "Dizziness"
      - "Confusion"
      - "Ataxia"
    rare:
      - "Cardiac effects (prolonged QTc, ventricular tachycardia) - one case report"
      - "Nausea and vomiting"
    contraindications:
      - "Pregnancy (may induce uterine contractions)"
      - "Use with anesthesia or CNS depressants"
    drug_interactions:
      - "May prolong QT interval with large doses"
      - "Potential interactions with QT-prolonging medications"

notes:
  - "This bibliography focuses on Passiflora incarnata (purple passionflower), the most studied species"
  - "Studies show consistent anxiolytic effects across multiple populations"
  - "Standardization to vitexin or isovitexin content is recommended but not universal"
  - "GABAergic mechanism established in preclinical studies"
  - "Clinical utility supported by traditional use and modern clinical trials"
  - "Further research needed on pharmacokinetics, optimal dosing, and long-term safety"
