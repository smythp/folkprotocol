---
# Passionflower (Passiflora incarnata) Clinical Bibliography
# Compiled: 2026-01-08
# Focus: Clinical trials, systematic reviews, dosing, bioavailability, safety, standardized extracts

systematic_reviews:
  - id: janda_2020
    title: "Passiflora incarnata in Neuropsychiatric Disorders-A Systematic Review"
    authors:
      - Katarzyna Janda
      - Karolina Wojtkowska
      - Karolina Jakubczyk
      - Justyna Antoniewicz
      - Karolina Skonieczna-Żydecka
    year: 2020
    journal: Nutrients
    pmid: "33352740"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/33352740/"
    study_type: Systematic Review
    trials_included: 9
    key_findings:
      - "Majority of studies reported reduced anxiety levels following administration of Passiflora incarnata preparations"
      - "Effect less evident in people with mild anxiety symptoms"
      - "Study durations ranged from one to 30 days with participants aged 18+"
      - "No adverse effects observed, including memory loss or collapse of psychometric functions"
      - "Due to high heterogeneity, it was impossible to perform a meta-analysis"
    conclusions: "Passionflower preparations may be helpful in treating some symptoms in neuropsychiatric patients, particularly stress-related conditions like anxiety, insomnia, and depression"

  - id: miroddi_2013
    title: "Passiflora incarnata L.: ethnopharmacology, clinical application, safety and evaluation of clinical trials"
    authors:
      - M Miroddi
      - G Calapai
      - M Navarra
      - P L Minciullo
      - S Gangemi
    year: 2013
    journal: Journal of Ethnopharmacology
    pmid: "24140586"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/24140586/"
    study_type: Systematic Review
    key_findings:
      - "Plant showed a good safety profile"
      - "Preclinical experiments revealed wide spectrum of pharmacological activities: anxiolytic, sedative, antitussive, antiasthmatic, and antidiabetic activities"
      - "Clinical studies reveal crucial weaknesses: poor details regarding drug extract ratio, limited patient samples, no description of blinding and randomization procedures"
    conclusions: "New clinical trials should be conducted using a more rigorous methodology to properly evaluate this plant's traditional uses for anxiety and sleep disorders"

  - id: ulbricht_2008
    title: "An evidence-based systematic review of passion flower (Passiflora incarnata L.) by the Natural Standard Research Collaboration"
    authors:
      - Catherine Ulbricht
      - Ethan Basch
      - Heather Boon
      - Kelly Dowhower Karpa
      - Gerald Gianutsos
      - Katie Nummy
      - Erica Seamon
      - Michael Smith
      - David Sollars
      - Shaina Tanguay-Colucci
      - Minney Varghese
      - Wendy Weissner
      - Jen Woods
    year: 2008
    journal: Journal of Dietary Supplements
    pmid: "22432466"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/22432466/"
    study_type: Systematic Review
    notes: "Evidence-based methodology for evaluating this herbal remedy across humans and animal studies"

randomized_controlled_trials:
  anxiety:
    - id: akhondzadeh_2001_gad
      title: "Passionflower in the treatment of generalized anxiety: a pilot double-blind randomized controlled trial with oxazepam"
      authors:
        - S Akhondzadeh
        - H R Naghavi
        - M Vazirian
        - A Shayeganpour
        - H Rashidi
        - M Khani
      year: 2001
      journal: Journal of Clinical Pharmacy and Therapeutics
      pmid: "11679026"
      pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/11679026/"
      study_type: Double-blind RCT
      sample_size: 36
      population: "Outpatients diagnosed with generalized anxiety disorder"
      intervention:
        agent: "Passiflora incarnata extract"
        dose: "45 drops daily"
        comparator: "Oxazepam 30 mg daily"
        duration: "4 weeks"
      key_findings:
        - "No significant difference was observed between the two protocols in overall efficacy"
        - "Oxazepam demonstrated faster therapeutic onset"
        - "Significantly more problems relating to impairment of job performance were encountered with subjects on oxazepam"
      conclusions: "Passionflower extract showed comparable efficacy to oxazepam without job performance impairment, warrants further investigation through larger-scale trials"

    - id: movafegh_2008
      title: "Preoperative oral Passiflora incarnata reduces anxiety in ambulatory surgery patients: a double-blind, placebo-controlled study"
      authors:
        - Ali Movafegh
        - Reza Alizadeh
        - Fatimah Hajimohamadi
        - Fatimah Esfehani
        - Mohmad Nejatfar
      year: 2008
      journal: Anesthesia and Analgesia
      pmid: "18499602"
      pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/18499602/"
      study_type: Double-blind, placebo-controlled RCT
      sample_size: 60
      population: "Ambulatory surgery patients"
      intervention:
        agent: "Passiflora incarnata (Passipy IranDarouk)"
        dose: "500 mg orally"
        timing: "90 minutes before surgery"
        comparator: "Placebo"
        per_group: 30
      key_findings:
        - "Anxiety scores significantly lower in treatment group versus control (P < 0.001)"
        - "Extract reduces anxiety without inducing sedation"
        - "Psychomotor recovery was comparable between groups"
        - "Discharge times were similar"
      conclusions: "Passiflora functions as an effective anxiolytic for outpatient procedures without sedative effects"

  dental_anxiety:
    - id: dantas_2017
      title: "Effects of passiflora incarnata and midazolam for control of anxiety in patients undergoing dental extraction"
      authors:
        - L-P Dantas
        - A de Oliveira-Ribeiro
        - L-M de Almeida-Souza
        - F-C Groppo
      year: 2017
      journal: Med Oral Patol Oral Cir Bucal
      pmid: "27918731"
      pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/27918731/"
      study_type: Double-blind, crossover RCT
      sample_size: 40
      population: "Volunteers undergoing mandibular third molar extraction"
      intervention:
        passiflora_dose: "260 mg orally, 30 minutes pre-surgery"
        midazolam_dose: "15 mg orally, 30 minutes pre-surgery"
        design: "Crossover (same participants received both interventions)"
      key_findings:
        - "Over 70% of volunteers felt quiet or a little anxious under both protocols"
        - "No significant differences between treatments in blood pressure, heart rate, or oxygen saturation"
        - "Midazolam caused amnesia in 20% of participants"
        - "Passiflora showed minimal memory effects"
        - "Anxiolytic effect similar to midazolam"
      conclusions: "Passiflora proved safe and effective for conscious sedation"

    - id: kaviani_2013
      title: "The efficacy of passiflora incarnata linnaeus in reducing dental anxiety in patients undergoing periodontal treatment"
      authors:
        - N Kaviani
        - M Tavakoli
        - Mr Tabanmehr
        - Ra Havaei
      year: 2013
      journal: J Dent (Shiraz)
      pmid: "24724122"
      pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/24724122/"
      study_type: Randomized, single-blind clinical trial
      sample_size: 63
      population: "Patients undergoing periodontal treatment (3 groups of 21 each)"
      intervention:
        agent: "Passion flower extract drops"
        timing: "Premedication prior to treatment"
      key_findings:
        - "Pre-treatment anxiety score: 12.09±2.42"
        - "Post-treatment anxiety score (passionflower): 8.47±2.58"
        - "Post-treatment anxiety score (placebo): 10.52±2.11"
        - "Post-treatment anxiety score (control): 11.23±2.34"
        - "Significant difference (p< 0.0001) in anxiety levels before and after passionflower administration"
      conclusions: "Administration of Passion flower as premedication was significantly effective in reducing anxiety"

  opioid_withdrawal:
    - id: akhondzadeh_2001_opioid
      title: "Passionflower in the treatment of opiates withdrawal: a double-blind randomized controlled trial"
      authors:
        - S Akhondzadeh
        - L Kashani
        - M Mobaseri
        - S H Hosseini
        - S Nikzad
        - M Khani
      year: 2001
      journal: Journal of Clinical Pharmacy and Therapeutics
      pmid: "11679027"
      pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/11679027/"
      study_type: Double-blind RCT
      sample_size: 65
      population: "Opioid-dependent adults (predominantly male) meeting DSM-IV criteria"
      intervention:
        treatment_group: "Passiflora extract (60 drops daily) plus clonidine (maximum 0.8 mg daily in three divided doses)"
        control_group: "Clonidine plus placebo drops (same dosing)"
        duration: "14 days"
      key_findings:
        - "Both groups showed equal effectiveness for physical withdrawal symptoms"
        - "Passiflora plus clonidine group showed significant superiority over clonidine alone in management of mental symptoms"
      conclusions: "Passiflora extract may be an effective adjuvant agent, but larger studies needed to confirm results"

  sleep_studies:
    - id: lee_2020
      title: "Effects of Passiflora incarnata Linnaeus on polysomnographic sleep parameters in subjects with insomnia disorder: a double-blind randomized placebo-controlled study"
      authors:
        - Jeewon Lee
        - Han-Young Jung
        - Soyoung Irene Lee
        - Ji Ho Choi
        - Shin-Gyeom Kim
      year: 2020
      journal: International Clinical Psychopharmacology
      pmid: "31714321"
      pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/31714321/"
      study_type: Double-blind, placebo-controlled RCT
      sample_size: 110
      population: "Adult participants (mean age 40.47 ± 11.68 years; 53.6% female)"
      intervention:
        agent: "Passionflower extract"
        comparator: "Placebo"
        duration: "2 weeks"
      key_findings:
        - "Total sleep time increased significantly in passionflower group: 23.05 ± 54.26 vs -0.16 ± 53.12; P = 0.049"
        - "Sleep efficiency and wake after sleep onset (WASO) showed improvement in passionflower group"
        - "No statistically significant difference versus placebo for sleep efficiency and WASO"
      conclusions: "Study demonstrated positive effects of Passionflower on objective sleep parameters including TST on polysomnography"

    - id: ngan_2011
      title: "A double-blind, placebo-controlled investigation of the effects of Passiflora incarnata (passionflower) herbal tea on subjective sleep quality"
      authors:
        - A Ngan
        - R Conduit
      year: 2011
      journal: Phytotherapy Research
      pmid: "21294203"
      pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/21294203/"
      study_type: Double-blind, placebo-controlled RCT
      sample_size: 41
      population: "Healthy adults ages 18-35; 10 underwent polysomnography"
      intervention:
        agent: "Passionflower herbal tea (low dose)"
        comparator: "Placebo tea"
        duration: "7 days"
        design: "Counterbalanced order with 1-week washout"
      key_findings:
        - "Sleep quality showed significantly better rating for passionflower: t(40) = 2.70, p < 0.01"
      conclusions: "Passionflower tea produced short-term subjective sleep benefits for healthy adults with mild fluctuations in sleep quality"

    - id: harit_2024
      title: "Randomized, Double-Blind, Placebo-Controlled, Clinical Study of Passiflora incarnata in Participants With Stress and Sleep Problems"
      authors:
        - Harit MK
        - Mundhe N
        - Tamoli S Sr
        - Pawar V
        - Bhapkar V
        - Kolhe G
        - Mahadik S
        - Kulkarni A
        - Agarwal A
      year: 2024
      journal: Cureus
      pmid: "38646244"
      pubmed_url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC11026993/"
      study_type: Double-blind, placebo-controlled RCT
      sample_size: 65
      population: "Participants with stress and sleep problems (32 treatment, 33 placebo)"
      intervention:
        agent: "SIVI (Passiflora incarnata aerial parts extract)"
        dose: "600 mg daily at bedtime"
        duration: "30 days"
      key_findings:
        - "Statistically significant reduction in stress scores versus placebo by day 30"
        - "Significant increase in mean total sleep time at day 15 and day 30 compared to placebo"
        - "General health improved significantly on days 15 and 30 using GHQ-12 assessment"
        - "No adverse effects during study period"
      conclusions: "600 mg daily SIVI extract effective for stress reduction and sleep improvement with good safety profile"

pharmacology_and_mechanisms:
  - id: grundmann_2008
    title: "Anxiolytic activity of a phytochemically characterized Passiflora incarnata extract is mediated via the GABAergic system"
    authors:
      - Oliver Grundmann
      - Jie Wang
      - Gerard P McGregor
      - Veronika Butterweck
    year: 2008
    journal: Planta Med
    pmid: "19006051"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/19006051/"
    study_type: In vivo animal study (elevated plus maze test in mice)
    extract_characterization:
      method: "HPLC analysis"
      major_flavonoids:
        - homoorientin
        - orientin
        - vitexin
        - isovitexin
    key_findings:
      - "Passionflower extract exerted anxiolytic effect comparable to diazepam (1.5 mg/kg) at dose of 375 mg/kg"
      - "First demonstration of in vivo, GABA-mediated anxiolytic activity of characterized passionflower extract"
      - "Effect effectively antagonized by flumazenil (GABA receptor antagonist)"
      - "Indicates GABAergic pathway involvement rather than serotonergic mechanisms"

safety_and_toxicity:
  - id: fisher_2000
    title: "Toxicity of Passiflora incarnata L"
    authors:
      - A A Fisher
      - P Purcell
      - D G Le Couteur
    year: 2000
    journal: Journal of Toxicology - Clinical Toxicology
    pmid: "10696928"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/10696928/"
    study_type: Case Report
    key_findings:
      - "34-year-old woman experienced severe nausea, vomiting, drowsiness, prolonged QTc, and episodes of nonsustained ventricular tachycardia"
      - "Adverse effects occurred at therapeutic doses"
      - "Required hospitalization for cardiac monitoring and intravenous fluid support"
      - "Connection between symptoms and herbal remedy not recognized for several days"
    conclusions: "Passiflora incarnata was associated with significant adverse effects in this patient; highlights importance of asking about herbal medicine use"
    notes: "Rare case; most studies show good safety profile"

  - id: livertox_2020
    title: "Passionflower"
    authors: []
    year: 2020
    publication: "LiverTox: Clinical and Research Information on Drug-Induced Liver Injury"
    pmid: "31643352"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/31643352/"
    url: "https://www.ncbi.nlm.nih.gov/books/NBK548020/"
    study_type: Review
    likelihood_of_liver_injury: "E (unlikely cause of clinically apparent liver injury)"
    key_findings:
      - "Passionflower has not been implicated in causing serum enzyme elevations or clinically apparent liver injury"
      - "Major U.S. prospective study (2004-2013) of 85 cases of herbal/dietary supplement liver injury found passion flower was not implicated in any cases"
      - "Common side effects: dizziness, sedation, confusion, ataxia (none hepatic)"
    clinical_cases: "None reported"
    conclusions: "Despite widespread use, passionflower extracts have not been convincingly linked to clinically apparent liver injury"

