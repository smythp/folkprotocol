      - Faster colonic transit at higher menthol exposures
      - Stomach, small bowel, and whole gut contractility positively correlated with menthol exposure
    safety: "No specific adverse events documented in pediatric population"

# PHARMACOLOGY AND PHARMACOKINETICS

pharmacology:
  - id: grigoleit2005_pharmacokinetics
    authors: "Grigoleit HG, Grigoleit P"
    title: "Pharmacology and preclinical pharmacokinetics of peppermint oil"
    journal: "Phytomedicine"
    year: 2005
    volume: "12"
    issue: "8"
    pages: "612-616"
    pmid: "16121523"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/16121523/"
    study_type: "Review of preclinical pharmacokinetics"
    absorption: "Relatively rapidly absorbed after oral administration"
    distribution: "Menthol interferes with calcium movement across cell membranes"
    metabolism: |
      - Primary biliary metabolite: menthol glucuronide (undergoes enterohepatic circulation)
      - Urinary metabolites: from hydroxylation at C-7, C-8, C-9
      - Forms mono- and dihydroxymenthols and carboxylic acids
      - Some excreted as glucuronic acid conjugates
    elimination: |
      - Mainly via bile
      - About equal excretion in feces and urine (rat studies with tritiated menthol)
    mechanism: "Dose-related antispasmodic effect on GI smooth muscle"

  - id: grigoleit2005_clinical_pharm
    authors: "Grigoleit HG, Grigoleit P"
