# HEADACHE AND MIGRAINE STUDIES

headache_studies:
  - id: gobel1994_neurophysiology
    authors: "Göbel H, Schmidt G, Soyka D"
    title: "Effect of peppermint and eucalyptus oil preparations on neurophysiological and experimental algesimetric headache parameters"
    journal: "Cephalalgia"
    year: 1994
    pmid: "7954745"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/7954745/"
    study_design: "Double-blind, placebo-controlled, randomized crossover trial"
    participants: 32
    population: "Healthy subjects"
    formulation: "Four topical test preparations applied to forehead and temples"
    key_findings: |
      - Peppermint oil + ethanol produced significant analgesic effect with reduced sensitivity to headache
      - Peppermint + eucalyptus + ethanol combination increased cognitive performance and produced muscle-relaxing and mental relaxing effect
      - Minimal impact on general pain sensitivity
      - Essential oils demonstrated significant effects on mechanisms associated with headache pathophysiology
    conclusion: "Laboratory evidence supports essential plant oil preparations for headache pathophysiology mechanisms"

  - id: gobel1996_paracetamol_comparison
    authors: "Göbel H, Fresenius J, Heinze A, Dworschak M, Soyka D"
    title: "Effectiveness of Oleum menthae piperitae and paracetamol in therapy of headache of the tension type"
    journal: "Nervenarzt"
    year: 1996
    pmid: "8805113"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/8805113/"
    study_design: "Randomized, placebo-controlled, double-blind crossover trial"
    participants: 41
    headache_attacks_analyzed: 164
    population: "Both sexes, ages 18-65"
    formulation: "10% peppermint oil in ethanol applied topically to forehead and temples"
    dosing: "Applied at baseline, 15, and 30 minutes"
    comparator: "Acetaminophen 1,000 mg oral"
    key_findings: |
      - 10% peppermint oil in ethanol significantly reduced clinical headache intensity after 15 minutes (p < 0.01)
      - Acetaminophen also showed efficacy vs placebo (p < 0.01)
      - No significant difference between peppermint oil and acetaminophen effectiveness
      - Combined treatment showed additive effects below significance threshold
    adverse_events: "None reported by patients"
    conclusion: "Peppermint oil is a well-tolerated and cost-effective alternative to acetaminophen for tension-type headache"

  - id: borhani_haghighi2010_migraine_menthol
    authors: "Borhani Haghighi A, Motazedian S, Rezaii R, Mohammadi F, Salarian L, Pourmokhtari M, Khodaei S, Vossoughi M, Miri R"
    title: "Cutaneous application of menthol 10% solution as an abortive treatment of migraine without aura: a randomised, double-blind, placebo-controlled, crossed-over study"
    journal: "International Journal of Clinical Practice"
    year: 2010
    pmid: "20456191"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/20456191/"
    study_design: "Randomized, triple-blind, placebo-controlled crossover trial"
    participants: 35
    migraine_attacks_analyzed: 118
    demographics: "80% female, 20% male; mean age 29.6 ± 6.2 years"
    formulation: "10% ethanol solution of menthol applied to forehead and temporal area"
    comparator: "0.5% menthol as placebo"
    key_findings: |
      - 2-hour pain-free response significantly superior to placebo (p = 0.001)
      - 2-hour pain relief significantly superior to placebo (p = 0.000)
      - Sustained pain-free and sustained pain-relief endpoints favored menthol (p = 0.008)
      - Nausea/vomiting and light/sound sensitivity improved with menthol (p = 0.02)
      - Per-protocol: significantly more patients had "at least one pain free/pain relief" with menthol vs placebo (p = 0.002)
    adverse_events: "No significant difference between menthol and placebo groups (p = 0.13)"
    conclusion: "Menthol 10% solution is an efficacious, safe and tolerable abortive treatment for migraine without aura"

  - id: gobel2016_tth_treatment
    authors: "Göbel H, Heinze A, Heinze-Kuhn K, Göbel A, Göbel C"
    title: "Peppermint oil in the acute treatment of tension-type headache"
    journal: "Schmerz"
    year: 2016
    pmid: "27106030"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/27106030/"
    study_type: "Literature review and treatment guidelines summary"
    formulation: "10% peppermint oil in ethanol solution"
    licensed_uses: "Licensed for treatment of tension-type headache in adults and children above 6 years"
    key_findings: |
      - Controlled studies demonstrate significantly greater effectiveness than placebo
      - Efficacy comparable to acetylsalicylic acid or paracetamol
      - Targets multiple pathophysiological pathways involved in headache
      - Included in professional treatment guidelines and recommendations
    conclusion: "Standard treatment for acute tension-type headaches; suitable for adults and children over age 6"

  - id: rafieian_kopaei2019_migraine_intranasal
    authors: "Rafieian-Kopaei M, Hasanpour-Dehkordi A, Lorigooini Z, Deris F, Solati K, Mahdiyeh F"
    title: "Comparing the Effect of Intranasal Lidocaine 4% with Peppermint Essential Oil Drop 1.5% on Migraine Attacks: A Double-Blind Clinical Trial"
    journal: "International Journal of Preventive Medicine"
    year: 2019
    pmid: "31404204"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/31404204/"
    study_design: "Double-blind, parallel, randomized controlled trial"
    participants: 120
    population: "Adult patients with migraine diagnosis"
    formulation: "Intranasal peppermint essential oil drop 1.5%"
    comparator: "Intranasal lidocaine 4%; placebo"
    key_findings: |
      - Significant difference among groups in headache intensity after treatment (p < 0.001)
      - 42.1% of peppermint oil patients showed considerable response to treatment
      - 41.5% of lidocaine patients showed considerable response
      - Both active treatments reduced headache intensity in approximately 40% of patients
      - Placebo group had notably fewer responders
    conclusion: "Nasal menthol (peppermint oil) can be used to relieve migraine headaches, with efficacy comparable to lidocaine"

  - id: kingsley2023_pediatric_headache
    authors: "Kingsley RA"
    title: "Randomized Trial Examining Efficacy of Mentha piperita in Reducing Chronic Headache Discomfort in Youth"
    journal: "Pain Management Nursing"
    year: 2023
    pmid: "37730471"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/37730471/"
    study_design: "Single-center, randomized, experimental controlled trial"
    participants: 46
    demographics: "89% female, mean age 15.2 years"
    population: "Adolescents with primary headache disorder"
    formulation: "Peppermint oil added to foot bath"
    comparator: "Foot bath alone (control)"
    key_findings: |
      - Both groups showed significant pain reduction (p < .01)
      - Peppermint oil did not significantly improve pain beyond foot bath control
      - Both groups reported anxiety reduction (p < .01)
      - Control group showed less anxiety decrease (p = .03)
      - Control group had significant heart rate decrease (p < .01)
      - 95.5% of participants rated the intervention favorably
    conclusion: "Brief relaxation response reduced pain and anxiety; peppermint oil provided no additional benefit beyond relaxation alone"

  - id: murtey2023_essential_oils_migraine_meta
    authors: "Murtey P, Mohd Noor N, Ishak A, Idris NS"
    title: "Essential Oils as an Alternative Treatment for Migraine Headache: A Systematic Review and Meta-Analysis"
    journal: "Korean Journal of Family Medicine"
    year: 2023
    pmid: "37899272"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/37899272/"
    study_type: "Systematic review and meta-analysis"
    trials_included: 7
    participants: 558
    oils_studied: "Lavender, anise, basil, rose, peppermint, chamomile"
    routes: "Topical, oral, intranasal, inhalation"
    key_findings: |
      - Attack frequency: No significant difference vs placebo (MD -1.34; 95% CI, -3.31 to 0.64)
      - Headache severity: No meaningful difference vs placebo (MD -0.38; 95% CI, -1.76 to 0.99)
      - Associated symptoms: Limited evidence for possible reduction in phonophobia/photophobia; results inconclusive
    conclusion: "No significant difference between essential oils and placebo in managing migraine; higher-quality larger-scale trials needed"
    limitations: "Mixed essential oils pooled; peppermint-specific effects not isolated"

# NAUSEA AND VOMITING STUDIES

nausea_vomiting_studies:
  - id: pasha2012_pregnancy_nausea
    authors: "Pasha H, Behmanesh F, Mohsenzadeh F, Hajahmadi M, Moghadamnia AA"
    title: "Study of the effect of mint oil on nausea and vomiting during pregnancy"
    journal: "Iran Red Crescent Medical Journal"
    year: 2012
    pmid: "23396673"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/23396673/"
    study_design: "Double-blind randomized controlled trial"
    participants: 60
    population: "Pregnant women with nausea and vomiting"
    formulation: "Pure mint essential oil (4 drops placed on water near bedside for inhalation)"
    dosing: "4 drops for 4 consecutive nights before sleep"
    key_findings: |
      - Decreasing trend in nausea severity in mint group during intervention (vs increasing trend in controls)
      - Post-intervention nausea lower in mint group but not statistically significant
      - No meaningful reduction in vomiting intensity during or after intervention
    conclusion: "Peppermint essential oil did not produce statistically significant benefit for nausea and vomiting of pregnancy"

  - id: sites2014_ponv_controlled_breathing
    authors: "Sites DS, Johnson NT, Miller JA, Torbush PH, Hardin JS, Knowles SS, Nance J, Fox TH, Tart RC"
    title: "Controlled breathing with or without peppermint aromatherapy for postoperative nausea and/or vomiting symptom relief: a randomized controlled trial"
    journal: "Journal of PeriAnesthesia Nursing"
    year: 2014
    pmid: "24461278"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/24461278/"
    study_design: "Single-blind randomized controlled trial"
    eligible_participants: 196
    symptomatic_enrolled: 42
    groups: "Controlled breathing (n=16) vs peppermint aromatherapy (n=26)"
    dosing: "Applied at initial nausea complaint; repeated at 5 minutes if needed; assessed at 10 minutes"
    key_findings: |
      - PONV incidence: 21.4% (42/196)
      - Gender was the only significant risk factor for PONV
      - Controlled breathing efficacy: 62.5%
      - Peppermint aromatherapy efficacy: 57.7%
      - No statistically significant difference between groups
    conclusion: "Controlled breathing and peppermint aromatherapy both effective for PONV; data support combined use as alternative to prescribed antiemetics"

  - id: jafarimanesh2020_chemo_nausea
    authors: "Jafarimanesh H, Akbari M, Hoseinian R, Zarei M, Harorani M"
    title: "The Effect of Peppermint (Mentha piperita) Extract on the Severity of Nausea, Vomiting and Anorexia in Patients with Breast Cancer Undergoing Chemotherapy: A Randomized Controlled Trial"
    journal: "Integrative Cancer Therapies"
    year: 2020
    pmid: "33118401"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/33118401/"
    study_design: "Randomized controlled trial"
    participants: 84
    groups: "Experimental (n=42) vs control (n=42)"
    population: "Patients with breast cancer undergoing chemotherapy"
    formulation: "Peppermint extract (oral)"
    dosing: "40 drops mixed in 20 cc tap water every 8 hours"
    key_findings: |
      - Statistically significant differences between groups at 24 and 48 hours post-chemotherapy (p < .05)
      - Peppermint group showed lower mean severity scores for nausea, vomiting, and anorexia
    adverse_events: "None reported"
    conclusion: "Peppermint extract may improve chemotherapy-induced nausea, vomiting, and anorexia as complementary medicine"

  - id: maghami2020_cardiac_surgery_ponv
    authors: "Maghami M, Afazel MR, Azizi-Fini I, Maghami M"
    title: "The effect of aromatherapy with peppermint essential oil on nausea and vomiting after cardiac surgery: A randomized clinical trial"
    journal: "Complement Ther Clin Pract"
    year: 2020
    pmid: "32891278"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/32891278/"
    study_design: "Randomized controlled trial"
    participants: 60
    population: "Cardiac surgery patients"
    formulation: "Peppermint essential oil via nebulizer aromatherapy"
    dosing: "Administered before endotracheal tube removal post-surgery"
    key_findings: |
      - Nausea frequency: 0.63 ± 0.81 (intervention) vs 1.46 ± 1.21 (control), p < 0.05
      - Nausea duration: 3.78 ± 5.09 min (intervention) vs 7.97 ± 5.55 min (control), p < 0.05
      - Nausea severity: 2.43 ± 2.84 (intervention) vs 4.61 ± 2.85 (control), p < 0.05
      - Vomiting episodes: 0.17 ± 0.46 (intervention) vs 0.73 ± 0.60 (control), p < 0.05
      - All differences statistically significant in first 4 hours after extubation
    conclusion: "Peppermint essential oil inhalation recommended for managing postoperative nausea and vomiting after open-heart surgery"

  - id: sanci2023_pediatric_leukemia_nausea
    authors: "Şancı Y, Yıldız S, Ayçiçek A, Möhür N"
    title: "Effect of peppermint-lemon aromatherapy on nausea-vomiting and quality of life in pediatric patients with leukemia: A randomized controlled trial"
    journal: "Journal of Pediatric Nursing"
    year: 2023
    pmid: "37453895"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/37453895/"
    study_design: "Pretest-posttest randomized controlled trial with three groups"
    participants: 90
    groups: "Experimental, placebo, control"
    age_range: "2-12 years"
    population: "Pediatric patients with leukemia undergoing chemotherapy"
    formulation: "Mentha piperita and Citrus Lemon essential oils via diffuser"
    comparator: "Placebo (water via diffuser); control (no intervention)"
    key_findings: |
      - Aromatherapy group showed significantly lower pulse and respiratory rates vs other groups
      - Quality of life scores significantly higher in aromatherapy group
      - Nausea/vomiting/retching scores showed greater improvement in aromatherapy group between first and fourth chemotherapy cycles
    conclusion: "Peppermint-lemon inhalation aromatherapy effective for chemotherapy-induced nausea/vomiting and quality of life in pediatric leukemia patients"

  - id: gergo2025_peppermint_nausea_meta
    authors: "Gergő D et al."
    title: "Inhaling Peppermint Essential Oil as a Promising Complementary Therapy in the Treatment of Nausea and Vomiting"
    journal: "Journal of Clinical Medicine"
    year: 2025
    pmid: "40725767"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/40725767/"
    pmc_url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC12294836/"
    study_type: "Systematic review and meta-analysis"
    trials_included: 19
    quantitative_analysis: 14
    qualitative_analysis: 5
    participants: "1,000+ across three patient groups"
    key_findings: |
      - PONV: reduction in nausea 2-6 hours after intervention (MD: -0.60 points)
      - Pregnancy-related nausea: significant reductions at 48 hours (MD: -0.51) and 96 hours (MD: -0.68)
      - Chemotherapy-induced nausea (CINV): most notable reductions at 48 hours (MD: -2.23) and 72 hours (MD: -2.41)
      - Improvements often below clinically meaningful thresholds despite statistical significance
    safety: "Favorable safety profile; minimal adverse events reported"
    quality: "Low certainty of evidence due to methodological limitations and small sample sizes"
    conclusion: "Peppermint oil inhalation may be a promising complementary therapy for nausea/vomiting; larger higher-quality trials needed"

# COGNITIVE FUNCTION STUDIES

cognitive_studies:
  - id: moss2008_memory_alertness
    authors: "Moss M, Hewitt S, Moss L, Wesnes K"
    title: "Modulation of cognitive performance and mood by aromas of peppermint and ylang-ylang"
    journal: "International Journal of Neuroscience"
    year: 2008
    pmid: "18041606"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/18041606/"
    study_design: "Randomized controlled trial"
    participants: 144
    population: "Healthy volunteers"
    formulation: "Peppermint aroma"
    key_findings: |
      - Peppermint aroma enhanced memory
      - Peppermint increased alertness
      - Ylang-ylang impaired memory and lengthened processing speed but increased calmness
      - Significant differences between conditions on multiple factors underpinning cognitive tests
    conclusion: "Aromas of essential oils produce significant and idiosyncratic effects on subjective and objective assessments of human behavior; both pharmacological and psychological mechanisms implicated"

  - id: kennedy2018_cognitive_rct
    authors: "Kennedy D, Okello E, Chazot P, Howes MJ, Ohiomokhare S, Jackson P, Haskell-Ramsay C, Khan J, Forster J, Wightman E"
    title: "Volatile Terpenes and Brain Function: Investigation of the Cognitive and Mood Effects of Mentha × Piperita L. Essential Oil with In Vitro Properties Relevant to Central Nervous System Function"
    journal: "Nutrients"
    year: 2018
    pmid: "30087294"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/30087294/"
    pmc_url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC6116079/"
    study_design: "Double-blind, placebo-controlled, balanced crossover randomized controlled trial"
    participants: 24
    demographics: "Mean age 25.2 years"
    formulation: "Peppermint essential oil encapsulated"
    dosing: "Single doses of 50 µL and 100 µL"
    key_findings: |
      - 100 µL dose improved performance on Rapid Visual Information Processing (RVIP) task at 1 h and 3 h post-dose
      - Both doses attenuated fatigue and improved Serial 3s subtraction task at 3 h post-dose
      - In vitro: menthol acts as positive allosteric modulator of acetylcholine receptors
      - In vitro: menthol inhibits acetylcholinesterase (promotes cholinergic activity)
    conclusion: "Peppermint essential oil beneficially modulated performance on demanding cognitive tasks and attenuated mental fatigue in healthy adults; higher doses recommended for investigation"

  - id: netzler2025_peppermint_tea_cognition
    authors: "Netzler L, Lovell B"
    title: "A Randomized Placebo-Controlled Clinical Trial Exploring the Short-Term Cognitive and Cerebrovascular Effects of Consuming Peppermint Tea: A Mediation Study"
    journal: "Human Psychopharmacology"
    year: 2025
    pmid: "40189738"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/40189738/"
    pmc_url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC11973245/"
    study_design: "Randomized, single-blind, placebo-controlled, independent groups"
    participants: 25
    population: "Adults aged 18+"
    formulation: "Peppermint tea"
    dosing: "200 mL consumed as tea"
    key_findings: |
      - Peppermint group showed improvements in cognitive performance compared to placebo
      - Greater increases in Oxygenated (Oxy-Hb) and Total hemoglobin in peppermint group
      - Cerebrovascular changes did not mediate cognitive improvements (mediation analysis)
    conclusion: "Peppermint tea enhanced cognition and cerebral blood flow in healthy adults; mechanism is not cerebrovascular; larger samples needed"

# NOTES

notes: |
  ## Standard Dosing Summary
  - IBS treatment: 180-200 mg enteric-coated peppermint oil, 1-2 capsules TID
  - Treatment duration: Typically 2-24 weeks
  - Pediatric dosing: 180-540 mg daily in divided doses (studied in ages 7-12)
  - Single dose studies: 0.1-0.24 ml per subject

  ## Formulation Considerations
  - Enteric-coated formulations preferred for GI conditions
  - Extended release over 10-12 hours in small intestine
  - pH-triggered coating targets colon as primary site of action
  - Novel delivery systems (triple-coated microspheres) show promise

  ## Safety Profile
  - Generally well tolerated at recommended doses
  - Common adverse effects: heartburn, perianal burning (mild and transient)
  - NOAEL in rats: 40 mg/kg/day
  - Concerns with pulegone content (should be ≤1%)
  - Topical use: rinse-off ≤3%, leave-on ≤0.2%

  ## Quality Standards
  - USP: ≥5% esters (as menthyl acetate), ≥50% total menthol
  - Multiple official monographs: WHO, Commission E, EMA, USP
  - Standardized preparations recommended for clinical use

  ## Clinical Evidence
  - Strong evidence for IBS symptom management
  - Effective for functional dyspepsia (especially combinations)
  - Reduces spasticity during colonoscopy/endoscopy
  - Shows promise for pediatric functional abdominal pain
  - Postoperative nausea: multiple RCTs support aromatherapy; meta-analysis (19 RCTs) shows significant reduction
  - Chemotherapy-induced nausea: emerging evidence, CINV reductions MD -2.23 to -2.41 at 48-72h
  - Headache: 10% peppermint oil in ethanol equivalent to acetaminophen/ASA for tension-type headache
  - Migraine: intranasal peppermint 1.5% comparable to lidocaine 4% (~42% responder rate)
  - Cognitive: 100 µL encapsulated EO improved RVIP performance and attenuated mental fatigue

  ## Pharmacokinetics
  - Rapidly absorbed orally
  - Menthol undergoes extensive first-pass metabolism
  - Eliminated primarily via bile (enterohepatic circulation)
  - Elimination half-life: 2.1-4.6 hours (dose-dependent)
  - Weight-adjusted dosing explains 59% of exposure variability

  ## Research Gaps
  - Need for larger, well-designed RCTs
  - Standardization of dosing protocols across studies
  - Long-term safety data needed
  - Optimal formulation and delivery system unclear
  - Quality of evidence remains low-to-moderate in many areas
