  - id: shulman2022_pediatric_pk
    authors: "Shulman RJ, Chumpitazi BP, Abdel-Rahman SM, Garg U, Musaad S, Kearns GL"
    title: "Randomised trial: Peppermint oil (menthol) pharmacokinetics in children and effects on gut motility in children with functional abdominal pain"
    journal: "British Journal of Clinical Pharmacology"
    year: 2022
    pmid: "34528282"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/34528282/"
    study_design: "Randomized controlled trial"
    participants: 30
    evaluable_pk_data: 29
    age_range: "7-12 years"
    condition: "Functional abdominal pain"
    formulation: "Enteric-coated peppermint oil"
    dosing: |
      - 180 mg (single dose)
      - 360 mg (180 mg twice daily)
      - 540 mg (180 mg three times daily)
    pharmacokinetics: |
      - Apparent dose-proportionality for systemic menthol exposure
      - Elimination half-lives: 2.1, 3.5, and 4.6 hours across dose groups
