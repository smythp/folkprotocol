    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/16121522/"
    study_type: "Clinical pharmacology review"
    studies_reviewed: 9
    subjects: 269
    bioavailability: "Fractionated urinary recovery of menthol dependent on formulation type"
    formulation_optimal: "Enteric-coated formulations"
    release_pattern: "Extended delivery over 10-12 hours in small intestine"
    dosing_single_dose: "0.1-0.24 ml per subject"
    treatment_duration: "2 weeks minimum"
    site_of_action: "Colon as primary site"
