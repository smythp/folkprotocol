# SYSTEMATIC REVIEWS AND META-ANALYSES

systematic_reviews:
  - id: ingrosso2022_ibs_efficacy
    authors: "Ingrosso MR, Ianiro G, Nee J, Lembo AJ, Moayyedi P, Black CJ, Ford AC"
    title: "Systematic review and meta-analysis: efficacy of peppermint oil in irritable bowel syndrome"
    journal: "Alimentary Pharmacology & Therapeutics"
    year: 2022
    pmid: "35942669"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/35942669/"
    study_type: "Systematic review and meta-analysis"
    trials_included: 10
    participants: 1030
    key_findings: |
      - Global symptom improvement: RR 0.65 (95% CI 0.43-0.98)
      - Number needed to treat for global symptoms: 4 patients
      - Abdominal pain improvement: RR 0.76 (95% CI 0.62-0.93)
      - Number needed to treat for pain: 7 patients
      - Peppermint oil superior to placebo
    adverse_events: |
      - RR of any adverse event: 1.57 (95% CI 1.04-2.37)
      - Adverse events more frequent with peppermint oil than placebo
    quality: "Very low quality of evidence"
    recommendations: "Better-designed trials needed"

  - id: alammar2019_ibs_pooled
    authors: "Alammar N, Wang L, Saberi B, Nanavati J, Holtmann G, Shinohara RT, Mullin GE"
    title: "The impact of peppermint oil on the irritable bowel syndrome: a meta-analysis of the pooled clinical data"
    journal: "BMC Complementary and Alternative Medicine"
    year: 2019
    pmid: "30654773"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/30654773/"
    study_type: "Meta-analysis and systematic review"
    trials_included: 12
    participants: 835
    key_findings: |
      - Global symptom improvement: RR 2.39 (95% CI 1.93-2.97, p<0.00001)
      - 253 treatment vs 254 placebo participants in 7 studies
      - Abdominal pain: RR 1.78 (95% CI 1.43-2.20, p<0.00001)
      - 278 patients per group in 6 studies
      - Number needed to treat: 3 patients for persistent symptoms
      - Number needed to treat for pain: 4 patients
    adverse_events: |
      - Peppermint oil group: 9.3% (32/344 patients)
      - Placebo group: 6.1% (20/327 patients)
      - No statistically significant difference (p=0.16)
    conclusion: "Safe and effective therapy for pain and global symptoms in adults with IBS"

  - id: khanna2014_ibs_treatment
    authors: "Khanna R, MacDonald JK, Levesque BG"
    title: "Peppermint oil for the treatment of irritable bowel syndrome: a systematic review and meta-analysis"
    journal: "Journal of Clinical Gastroenterology"
    year: 2014
    pmid: "24100754"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/24100754/"
    study_type: "Systematic review and meta-analysis"
    trials_included: 9
    participants: 726
    formulation: "Enteric-coated peppermint oil capsules"
    treatment_duration: "Minimum 2 weeks"
    key_findings: |
      - Global IBS symptom improvement: RR 2.23 (95% CI 1.78-2.81)
      - 5 studies, 392 patients
      - Abdominal pain improvement: RR 2.14 (95% CI 1.64-2.79)
      - 5 studies, 357 patients
    adverse_events: "Mild and transient; heartburn most common"
    conclusion: "Safe and effective short-term treatment for IBS"

  - id: aziz2020_colonoscopy
    authors: "Aziz M, Sharma S, Ghazaleh S, Fatima R, Acharya A, Ghanim M, Sheikh T, Lee-Smith W, Hamdani SU, Nawras A"
    title: "The anti-spasmodic effect of peppermint oil during colonoscopy: a systematic review and meta-analysis"
    journal: "Minerva Gastroenterologica e Dietologica"
    year: 2020
    pmid: "31994371"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/31994371/"
    study_type: "Systematic review and meta-analysis"
    trials_included: 6
    key_findings: |
      - Reduced spasticity: risk difference -0.39 (p=0.02)
      - Severe spasticity decreased: risk difference -0.15 (p=0.04)
      - Peristalsis lowered during examination (p≤0.001)
      - Improved adenoma detection rate: RR 1.31 (p=0.01) in 2 studies
    limitations: "Significant heterogeneity"
    recommendations: "Larger studies with standardized dosing protocols needed"

  - id: madisch2023_menthacarin
    authors: "Madisch A, Frieling T, Zimmermann A, Hollenz M, Labenz J, Stracke B, Miehlke S"
    title: "Menthacarin, a Proprietary Peppermint Oil and Caraway Oil Combination, Improves Multiple Complaints in Patients with Functional Gastrointestinal Disorders: A Systematic Review and Meta-Analysis"
    journal: "Digestive Diseases"
    year: 2023
    pmid: "36502789"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/36502789/"
    study_type: "Systematic review and meta-analysis"
    trials_included: 12
    meta_analysis_trials: 5
    participants: 580
    meta_analysis_participants: 249
    formulation: "Menthacarin (proprietary peppermint oil and caraway oil combination)"
    key_findings: |
      - Pain reduction: standardized mean difference 0.80 (95% CI 0.39-1.21)
      - Global improvement: RR 2.65 (95% CI 1.81-3.87) on Clinical Global Impression Scale
      - Effective for functional dyspepsia
      - Promising for IBS symptoms
    safety: "Effective and safe"

  - id: gergo2025_lmenthol_endoscopy
    authors: "Gergő D, Tóth-Mészáros A, Schulze Wenning A, Fehérvári P, Nguyen Do To U, Hegyi P, Erőss B, Ványolós A, Csupor D"
    title: "Efficacy and Safety of L-Menthol During Gastrointestinal Endoscopy—A Systematic Review and Meta-Analysis of Randomized Clinical Trials"
    journal: "Journal of Clinical Medicine"
    year: 2025
    pmid: "40566063"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/40566063/"
    study_type: "Systematic review and meta-analysis"
    trials_included: 14
    participants: 1002
    formulation: "L-menthol (derived from peppermint oil)"
    mechanism: "Calcium channel blockade promotes GI smooth muscle relaxation"
    key_findings: |
      - Peristalsis suppression: 55.9% (OR 3.88)
      - Improved ease of examination: OR 2.53
      - No significant impact on adenoma detection rates (OR 1.06)
      - No prolonged withdrawal time (3.24 seconds difference)
    adverse_events: "Low and comparable to placebo (OR 0.97)"
    conclusion: "Safer alternative to traditional antispasmodics"

# RANDOMIZED CONTROLLED TRIALS

randomized_controlled_trials:
  - id: weerts2020_ibs_phase3
    authors: "Weerts ZZRM, Masclee AAM, Witteman BJM, Clemens CHM, Winkens B, Brouwers JRBJ, Frijlink HW, Muris JWM, De Wit NJ, Essers BAB, Tack J, Snijkers JTW, Bours AMH, de Ruiter-van der Ploeg AS, Jonkers DMAE, Keszthelyi D"
    title: "Efficacy and Safety of Peppermint Oil in a Randomized, Double-Blind Trial of Patients With Irritable Bowel Syndrome"
    journal: "Gastroenterology"
    year: 2020
    pmid: "31470006"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/31470006/"
    study_design: "Phase III, multicenter, randomized, double-blind, placebo-controlled"
    participants: 189
    completed: 178
    formulation: "Capsules"
    dosing: |
      - Small-intestinal-release: 182 mg peppermint oil
      - Ileocolonic-release: 182 mg peppermint oil
      - Placebo
    treatment_duration: "8 weeks"
    primary_outcomes: |
      - Small-intestinal group: 46.8% abdominal pain response (29/62; P=0.170 vs placebo)
      - Ileocolonic group: 41.3% response (26/63; P=0.385 vs placebo)
      - Placebo: 34.4% response (22/64)
      - Neither formulation met primary endpoints using regulatory criteria
    adverse_events: "More common in both peppermint oil groups (P<0.005); described as mild"
    conclusion: "Secondary outcomes showed modest improvements"

  - id: cash2016_novel_delivery
    authors: "Cash BD, Epstein MS, Shah SM"
    title: "A Novel Delivery System of Peppermint Oil Is an Effective Therapy for Irritable Bowel Syndrome Symptoms"
    journal: "Digestive Diseases and Sciences"
    year: 2016
    pmid: "26319955"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/26319955/"
    study_design: "Randomized, double-blind, placebo-controlled"
    participants: 72
    peppermint_group: 35
    placebo_group: 37
    demographics: "Mean age 40.7 years, 75% female"
    formulation: "Triple-coated microsphere (average diameter <1.5mm, microcrystalline cellulose core with enteric polymer coating)"
    dosing: "3 times daily"
    treatment_duration: "4 weeks"
    delivery_mechanism: "Sustained release in small intestine"
    key_findings: |
      - 40% reduction in Total IBS Symptom Score (TISS) with peppermint vs 24.3% with placebo
      - At 24 hours: 19.6% reduction (peppermint) vs 10.3% (placebo)
      - Greater improvement in individual GI symptoms
      - Greater improvement in severe/unbearable symptoms vs placebo
    safety: "Well tolerated with few adverse events"

  - id: shulman2022_pediatric_pk
    authors: "Shulman RJ, Chumpitazi BP, Abdel-Rahman SM, Garg U, Musaad S, Kearns GL"
    title: "Randomised trial: Peppermint oil (menthol) pharmacokinetics in children and effects on gut motility in children with functional abdominal pain"
    journal: "British Journal of Clinical Pharmacology"
    year: 2022
    pmid: "34528282"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/34528282/"
    study_design: "Randomized controlled trial"
    participants: 30
    evaluable_pk_data: 29
    age_range: "7-12 years"
    condition: "Functional abdominal pain"
    formulation: "Enteric-coated peppermint oil"
    dosing: |
      - 180 mg (single dose)
      - 360 mg (180 mg twice daily)
      - 540 mg (180 mg three times daily)
    pharmacokinetics: |
      - Apparent dose-proportionality for systemic menthol exposure
      - Elimination half-lives: 2.1, 3.5, and 4.6 hours across dose groups
      - Weight-adjusted dosing explained 59% of variability in menthol exposure
    gut_motility: |
      - Colonic transit time inversely related to AUClast (P=0.003)
      - Faster colonic transit at higher menthol exposures
      - Stomach, small bowel, and whole gut contractility positively correlated with menthol exposure
    safety: "No specific adverse events documented in pediatric population"

# PHARMACOLOGY AND PHARMACOKINETICS

pharmacology:
  - id: grigoleit2005_pharmacokinetics
    authors: "Grigoleit HG, Grigoleit P"
    title: "Pharmacology and preclinical pharmacokinetics of peppermint oil"
    journal: "Phytomedicine"
    year: 2005
    volume: "12"
    issue: "8"
    pages: "612-616"
    pmid: "16121523"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/16121523/"
    study_type: "Review of preclinical pharmacokinetics"
    absorption: "Relatively rapidly absorbed after oral administration"
    distribution: "Menthol interferes with calcium movement across cell membranes"
    metabolism: |
      - Primary biliary metabolite: menthol glucuronide (undergoes enterohepatic circulation)
      - Urinary metabolites: from hydroxylation at C-7, C-8, C-9
      - Forms mono- and dihydroxymenthols and carboxylic acids
      - Some excreted as glucuronic acid conjugates
    elimination: |
      - Mainly via bile
      - About equal excretion in feces and urine (rat studies with tritiated menthol)
    mechanism: "Dose-related antispasmodic effect on GI smooth muscle"

  - id: grigoleit2005_clinical_pharm
    authors: "Grigoleit HG, Grigoleit P"
    title: "Gastrointestinal clinical pharmacology of peppermint oil"
    journal: "Phytomedicine"
    year: 2005
    volume: "12"
    issue: "8"
    pages: "607-611"
    pmid: "16121522"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/16121522/"
    study_type: "Clinical pharmacology review"
    studies_reviewed: 9
    subjects: 269
    bioavailability: "Fractionated urinary recovery of menthol dependent on formulation type"
    formulation_optimal: "Enteric-coated formulations"
    release_pattern: "Extended delivery over 10-12 hours in small intestine"
    dosing_single_dose: "0.1-0.24 ml per subject"
    treatment_duration: "2 weeks minimum"
    site_of_action: "Colon as primary site"
    clinical_effects: |
      - Substantial spasmolytic effect on GI smooth muscle
      - Measured via oro-cecal transit time, total GI transit time
      - Affects gastric emptying and colonic motility
    formulation_preference: "pH-triggered enteric-coated, targeting colon"

# CLINICAL USE AND DOSING

clinical_use:
  - id: grigoleit2005_ibs_review
    authors: "Grigoleit HG, Grigoleit P"
    title: "Peppermint oil in irritable bowel syndrome"
    journal: "Phytomedicine"
    year: 2005
    pmid: "16121521"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/16121521/"
    study_type: "Literature review"
    trials_reviewed: 16
    participants: 651
    formulation: "Enteric-coated capsules"
    standard_dosing: "180-200 mg enteric-coated peppermint oil"
    recommended_regimen: "1-2 capsules three times daily (t.i.d.) over 24 weeks"
    efficacy: |
      - 8 of 12 placebo-controlled studies showed statistically significant benefits
      - Average response rate: 58% (peppermint oil) vs 29% (placebo)
      - Placebo response range: 10-52%
      - Comparable effectiveness to smooth muscle relaxants in 3 comparisons
    adverse_effects: |
      - Generally mild and transient
      - Peppermint oil: heartburn, anal/perianal burning or discomfort
      - Anticholinergic comparators: dry mouth, blurred vision
    clinical_recommendation: "May be drug of first choice in IBS patients with non-serious constipation or diarrhea"

# SAFETY AND TOXICOLOGY

safety:
  - id: chumpitazi2018_safety_review
    authors: "Chumpitazi BP, Kearns GL, Shulman RJ"
    title: "Review article: the physiological effects and safety of peppermint oil and its efficacy in irritable bowel syndrome and other functional disorders"
    journal: "Alimentary Pharmacology & Therapeutics"
    year: 2018
    pmid: "29372567"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/29372567/"
    review_type: "Comprehensive literature review (through July 15, 2017)"
    mechanisms_of_action: |
      - Smooth muscle relaxation (via calcium channel blockade or direct enteric nervous system effects)
      - Visceral sensitivity modulation through transient receptor potential cation channels
      - Anti-microbial activity
      - Anti-inflammatory activity
      - Psychosocial distress modulation
    gastrointestinal_effects: "Affects entire digestive tract: esophageal, gastric, small bowel, gallbladder, and colonic physiology"
    safety_profile: "Few adverse effects reported in peppermint oil trials"
    clinical_efficacy: |
      - Irritable bowel syndrome
      - Functional dyspepsia
      - Childhood functional abdominal pain
      - Post-operative nausea
    conclusion: "Good safety profile with effective treatment for multiple GI disorders"

  - id: nair2001_safety_assessment
    authors: "Nair B"
    title: "Final report on the safety assessment of Mentha Piperita (Peppermint) Oil, Mentha Piperita (Peppermint) Leaf Extract, Mentha Piperita (Peppermint) Leaf, and Mentha Piperita (Peppermint) Leaf Water"
    journal: "International Journal of Toxicology"
    year: 2001
    pmid: "11766133"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/11766133/"
    study_type: "Comprehensive safety assessment"
    acute_toxicity: "Minimally toxic in acute oral studies"
    neurological_effects: "Cyst-like lesions in rat cerebellums with pulegone or high menthone (>200 mg/kg/day)"
    hepatotoxicity: "Pulegone demonstrated liver toxicity concerns"
    dermal_reactions: "Moderate-to-severe reactions with repeated intradermal dosing in rabbits"
    phototoxicity: "Not observed"
    mutagenicity: |
      - Negative: Ames assay, mouse lymphoma assay
      - Equivocal: hamster chromosome aberration testing
    carcinogenicity: "No differences between peppermint oil-treated and control mice"
    safe_use_concentrations: |
      - Rinse-off formulations: ≤3%
      - Leave-on formulations: ≤0.2%
      - Pulegone limitation: ≤1%
    sensitization: |
      - Isolated clinical cases of irritation/sensitization reported
      - 8% peppermint oil: negative in maximization testing
    special_consideration: "Menthol enhances penetration of other agents"

  - id: madsen1992_subchronic_toxicity
    authors: "Spindler P, Madsen C"
    title: "Subchronic toxicity study of peppermint oil in rats"
    journal: "Toxicology Letters"
    year: 1992
    volume: "62"
    issue: "2-3"
    pages: "215-220"
    pmid: "1412506"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/1412506/"
    study_design: "90-day oral administration study in rats"
    groups: 4
    dosing_levels: "0, 10, 40, and 100 mg/kg body weight per day"
    toxicology_findings: |
      - Highest dose (100 mg/kg): cyst-like spaces in cerebellar white matter
      - Highest dose (100 mg/kg): nephropathy in male rats
      - No other encephalopathic signs observed
    noael: "40 mg/kg body weight per day"
    safety_conclusion: "40 mg/kg daily represents maximum dose without observable adverse effects in rats"

