# SYSTEMATIC REVIEWS AND META-ANALYSES

systematic_reviews:
  - id: ingrosso2022_ibs_efficacy
    authors: "Ingrosso MR, Ianiro G, Nee J, Lembo AJ, Moayyedi P, Black CJ, Ford AC"
    title: "Systematic review and meta-analysis: efficacy of peppermint oil in irritable bowel syndrome"
    journal: "Alimentary Pharmacology & Therapeutics"
    year: 2022
    pmid: "35942669"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/35942669/"
    study_type: "Systematic review and meta-analysis"
    trials_included: 10
    participants: 1030
    key_findings: |
      - Global symptom improvement: RR 0.65 (95% CI 0.43-0.98)
      - Number needed to treat for global symptoms: 4 patients
      - Abdominal pain improvement: RR 0.76 (95% CI 0.62-0.93)
      - Number needed to treat for pain: 7 patients
      - Peppermint oil superior to placebo
    adverse_events: |
      - RR of any adverse event: 1.57 (95% CI 1.04-2.37)
      - Adverse events more frequent with peppermint oil than placebo
    quality: "Very low quality of evidence"
    recommendations: "Better-designed trials needed"

  - id: alammar2019_ibs_pooled
    authors: "Alammar N, Wang L, Saberi B, Nanavati J, Holtmann G, Shinohara RT, Mullin GE"
    title: "The impact of peppermint oil on the irritable bowel syndrome: a meta-analysis of the pooled clinical data"
    journal: "BMC Complementary and Alternative Medicine"
    year: 2019
    pmid: "30654773"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/30654773/"
    study_type: "Meta-analysis and systematic review"
    trials_included: 12
    participants: 835
    key_findings: |
      - Global symptom improvement: RR 2.39 (95% CI 1.93-2.97, p<0.00001)
      - 253 treatment vs 254 placebo participants in 7 studies
      - Abdominal pain: RR 1.78 (95% CI 1.43-2.20, p<0.00001)
      - 278 patients per group in 6 studies
      - Number needed to treat: 3 patients for persistent symptoms
      - Number needed to treat for pain: 4 patients
    adverse_events: |
      - Peppermint oil group: 9.3% (32/344 patients)
      - Placebo group: 6.1% (20/327 patients)
      - No statistically significant difference (p=0.16)
    conclusion: "Safe and effective therapy for pain and global symptoms in adults with IBS"

