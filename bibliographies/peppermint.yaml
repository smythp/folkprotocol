    formulation: "Capsules"
    dosing: |
      - Small-intestinal-release: 182 mg peppermint oil
      - Ileocolonic-release: 182 mg peppermint oil
      - Placebo
    treatment_duration: "8 weeks"
    primary_outcomes: |
      - Small-intestinal group: 46.8% abdominal pain response (29/62; P=0.170 vs placebo)
      - Ileocolonic group: 41.3% response (26/63; P=0.385 vs placebo)
      - Placebo: 34.4% response (22/64)
      - Neither formulation met primary endpoints using regulatory criteria
    adverse_events: "More common in both peppermint oil groups (P<0.005); described as mild"
    conclusion: "Secondary outcomes showed modest improvements"

  - id: cash2016_novel_delivery
    authors: "Cash BD, Epstein MS, Shah SM"
    title: "A Novel Delivery System of Peppermint Oil Is an Effective Therapy for Irritable Bowel Syndrome Symptoms"
    journal: "Digestive Diseases and Sciences"
    year: 2016
    pmid: "26319955"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/26319955/"
    study_design: "Randomized, double-blind, placebo-controlled"
    participants: 72
    peppermint_group: 35
    placebo_group: 37
    demographics: "Mean age 40.7 years, 75% female"
    formulation: "Triple-coated microsphere (average diameter <1.5mm, microcrystalline cellulose core with enteric polymer coating)"
    dosing: "3 times daily"
    treatment_duration: "4 weeks"
    delivery_mechanism: "Sustained release in small intestine"
    key_findings: |
