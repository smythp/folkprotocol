    formulation_preference: "pH-triggered enteric-coated, targeting colon"

# CLINICAL USE AND DOSING

clinical_use:
  - id: grigoleit2005_ibs_review
    authors: "Grigoleit HG, Grigoleit P"
    title: "Peppermint oil in irritable bowel syndrome"
    journal: "Phytomedicine"
    year: 2005
    pmid: "16121521"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/16121521/"
    study_type: "Literature review"
    trials_reviewed: 16
    participants: 651
    formulation: "Enteric-coated capsules"
    standard_dosing: "180-200 mg enteric-coated peppermint oil"
    recommended_regimen: "1-2 capsules three times daily (t.i.d.) over 24 weeks"
    efficacy: |
      - 8 of 12 placebo-controlled studies showed statistically significant benefits
      - Average response rate: 58% (peppermint oil) vs 29% (placebo)
      - Placebo response range: 10-52%
      - Comparable effectiveness to smooth muscle relaxants in 3 comparisons
    adverse_effects: |
      - Generally mild and transient
      - Peppermint oil: heartburn, anal/perianal burning or discomfort
      - Anticholinergic comparators: dry mouth, blurred vision
    clinical_recommendation: "May be drug of first choice in IBS patients with non-serious constipation or diarrhea"

