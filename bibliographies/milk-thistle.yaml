# SAFETY AND TOXICITY

safety_studies:
  - id: soleimani2019_safety
    authors: "Soleimani V, Delghandi PS, Moallem SA, Karimi G"
    title: "Safety and toxicity of silymarin, the major constituent of milk thistle extract: An updated review"
    journal: "Phytotherapy Research"
    year: 2019
    volume: null
    pages: null
    pmid: "31069872"
    doi: null
    study_type: "Literature review"
    key_findings: |
      General Safety:
      - Safe in humans at therapeutic doses
      - Well tolerated even at high doses

      High Dose Tolerance:
      - 700 mg three times daily (2100 mg/day) for 24 weeks: well tolerated

      Adverse Effects:
      - Minor gastrointestinal symptoms: nausea, diarrhea

      Pregnancy:
      - One trial showed safety in pregnancy with no fetal anomalies
      - Caution recommended; more human studies needed

      Drug Interactions:
      - Low drug interaction potential
      - Does not substantially affect cytochrome P-450 enzymes
      - Caution warranted with narrow therapeutic window drugs
    adverse_effects: "Minor GI effects (nausea, diarrhea)"
    safety: "Safe at therapeutic and high doses"
    quality: "Comprehensive safety review"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/31069872/"

