# NOTES

quality_considerations: |
  One significant concern raised in the literature:
  - Commercial milk thistle preparations may contain mycotoxins, pesticides, and microbiological contamination
  - Quality varies significantly between manufacturers
  - Standardization to silymarin content is important but not sufficient
  - Third-party testing recommended
  Reference: PMID 31366891

key_active_constituents:
  - name: "Silymarin"
    description: "Complex of flavonolignans comprising 65-80% of extract"

  - name: "Silybin (Silibinin)"
    description: "Most abundant and potent flavonolignan; exists as silybin A and silybin B"
    proportion: "50-60% of silymarin"

  - name: "Silydianin"
    description: "Minor flavonolignan component"

  - name: "Silychristin"
    description: "Minor flavonolignan component"

  - name: "Isosilybin A and B"
    description: "Minor but bioactive flavonolignans"

mechanism_of_action: |
  - Antioxidant: Reduces oxidative stress and free radical damage
  - Anti-inflammatory: Modulates inflammatory pathways
  - Membrane stabilization: Protects hepatocyte cell membranes
  - Protein synthesis stimulation: Promotes liver regeneration
  - Inhibition of toxin penetration: Blocks toxin entry into hepatocytes
  - Immunomodulation: Affects immune system response

sources_summary: |
  This bibliography includes:
  - Regulatory monographs: EMA/HMPC 2018, German Commission E, European Pharmacopoeia, ESCOP
  - 9 systematic reviews and meta-analyses (liver disease, NAFLD, diabetes, nephroprotection, anti-TB)
  - 10 major randomized controlled trials (cirrhosis, alcoholic hepatitis, acute hepatitis,
    chronic hepatitis C, NASH, Amanita poisoning, decompensated liver disease, chemotherapy protection)
  - 4 bioavailability and pharmacokinetic studies (phytosome, micellar, conjugate profiling, phase I PK)
  - 2 comprehensive safety reviews

  Key dosing range from clinical evidence:
  - Standard: 420 mg/day (140 mg TID) — Ferenci 1989 (cirrhosis survival benefit), El-Kamary 2009
  - High-dose: 1050–2100 mg/day — used in NASH (Chan Wah Kheong 2017), HCV (Fried 2012 JAMA),
    decompensated cirrhosis (Fathalah 2017)
  - Phase I safety ceiling: 2100 mg/day (700 mg TID × 7 days) — no adverse events (Hawke 2010)
  - Enhanced bioavailability: 45 mg phytosome ≈ >400 mg conventional silymarin (Méndez-Sánchez 2019)

  PubMed sources accessed January–March 2026.
  Focus on clinical evidence directly ON milk thistle, standardized extracts, dosing, bioavailability.
