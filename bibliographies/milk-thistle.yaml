  - id: hruby1983_amanita
    authors: "Hruby K, Fuhrmann M, Csomos G, Thaler H"
    title: "Pharmacotherapy of Amanita phalloides poisoning using silybin"
    journal: "Wien Klin Wochenschr"
    year: 1983
    pmid: "6410590"
    doi: null
    study_type: "Retrospective case series / pharmacotherapy analysis"
    sample_size: 18
    dosage: "Mean silybin dosage 33 mg/kg body weight/day IV; mean treatment duration 81.6 hours"
    key_findings: |
      Survival:
      - 17 of 18 patients survived (one fatality in high-dose suicidal case)

      Timing:
      - Mean time to treatment: 71.5 hours (severe group) vs 46 hours (medium) vs 33.8 hours (light)
      - Administration within ~48 hours of mushroom intake effective to prevent severe liver damage

      Clinical:
      - IV silybin blocks hepatic uptake of alpha-amanitin toxin
    conclusion: "IV silybin appears effective in preventing severe liver damage from Amanita phalloides when administered within 48 hours"
    notes: "Supports parenteral silibinin (Legalon SIL IV) use in acute mushroom poisoning; foundational clinical dataset for this indication"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/6410590/"

