  - id: navarro2019_nash
    authors: "Navarro VJ, Belle SH, D'Amato M, Adfhal N, Brunt EM, Fried MW, Reddy KR, Wahed AS, Harrison S"
    title: "Silymarin in non-cirrhotics with non-alcoholic steatohepatitis: A randomized, double-blind, placebo controlled trial"
    journal: "PLoS One"
    year: 2019
    volume: null
    pages: null
    pmid: "31536511"
    doi: null
    study_type: "Phase II RCT, double-blind, placebo-controlled, multicenter"
    sample_size: 78
    treatment_allocation: "25 placebo, 26 receiving 420mg, 27 receiving 700mg"
    dosage: "Legalon 420 mg or 700 mg three times daily (1260 mg or 2100 mg/day)"
    duration: "48 weeks"
    key_findings: |
      Primary Endpoint (≥2 point NAS improvement):
      - 700 mg group: 15%
      - 420 mg group: 19%
      - Placebo group: 12%
