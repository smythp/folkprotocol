# REGULATORY MONOGRAPHS

regulatory_monographs:
  - id: ema_hmpc_2018
    source: "European Medicines Agency – Committee on Herbal Medicinal Products (HMPC)"
    title: "European Union Herbal Monograph on Silybum marianum (L.) Gaertn., fructus"
    reference: "EMA/HMPC/294187/2013"
    year: 2018
    adopted: "September 2018"
    url: "https://www.ema.europa.eu/en/medicines/herbal/silybi-mariani-fructus"
    regulatory_category: "Traditional use (minimum 30 years including 15+ years in EU)"
    approved_indications:
      - "Relief of symptoms of digestive disorders (sensation of fullness, indigestion)"
      - "Support of liver function (after serious conditions excluded by physician)"
    preparations_covered:
      - "Dried and comminuted fruit or powder"
      - "Liquid extracts (acetone, ethanol, ethyl acetate, or methanol)"
      - "Soft or dry extracts; herbal tea, liquid, or solid oral forms"
    usage_restrictions:
      - "Adults only"
      - "Consult healthcare provider if symptoms persist >2 weeks or worsen"
    contraindications:
      - "Hypersensitivity to milk thistle or Asteraceae/Compositae family plants"
    adverse_effects:
      - "Mild GI effects: dry mouth, nausea, upset stomach, diarrhea"
      - "Headache, allergic skin reactions (urticaria, itching, rash)"
      - "Asthma (rare)"
    notes: "Periodic review initiated May 2023; consultation closed July 2023"

  - id: commission_e
    source: "German Commission E (Federal Institute for Drugs and Medical Devices)"
    title: "Commission E Monograph: Milk Thistle Fruit (Cardui mariae fructus)"
    year: 1986
    url: "https://www.herbalgram.org/resources/expanded-commission-e-monographs/milk-thistle-fruit/"
    regulatory_category: "Positive monograph (approved herbal medicine)"
    approved_indications:
      - "Toxic liver damage"
      - "Supportive treatment in chronic inflammatory liver disease"
      - "Hepatic cirrhosis"
    standardized_dose: "200–400 mg/day silymarin calculated as silybin"
    notes: >
      One of the earliest formal regulatory recognitions of silymarin's hepatoprotective
      use. Basis for widespread European use of Legalon (140 mg silymarin/capsule,
      standardized to 70–80% flavonolignans). Expanded Commission E monograph published
      by American Botanical Council.

  - id: european_pharmacopoeia
    source: "European Directorate for the Quality of Medicines & HealthCare (EDQM)"
    title: "European Pharmacopoeia Monograph: Silybi mariani fructus and Refined and Quantified Dry Extract"
    monograph_number: "1860"
    standardization_criteria:
      total_silymarin: "30–65% m/m in refined and quantified dry extract (expressed as silybin)"
      silybin_a_and_b: "40–65% of total silymarin"
      silychristin_and_silydianin: "20–45% of total silymarin"
      isosilybin_a_and_b: "10–20% of total silymarin"
    notes: >
      Sets analytical standards underpinning commercial preparations. HPTLC identity
      testing specified. Commercial preparations (e.g., Legalon, Siliphos) must conform.
      Note: typical retail supplements often labeled as "70–80% silymarin" correspond to
      the crude extract standardization, not the refined EP specification.

  - id: escop_2009
    source: "European Scientific Cooperative on Phytotherapy (ESCOP)"
    title: "ESCOP Monograph: Silybi mariani fructus (Milk Thistle Fruit)"
    year: 2009
    approved_indications:
      - "Treatment of toxic liver damage"
      - "Supportive treatment in chronic inflammatory liver conditions and hepatic cirrhosis"

# SYSTEMATIC REVIEWS AND META-ANALYSES

systematic_reviews:
  - id: li2024_nafld
    authors: "Li S, Duan F, Li S, Lu B"
    title: "Administration of silymarin in NAFLD/NASH: A systematic review and meta-analysis"
    journal: "Annals of Hepatology"
    year: 2024
    volume: null
    pages: null
    pmid: "38579127"
    doi: null
    study_type: "Systematic review and meta-analysis"
    trials_included: 26
    participants: 2375
    key_findings: |
      Lipid Profile:
      - Total cholesterol decreased (SMD: -0.85)
      - Triglycerides reduced (SMD: -0.62)
      - LDL-C lowered (SMD: -0.81)
      - HDL-C increased (SMD: 0.46)

      Liver Enzymes:
      - ALT decreased by 12.39 units
      - AST decreased by 10.97 units

      Metabolic Markers:
      - Fasting insulin reduced (SMD: -0.59)
      - Fatty liver index decreased by 6.64 points
      - Fatty liver score lowered (SMD: -0.51)

      Histological Outcomes:
      - Hepatic steatosis significantly improved (OR: 3.25)
    safety: "Well tolerated in NAFLD patients"
    quality: "Meta-analysis of 26 RCTs"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/38579127/"

  - id: frounchi2025_nephroprotective
