clinical_trials:
  - id: ferenci1989_cirrhosis
    authors: "Ferenci P, Dragosics B, Dittrich H, Frank H, Benda L, Lochs H, Meryn S, Base W, Schneider B"
    title: "Randomized controlled trial of silymarin treatment in patients with cirrhosis of the liver"
