# SYSTEMATIC REVIEWS AND META-ANALYSES

systematic_reviews:
  - id: li2024_nafld
    authors: "Li S, Duan F, Li S, Lu B"
    title: "Administration of silymarin in NAFLD/NASH: A systematic review and meta-analysis"
    journal: "Annals of Hepatology"
    year: 2024
    volume: null
    pages: null
    pmid: "38579127"
    doi: null
    study_type: "Systematic review and meta-analysis"
    trials_included: 26
    participants: 2375
    key_findings: |
      Lipid Profile:
      - Total cholesterol decreased (SMD: -0.85)
      - Triglycerides reduced (SMD: -0.62)
      - LDL-C lowered (SMD: -0.81)
      - HDL-C increased (SMD: 0.46)

      Liver Enzymes:
      - ALT decreased by 12.39 units
      - AST decreased by 10.97 units

      Metabolic Markers:
      - Fasting insulin reduced (SMD: -0.59)
      - Fatty liver index decreased by 6.64 points
      - Fatty liver score lowered (SMD: -0.51)

      Histological Outcomes:
      - Hepatic steatosis significantly improved (OR: 3.25)
    safety: "Well tolerated in NAFLD patients"
    quality: "Meta-analysis of 26 RCTs"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/38579127/"

  - id: frounchi2025_nephroprotective
    authors: "Frounchi N, Mahmoodpoor F, Zakavi SS, Eyvazova K, Yagubova S, Ardalan M, Ahmadian E, Gareev I, Beylerli O, Roumiantsev S"
    title: "Nephroprotective Effects of Silymarin: A Systematic Review and Meta-Analysis"
    journal: "Biochemistry (Moscow)"
    year: 2025
    volume: "89"
    issue: "8"
    pages: null
    pmid: "40886393"
    doi: null
    study_type: "Systematic review and meta-analysis"
    trials_included: 7
    participants: "10 clinical trials identified, 7 included in meta-analysis"
    key_findings: |
      Overall Nephroprotective Effect:
      - Significant reduction in serum creatinine (Hedges' g = -1.23; 95% CI: -2.02 to -0.43; p = 0.0024)

      Subgroup Analysis by Condition:
      - Drug-induced acute kidney injury: Effective (p = 0.003)
      - Chronic kidney disease: Not effective (p = 0.3065)

      Dosage Analysis:
      - Daily dose of 280 mg: Ineffective (p = 0.2375)
    safety: "No significant adverse events reported"
    quality: "Meta-analysis of clinical trials"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/40886393/"

  - id: calderon2023_liver_enzymes
    authors: "Calderon Martinez E, Herrera D, Mogan S, Hameed Z, Jangda AA, Khan TJ, Mroke P, Sajid S, Shah YR, Baig I"
    title: "Impact of Silymarin Supplements on Liver Enzyme Levels: A Systematic Review"
    journal: "Cureus"
    year: 2023
    volume: null
    pages: null
    pmid: "38021897"
    doi: null
    study_type: "Systematic review"
    trials_included: 29
    participants: 3846
    dosage_range: "140 mg to 420 mg"
    key_findings: |
      Effect on Liver Enzymes:
      - 65.5% of studies: Reduced liver enzyme levels
      - 20.7% of studies: No significant change
      - 13.8% of studies: Elevated liver enzymes

      Clinical Implications:
      - Potential hepatoprotective influence
      - Most pronounced benefits in NAFLD patients
      - Variations attributed to comorbidities, dosing, and underlying disease differences
    safety: "Generally well tolerated"
    quality: "Systematic review of 29 RCTs"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/38021897/"

  - id: tao2019_antituberculosis
    authors: "Tao L, Qu X, Zhang Y, Song Y, Zhang SX"
    title: "Prophylactic Therapy of Silymarin (Milk Thistle) on Antituberculosis Drug-Induced Liver Injury: A Meta-Analysis of Randomized Controlled Trials"
    journal: "Canadian Journal of Gastroenterology and Hepatology"
    year: 2019
    volume: null
    pages: null
    pmid: "30733935"
    doi: null
    study_type: "Meta-analysis"
    trials_included: 5
    participants: 1198
    treatment_allocation: "585 silymarin, 613 placebo"
    key_findings: |
      Hepatoprotection:
      - Reduced anti-TB drug-induced liver injury at week 4 (RR: 0.33, 95% CI: 0.15-0.75)
      - Protective effects on ALT, AST, and ALP (statistically significant)

      Safety:
      - Adverse events comparable to placebo (OR: 1.09, 95% CI: 0.86-1.39, p = 0.47)
      - Significantly reduced risk of liver injury within 4 weeks of treatment
    safety: "No significant difference in adverse events vs placebo"
    quality: "Meta-analysis of 5 RCTs"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/30733935/"

  - id: voroneanu2016_diabetes
    authors: "Voroneanu L, Nistor I, Dumea R, Apetrii M, Covic A"
    title: "Silymarin in Type 2 Diabetes Mellitus: A Systematic Review and Meta-Analysis of Randomized Controlled Trials"
    journal: "Journal of Diabetes Research"
    year: 2016
    volume: null
    pages: null
    pmid: "27340676"
    doi: null
    study_type: "Meta-analysis"
    trials_included: 5
    participants: 270
    key_findings: |
      Glycemic Control:
      - Fasting blood glucose decreased by 26.86 mg/dL (95% CI: -35.42 to -18.30)
      - HbA1c decreased by 1.07% (95% CI: -1.73 to -0.40)

      Lipid Profile:
      - No significant effect on lipid profile

      Renal Effects:
      - Benefits for proteinuria and CKD progression uncertain (only single small studies)

      Limitations:
      - Low quality evidence
      - Substantial heterogeneity across studies
      - No clinical recommendation can be made at this time
    safety: "Well tolerated in included studies"
    quality: "Meta-analysis of 5 RCTs with noted methodological limitations"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/27340676/"

  - id: saller2008_updated
    authors: "Saller R, Brignoli R, Melzer J, Meier R"
    title: "An updated systematic review with meta-analysis for the clinical evidence of silymarin"
    journal: "Forsch Komplementmed"
    year: 2008
    volume: null
    pages: null
    pmid: "18334810"
    doi: null
    study_type: "Meta-analysis and systematic review"
    trials_included: 19
    participants: "From 65 papers, 19 meeting double- or single-blind criteria included"
    key_findings: |
      Toxic Liver Diseases:
      - Evidence scarce

      Viral Hepatitis C:
      - No evidence of benefit for treatment

      Alcoholic Liver Disease:
      - Reduced aspartate aminotransferase vs placebo
      - No effect on alkaline phosphatase

      Liver Cirrhosis:
      - Modest mortality benefit
      - Liver-related mortality: 10.0% (silymarin) vs 17.3% (placebo)

      Recommended Use:
      - Supportive element for Amanita phalloides poisoning
      - Supportive treatment for alcoholic cirrhosis
    safety: "Limited clinical benefit noted"
    quality: "Systematic review with selective inclusion"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/18334810/"

  - id: jacobs2002_liver_disease
    authors: "Jacobs BP, Dennehy C, Ramirez G, Sapp J, Lawrence VA"
    title: "Milk thistle for the treatment of liver disease: a systematic review and meta-analysis"
    journal: "American Journal of Medicine"
    year: 2002
    volume: null
    pages: null
    pmid: "12427501"
    doi: null
    study_type: "Meta-analysis and systematic review"
    trials_included: 14
    participants: 433
    key_findings: |
      Safety:
      - Safe and well tolerated
      - Adverse effects comparable to placebo

      Efficacy:
      - No reduction in mortality (OR: 0.8)
      - No improvements in liver biopsy histology
      - No significant differences in liver enzymes or albumin
      - Minor reduction in ALT (-9 IU/L) without clinical significance

      Conclusion:
      - Data too limited to exclude substantial benefit or harm
      - Insufficient evidence to recommend for liver disease treatment
    safety: "Safe and well tolerated, adverse effects similar to placebo"
    quality: "Meta-analysis of 14 placebo-controlled RCTs"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/12427501/"

