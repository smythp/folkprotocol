# NOTES

quality_considerations: |
  One significant concern raised in the literature:
  - Commercial milk thistle preparations may contain mycotoxins, pesticides, and microbiological contamination
  - Quality varies significantly between manufacturers
  - Standardization to silymarin content is important but not sufficient
  - Third-party testing recommended
  Reference: PMID 31366891

key_active_constituents:
  - name: "Silymarin"
    description: "Complex of flavonolignans comprising 65-80% of extract"

  - name: "Silybin (Silibinin)"
    description: "Most abundant and potent flavonolignan; exists as silybin A and silybin B"
    proportion: "50-60% of silymarin"

  - name: "Silydianin"
    description: "Minor flavonolignan component"

  - name: "Silychristin"
    description: "Minor flavonolignan component"

  - name: "Isosilybin A and B"
    description: "Minor but bioactive flavonolignans"

mechanism_of_action: |
  - Antioxidant: Reduces oxidative stress and free radical damage
  - Anti-inflammatory: Modulates inflammatory pathways
  - Membrane stabilization: Protects hepatocyte cell membranes
  - Protein synthesis stimulation: Promotes liver regeneration
  - Inhibition of toxin penetration: Blocks toxin entry into hepatocytes
  - Immunomodulation: Affects immune system response

sources_summary: |
  This bibliography includes:
  - 8 systematic reviews and meta-analyses
  - 3 major randomized controlled trials
  - 3 bioavailability and pharmacokinetic studies
  - 2 comprehensive safety reviews
  - Multiple traditional medicine monographs (Commission E, ESCOP, EP, USP-NF)

  All PubMed sources were accessed January 2026.
  Focus on clinical evidence, standardized extracts, and reproducible dosing protocols.
