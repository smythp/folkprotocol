# BIOAVAILABILITY AND PHARMACOKINETICS

bioavailability_studies:
  - id: chang2025_micellar
    authors: "Chang C, Zhang Y, Kuo YC, Du M, Roh K, Gahler R, Ibi A, Solnier J"
    title: "Novel Micellar Formulation of Silymarin (Milk Thistle) with Enhanced Bioavailability in a Double-Blind, Randomized, Crossover Human Trial"
    journal: "Pharmaceutics"
    year: 2025
    volume: null
    pages: null
    pmid: "40733088"
    doi: null
    study_type: "Double-blind, randomized, crossover bioavailability trial"
    sample_size: 16
    dosage: "Single oral dose of 130 mg silymarin"
    formulations: "Micellar (LipoMicel) vs Standard formulation"
    key_findings: |
      Enhanced Bioavailability:
      - Cmax: 18.9-fold higher with micellar formulation
      - AUC0-24: 11.4-fold higher with micellar formulation

      Specific Values:
      - Micellar Cmax: 74.4-288.3 ng/mL vs Standard: 1.9-30.7 ng/mL (p = 0.007)
      - Micellar AUC0-24: 178-612.5 ng·h/mL vs Standard: 7.40-113.5 ng·h/mL (p = 0.015)
      - Micellar Tmax: 0.5 hours vs Standard: 2.5 hours (faster absorption)
    adverse_effects: "No adverse events or safety concerns reported"
    safety: "Excellent safety profile"
    quality: "Well-designed crossover bioavailability study"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/40733088/"

  - id: wen2008_pharmacokinetics
    authors: "Wen Z, Dumas TE, Schrieber SJ, Hawke RL, Fried MW, Smith PC"
    title: "Pharmacokinetics and metabolic profile of free, conjugated, and total silymarin flavonolignans in human plasma after oral administration of milk thistle extract"
    journal: "Drug Metabolism and Disposition"
    year: 2008
    volume: null
    pages: null
    pmid: "17913795"
    doi: null
    study_type: "Human pharmacokinetic study"
    sample_size: 3
    dosage: "Single oral dose of 600 mg standardized milk thistle extract"
    key_findings: |
      Half-Lives:
      - Free flavonolignans: 1-3 hours
      - Conjugated flavonolignans: 3-8 hours

      Metabolism:
      - Conjugated AUC values 4- to 30-fold higher than free fractions
      - Silybin B (conjugated): mean AUC = 597 μg·h/L
      - Isosilybin A (conjugated): mean AUC = 734 μg·h/L

      Metabolic Profile:
      - Flavonolignans quickly metabolized to conjugates
      - Primarily form glucuronides after oral administration
    safety: "No adverse effects noted"
    quality: "Detailed pharmacokinetic analysis"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/17913795/"

  - id: kidd2005_phytosome
    authors: "Kidd P, Head K"
    title: "A review of the bioavailability and clinical efficacy of milk thistle phytosome: a silybin-phosphatidylcholine complex (Siliphos)"
    journal: "Alternative Medicine Review"
    year: 2005
    volume: null
    pages: null
    pmid: "16164374"
    doi: null
    study_type: "Review article"
    key_findings: |
      Bioavailability Enhancement:
      - Silybin-phosphatidylcholine phytosome provides significant liver protection
      - Enhanced bioavailability over conventional silymarin

      Mechanism:
      - Phytosomes transition water-soluble flavonoids into lipid-based cell membranes
      - Improves absorption and bloodstream entry

      Clinical Potency:
      - Silybin is the most potent flavonoid in milk thistle
