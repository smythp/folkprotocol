    study_type: "Randomized controlled trial, prospective, balanced, blind, single-dose, two-way crossover"
    sample_size: 23
    treatment_allocation: "11 women, 12 men; ages 22–31; crossover design"
    dosage: "45 mg silybin-phosphatidylcholine complex vs 70 mg conventional silymarin tablets (single dose)"
    key_findings: |
      Bioavailability:
      - Plasma silybin levels significantly higher with phosphatidylcholine complex (p < 0.0001)
      - Silybin bioavailability: 9.6-fold higher with phytosome complex vs conventional tablets
      - AUC and Cmax both significantly superior for phytosome formulation

      Mechanism:
      - Phosphatidylcholine complexation enables silybin to transition from hydrophilic gut environment
