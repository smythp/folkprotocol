    pmid: "22797645"
    doi: null
    study_type: "Multicenter, double-blind, randomized controlled trial"
    sample_size: 154
    treatment_allocation: "Three arms: 420 mg silymarin TID, 700 mg silymarin TID, placebo TID"
    dosage: "420 mg TID (1260 mg/day) or 700 mg TID (2100 mg/day) vs placebo"
    duration: "24 weeks"
    conditions: "Chronic hepatitis C (interferon-refractory)"
    key_findings: |
      Primary Endpoint (ALT normalization):
      - ~2 participants per arm achieved normalization — not significant

      ALT Change:
      - Placebo: -4.3 U/L
      - 420 mg silymarin: -14.4 U/L
      - 700 mg silymarin: -11.3 U/L
