---
# Black Cohosh (Cimicifuga racemosa / Actaea racemosa) Bibliography
# Focus: Clinical studies, systematic reviews, RCTs, standardized extracts, dosing, bioavailability, safety

systematic_reviews_meta_analyses:
  - id: sadahiro2023
    title: "Black cohosh extracts in women with menopausal symptoms: an updated pairwise meta-analysis"
    authors: "Sadahiro R, Matsuoka LN, Zeng B-S, Chen K-H, Zeng B-Y, Wang H-Y, et al."
    year: 2023
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/37192826/"
    study_type: "Pairwise meta-analysis of RCTs"
    studies_included: 22
    sample_size: 2310
    key_findings:
      - "Overall menopausal symptoms: Hedges' g = 0.575, p < 0.001"
      - "Hot flashes: g = 0.315, p = 0.003"
      - "Somatic symptoms: g = 0.418, p = 0.001"
      - "No significant improvement in anxiety (p = 0.438) or depression (p = 0.131)"
      - "Dropout rates comparable to placebo"
    notes: "Most comprehensive recent meta-analysis of black cohosh for menopausal symptoms"

  - id: castelo-branco2021
    title: "Review & meta-analysis: isopropanolic black cohosh extract iCR for menopausal symptoms - an update on the evidence"
    authors: "Castelo-Branco C, Gambacciani M, Cano A, Minkin MJ, Rachoń D, Ruan X, Beer A-M, Schnitker J, Henneicke-von Zepelin H-H, Pickartz S"
    year: 2021
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/33021111/"
    study_type: "Systematic review and meta-analysis"
    studies_included: 35
    sample_size: 43759
    treated_with_icr: 13096
    key_findings:
      - "iCR superior to placebo: standardized mean difference -0.694 (p < 0.0001)"
      - "Dose-dependent effect: higher doses showed SMD of -1.020 and -0.999"
      - "Efficacy comparable to low-dose estradiol and tibolone"
      - "Superior tolerability to hormone therapy"
      - "No evidence of hepatotoxicity"
      - "Combination with St. John's wort more effective for psychological symptoms"
    extract_type: "Isopropanolic Cimicifuga racemosa extract (iCR)"
    notes: "Largest systematic review; demonstrates extract-specific efficacy"

  - id: fan2022
    title: "Systematic Review of Black Cohosh (Cimicifuga racemosa) for Management of Polycystic Ovary Syndrome-Related Infertility"
    authors: "Fan CW, Cieri-Hutcherson NE, Hutcherson TC"
    year: 2022
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/33926292/"
    study_type: "Systematic review"
    studies_included: 5
    key_findings:
      - "Improved hormone regulation vs clomiphene citrate alone"
      - "Improved endometrial thickness vs clomiphene citrate"
      - "Three RCTs reported improved pregnancy rates with black cohosh + CC combination"
      - "No differences in adverse events"
      - "Insufficient high-quality evidence for definitive conclusions"
    indication: "PCOS-related infertility"
    notes: "Emerging application beyond menopausal symptoms"

  - id: shams2010
    title: "Efficacy of black cohosh-containing preparations on menopausal symptoms: a meta-analysis"
    authors: "Shams T, Setia MS, Hemmings R, McCusker J, Sewitch M, Ciampi A"
    year: 2010
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/20085176/"
    study_type: "Meta-analysis"
    studies_included: 9
    studies_analyzed: 7
    key_findings:
      - "Six of nine trials showed significant improvement vs placebo"
      - "Combined estimate: 26% improvement (95% CI 11%-40%)"
      - "Significant heterogeneity between trials noted"
    limitations: "Heterogeneity suggests extract standardization issues"

  - id: borrelli2008_efficacy
    title: "Black cohosh (Cimicifuga racemosa) for menopausal symptoms: a systematic review of its efficacy"
    authors: "Borrelli F, Ernst E"
    year: 2008
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/18585461/"
    study_type: "Systematic review of RCTs"
    studies_included: 6
    sample_size: 1112
    key_findings:
      - "Evidence does not consistently demonstrate effect on menopausal symptoms"
      - "Beneficial effect in perimenopausal women cannot be excluded"
      - "Further rigorous trials warranted"
    notes: "Earlier systematic review; mixed conclusions reflect extract heterogeneity"

  - id: borrelli2008_safety
    title: "Black cohosh (Cimicifuga racemosa): a systematic review of adverse events"
    authors: "Borrelli F, Ernst E"
    year: 2008
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/18984078/"
    study_type: "Systematic safety review"
    studies_reviewed: 28
    breakdown:
      clinical_trials: 13
      postmarketing_surveillance: 3
      case_series: 4
      case_reports: 8
    key_findings:
      - "Clinical trials suggest black cohosh to be safe"
      - "Case reports show problematic causal attribution"
      - "Serious safety concerns require further investigation"
    notes: "Highlights gap between controlled trial safety and case report concerns"

  - id: naser2022
    title: "Weight gain in menopause: systematic review of adverse events in women treated with black cohosh"
    authors: "Naser B, Castelo-Branco C, Meden H, Minkin MJ, Rachoń D, Beer A-M, Pickartz S"
    year: 2022
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/34608830/"
    study_type: "Systematic review of adverse events"
    studies_reviewed: 31
    cases_reviewed: 30
    sample_size: 1839
    duration: "Up to 12 months treatment"
    key_findings:
      - "30 spontaneous weight gain reports over 15 years"
      - "Causality not certain/likely in any case"
      - "Only 2 of 31 trials reported weight gain as adverse event"
      - "No significant weight differences between groups in trials"
      - "No scientific evidence that black cohosh causes weight gain"
    notes: "Addresses common patient concern; refutes weight gain association"

randomized_controlled_trials:
  - id: schellenberg2012
    title: "Dose-Dependent Effects of the Cimicifuga racemosa Extract Ze 450 in the Treatment of Climacteric Complaints: A Randomized, Placebo-Controlled Study"
    authors: "Schellenberg R, Saller R, Hess L, Melzer J, Zimmermann C, Drewe J, Zahner C"
    year: 2012
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/23346194/"
    study_type: "RCT, double-blind, placebo-controlled, three-arm"
    sample_size: 180
    extract: "Ze 450"
    doses:
      - "6.5 mg CR extract"
      - "13.0 mg CR extract"
      - "Placebo"
    duration: "12 weeks"
    primary_outcome: "Kupperman Menopausal Index"
    key_findings:
      - "13.0 mg dose: mean absolute difference 17.0 points (95% CI 14.65-19.35, p < 0.0001) vs placebo"
      - "6.5 mg dose: mean absolute difference 8.47 points (95% CI 5.55-11.39, p = 0.0003) vs placebo"
      - "Clear dose-dependent response"
      - "No safety concerns in adverse events or lab testing"
    notes: "Key dose-finding study; demonstrates dose-response relationship"

  - id: nappi2005
    title: "Efficacy of Cimicifuga racemosa on climacteric complaints: a randomized study versus low-dose transdermal estradiol"
    authors: "Nappi RE, Malavasi B, Brundu B, Facchinetti F"
    year: 2005
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/15969244/"
    study_type: "RCT, comparative"
    sample_size: 64
    interventions:
      black_cohosh: "40 mg isopropanolic aqueous extract daily"
      estradiol: "25 mcg transdermal every 7 days + dihydrogesterone 10 mg/day for final 12 days"
    duration: "3 months"
    key_findings:
      - "Hot flushes: both reduced significantly (p < 0.001), no difference between groups"
      - "Vasomotor symptoms: both groups p < 0.001"
      - "Anxiety and depression: both decreased (p < 0.001)"
      - "Black cohosh increased HDL-cholesterol (p < 0.04)"
      - "Both lowered LDL-cholesterol (black cohosh p < 0.003; estradiol p < 0.002)"
      - "No effect on endometrial thickness in either group"
    notes: "Demonstrates equivalence to low-dose HRT for primary symptoms"

  - id: frei-kleiner2005
    title: "Cimicifuga racemosa dried ethanolic extract in menopausal disorders: a double-blind placebo-controlled clinical trial"
    authors: "Frei-Kleiner S, Schaffner W, Rahlfs VW, Bodmer C, Birkhäuser M"
    year: 2005
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/16039414/"
    study_type: "RCT, multicenter, double-blind, placebo-controlled"
    sample_size: 122
    extract_type: "Dried ethanolic extract"
    duration: "12 weeks"
    primary_outcomes:
      - "Weekly weighted score of hot flashes"
      - "Kupperman Index"
    key_findings:
      - "No overall superiority vs placebo in full cohort"
      - "Subgroup with Kupperman Index ≥20: 47% decrease (black cohosh) vs 21% (placebo), p < 0.018"
      - "Adverse events: no difference in prevalence or intensity vs placebo"
    notes: "Demonstrates efficacy in more symptomatic women; ethanolic vs isopropanolic extract"

  - id: tanmahasamut2015
    title: "Cimicifuga racemosa extract for relieving menopausal symptoms: a randomized controlled trial"
    authors: "Tanmahasamut P, Vichinsartvichai P, Rattanachaiyanont M, Techatraisak K, Dangrat C, Sardod P"
    year: 2015
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/24941138/"
    study_type: "RCT, double-blind, placebo-controlled"
    sample_size: 54
    dose: "40 mg/day black cohosh extract"
    key_findings:
      - "Kupperman Index: improved in both groups, no significant difference"
      - "Hot flush frequency: improved similarly across groups"
      - "QOL: no significant between-group differences"
      - "No serious adverse events"
      - "No significant change in liver function tests"
    population: "Thai women"
    notes: "Negative study; possible population or extract differences"

  - id: shahnazi2013
    title: "Effect of black cohosh (cimicifuga racemosa) on vasomotor symptoms in postmenopausal women: a randomized clinical trial"
    authors: "Shahnazi M, Nahaee J, Mohammad-Alizadeh-Charandabi S, Bayatipayan S"
    year: 2013
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/25276716/"
    study_type: "RCT, double-blind, placebo-controlled"
    sample_size: 84
    dose: "One black cohosh tablet daily"
    duration: "8 weeks"
    key_findings:
      - "Significant difference in severity and number of hot flashes at weeks 4 and 8"
      - "Repeated measures ANOVA showed significant reduction in vasomotor symptoms"
      - "Effective alternative for menopausal vasomotor symptoms"
    notes: "Positive study for vasomotor symptoms specifically"

  - id: fernandes2020
    title: "Effectiveness of the short-term use of Cimicifuga racemosa in the endothelial function of postmenopausal women: a double-blind, randomized, controlled trial"
    authors: "Fernandes ES, Celani MFS, Fistarol M, Geber S"
    year: 2020
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/31691621/"
    study_type: "RCT, double-blind, placebo-controlled"
    sample_size: 62
    dose: "160 mg dry extract containing 4 mg triterpene glycosides"
    duration: "28 days"
    primary_outcome: "Flow-mediated dilation (endothelial function)"
    key_findings:
      - "Treatment group: significant increase in flow-mediated dilation (p = 0.006)"
      - "Placebo group: no changes (p ≥ 0.05)"
      - "Between-group comparison: p = 0.018"
      - "Beneficially influences endothelial function and brachial artery elasticity"
    notes: "Novel cardiovascular mechanism; short-term vascular benefits"

  - id: xi2014
    title: "Effect of Isopropanolic Cimicifuga racemosa Extract on Uterine Fibroids in Comparison with Tibolone among Patients of a Recent Randomized, Double Blind, Parallel-Controlled Study in Chinese Women with Menopausal Symptoms"
    authors: "Xi S, Liske E, Wang S, Liu J, Zhang Z, Geng L, Hu L, Jiao C, Zheng S, Henneicke-von Zepelin H-H, Bai W"
    year: 2014
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/24719645/"
    study_type: "RCT, double-blind, parallel-controlled"
    sample_size: 62
    interventions:
      icr: "40 mg crude drug daily (n=34)"
      tibolone: "2.5 mg daily (n=28)"
    key_findings:
      - "iCR: median fibroid volume decreased -30% (p = 0.016)"
      - "Tibolone: median fibroid volume increased +4.7%"
      - "iCR provides symptom relief while inhibiting myoma growth"
    population: "Chinese women with uterine fibroids"
    notes: "Important safety finding; contrasts with tibolone's proliferative effect"

  - id: geller2009
    title: "Safety and efficacy of black cohosh and red clover for the management of vasomotor symptoms: a randomized controlled trial"
    authors: "Geller SE, Shulman LP, van Breemen RB, Banuvar S, Zhou Y, Epstein G, Hedayat S, Nikolic D, Krause EC, Piersen CE, Bolton JL, Pauli GF, Farnsworth NR"
    year: 2009
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/19609225/"
    study_type: "RCT, double-blind, four-arm"
    sample_size: 89
    interventions:
      - "Standardized black cohosh extract"
      - "Red clover extract"
      - "Placebo"
      - "CEE/MPA (0.625 mg + 2.5 mg)"
    duration: "12 months"
    key_findings:
      - "Symptom reduction: black cohosh 34%, red clover 57%, placebo 63%, CEE/MPA 94%"
      - "Only CEE/MPA significantly different from placebo"
      - "Both botanicals safe as administered"
      - "No improvements in other menopausal symptoms for botanical groups"
    notes: "Negative efficacy study; both botanicals not superior to placebo"

  - id: amsterdam2009
    title: "Randomized, double-blind, placebo-controlled trial of Cimicifuga racemosa (black cohosh) in women with anxiety disorder due to menopause"
    authors: "Amsterdam JD, Yao Y, Mao JJ, Soeller I, Rockwell K, Shults J"
    year: 2009
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/19745648/"
    study_type: "RCT, double-blind, placebo-controlled"
    sample_size: 28
    dose: "Pharmaceutical-grade black cohosh extract"
    duration: "Up to 12 weeks"
    indication: "Anxiety disorder due to menopause"
    key_findings:
      - "No statistically significant anxiolytic effect (p = 0.294)"
      - "No difference in proportion achieving ≥50% anxiety reduction (p = 0.79)"
      - "Comparable tolerability to placebo"
      - "3.6% discontinued due to adverse events"
    limitations: "Small sample size, choice of preparation, dosage"
    notes: "Negative study for anxiety; does not support anxiolytic use"

hepatotoxicity_safety_studies:
  - id: naser2011
    title: "Suspected black cohosh hepatotoxicity: no evidence by meta-analysis of randomized controlled clinical trials for isopropanolic black cohosh extract"
    authors: "Naser B, Schnitker J, Minkin MJ, de Arriba SG, Nolte K-U, Osmers R"
    year: 2011
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/21228727/"
    study_type: "Meta-analysis of RCTs"
    trials_analyzed: 5
    sample_size: 1117
    completed: 1020
    treatment_duration: "3-6 months"
    liver_enzymes_measured:
      - "Aspartate aminotransferase (AST)"
      - "Alanine aminotransferase (ALT)"
      - "γ-glutamyltranspeptidase (GGT)"
    key_findings:
      - "No significant effects on liver enzymes"
      - "AST: overall fixed effect 0.055 ± 0.062 (p = 0.37)"
      - "ALT: overall fixed effect 0.063 ± 0.062 (p = 0.31)"
      - "No difference between treatment and placebo groups"
      - "No evidence of hepatotoxicity for isopropanolic extract"
    notes: "Definitive meta-analysis refuting hepatotoxicity concerns for iCR extract"

  - id: nasr2009
    title: "Influence of black cohosh (Cimicifuga racemosa) use by postmenopausal women on total hepatic perfusion and liver functions"
    authors: "Nasr A, Nafeh H"
    year: 2009
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/19539907/"
    study_type: "Prospective longitudinal trial"
    sample_size: 87
    dose: "40 mg daily (Klimadynon dry extract)"
    duration: "12 consecutive months"
    assessments:
      - "Total hepatic blood flow (color Doppler ultrasound)"
      - "Prothrombin time and concentration"
      - "Serum albumin, bilirubin"
      - "Gamma-glutamyltransferase, alkaline phosphatase"
      - "Alanine and aspartate aminotransferase"
    key_findings:
      - "No significant changes in hepatic blood flow"
      - "No changes in any liver function tests"
      - "Safe for long-term use in healthy postmenopausal women"
    notes: "Long-term safety study; comprehensive hepatic assessment"

pharmacokinetics_bioavailability:
  - id: vanbreemen2010
    title: "Pharmacokinetics of 23-epi-26-deoxyactein in women after oral administration of a standardized extract of black cohosh"
    authors: "van Breemen RB, Liang W, Banuvar S, Shulman LP, Pang Y, Tao Y, Nikolic D, Krock KM, Fabricant DS, Chen S-N, Hedayat S, Bolton JL, Pauli GF, Piersen CE, Krause EC, Geller SE, Farnsworth NR"
    year: 2010
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/20032972/"
    study_type: "Phase I RCT, pharmacokinetic study"
    sample_size: 15
    doses_tested:
      - "1.4 mg 23-epi-26-deoxyactein"
      - "2.8 mg 23-epi-26-deoxyactein"
      - "5.6 mg 23-epi-26-deoxyactein"
    compound: "23-epi-26-deoxyactein (triterpene glycoside)"
    pk_parameters:
      cmax: "Increased proportionately with dosage"
      auc: "Increased proportionately with dosage"
      half_life: "Approximately 2 hours (all doses)"
      urinary_excretion: "Less than 0.01% in 24 hours"
    key_findings:
      - "Linear dose-proportional pharmacokinetics"
      - "Short half-life (~2h) suggests multiple daily dosing beneficial"
      - "Minimal urinary excretion indicates extensive metabolism or tissue distribution"
      - "No acute toxicity or estrogenic hormone effects observed"
      - "No phase I or phase II metabolites detected in clinical specimens or in vitro"
    notes: "Only published PK study for specific black cohosh triterpene; limited metabolic transformation"

extract_specific_evidence:
  - id: beer2013
    title: "Differentiated Evaluation of Extract-Specific Evidence on Cimicifuga racemosa's Efficacy and Safety for Climacteric Complaints"
    authors: "Beer A-M, Neff A"
    year: 2013
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/24062793/"
    study_type: "Review of extract-specific evidence"
    key_findings:
      isopropanolic_extract:
        patients: ">11,000"
        evidence_level: "1b efficacy, 1a safety"
        recommendation_grade: "A"
        description: "Consistent confirmatory evidence"
      ethanolic_extract_bno1055:
        patients: ">500"
        evidence_level: "2b"
        recommendation_grade: "B"
        description: "Weaker evidence base"
      critical_finding: "Only registered CR medicinal products able to prove efficacy"
    notes: "Emphasizes extract-specific evidence; pharmaceutical quality critical for efficacy"

