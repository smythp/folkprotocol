  - "Key marker compounds: 23-epi-26-deoxyactein, actein, 27-deoxyactein"
  - "Ethanolic (alcohol) extracts also used in some studies"
  - "Adulteration with other Actaea/Cimicifuga species is a known quality control issue"
  - "American Herbal Pharmacopoeia monograph provides detailed analytical methods for authentication"

clinical_evidence_summary:
  efficacy:
    - "Meta-analysis of 43,759 women shows significant benefit for neurovegetative and psychological menopausal symptoms (SMD -0.694, p<0.0001)"
    - "Effect appears dose-dependent, with higher dosages showing greater efficacy"
    - "Comparable efficacy to low-dose hormone therapy (estradiol, tibolone) with better safety profile"
    - "Individual RCTs show mixed results, with high heterogeneity between studies"
    - "Most consistent benefits for vasomotor symptoms (hot flashes, night sweats)"
    - "Potential benefits for PCOS-related infertility when combined with clomiphene citrate"

  safety:
    - "13 clinical trials indicate relative safety"
    - "Most common side effects: mild, transient gastrointestinal upset and rashes"
    - "Meta-analysis of 1,117 women: no evidence of hepatotoxicity in controlled trials"
    - "Case reports of liver injury have problematic causality assessment; contamination suspected in some cases"
    - "No effects on estrogen-sensitive tissues (breast, endometrium)"
    - "Commission E recommends not exceeding 6 months of continuous use"

  pharmacokinetics:
    - "Oral bioavailability: peak concentration at 2-2.9 hours, half-life ~2 hours"
    - "Dose-proportional absorption with saturable elimination at higher doses"
    - "Minimal urinary excretion (<0.01%), suggesting extensive metabolism"
    - "No acute estrogenic effects observed in pharmacokinetic studies"

  standardization_dosing:
    - "Most studied preparation: Remifemin (isopropanolic extract, 40 mg/day)"
    - "Typical standardization: 2.5% triterpene glycosides (1 mg per 20 mg extract)"
    - "Clinical dose range: 8-160 mg/day (median and most common: 40 mg/day)"
    - "Study durations: 8-54 weeks (mean: 22.8 weeks)"
    - "Higher doses show greater efficacy in meta-analysis"

