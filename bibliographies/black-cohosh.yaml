pharmacokinetics_bioavailability:
  - pmid: "20032972"
    title: "Pharmacokinetics of 23-epi-26-deoxyactein in women after oral administration of a standardized extract of black cohosh"
    authors: "Reame NE, Lukacs JL, Padmanabhan V, Eyvazzadeh AD, Smith YR, Zubieta JK"
    year: 2010
    journal: "Clin Pharmacol Ther"
    volume: "83"
    issue: "3"
    pages: "408-416"
    doi: "10.1038/sj.clpt.6100462"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/20032972/"
    pmc: "PMC3635811"
    full_text: "https://www.ncbi.nlm.nih.gov/pmc/articles/PMC3635811/"
    study_type: "Pharmacokinetic study"
    sample_size: "15 healthy menopausal women"
    intervention: "Single doses containing 1.4, 2.8, or 5.6 mg of 23-epi-26-deoxyactein"
    key_compounds: "23-epi-26-deoxyactein (major triterpene glycoside)"
    key_findings:
      - "No acute toxicity or estrogenic hormone effects observed"
      - "Maximum concentration and AUC increased proportionately with dosage"
      - "Half-life approximately 2 hours for all dosages"
      - "Peak serum concentration reached between 2.0-2.9 hours post-administration"
      - "Peak serum concentration dose-dependent: 2.2 ng/mL (3.3 nM) to 12.4 ng/mL (18.8 nM)"
      - "Rapid increase during first hour, slower increase second hour"
      - "Less than 0.01% of 23-epi-26-deoxyactein recovered in urine 24h post-administration"
      - "Non-linear absorption with over-proportional AUC at higher doses (saturable elimination)"
      - "Terminal half-life increased with dose: 2.1h (1.4 mg) to 3.0h (5.6 mg)"
    bioavailability: "Low urinary recovery (<0.01%) suggests extensive metabolism or alternative elimination routes"
    half_life: "Approximately 2 hours (range 2.1-3.0h depending on dose)"
    tmax: "2.0-2.9 hours"
    standardization: "75% ethanol extract of black cohosh"

safety_hepatotoxicity:
  - pmid: "21228727"
    title: "Suspected black cohosh hepatotoxicity: no evidence by meta-analysis of randomized controlled clinical trials for isopropanolic black cohosh extract"
    authors: "Naser B, Schnitker J, Minkin MJ, de Arriba SG, Nolte KU, Osmers R"
    year: 2011
    journal: "Menopause"
    volume: "18"
    issue: "4"
    pages: "366-375"
    doi: "10.1097/gme.0b013e3181fcb2a9"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/21228727/"
    study_type: "Meta-analysis of RCTs"
    trials_analyzed: "5 randomized, double-blind, controlled trials"
    sample_size: "1,117 women"
    intervention: "Isopropanolic black cohosh extract (iCR / Remifemin)"
    key_findings:
      - "No evidence that iCR has any adverse effect on liver function"
      - "No significant changes in mean ALT, AST, or GGT levels between black cohosh and placebo"
      - "Among 7 patients with significant rises in liver tests, none judged related to black cohosh"
      - "Follow-up study of 107 women treated ≥1 year: none had clinical or biochemical evidence of liver injury"
      - "Meta-analysis contradicts case reports of hepatotoxicity"
    conclusion: "Isopropanolic black cohosh extract does not appear to cause hepatotoxicity in controlled clinical trials"
    product: "Remifemin (isopropanolic extract)"

  - pmid: "20216279"
    title: "Black cohosh and suspected hepatotoxicity: inconsistencies, confounding variables, and prospective use of a diagnostic causality algorithm. A critical review"
    authors: "Teschke R, Schmidt-Taenzer W, Wolff A"
    year: 2011
    journal: "Menopause"
    volume: "18"
    issue: "4"
    pages: "456-465"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/20216279/"
    study_type: "Critical review with causality assessment"
    cases_reviewed: "69 cases with liver disease"
    key_findings:
      - "Using hepatotoxicity-specific causality assessment methods: excluded, unlikely, unrelated, or unassessable causality in 68 of 69 cases"
      - "Among 4 cases reported to Health Canada: none contained authentic black cohosh (product contamination)"
      - "Expert committee review of 30 reports: none considered 'certain' or 'probable'"
      - "Inconsistencies in case reports and confounding variables make causal attribution problematic"
      - "Recommendations for cautionary labeling not supported by rigorous causality assessment"
    conclusion: "Causal relationship between authentic black cohosh and hepatotoxicity not established"

