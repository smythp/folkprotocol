systematic_reviews_meta_analyses:
  - pmid: "33021111"
    title: "Review & meta-analysis: isopropanolic black cohosh extract iCR for menopausal symptoms - an update on the evidence"
    authors: "Beer AM, Osmers R, Schnitker J, Bai W, Mueck AO, Meden H"
    year: 2021
    journal: "Climacteric"
    volume: "24"
    issue: "2"
    pages: "109-119"
    doi: "10.1080/13697137.2020.1820477"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/33021111/"
    full_text: "https://www.tandfonline.com/doi/full/10.1080/13697137.2020.1820477"
    study_type: "Systematic review and meta-analysis"
    sample_size: "43,759 women total, 13,096 treated with isopropanolic Cimicifuga racemosa extract (iCR)"
    studies_included: "35 clinical studies and 1 meta-analysis"
    key_findings:
      - "Compared to placebo, iCR significantly superior for treating neurovegetative and psychological menopausal symptoms (SMD -0.694, p<0.0001)"
      - "Effect sizes larger with higher dosages: iCR monotherapy (SMD -1.020) and iCR+St. John's wort (SMD -0.999), suggesting dose-dependency"
      - "Efficacy comparable to low-dose transdermal estradiol or tibolone, with better tolerability profile than tibolone"
      - "No evidence of hepatotoxicity in clinical data"
      - "No effects on estrogen-sensitive tissues (breast, endometrium)"
    standardization: "Isopropanolic extract of Cimicifuga racemosa"
    dosing: "Higher dosages showed greater effect"

  - pmid: "18585461"
    title: "Black cohosh (Cimicifuga racemosa) for menopausal symptoms: a systematic review of its efficacy"
    authors: "Borrelli F, Ernst E"
    year: 2008
    journal: "Pharmacol Res"
    volume: "58"
    issue: "1"
    pages: "8-14"
    doi: "10.1016/j.phrs.2008.05.008"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/18585461/"
    study_type: "Systematic review of RCTs"
    sample_size: "1,112 peri- and post-menopausal women across 6 RCTs"
    databases_searched: "Medline, Embase, Amed, Phytobase, Cochrane Library"
    key_findings:
      - "Evidence does not consistently demonstrate effect on menopausal symptoms"
      - "Beneficial effect in peri-menopausal women cannot be excluded"
      - "High heterogeneity between studies limits conclusions"
      - "Further rigorous trials warranted"

