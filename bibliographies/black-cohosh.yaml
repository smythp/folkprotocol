    title: "British Herbal Compendium - Black Cohosh"
    organization: "British Herbal Medicine Association"
    recommended_dose: "40-200 mg dried herb daily, divided into multiple doses"
    notes: "Traditional British pharmacopoeia entry"

dosing_summary:
  standardized_extracts:
    isopropanolic_extract:
      typical_dose: "40 mg daily"
      studied_range: "40-80 mg daily"
      evidence_quality: "High (>11,000 patients)"
    ethanolic_extract:
      typical_dose: "40 mg daily"
      studied_range: "40-160 mg daily"
      evidence_quality: "Moderate (>500 patients)"
    ze450_extract:
      low_dose: "6.5 mg (effective, p = 0.0003)"
      high_dose: "13.0 mg (more effective, p < 0.0001)"
      note: "Demonstrates dose-response relationship"
  triterpene_standardization: "0.4% minimum (USP); 4 mg triterpenes in 160 mg extract (some studies)"
  duration_studied: "Up to 12 months in safety studies; typically 12 weeks in efficacy studies"
  maximum_recommended: "6 months continuous use (Commission E)"

key_safety_findings:
  controlled_trials:
    - "No hepatotoxicity in meta-analysis of 5 RCTs (n=1,020)"
    - "12-month use showed no liver function changes (n=87)"
    - "Adverse event rates comparable to placebo"
    - "No weight gain causation (31 trials, n=1,839)"
    - "No effect on endometrial thickness"
    - "Reduces uterine fibroid volume (-30%)"
  case_reports:
    - "Case reports of hepatotoxicity exist but causality attribution problematic"
    - "69 suspected hepatotoxicity cases: 68/69 had excluded, unlikely, or unassessable causality"
  cardiovascular:
    - "Improves endothelial function and arterial elasticity"
    - "Increases HDL-cholesterol"
    - "Decreases LDL-cholesterol"

efficacy_summary:
  effective_for:
    - "Overall menopausal symptoms (26-57.5% improvement, extract-dependent)"
    - "Hot flashes (moderate effect, g = 0.315)"
    - "Somatic symptoms (g = 0.418)"
    - "Vasomotor symptoms (multiple positive RCTs)"
    - "Comparable to low-dose estradiol for hot flashes"
  not_effective_for:
    - "Anxiety symptoms (multiple negative RCTs)"
    - "Depression symptoms (meta-analysis: p = 0.131)"
  mixed_evidence:
    - "Overall efficacy varies by extract type and standardization"
    - "Beneficial effects more consistent in perimenopausal vs postmenopausal women"
    - "Higher baseline symptom severity shows better response"

mechanisms:
  proposed:
    - "Not estrogenic (no effect on reproductive tissues)"
    - "Triterpene glycosides as active constituents"
    - "Possible serotonergic activity"
    - "Endothelial function modulation"
    - "Anti-proliferative effect on uterine fibroids"
  compounds_studied:
    - "23-epi-26-deoxyactein (primary triterpene marker)"
    - "Triterpene glycoside complex"

extract_standardization_importance:
  - "Isopropanolic extract (iCR) has strongest evidence base"
  - "Ethanolic extracts show variable efficacy"
  - "Only registered medicinal products with pharmaceutical quality demonstrate consistent efficacy"
  - "Significant heterogeneity in meta-analyses reflects extract differences"
  - "No universally accepted triterpene standardization method"

research_gaps:
  - "Comprehensive bioavailability studies lacking"
  - "Tissue distribution unknown"
  - "Mechanism of action incompletely understood"
  - "Long-term safety beyond 12 months not well studied"
  - "Optimal dosing and duration need refinement"
  - "Population-specific responses (ethnicity) require investigation"

clinical_bottom_line:
  - "Isopropanolic extract (40-80 mg daily) has strongest evidence for menopausal symptoms"
  - "Effect size moderate for vasomotor symptoms, stronger for overall menopausal symptom burden"
  - "Safety profile favorable in controlled trials; hepatotoxicity case reports not supported by trial data"
  - "Not effective for anxiety or depression"
  - "Extract quality and standardization critical for efficacy"
  - "Duration: typically 12 weeks to assess response; up to 12 months studied for safety"
