# Reishi (Ganoderma lucidum) Clinical Bibliography
# Compiled: 2025-01-15
# Updated: 2025-01-15
# Focus: Clinical trials, systematic reviews, meta-analyses, dosing studies, bioavailability, safety profiles, standardized extracts
# Sources: PubMed, PMC, Cochrane Library, Nature Scientific Reports, official pharmacopoeias

systematic_reviews_and_meta_analyses:
  - id: jafari_2025
    title: "The Nutritional Significance of Ganoderma lucidum on Human Health: A GRADE-Assessed Systematic Review and Meta-Analysis of Clinical Trials"
    authors: "Ali Jafari, Helia Mardani, Zahra Mirzaei Fashtali, Bahareh Arghavan"
    year: 2025
    journal: "Food Science & Nutrition"
    volume: "13(6)"
    article_number: "e70423"
    doi: "10.1002/fsn3.70423"
    pubmed_id: "40510787"
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/40510787/
    pmc_url: https://pmc.ncbi.nlm.nih.gov/articles/PMC12160064/
    full_text_url: https://onlinelibrary.wiley.com/doi/full/10.1002/fsn3.70423
    study_type: Systematic review and meta-analysis (GRADE-assessed)
    databases_searched: "EMBASE, PubMed, Web of Science, Scopus (up to August 2024)"
    sample_size: "17 randomized controlled trials, 971 participants"
    geographic_distribution: "East Asia (12 studies), Middle East, Americas, Oceania, Europe"
    intervention:
      dose_range: "200-11,200 mg/day"
      duration: "1-24 weeks"
    key_findings:
      - metric: "BMI"
        result: "WMD = -0.43 kg/m²"
        p_value: 0.011
        interpretation: "Statistically significant but modest effect"
      - metric: "Creatinine"
        result: "WMD = -0.14 mg/dL"
        p_value: 0.028
      - metric: "Glutathione peroxidase"
        result: "WMD = 2.29 U/g Hb"
        p_value: "<0.001"
      - metric: "Heart rate"
        result: "WMD = -3.92 bpm"
        p_value: 0.029
      - "No significant effects on: body fat, waist circumference, blood pressure, fasting glucose, lipid profiles (TC, TG, LDL-C, HDL-C), inflammatory markers (hs-CRP, TNF-α), liver enzymes"
    safety: "No significant adverse effects; supplementation well tolerated across trials"
    quality_of_evidence: "Very low across all outcomes (GRADE assessment)"
    methodological_quality: "16 of 17 studies rated 'Poor'; 1 study rated 'Fair' (Cochrane Risk of Bias 2.0 tool)"
    clinical_significance: "Effect sizes were modest and fell below clinically meaningful thresholds for most outcomes despite statistical significance"
    notes: "Most comprehensive and recent meta-analysis with GRADE assessment; highlights gap between statistical and clinical significance"

  - id: jafari_2023_spores
    title: "Pharmacological Activities and Safety of Ganoderma lucidum Spores: A Systematic Review"
    authors: Jafari A, et al.
    year: 2023
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/37790044/
    pdf_url: https://www.cureus.com/articles/143256-pharmacological-activities-and-safety-of-ganoderma-lucidum-spores-a-systematic-review.pdf
    study_type: Systematic review (PRISMA)
    databases_searched: "PubMed, Virtual Health Library (VHL), Global Health Library (GHL), SIGLE, Google Scholar (searched September 13, 2021)"
    sample_size: "90 studies reporting pharmacological effects and/or safety of G. lucidum spores"
    key_findings:
      - "Spores showed antitumor, immunomodulatory, antioxidant, and hepatoprotective activities"
      - "Generally well-tolerated in clinical applications"
      - "Safety profile comparable to whole fruiting body"
    notes: "Focused specifically on spore preparations, which have different bioactive profiles"

  - id: wang_2023_lipids
    title: "Effect of Ganoderma lucidum on serum lipid profiles: A systematic review and meta-analysis on animal studies"
    authors: Wang L, et al.
    year: 2023
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/38116485/
    study_type: Systematic review and meta-analysis
    databases_searched: "Medline (PubMed), Scopus, Web of Science, Cochrane Library, Google Scholar (up to January 2022)"
    sample_size: Animal studies only
    key_findings:
      - "G. lucidum has favorable effects on triglycerides (TG)"
      - "Reduced total cholesterol (TC)"
      - "Reduced LDL-C"
      - "Increased HDL-C"
      - "Reduced VLDL"
    notes: "Animal studies only - human clinical translation needs verification"

  - id: zhong_2019
    title: "Coriolus Versicolor and Ganoderma Lucidum Related Natural Products as an Adjunct Therapy for Cancers: A Systematic Review and Meta-Analysis of Randomized Controlled Trials"
    authors: "Linda Zhong, Peijing Yan, Wai Ching Lam, Liang Yao, Zhaoxiang Bian"
    year: 2019
    journal: "Frontiers in Pharmacology"
    pubmed_id: "31333449"
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/31333449/
    study_type: Systematic review and meta-analysis of RCTs
    sample_size: "23 randomized controlled trials, 4,246 cancer patients"
    cancer_types: "Various cancer types and stages"
    intervention: "Coriolus versicolor and Ganoderma lucidum as adjunct to standard cancer treatment"
    key_findings:
      - metric: "Mortality risk"
        result: "Hazard ratio 0.82"
        ci_95: "Not specified in abstract"
      - metric: "Treatment efficacy"
        result: "Risk ratio 1.30 for total efficacy versus controls"
      - metric: "Immune markers (CD3, CD4)"
        result: "Elevated by approximately 9%"
      - "No significant impact on disease control rates, relapse-free survival, CD8, CD4/CD8 ratio, or NK cell counts"
    safety: "Used as adjunct therapy; no specific adverse events detailed in abstract"
    notes: "Larger meta-analysis including both Coriolus and Ganoderma; demonstrates adjunct therapy benefits"

  - id: jin_2016_cochrane_cancer
    title: "Ganoderma lucidum (Reishi mushroom) for cancer treatment"
    authors: "Xingzhong Jin, Julieta Ruiz Beguerie, Daniel Man-Yeun Sze, Godfrey C F Chan"
    year: 2016
    pubmed_id: "27045603"
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/27045603/
    pmc_url: https://pmc.ncbi.nlm.nih.gov/articles/PMC6353236/
    doi: "10.1002/14651858.CD007731.pub3"
    study_type: Cochrane systematic review and meta-analysis
    databases_searched: "MEDLINE, EMBASE, and others (October 2011)"
    sample_size: "5 RCTs included in meta-analysis"
    cancer_types: "Lung cancer, colon cancer, advanced malignancies"
    intervention: "Various G. lucidum preparations (polysaccharide extracts, spore capsules, oral liquids) with or replacing chemotherapy/radiotherapy"
    key_findings:
      - metric: "Tumor response"
        result: "Better response rates when combined with conventional treatment versus chemo/radiotherapy alone (modest effect)"
      - metric: "Quality of life"
        result: "4 studies showed improved QOL versus controls (Karnofsky scale)"
      - metric: "Immune function"
        result: "Increased CD3, CD4, CD8 percentages; modest NK cell activity elevation"
        cd3_increase: "3.91%"
        cd4_increase: "3.05%"
        cd8_increase: "2.02%"
    safety: "Minimal side effects (nausea, insomnia); no significant hematological or hepatological toxicity"
    conclusions: "Insufficient evidence for first-line cancer treatment; could be administered as alternative adjunct to conventional treatment; long-term survival benefits uncertain"
    notes: "Cochrane review - high quality systematic review methodology; gold standard evidence"

  - id: correia_2020_radioprotective
    title: "Use of Ganoderma lucidum (Ganodermataceae, Basidiomycota) as Radioprotector"
    authors: Correia AA, et al.
    year: 2020
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/32325828/
    study_type: Systematic review and meta-analysis (PRISMA)
    databases_searched: "PubMed, Scopus, Embase, Google Scholar (March 2020)"
    sample_size: "15 full text articles from 1109 records; none were clinical trials"
    key_findings:
      - "Preclinical evidence for radioprotective effects"
      - "No human clinical trials available on radioprotection"
    notes: "Identifies research gap - no human trials for radioprotection despite preclinical promise"

randomized_controlled_trials:
  - id: geng_2025_dyslipidemia
