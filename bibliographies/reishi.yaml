  - id: sanchez_2024_nsclc_protocol
    title: "Synergy of de-walled Ganoderma Lucidum spore powder (GLSP) on targeted therapy in advanced non-squamous non-small cell lung cancer with epidermal growth factor receptor (EGFR) mutant: protocol for a randomized, double-blind, placebo-controlled study"
