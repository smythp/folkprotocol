    sample_size: 16 healthy volunteers
    duration: 10 consecutive days
    intervention: "Ganoderma lucidum extract"
    dose: "2 grams twice daily (4 g/day total)"
    key_findings:
      - "No adverse effects observed compared to placebo"
      - "No abnormalities in hematological parameters"
      - "No hepatic biomarker changes"
      - "No renal biomarker changes"
      - "Well tolerated at 4 g/day dose"
    notes: "Important dedicated safety study in healthy volunteers"

  - id: zhao_2012_cancer_fatigue
    title: "Spore Powder of Ganoderma lucidum Improves Cancer-Related Fatigue in Breast Cancer Patients Undergoing Endocrine Therapy: A Pilot Clinical Trial"
    authors: Zhao H, Zhang Q, Zhao L, Huang X, Wang J, Kang X
    year: 2012
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/22203880/
    pmc_url: https://pmc.ncbi.nlm.nih.gov/articles/PMC3236089/
    study_type: Pilot randomized controlled trial
    sample_size: 48 breast cancer patients with cancer-related fatigue
    duration: 4 weeks
    intervention: "Ganoderma lucidum spore powder during endocrine therapy"
    dose: "1,000 mg three times daily (3,000 mg/day total)"
    key_findings:
      - "Statistically significant improvements in physical well-being"
      - "Reduced fatigue subscale scores"
      - "Less anxiety and depression"
      - "Better quality of life"
      - "TNF-α decreased from 128.70 to 71.89 pg/mL (P < 0.01)"
      - "IL-6 decreased from 62.43 to 37.62 pg/mL (P < 0.05)"
      - "No significant adverse effects"
    notes: "Demonstrates anti-inflammatory effects with measurable cytokine changes"

