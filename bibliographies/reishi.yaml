dosing_and_pharmacokinetics:
  - id: cheng_2016_pk
    title: "Pharmacokinetic Studies of Ganoderic Acids from the Lingzhi or Reishi Medicinal Mushroom, Ganoderma lucidum (Agaricomycetes), by LC-MS/MS"
    authors: "Chun-Ru Cheng, Jie Ding, Yi Yang, Xin-Yong Liang, De-An Guo, Min Yang, Shu-Hong Guan"
    year: 2016
    pubmed_id: "27649602"
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/27649602/
    study_type: "Pharmacokinetic study in animals (Sprague-Dawley male rats)"
    compounds_studied: "Ganoderic acids A, B, D, and E"
    administration: "Oral extract from G. lucidum"
    analytical_method: "Liquid chromatography-tandem mass spectrometry (LC-MS/MS)"
    key_findings:
      - "Four ganoderic acids exhibited similar pharmacokinetic behaviors in some aspects"
      - "Some pharmacokinetic parameters differed between compounds"
      - "Reabsorption peaks occurred in some ganoderic acids post-administration"
      - "Metabolic transformation among ganoderic acids created differential behaviors"
    measurements: "Plasma concentration-time curves for simultaneous determination of four ganoderic acids"
    notes: "Preclinical study demonstrating complex PK of different ganoderic acid forms; basis for human studies"

