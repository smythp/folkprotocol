  - id: clinical_dose_ranges
    title: "Clinical Dosing Summary from Multiple Trials"
    source: Multiple clinical trials
    year: 2005-2025
    dose_ranges:
      - "Low dose: 200 mg (purified β-glucan fraction)"
      - "Low-moderate: 225 mg (standardized extract, twice daily)"
      - "Moderate: 1,400-3,000 mg daily (most common clinical trial range)"
      - "High dose: 3,000-5,400 mg daily"
      - "Very high dose: Up to 11,200 mg/day reported in some studies"
    typical_duration: "12-16 weeks most common; ranges from 1-24 weeks"
    notes: "Dosing varies significantly based on preparation type (whole fruiting body, spores, extracted polysaccharides, standardized extracts)"

  - id: pharmacokinetics_ganoderic_acids
    title: "Pharmacokinetics of Ganoderma Triterpenoids"
    source: Referenced in clinical evidence reviews
    key_findings:
      - "Ganoderic acids rapidly absorbed: peak serum concentration ~30 minutes post-ingestion"
      - "Short elimination half-life: 0.66 ± 0.33 hours"
      - "3,000 mg Ganoderma containing ~1,400 mg ganoderic acid tested"
      - "Suggested extensive hepatic first-pass metabolism"
      - "Lower overall bioavailability due to metabolism"
    notes: "Rapid absorption but quick elimination suggests need for multiple daily doses"

  - id: bioavailability_beta_glucans
    title: "Bioavailability of β-Glucan Compounds"
    source: General pharmacological literature
    bioavailability_range: "0.5% to 52%"
    key_findings:
      - "β-glucan bioavailability is generally low"
      - "Wide variation depending on molecular weight and preparation"
      - "Polysaccharides may have limited potency in humans compared to preclinical models"
    notes: "Low bioavailability is common challenge with polysaccharide-based natural products"

safety_and_adverse_effects:
  - id: gill_2008_toxicity
    title: "Toxicity of a traditional Chinese medicine, Ganoderma lucidum, in children with cancer"
    authors: "Simperal K Gill, Michael J Rieder"
    year: 2008
    journal: "Canadian Journal of Clinical Pharmacology"
    pubmed_id: "18603664"
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/18603664/
    study_type: "In vitro toxicity assessment"
    populations_tested:
      - "Pediatric cancer patients (cell lines)"
      - "Healthy children (peripheral blood mononuclear cells)"
      - "Healthy adults (peripheral blood mononuclear cells)"
    extracts_tested: "3 different extracts (GL, Reishi, PSGL) at low and high concentrations"
    key_findings:
      - "Time- and concentration-dependent decreases in cell viability"
      - "Variable results in human peripheral blood mononuclear cells (PBMCs)"
      - "Toxicity documented across samples"
    conclusions: "Extracts of G. lucidum should be used with caution as there appears to be potential for toxicity"
    notes: "Important safety study contradicting previous assumptions about complete safety; suggests caution especially in pediatric populations"

  - id: safety_meta_analysis
    title: "Safety Profile Meta-Analysis from Multiple Trials"
    source: Multiple systematic reviews
    trials_analyzed: "5 trials with 398 participants (cardiovascular risk factors); 5 trials with 373 participants (cancer treatment)"
    dose_range: "1,400-3,000 mg daily"
    duration: "12-16 weeks"
    key_findings:
      - "No abnormalities in hematological biomarkers"
      - "No abnormalities in hepatic safety biomarkers"
      - "No abnormalities in renal safety biomarkers"
      - "No moderate or severe adverse effects reported"
      - "Generally well tolerated with only rare and minor adverse events in cancer patients"
      - "Possibly safe when used up to one year"
      - "Powdered whole reishi possibly safe up to 16 weeks"
    notes: "Generally excellent safety profile across multiple trials in adult populations"

  - id: common_mild_adverse_effects
    title: "Commonly Reported Mild Adverse Effects"
    source: Multiple clinical trials
    mild_effects:
      - "Dry mouth"
      - "Sore throat"
      - "Nausea"
      - "Vomiting (less common)"
      - "Headache (less common)"
      - "Diarrhea (less common)"
      - "Dizziness (less common)"
      - "Insomnia (less common)"
      - "Shortness of breath (less common)"
      - "Stomach discomfort"
      - "Fatigue"
      - "Epistaxis (nosebleed)"
    severity: "Generally mild; no treatment discontinuations required"
    notes: "Herbal sensitivity reactions in small proportion of participants"

  - id: serious_adverse_event_hepatotoxicity
    title: "Hepatotoxicity Case Report"
    finding: "One report of severe hepatotoxicity after 1 month supplementation"
    context: "Isolated case; causation unclear given general hepatoprotective effects in other studies"
    notes: "Rare but documented; caution in individuals with pre-existing liver conditions"

  - id: safety_concern_ca_markers
    title: "Cancer Antigen Marker Elevation"
    finding: "High doses of G. lucidum spore extract increased levels of cancer antigen (CA) 72-4"
    context: "No harmful effects shown on body organs despite marker increase"
    recommendation: "High doses of G. lucidum spore extract should be used with caution"
    notes: "Unclear clinical significance; requires monitoring in long-term high-dose use"

