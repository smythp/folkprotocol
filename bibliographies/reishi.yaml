  - id: hsu_2008_hepatoprotective
    title: "Triterpenoids and polysaccharide peptides-enriched Ganoderma lucidum: a randomized, double-blind placebo-controlled crossover study of its antioxidation and hepatoprotective efficacy in healthy volunteers"
    authors: Hsu CH, et al.
    year: 2008
    pubmed_url: Not found in searches, but referenced in PMC
    pmc_url: https://pmc.ncbi.nlm.nih.gov/articles/PMC6130508/
    study_type: Randomized, double-blind, placebo-controlled crossover trial
