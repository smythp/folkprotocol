    sample_size: 110 participants
    duration: 12 weeks
    intervention: "Ganoderma lucidum spore oil"
    dose: Not specified in abstract
    key_findings:
      - "Significantly lower total cholesterol after 12 weeks"
      - "Significantly lower triglycerides"
      - "Significantly lower LDL-C"
      - "Significantly higher HDL-C compared to placebo"
    notes: "Recent 2025 study on spore oil for dyslipidemia"

  - id: gao_2016_metabolic_syndrome
    title: "A double-blind, randomised, placebo-controlled trial of Ganoderma lucidum for the treatment of cardiovascular risk factors of metabolic syndrome"
    authors: Gao Y, Lan J, Dai X, Ye J, Zhou S
    year: 2016
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/27511742/
    pmc_url: https://pmc.ncbi.nlm.nih.gov/articles/PMC4980683/
    study_type: Randomized, double-blind, placebo-controlled trial
    sample_size: 84 participants with type 2 diabetes mellitus and metabolic syndrome
    duration: 16 weeks
    intervention: "Ganoderma lucidum with or without Cordyceps sinensis vs placebo"
    dose: "3 g/day"
    key_findings:
      - "Evidence does not support use for cardiovascular risk factors in diabetes or metabolic syndrome"
      - "52 and 35 adverse events reported in G. lucidum groups"
      - "Two serious events (stroke, breast cancer diagnosis) not attributed to intervention"
      - "No significant improvements in cardiovascular markers"
    notes: "Negative trial - important for balanced evidence base"

  - id: noguchi_2008_luts
