    sample_size: 132 patients with neurasthenia
    duration: 8 weeks
    intervention: "Ganopoly (polysaccharide extract)"
    dose: "1,800 mg three times daily (5,400 mg/day total)"
    key_findings:
      - "Ganopoly treatment resulted in significantly lower CGI severity scores (15.5% reduction vs 4.9% placebo)"
      - "Reduced sense of fatigue by 28.3% from baseline (vs 20.1% placebo)"
      - "Statistically significant improvements in well-being"
      - "Well tolerated"
    notes: "High dose study - 5,400 mg/day total"

  - id: wachtel_2007_safety
    title: "Safety and tolerability of Ganoderma lucidum in healthy subjects: a double-blind randomized placebo-controlled trial"
    authors: Wachtel-Galor S, Tomlinson B, Benzie IF
    year: 2007
    pubmed_url: https://pubmed.ncbi.nlm.nih.gov/17597499/
