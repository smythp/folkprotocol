  - id: pharmacopoeia_china
    title: "Pharmacopoeia of the People's Republic of China - Ganoderma/Lingzhi Monograph"
    source: Chinese Pharmacopoeia
    edition: 2015
    reference_url: https://www.ncbi.nlm.nih.gov/books/NBK92757/
    traditional_indications: "Replenish Qi, ease the mind, relieve cough and asthma; recommended for dizziness, insomnia, palpitation, and shortness of breath"
