      active_compounds:
        - "[6]-gingerol"
        - "[8]-gingerol"
        - "[10]-gingerol"
        - "[6]-shogaol"
      key_findings:
        binding_site: "Modulatory site distinct from serotonin binding site"
        potency_order: "[6]-shogaol ≥ [8]-gingerol > [10]-gingerol ≥ [6]-gingerol"
