      - herb: "Ginger"
        evidence_level: "Strong"
        typical_dose: "1-2 g daily"
        formulation: "Capsules, tea, fresh root"
        safety: "Safe for pregnancy use"
        comparative_note: "More effective than vitamin B6 in some trials, comparable in others"
      - herb: "Vitamin B6 (Pyridoxine)"
        evidence_level: "Strong"
        typical_dose: "10-25 mg three times daily"
        safety: "Safe for pregnancy"
        note: "Pharmaceutical comparison, not herbal"
    additional_effective_herbs:
      - herb: "Peppermint"
        administration: "Tea or aromatherapy"
        safety: "Generally safe"
      - herb: "Lemon"
        administration: "Aromatherapy, water infusion"
