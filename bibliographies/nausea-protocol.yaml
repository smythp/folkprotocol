# DOSING SUMMARY

dosing_summary:
  ginger:
    general_adult_dose: "1-2 g daily"
    pregnancy_nvp: "1 g daily (divided doses)"
    ponv: "1 g preoperatively"
    cinv: "500-1000 mg twice daily"
    formulations:
      - "Fresh root: 2-4 g"
      - "Dried powder: 250-1000 mg"
      - "Tea: 1-2 g steeped"
      - "Extract standardized: Follow manufacturer guidelines"
    safety: "Generally well-tolerated; minor side effects (dizziness) in 2.8% of patients in one study"

  peppermint:
    aromatherapy: "Inhalation of essential oil as needed"
    enteric_coated_oil: "0.2-0.4 mL three times daily between meals (for IBS; extrapolate for nausea)"
    tea: "1-2 cups as needed"
    safety: "Generally safe; avoid in GERD as it may relax lower esophageal sphincter"

  chamomile:
    tea: "1-4 cups daily"
    extract: "500 mg twice daily (dose from CINV study)"
    safety: "Generally safe in moderate amounts; rare allergic reactions in those allergic to Asteraceae family"

  fennel:
    seeds: "1-2 teaspoons crushed, steeped as tea or chewed"
    extract: "Varies by preparation"
    safety: "Generally safe as food/spice; high doses may have estrogenic effects"

  cardamom:
    culinary: "As spice in food and beverages"
    tea: "2-4 pods crushed, steeped"
    extract: "Follow product guidelines"
    safety: "Generally safe as culinary spice"

  vitamin_b6:
    pregnancy_nvp: "10-25 mg three times daily"
    safety: "Safe for pregnancy; very high doses (>100 mg/day long-term) may cause neuropathy"

# SAFETY AND CONTRAINDICATIONS

safety_contraindications:
  ginger:
    safety_profile: "Generally safe and well-tolerated"
    side_effects: "Minor: heartburn, diarrhea, mouth irritation (rare)"
    contraindications:
      - "Caution with anticoagulant medications (theoretical interaction)"
      - "May lower blood sugar (monitor in diabetics on medication)"
    pregnancy: "Safe for use in pregnancy according to multiple systematic reviews"

  peppermint:
    safety_profile: "Generally safe"
    side_effects: "Heartburn in some individuals"
    contraindications:
      - "GERD or hiatal hernia (may worsen symptoms by relaxing lower esophageal sphincter)"
      - "Achlorhydria (lack of stomach acid)"
    pregnancy: "Generally considered safe in moderate amounts"

  chamomile:
    safety_profile: "Generally safe"
    side_effects: "Rare allergic reactions"
    contraindications:
      - "Allergy to Asteraceae/Compositae family plants (ragweed, chrysanthemums, marigolds, daisies)"
    pregnancy: "Generally safe in moderate amounts; excessive amounts not recommended"

  fennel:
    safety_profile: "Generally safe as food/spice"
    side_effects: "Rare allergic reactions"
    contraindications:
      - "Estrogen-sensitive conditions (theoretical concern with high doses due to anethole)"
    pregnancy: "Safe as culinary spice; medicinal doses not well-studied"

  cardamom:
    safety_profile: "Generally safe as culinary spice"
    side_effects: "Rare"
    contraindications: "None well-established"
    pregnancy: "Safe as culinary spice"

# KEY RECOMMENDATIONS

key_recommendations:
  comparative_effectiveness:
    - "For pregnancy NVP: Ginger is first-line herbal option (comparable or superior to vitamin B6)"
    - "For PONV aromatherapy: Peppermint oil most effective among essential oils; ginger also effective"
    - "For PONV oral: Ginger shows preventive effects"
    - "For CINV: Ginger as adjunct to conventional antiemetics reduces nausea and vomiting; chamomile equally effective for vomiting, ginger superior for nausea"
    - "For general digestive nausea: Multiple herbs effective - ginger, peppermint, fennel, chamomile, cardamom"

  combination_approaches:
    - "Traditional formulas combining multiple herbs show synergistic effects"
    - "Aromatherapy blends (ginger, peppermint, spearmint, cardamom) reduce nausea and antiemetic medication needs"
    - "Ayurvedic formulas (CCF tea, cardamom-ginger-fennel) support overall digestive function"
    - "TCM formulas (Banxia Houpo Tang, Xiao-Ban-Xia Decoction) address pattern-specific nausea"

  symptom_specific:
    nausea_predominant:
      primary_herbs:
        - "Ginger (strongest evidence for nausea reduction)"
        - "Peppermint (especially aromatherapy)"
      mechanisms: "5-HT3 receptor antagonism, smooth muscle relaxation"

    vomiting_predominant:
      primary_herbs:
        - "Ginger (effective for vomiting frequency)"
        - "Chamomile (equally effective as ginger for vomiting in CINV)"
      traditional_formulas:
        - "Banxia Houpo Tang (TCM - specifically for vomiting from rebellious qi)"
        - "Xiao-Ban-Xia Decoction (TCM - classical anti-emetic formula)"

    nausea_with_anxiety_or_tension:
      primary_herbs:
        - "Chamomile (antispasmodic + anxiolytic via apigenin)"
        - "Lavender (calming aromatherapy)"
      traditional_approach: "Banxia Houpo Tang addresses emotional component ('plum-pit qi')"

    nausea_with_bloating_gas:
      primary_herbs:
        - "Fennel (carminative, breaks down gas)"
        - "Cardamom (carminative, antispasmodic)"
        - "Peppermint (carminative, antispasmodic)"
      ayurvedic_approach: "CCF tea (cumin-coriander-fennel) for gentle digestive support"

