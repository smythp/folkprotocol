        evidence: "Most effective essential oil in meta-analysis"
        administration: "Inhalation"
      - herb: "Ginger aromatherapy"
        evidence: "Effective, slightly less than peppermint in some contexts"
        administration: "Inhalation"
      - herb: "Lavender essential oil"
        administration: "Inhalation"
        evidence: "Studied in combination protocols"
    oral_preparations:
      - herb: "Ginger"
        evidence: "Network meta-analysis of various preparations"
        typical_dose: "1 g preoperatively"
    comparative_note: "For thyroidectomy PONV, ginger aromatherapy (Rhodes score 0.48) performed better than peppermint (1.11) vs control (1.37)"

  chemotherapy_cinv:
    herbs_with_evidence:
      - herb: "Ginger"
        mechanisms:
          - "5-HT3 receptor antagonism"
