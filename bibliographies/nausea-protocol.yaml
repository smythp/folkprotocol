          - "Neurotransmitter regulation (5-HT, SP, DA)"
          - "Mitochondrial protection"
          - "Anti-pyroptosis"
        typical_dose: "500-1000 mg twice daily"
        timing: "5 days before and after chemotherapy"
        evidence: "Multiple RCTs and meta-analyses"
        combination: "With conventional antiemetics"
      - herb: "Chamomile (Matricaria chamomilla)"
        typical_dose: "500 mg twice daily"
        timing: "5 days before and after chemotherapy"
        evidence: "RCT comparing with ginger"
        findings: "Equally effective for vomiting frequency; ginger superior for nausea frequency"
      - herb: "Peppermint oil"
        administration: "Aromatherapy inhalation"
        evidence: "Effective in systematic reviews"
    traditional_formulas:
      - formula: "Xiao-Ban-Xia Decoction"
        tradition: "Traditional Chinese Medicine"
        evidence: "Frequently used clinically for CINV"
        mechanism: "Inhibits ferroptosis via Nrf2/SLC7A11/GPX4 pathway"
      - formula: "Hezhong granules"
        tradition: "Chinese herbal medicine"
        evidence: "Effective and well-tolerated in advanced colorectal cancer"
        specialty: "Notable benefits in preventing delayed CINV"
    aromatherapy_blend:
      composition: "Ginger, peppermint, spearmint, cardamom essential oils"
      evidence: "RCT in 1,151 patients showed statistically significant reduction in nausea and antiemetic medication requests"

  motion_sickness:
