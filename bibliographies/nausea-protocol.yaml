    source_url: https://www.sciencedirect.com/science/article/abs/pii/S0266613807001416
    key_findings:
      - "Both ginger and vitamin B6 effective for treatment of NVP"
      - "Ginger more effective than vitamin B6"

  - id: ginger_vs_b6_chittumma_2007
    type: Randomized Double-Blind Controlled Trial
    title: "Comparison of the effectiveness of ginger and vitamin B6 for treatment of nausea and vomiting in early pregnancy"
    year: 2007
    pubmed_id: 17621727
    pubmed_link: https://pubmed.ncbi.nlm.nih.gov/17621727/
    key_findings:
      nausea_severity: "Ginger more effective than vitamin B6 for relieving the severity of nausea"
      vomiting_episodes: "Equally effective for decreasing the number of vomiting episodes in early pregnancy"

  - id: ginger_vs_b6_sharifzadeh_2018
    type: Randomized Controlled Trial
    title: "Comparing the effectiveness of vitamin B6 and ginger in treatment of pregnancy-induced nausea and vomiting"
    year: 2018
    pubmed_id: 24250336
    pubmed_link: https://pubmed.ncbi.nlm.nih.gov/24250336/
    pmc_link: https://pmc.ncbi.nlm.nih.gov/articles/PMC3819920/
    key_findings:
