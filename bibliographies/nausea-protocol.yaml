    key_findings:
      - "No strong evidence for any intervention for nausea and vomiting in pregnancy"
      - "Ginger beneficial for nausea and vomiting in pregnancy"
      - "Four studies showed ginger superior to placebo"

# HEAD-TO-HEAD COMPARATIVE TRIALS

comparative_trials:
  - id: latif_2025
    type: Randomized Clinical Trial
    title: "Comparative Study on the Prokinetic Effects of Ginger, Caraway, and Peppermint in Relieving Gastrointestinal Disturbances in Pulmonary TB Patients"
    year: 2025
    journal: Food Science & Nutrition
    clinicaltrials_id: NCT06157034
    pmc_link: https://pmc.ncbi.nlm.nih.gov/articles/PMC12104075/
    source_url: https://onlinelibrary.wiley.com/doi/full/10.1002/fsn3.70338
    sample_size: 200
    comparison: "Ginger vs Caraway vs Peppermint"
    intervention_details:
      ginger_group: "1 g daily"
      caraway_group: "2 g daily"
      peppermint_group: "3 mL daily"
    phases:
      - "Baseline"
      - "Intervention (3 months)"
      - "Washout (1 month)"
    key_findings:
      ginger_results: "No vomiting recurrence in both intervention and washout phases"
      context: "Patients on anti-tuberculosis treatment with GI symptoms"

  - id: chemotherapy_aromatherapy_2024
    type: Quasi-Experimental Study
    title: "Peppermint and Ginger Aromatherapy for Managing Nausea and Vomiting During Chemotherapy"
    year: 2024
    journal: Indonesian Journal of Global Health Research
    sample_size: 28
    setting: "Breast cancer patients at Husada Hospital Jakarta"
    comparison: "Peppermint aromatherapy vs Ginger aromatherapy"
    source_url: https://jurnal.globalhealthsciencegroup.com/index.php/IJGHR/article/view/6212
    measurements:
      - "Before chemotherapy"
      - "2 hours after chemotherapy"
      - "6 hours after chemotherapy"
    key_findings:
      - "Both interventions significantly reduced nausea and vomiting (p < 0.05)"
      - "At 6 hours: peppermint group had lower scores than ginger group"
      - "Peppermint average score: 6.57"
      - "Ginger average score: 10.29"
      - "Statistical significance: p = 0.036"
      conclusion: "Peppermint was more effective than ginger at 6 hours post-chemotherapy"

  - id: thyroidectomy_ponv_2025
    type: Randomized Controlled Trial
    title: "The Effect of Ginger and Mint on Postoperative Nausea and Vomiting in Patients Undergoing Total Thyroidectomy"
    year: 2025
    setting: "Bezmialem Vakif University (2021-2022)"
    pubmed_id: 40856681
    pubmed_link: https://pubmed.ncbi.nlm.nih.gov/40856681/
    comparison: "Ginger vs Peppermint vs Routine care control"
    intervention: "Aromatherapy"
    key_findings:
      rhodes_score_ginger: "0.48 ± 0.51"
      rhodes_score_peppermint: "1.11 ± 0.64"
      rhodes_score_control: "1.37 ± 0.49"
      statistical_significance: "P < .001"
      conclusion: "Ginger performed slightly better than peppermint for thyroidectomy PONV"
      both_effective: "Both ginger and peppermint groups showed significantly lower pain and nausea severity compared with control"

  - id: oral_surgery_ponv_2025
    type: Single-Blind Randomized Controlled Trial
    title: "Effect of aromatherapy with peppermint, ginger, and lavender on postoperative nausea severity after oral surgery under general anaesthesia"
    year: 2025
    pubmed_id: 40154579
    pubmed_link: https://pubmed.ncbi.nlm.nih.gov/40154579/
    source_url: https://www.sciencedirect.com/science/article/pii/S0965229925000445
    comparison: "Peppermint vs Ginger vs Lavender aromatherapy"
    context: "Post-oral surgery PONV"
    intervention: "Aromatherapy inhalation"

  - id: ginger_vs_chamomile_cinv
    type: Randomized Double-Blind Clinical Trial
    title: "Effect of Ginger and Chamomile on Nausea and Vomiting Caused by Chemotherapy in Iranian Women with Breast Cancer"
    year: 2016
    pubmed_id: 27644672
    pubmed_link: https://pubmed.ncbi.nlm.nih.gov/27644672/
    sample_size: 65
    comparison: "Ginger vs Chamomile"
    intervention_details:
      ginger_dose: "500 mg capsules twice daily"
      chamomile_dose: "500 mg Matricaria chamomilla extract capsules twice daily"
      duration: "5 days before and after chemotherapy"
      additional_treatment: "Both groups received routine antiemetic medications"
    key_findings:
      vomiting_frequency: "Both ginger and chamomile significantly effective, no significant difference between groups"
      nausea_frequency: "Unlike chamomile, ginger significantly influenced the frequency of nausea"
      conclusion: "Ginger superior for nausea frequency; both equally effective for vomiting"

  - id: ginger_vs_b6_smith_2004
    type: Randomized Controlled Trial
    title: "A comparison between the effects of ginger, pyridoxine (vitamin B6) and placebo for the treatment of the first trimester nausea and vomiting of pregnancy (NVP)"
    year: 2004
    pubmed_id: 28629250
    pubmed_link: https://pubmed.ncbi.nlm.nih.gov/28629250/
    comparison: "Ginger vs Vitamin B6 (Pyridoxine) vs Placebo"
    key_findings:
      overall: "Ginger more effective than placebo for mild to moderate NVP"
      comparison_with_b6: "Ginger comparable with vitamin B6"

  - id: ginger_vs_b6_ensiyeh_2009
    type: Randomized Controlled Trial
    title: "Comparing ginger and vitamin B6 for the treatment of nausea and vomiting in pregnancy"
    year: 2009
