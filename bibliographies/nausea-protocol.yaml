        administration: "Tea"
        safety: "Generally safe in moderate amounts"
      - herb: "Cardamom"
        administration: "Tea, food spice"
      - herb: "Spearmint"
        administration: "Tea, syrup"
    safety_note: "All listed herbs safe for consumption by pregnant women according to systematic reviews"

  postoperative_ponv:
