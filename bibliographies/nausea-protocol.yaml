# SYSTEMATIC REVIEWS AND META-ANALYSES

systematic_reviews:
  - id: marx_2025
    type: Systematic Review and Meta-Analysis
    title: "Inhaling Peppermint Essential Oil as a Promising Complementary Therapy in the Treatment of Nausea and Vomiting"
    year: 2025
    published: July 2025
    journal: Journal of Clinical Medicine
    source_url: https://www.mdpi.com/2077-0383/14/14/5069
    conditions_studied:
      - Postoperative nausea and vomiting (PONV)
      - Chemotherapy-induced nausea and vomiting (CINV)
      - Pregnancy-related nausea and vomiting (NVP)
    key_findings:
      - "Peppermint oil inhalation was most effective among essential oils tested"
      - "Research from 2024 examined lavender, chamomile, peppermint, orange, ginger, damask rose, and sage"
      - "Peppermint oil was the most effective in reducing nausea and vomiting across all essential oils"
    mechanism:
      - "Blocks serotonin receptors in GI tract that trigger nausea/vomiting reflex"
      - "Antispasmodic effects via menthol (35-45%) and menthone (10-30%)"
      - "Relaxes smooth muscles of gastrointestinal tract"

  - id: lin_2024
    type: Overview of Systematic Reviews
    title: "Ginger for treating nausea and vomiting: an overview of systematic reviews and meta-analyses"
    authors:
      - Lin et al.
    year: 2024
    pubmed_id: 38072785
    pubmed_link: https://pubmed.ncbi.nlm.nih.gov/38072785/
    meta_analyses_reviewed: 15
    key_findings:
      - "Pooled odds ratio: 0.41 (95% CI: 0.22-0.79, P = 0.008)"
      - "Significant reduction in nausea and vomiting symptoms"
      - "Multiple contexts: pregnancy, postoperative, chemotherapy"
    quality: "Overview of 15 meta-analyses provides high-level evidence"

  - id: ernest_2000
    type: Systematic Review
    title: "Efficacy of ginger for nausea and vomiting: a systematic review of randomized clinical trials"
    first_author: Ernst E
    year: 2000
    journal: British Journal of Anaesthesia
    pubmed_id: 10793599
    pubmed_link: https://pubmed.ncbi.nlm.nih.gov/10793599/
    key_findings:
      - "Ginger is a promising antiemetic herbal remedy"
      - "Evidence quality varies by context"
      - "Strongest evidence for pregnancy-related nausea"

  - id: thomson_2014
    type: Meta-Analysis
    title: "Effect of ginger in the treatment of nausea and vomiting compared with vitamin B6 and placebo during pregnancy"
    year: 2014
    pubmed_id: 31937153
    pubmed_link: https://pubmed.ncbi.nlm.nih.gov/31937153/
    key_findings:
      - "Ginger significantly relieves general NVP symptoms and nausea compared with placebo"
      - "No significant effect on vomiting alone"
      - "Ginger more effective than vitamin B6 in treating NVP"
      - "No significant differences in some comparisons with B6"

  - id: ni_2020
    type: Systematic Review and Meta-Analysis
    title: "A systematic review and meta-analysis of the effect and safety of ginger in the treatment of pregnancy-associated nausea and vomiting"
    year: 2014
    journal: Nutrition Journal
    pmc_link: https://pmc.ncbi.nlm.nih.gov/articles/PMC3995184/
    key_findings:
      - "All seven studies concluded ginger more effective than placebo"
      - "Significantly decreased nausea symptoms when compared to placebo"
      - "Significant effect in improving general symptom of NVP"
      - "Significant in relieving severity of nausea"
      - "Not significant in reducing vomiting compared with placebo"

  - id: gibson_2021
    type: Systematic Review and Meta-Analysis
    title: "Efficacy of Ginger in Preventing Postoperative Nausea and Vomiting: A Systematic Review and Meta-Analysis"
    year: 2021
    pubmed_id: 34312974
    pubmed_link: https://pubmed.ncbi.nlm.nih.gov/34312974/
    context: Postoperative nausea and vomiting (PONV)
    key_findings:
      - "Network meta-analysis compared and ranked relative efficacy for PONV control"
      - "Compared all available ginger preparations"
      - "Ginger shows preventive effects for PONV"

  - id: liu_2024
    type: Systematic Review and Meta-Analysis
    title: "Effect of herbal medicine on postoperative nausea and vomiting after laparoscopic surgery"
    year: 2024
    pubmed_id: 38847692
    pubmed_link: https://pubmed.ncbi.nlm.nih.gov/38847692/
    key_findings:
      vomiting_incidence: "RR = 0.43 (95% CI 0.32-0.57, P < 0.00001)"
      conclusion: "Herbal medicine is effective and safe treatment for nausea and vomiting secondary to laparoscopic surgery"

  - id: wang_2023
    type: Systematic Review and Meta-Analysis
