notes: >
  This bibliography focuses on clinical studies of butterbur (Petasites hybridus)
  with emphasis on standardized extracts, particularly Petadolex (PA-free root,
  migraine) and Ze 339 (PA-free CO₂ leaf, allergic rhinitis). Most robust evidence
  is for migraine prophylaxis at 75 mg BID (150 mg/day) and for allergic rhinitis
  at Ze339 8 mg petasines TID. Safety concerns center on pyrrolizidine alkaloid
  contamination in non-PA-free commercial products; 7/21 (33%) of surveyed brands
  contained detectable PAs. Properly processed PA-free extracts show no clinically
  significant hepatotoxicity in controlled trials. The AAN Level A guideline (2012)
  was retired in 2015 due to hepatotoxicity concerns with poorly manufactured products.
  Updated 2026-03-06 to add: AAN guideline, Diener 2004 first placebo RCT,
  Gray 2004 negative trial, Oelkers-Ax 2008 pediatric RCT, Schapowal 2004
  dose-dependent trial, Schapowal 2005 fexofenadine trial, Danesch 2003 safety
  review, and Anderson 2019 pharmacovigilance review.
