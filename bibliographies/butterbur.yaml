pharmacology_and_safety:
  - id: borlak_2022
    title: "Petasites for Migraine Prevention: New Data on Mode of Action, Pharmacology and Safety. A Narrative Review"
    authors:
      - Jürgen Borlak
      - Hans-Christoph Diener
      - Johanna Kleeberg-Hartmann
      - Karl Messlinger
      - Stephen Silberstein
    year: 2022
    journal: "Frontiers in Neurology"
    volume: "13"
    article_number: "864689"
    pmid: "35585841"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/35585841/"
    study_type: "Narrative Review"
    key_findings:
      mode_of_action:
        - "Petasins dampen nociception by desensitizing calcium-conducting TRP ion channels"
        - "Suppress inflammatory mediators through enzyme inhibition"
        - "Block calcitonin-gene related peptide (CGRP) signaling - central to migraine pathophysiology"
      clinical_efficacy:
        - "Migraine attack frequency reduced significantly at 150 mg/day in RCTs"
        - "No clinically relevant hepatic dysfunction reported in RCTs using Petadolex®"
      safety_profile:
        - "No-observable-adverse-effect-level: 15-fold the maximal clinical dose (animal studies)"
        - "At supratherapeutic doses (45-90 fold): bile duct hyperplasia observed (reversible)"
        - "Human hepatocyte studies: no toxicity at therapeutic concentrations"

  - id: diener_2018
    title: "Safety profile of a special butterbur extract from Petasites hybridus in migraine prevention with emphasis on the liver"
    authors:
      - Hans-Christoph Diener
      - Frederick G Freitag
      - Ulrich Danesch
    year: 2018
    journal: "Therapeutic Advances in Neurological Disorders"
    doi: "10.1177/2515816318759304"
    url: "https://journals.sagepub.com/doi/full/10.1177/2515816318759304"
    study_type: "Safety Review"
    product_studied: "Petadolex®"
    key_findings:
      rucam_assessment:
        - method: "RUCAM (Roussel Uclaf Causality Assessment Method)"
        - serious_liver_injury: "No probable relationship found between Petadolex® and serious liver injury cases"
        - non_serious_events: "Two cases of non-serious reversible liver enzyme elevations rated as probably related"
      pyrrolizidine_alkaloids:
        - status: "Petadolex is free of detectable levels of pyrrolizidine alkaloids"
        - importance: "PAs are toxic compounds that can cause liver damage"
      clinical_experience:
        - patient_exposure: "Approximately 2.3 million patient months (1992-2016)"
        - liver_damage_cases_usa_canada: "Not one single case reported"
      conclusion: "No evidence that Petadolex poses substantial risk of liver injury"
      note: "Petadolex differs from other butterbur products; only butterbur extract with proven clinical efficacy in migraine prevention"

  - id: aydin_2013
