standardization_and_dosing:
  standard_extract_specifications:
    - extract_name: "Petadolex"
      extraction_method: "Carbon dioxide extraction"
      petasin_content: "Minimum 7.5 mg petasin and isopetasin per dose"
      pyrrolizidine_alkaloids: "Below limits of detection in high-quality preparations"
    - extract_name: "Ze 339"
      plant_part: "Leaves"
      extraction_method: "Carbon dioxide extract"
      standardization: "8 mg petasines per tablet"
      pyrrolizidine_alkaloids: "PA-free"

  clinical_dosing_recommendations:
    migraine_prevention:
      - dose: "75 mg twice daily (150 mg/day total)"
        evidence_level: "Strongest evidence, statistically significant vs placebo"
        duration: "4 months"
      - dose: "50 mg twice daily (100 mg/day total)"
        evidence_level: "Some evidence, not statistically significant vs placebo"
      - pediatric: "50-150 mg daily for 4 months"
    allergic_rhinitis:
      - dose: "One tablet (Ze 339) 3-4 times daily"
        standardization: "8 mg petasines per tablet"
        duration: "2 weeks"
    asthma:
      - dose: "50 mg/day"
        duration: "1-2 months"
        note: "Improved bronchial hyperresponsiveness in small trial (N=16)"

  safety_considerations:
    monitoring:
      - "Liver function tests recommended (AST, ALT, ALP, GGT, bilirubin)"
      - "Due to potential hepatotoxicity from pyrrolizidine alkaloids"
    duration:
      - "PA-free butterbur products appear safe when taken for up to 16 weeks"
    product_quality:
      - "Only use products processed to remove pyrrolizidine alkaloids"
      - "Products must be labeled or certified as PA-free"
      - "Recent review: 7 of 21 commercial products (33%) contained PAs"
      - "Some products claiming PA-free may not be"
    regulatory_status:
      - "American Academy of Neurology stopped recommending butterbur in 2015 due to liver toxicity concerns"
      - "French pharmacopoeia: registered on B list (disadvantages exceed advantages)"

pyrrolizidine_alkaloid_safety:
  toxicity_concerns:
    - "Pyrrolizidine alkaloids can cause hepatotoxicity, lung toxicity, carcinogenesis, and thrombosis"
    - "Primarily cause veno-occlusive liver disease"
    - "WHO Vigibase: 40 cases of hepatotoxicity reported, including 2 liver transplants (may be from contaminated products)"
  pa_free_products:
    - "Products processed to remove PAs do not appear to cause liver injury"
    - "Safe when taken by mouth for up to 16 weeks in studies"
    - "Rare cases of liver injury reported with products claimed to be PA-free"
    - "Recent cases suggest possible residual pyrrolizidine alkaloid contamination"
  quality_control:
    - "7 of 21 commercial products (33%) contained PAs in recent review"
    - "Verification of PA-free status critical"
    - "High-quality preparations have PA content below detection limits"

clinical_outcomes_summary:
  migraine_prophylaxis:
    efficacy:
