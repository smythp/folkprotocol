    key_findings:
      - "Safety evaluated from acute, subchronic, and chronic animal toxicity studies"
      - "Mutagenicity studies showed no mutagenic potential"
      - "Clinical trial, postmarketing surveillance, and pharmacovigilance data reviewed"
      - "Patented special butterbur root extract assessed as safe for human use"
    conclusion: "Petadolex PA-free extract is safe for migraine treatment in humans"

  - id: anderson_2019_hepatotoxicity
    title: "Hepatobiliary Events in Migraine Therapy with Herbs—The Case of Petadolex, A Petasites Hybridus Extract"
    authors:
      - Nora Anderson
      - Jürgen Borlak
    year: 2019
    journal: "Journal of Clinical Medicine"
    pmid: "31083451"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/31083451/"
    study_type: "Pharmacovigilance Review combined with Animal Toxicity and In Vitro Hepatotoxicity Testing"
    key_findings:
      adverse_events:
        - "56 hepatobiliary adverse events reported in postmarketing surveillance"
        - "Most cases mild (<3× ULN ALT/AST)"
        - "9 severe cases; average time to onset ~103 days"
        - "ALT range: 3–153× ULN; AST: 2–104× ULN in severe cases"
        - "2 patients required liver transplantation"
      confounders:
        - "22 of 56 patients on concurrent hepatotoxic medications (NSAIDs, migraine drugs)"
      causality_rucam:
        likely: 3
        possible: 13
        unlikely: 8
        unclassifiable: 24
      animal_studies:
        - "Bile duct proliferation at 45–90× maximum clinical dose (rats)"
        - "No morphological liver changes in minipigs at 218× MCD"
    conclusion: "Petadolex-associated hepatotoxicity is rare, idiosyncratic, and frequently confounded by co-medications"

pharmacology_and_safety:
  - id: borlak_2022
    title: "Petasites for Migraine Prevention: New Data on Mode of Action, Pharmacology and Safety. A Narrative Review"
    authors:
      - Jürgen Borlak
      - Hans-Christoph Diener
      - Johanna Kleeberg-Hartmann
      - Karl Messlinger
      - Stephen Silberstein
    year: 2022
    journal: "Frontiers in Neurology"
    volume: "13"
    article_number: "864689"
    pmid: "35585841"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/35585841/"
    study_type: "Narrative Review"
    key_findings:
      mode_of_action:
        - "Petasins dampen nociception by desensitizing calcium-conducting TRP ion channels"
        - "Suppress inflammatory mediators through enzyme inhibition"
        - "Block calcitonin-gene related peptide (CGRP) signaling - central to migraine pathophysiology"
      clinical_efficacy:
        - "Migraine attack frequency reduced significantly at 150 mg/day in RCTs"
        - "No clinically relevant hepatic dysfunction reported in RCTs using Petadolex®"
      safety_profile:
        - "No-observable-adverse-effect-level: 15-fold the maximal clinical dose (animal studies)"
        - "At supratherapeutic doses (45-90 fold): bile duct hyperplasia observed (reversible)"
        - "Human hepatocyte studies: no toxicity at therapeutic concentrations"

