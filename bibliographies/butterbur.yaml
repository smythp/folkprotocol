    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/23277154/"
    study_type: "Review"
    key_findings:
      active_constituents:
        - "Sesquiterpenes (petasin and isopetasin) are major active constituents"
        - "Responsible for spasmolytic, anti-inflammatory, and analgesic properties"
      safety_concerns:
        - "Plant contains pyrrolizidine alkaloids (PAs)"
        - "Toxic alkaloid content limits direct usage"
        - "Alkaloid removal essential for safe medical and dietary applications"
      bioavailability_extraction:
        - "Different plant parts (leaves, rhizomes) contain varying concentrations of beneficial compounds and toxic alkaloids"
        - "Careful raw-material selection required to optimize safety and efficacy"
      analytical_methods:
        - "Liquid chromatography-mass spectrometry"
        - "Gas chromatography-mass spectrometry"
        - "Enzyme-linked immunoassay for identifying alkaloids and medicinal constituents"

