randomized_controlled_trials_migraine:
  - id: lipton_2004
    title: "Petasites hybridus root (butterbur) is an effective preventive treatment for migraine"
    authors:
      - R B Lipton
      - H Göbel
      - K M Einhäupl
      - K Wilks
      - A Mauskop
    year: 2004
    journal: Neurology
    volume: "63"
    issue: "12"
    pages: "2240-2244"
    pmid: "15623680"
    doi: "10.1212/01.wnl.0000147290.68260.11"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/15623680/"
    study_type: "Randomized Controlled Trial (3-arm, parallel-group)"
    sample_size: "245 patients with migraine"
    treatment_duration: "4 months"
    groups:
      - name: "High dose"
        dose: "75 mg twice daily (150 mg/day)"
        n_patients: ~82
      - name: "Mid dose"
        dose: "50 mg twice daily (100 mg/day)"
        n_patients: ~82
      - name: "Placebo"
        dose: "Placebo twice daily"
        n_patients: ~81
    primary_outcomes:
      - measure: "Migraine attack frequency reduction"
        high_dose: "48% reduction"
        mid_dose: "36% reduction"
        placebo: "26% reduction"
        statistical_significance: "High dose p=0.0012 vs placebo; Mid dose p=0.127 vs placebo"
    secondary_outcomes:
      - measure: "≥50% reduction in attack frequency"
        high_dose: "68% of patients"
        placebo: "49% of patients"
        statistical_significance: "p < 0.05"
    adverse_effects: "Mild gastrointestinal events, predominantly burping"
    conclusion: "Only 75 mg BID dose demonstrated statistically significant superiority over placebo"

  - id: diener_2004_reanalysis
    title: "The first placebo-controlled trial of a special butterbur root extract for the prevention of migraine: reanalysis of efficacy criteria"
    authors:
      - H C Diener
      - V W Rahlfs
      - U Danesch
    year: 2004
    journal: "European Neurology"
    pmid: "14752215"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/14752215/"
    study_type: "Randomized Double-Blind Placebo-Controlled Trial (reanalysis)"
    sample_size: "60 participants (butterbur: 33; placebo: 27)"
    treatment_duration: "Not specified"
    intervention: "Petadolex (PA-free root extract), 25 mg twice daily (50 mg/day)"
    primary_outcomes:
      - measure: "Migraine attack frequency"
        butterbur: "3.4 → 1.8 attacks/month (p=0.0024)"
        placebo: "2.9 → 2.6 attacks/month (not significant)"
      - measure: "Responder rate (≥50% frequency improvement)"
        butterbur: "45%"
        placebo: "15%"
    safety: "Well tolerated; no safety concerns reported"
    conclusion: "Butterbur 50 mg/day may be effective for migraine prophylaxis"
    notes: "Earliest placebo-controlled trial; lower dose (50 mg/day) than the pivotal Lipton 2004 trial (150 mg/day) but still statistically significant"

  - id: grossmann_2000
    title: "An extract of Petasites hybridus is effective in the prophylaxis of migraine"
    authors:
      - M Grossmann
      - H Schmidramsl
    year: 2000
    journal: "International Journal of Clinical Pharmacology and Therapeutics"
    volume: "38"
    issue: "9"
    pages: "430-435"
    pmid: "11020030"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/11020030/"
    study_type: "Randomized, Double-Blind, Placebo-Controlled Trial"
    sample_size: "60 patients"
    treatment_duration: "12 weeks (plus 4-week run-in phase)"
    intervention: "Petadolex: 2 capsules twice daily, each containing 25 mg"
    total_daily_dose: "100 mg"
    key_findings:
      - "Migraine attack frequency decreased by maximum of 60% compared to baseline"
      - "Reduction was significant (p < 0.05) compared to placebo"
      - "No adverse events reported"
      - "Exceptional tolerability demonstrated"
    conclusion: "High efficacy combined with excellent tolerance supports clinical value"

  - id: oelkers_ax_2008_pediatric
    title: "Butterbur root extract and music therapy in the prevention of childhood migraine: an explorative study"
    authors:
      - R Oelkers-Ax
      - A Leins
      - P Parzer
      - T Hillecke
      - H V Bolay
      - J Fischer
      - S Bender
      - U Hermanns
      - F Resch
    year: 2008
    journal: "European Journal of Pain"
    pmid: "17659990"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/17659990/"
    study_type: "Prospective Randomized Partly Double-Blind Placebo-Controlled Parallel-Group Trial"
    population: "Primary school children with migraine"
    sample_size: "58 children total (butterbur: 19; music therapy: 20; placebo: 19)"
    key_findings:
      - "8-week post-treatment: only music therapy superior to placebo (p=0.005); butterbur not significant"
      - "6-month follow-up: both music therapy (p=0.018) AND butterbur (p=0.044) superior to placebo"
      - "All groups showed substantial attack frequency reduction during baseline phase"
    conclusion: "Butterbur showed delayed/sustained efficacy emerging at 6-month follow-up vs placebo"
    notes: "Explorative study; butterbur did not reach primary endpoint at 8 weeks but showed significance at 6-month follow-up, suggesting a delayed effect profile"

