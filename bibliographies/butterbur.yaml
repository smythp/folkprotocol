randomized_controlled_trials_allergic_rhinitis:
  - id: schapowal_2004_dose_dependent
    title: "Butterbur Ze339 for the treatment of intermittent allergic rhinitis: dose-dependent efficacy in a prospective, randomized, double-blind, placebo-controlled study"
    authors:
      - Andreas Schapowal
    collaboration: "Petasites Study Group"
    year: 2004
    journal: "Archives of Otolaryngology–Head & Neck Surgery"
    pmid: "15611396"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/15611396/"
    study_type: "Prospective Randomized Double-Blind Placebo-Controlled Multicenter Parallel-Group Trial"
    sample_size: "186 patients (high-dose: 60; low-dose: 65; placebo: 61)"
    extract: "Ze339 (CO₂ leaf extract, 8 mg petasines/tablet)"
    treatment_duration: "2 consecutive weeks"
    dosing:
      high_dose: "1 tablet three times daily"
      low_dose: "1 tablet twice daily"
      placebo: "matching placebo"
    key_findings:
      - "Both Ze339 doses significantly superior to placebo in main efficacy variable"
      - "Significant dose-response relationship observed between high-dose and low-dose groups"
      - "Clinician assessments and overall responder rates significantly favored both active groups vs placebo"
      - "Incidence and type of adverse events indistinguishable across herbal treatment and placebo groups"
    conclusion: "Ze339 effective for intermittent allergic rhinitis; dose-response confirmed; 3×/day optimal"

  - id: schapowal_2005_fexofenadine
    title: "Treating intermittent allergic rhinitis: a prospective, randomized, placebo and antihistamine-controlled study of Butterbur extract Ze 339"
    authors:
      - Andreas Schapowal
    collaboration: "Study Group"
    year: 2005
    journal: "Phytotherapy Research"
    pmid: "16114089"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/16114089/"
    study_type: "Prospective Randomized Double-Blind Placebo and Active Comparator Controlled Parallel-Group Trial"
    sample_size: "330 patients"
    extract: "Ze339 (CO₂ leaf extract, 8 mg total petasine per tablet)"
    dosing:
      butterbur: "1 tablet (8 mg petasine) three times daily"
      fexofenadine: "Telfast 180 mg once daily"
      placebo: "matching placebo"
    key_findings:
      - "Both Ze339 and fexofenadine significantly superior to placebo (p<0.001) for daytime symptoms"
      - "No significant difference between the two active treatments (p=0.37)"
      - "Evening/night symptoms, physician assessments, and responder rates similarly favored both active treatments"
      - "Both treatments demonstrated good tolerability"
    conclusion: "Ze339 efficacy equivalent to fexofenadine 180 mg; no meaningful difference between herbal and antihistamine"

  - id: schapowal_2002
    title: "Randomised controlled trial of butterbur and cetirizine for treating seasonal allergic rhinitis"
    authors:
      - Andreas Schapowal
    collaboration: "Petasites Study Group"
    year: 2002
    journal: "BMJ (British Medical Journal)"
    volume: "324"
    issue: "7330"
    pages: "144-146"
    pmid: "11799030"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/11799030/"
    study_type: "Double-Blind, Randomized Controlled Trial"
    sample_size: "125 patients randomized (butterbur: 61; cetirizine: 64)"
    settings: "Four outpatient clinics in Switzerland and Germany"
    treatment_duration: "Two consecutive weeks"
    interventions:
      - group: "Butterbur"
        extract: "CO₂ extract tablets, Ze 339"
        dosing: "One tablet four times daily"
      - group: "Cetirizine"
        dosing: "One tablet in evening"
    outcomes:
      - measure: "SF-36 questionnaire scores"
        result: "Comparable efficacy between groups"
      - measure: "Clinical global impression scale"
        result: "Median global improvement scores: 3 in both groups"
    adverse_events:
      - cetirizine: "8 of 12 adverse events involved sedative effects"
      - note: "Despite cetirizine's non-sedating classification"
    conclusion: "Butterbur showed similar effectiveness to cetirizine, useful when avoiding antihistamine sedation"

  - id: gray_2004_negative
    title: "Effects of butterbur treatment in intermittent allergic rhinitis: a placebo-controlled evaluation"
    authors:
      - Robert D Gray
      - Kay Haggart
      - Daniel K C Lee
      - Steven Cull
      - Brian J Lipworth
    year: 2004
    journal: "Annals of Allergy, Asthma & Immunology"
    pmid: "15281472"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/15281472/"
    study_type: "Double-Blind Placebo-Controlled Crossover Trial"
    sample_size: "35 patients (14 male, 21 female)"
    dosing: "Butterbur 50 mg twice daily for 2 weeks per arm"
    preparation: "Root-based, non-Ze339 preparation"
    primary_outcomes:
      - measure: "Peak nasal inspiratory flow (PNIF) — primary outcome"
        butterbur: "Morning 107 / Evening 114 L/min"
        placebo: "Morning 105 / Evening 117 L/min"
        result: "No significant difference"
      - measure: "Total nasal symptom score"
        butterbur: "Morning 3.4 / Evening 3.5"
        placebo: "Morning 3.7 / Evening 3.8"
        result: "Not clinically significant"
    key_findings:
      - "No significant effect on PNIF, total nasal symptom score, eye symptom score, or quality of life vs placebo"
    conclusion: "Negative trial — butterbur showed no meaningful benefit over placebo for intermittent allergic rhinitis"
    notes: >
      Used non-Ze339 non-standardized preparation at 50 mg BID; divergence from Ze339 trials likely
      reflects preparation-specific differences. Highlights importance of using standardized
      extracts; results should not be generalized to Ze339.

  - id: thomet_2002
