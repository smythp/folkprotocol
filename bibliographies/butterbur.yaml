randomized_controlled_trials_allergic_rhinitis:
  - id: schapowal_2002
    title: "Randomised controlled trial of butterbur and cetirizine for treating seasonal allergic rhinitis"
    authors:
      - Andreas Schapowal
    collaboration: "Petasites Study Group"
    year: 2002
    journal: "BMJ (British Medical Journal)"
    volume: "324"
    issue: "7330"
    pages: "144-146"
    pmid: "11799030"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/11799030/"
    study_type: "Double-Blind, Randomized Controlled Trial"
    sample_size: "125 patients randomized (butterbur: 61; cetirizine: 64)"
    settings: "Four outpatient clinics in Switzerland and Germany"
    treatment_duration: "Two consecutive weeks"
    interventions:
      - group: "Butterbur"
        extract: "CO₂ extract tablets, Ze 339"
        dosing: "One tablet four times daily"
      - group: "Cetirizine"
        dosing: "One tablet in evening"
    outcomes:
      - measure: "SF-36 questionnaire scores"
        result: "Comparable efficacy between groups"
      - measure: "Clinical global impression scale"
        result: "Median global improvement scores: 3 in both groups"
    adverse_events:
      - cetirizine: "8 of 12 adverse events involved sedative effects"
      - note: "Despite cetirizine's non-sedating classification"
    conclusion: "Butterbur showed similar effectiveness to cetirizine, useful when avoiding antihistamine sedation"

