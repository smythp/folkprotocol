# Clinical Efficacy Summary by Condition

efficacy_by_condition:
  premenstrual_syndrome:
    evidence_quality: "Multiple RCTs and meta-analyses"
    effect_size: "Hedges g = -1.21 (95% CI: -1.53 to -0.88)"
    responder_rates: "52% vs 24% placebo"
    remission_likelihood: "2.57x more likely than placebo"
    superiority: "Superior to pyridoxine and magnesium oxide"

  cyclic_mastalgia:
    evidence_quality: "Systematic review of 25 studies"
    effect_size: "SMD: 0.67 (95% CI: 0.5-0.85)"
    pain_reduction: "33.7mm vs 20.3mm placebo after 2 cycles (p=0.006)"
    mechanism: "Reduces elevated serum prolactin"
