    compound: "agnuside"
    oral_bioavailability: "0.7%"
    tmax: "30-45 minutes"
    notes: "No specific information on pharmacokinetics in humans according to EMA assessment report"

  - title: "Nanoemulsion for improving solubility and permeability of Vitex agnus-castus extract: formulation and in vitro evaluation"
    year: 2021
    journal: "PMC"
    study_type: "Formulation development"
    rationale: "Many herbal extracts have low in-vivo activity due to poor solubility, absorption, and bioavailability"
    approach: "Novel nanoemulsion formulation to improve oral delivery and bioavailability"

