      url: "https://pubmed.ncbi.nlm.nih.gov/19422358/"
    study_details:
      species: "Scutellariae radix (S. baicalensis root)"
      design: "Parallel-group clinical trial with probe drug cocktail"
      participants: 24  # healthy male volunteers, 8 per herbal group
      duration: "13 days; probe drug testing before and after treatment"
      cyp_enzymes_assessed:
        - "CYP1A2 (caffeine probe)"
        - "CYP2C9 (losartan probe)"
        - "CYP2C19 (omeprazole probe)"
        - "CYP2D6 (dextromethorphan probe)"
        - "CYP2E1 (chlorzoxazone probe)"
        - "CYP3A4 (midazolam probe)"
      key_findings_scutellariae_radix:
        - "CYP2C9 activity reduced to 71% of baseline (losartan metabolic ratio)"
        - "CYP2E1 activity increased 1.42-fold (chlorzoxazone metabolic ratio)"
        - "Other CYP isoforms not significantly affected"
      clinical_implication: "Moderate CYP2C9 inhibition may affect metabolism of warfarin, phenytoin, NSAIDs; further clinical evaluation warranted"

  - citation:
      authors: "Zhou X, Fu L, Wang P, Yang L, Zhu X, Li CG"
      title: "Drug-herb interactions between Scutellaria baicalensis and pharmaceutical drugs: Insights from experimental studies, mechanistic actions to clinical applications"
      journal: "Biomedicine & Pharmacotherapy"
      year: 2021
      volume: "138"
      pages: "111445"
      pmid: "33711551"
      doi: "10.1016/j.biopha.2021.111445"
      url: "https://pubmed.ncbi.nlm.nih.gov/33711551/"
    study_details:
      species: "S. baicalensis"
      study_type: "Comprehensive review"
      key_findings:
        - "S. baicalensis bioactives affect pharmacokinetics via efflux pumps and CYP450 enzymes"
        - "Baicalin (0.01–1 µM) increased CYP3A4, CYP2C9, CYP2C19 expression at 24–36h; decreased CYP3A4 and CYP2C9 at 48h in HeLa cells"
        - "CYP450 inhibition can increase drug effects or toxicity; induction reduces drug efficacy"
        - "Interactions documented with cancer drugs, diabetes medications, and antimicrobials"
      clinical_concern: "Warfarin, chemotherapy, immunosuppressants most clinically relevant; use caution with concurrent pharmaceutical drugs"

