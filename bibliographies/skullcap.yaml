# Key Research Gaps
research_needs:
  - "Long-term RCTs for S. lateriflora (>8 weeks) are absent"
  - "Human pharmacokinetic studies for whole S. lateriflora herb (not just isolated constituents)"
  - "Definitive mechanistic studies on GABAA receptor binding in humans"
  - "Species-specific hepatotoxicity risk differentiation (lateriflora vs baicalensis)"
  - "Head-to-head comparisons of standardized vs whole herb preparations"
  - "Dose-finding studies for S. lateriflora across clinical indications"
  - "Systematic review specifically on S. lateriflora (vs S. baicalensis) clinical evidence"
  - "Bioavailability enhancement strategies for S. baicalensis constituents in human trials"
  - "Investigation of germander adulteration prevalence in commercial products"

# Summary Points
summary:
  clinical_evidence:
    s_lateriflora:
      - "Two small RCTs support anxiolytic/mood effects in healthy volunteers (n=43 and n=66)"
      - "2025 RCT (n=66) demonstrates significant sleep improvement with 400 mg/day standardized extract"
      - "Effects on anxiety modest; most pronounced effect is global mood enhancement"
      - "Evidence base very limited; no systematic reviews found specifically for S. lateriflora RCTs"
    s_baicalensis:
      - "Primarily used in TCM for inflammatory conditions; clinical RCT evidence in Western indications limited"
      - "Taiwan NHI database confirms frequent clinical use for headache/migraine (N=4,849; 4th most common indication)"
      - "2025 combination RCT (n=35; with Crataegus, Mg, Cr) showed improved mood, anxiety, and sleep in stressed adults"
      - "Most evidence comes from preclinical studies and constituent-level pharmacology"
      - "Preclinical meta-analysis (13 animal studies) supports antidepressant activity via BDNF/PI3K-AKT pathways"

  safety:
    - "Likelihood score B for clinically apparent liver injury (LiverTox)"
    - "Hepatotoxicity rare but documented; onset typically 1–12 weeks"
    - "Most severe cases involve S. baicalensis or uncertain species; S. lateriflora association less established"
    - "Drug-induced autoimmune hepatitis reported (rare; 1 documented severe case 2023)"
    - "Germander (Teucrium canadense) adulteration historically common; may be responsible for some DILI cases"
    - "S. baicalensis hepatic safety data: 1335 mg/day x 14.8 months showed no LFT changes in 17 subjects"
    - "Pulmonary infiltrates documented in one Move Free case (S. baicalensis)"
    - "Contraindicated in pregnancy and lactation (insufficient data)"

  pharmacokinetics:
    s_lateriflora:
      - "No human PK studies for whole herb identified"
      - "In vitro data: oroxylin A and oroxylin A glucuronide are primary bioavailable compounds"
      - "Gastroduodenal digestion significantly degrades most polyphenolics (20–73% reduction)"
    s_baicalensis_baicalein:
      - "Tmax 0.75–3.5 hours for baicalein after oral dose"
      - "Half-life 1.9–15 hours (dose-dependent)"
      - "Dose proportionality demonstrated 100–2800 mg (single dose) and 200–800 mg (multiple dose)"
      - "No serious accumulation with multiple dosing"
      - "Low water solubility limits bioavailability; nanoformulations under investigation"

  drug_interactions:
    - "S. baicalensis inhibits CYP2C9 (reduces to ~71%) and induces CYP2E1 (increases 1.42x) in humans"
    - "Potential interactions with warfarin, NSAIDs, phenytoin (CYP2C9 substrates)"
    - "Bidirectional CYP3A4 effects (time-dependent in vitro); clinical significance unclear"
    - "Review documents interactions across cancer, diabetes, and anti-infective drug classes"

