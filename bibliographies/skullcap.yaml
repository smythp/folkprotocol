      year: 2014
      volume: "28"
      issue: "5"
      pages: "692-698"
      pmid: "23878109"
      doi: "10.1002/ptr.5044"
      url: "https://pubmed.ncbi.nlm.nih.gov/23878109/"
    study_details:
      species: "S. lateriflora"
      design: "Randomized, double-blind, placebo-controlled crossover"
      duration: "2 weeks per arm"
      participants: 43  # healthy volunteers, 81% with mild anxiety or less at baseline
      population: "Healthy volunteers"
      intervention: "350 mg S. lateriflora three times daily (1050 mg/day)"
      comparator: "Placebo"
      outcomes:
        primary:
          - "Total Mood Disturbance (POMS): highly significant decrease with skullcap (p<0.001) vs no significant change with placebo (p=0.072)"
        secondary:
          - "Anxiety (BAI): no significant difference between treatment and placebo (p=0.191)"
          - "No reduction in energy or cognition"
      safety: "Herb significantly enhanced global mood without reducing energy or cognition; favorable tolerability in healthy population"
      limitations:
        - "Carryover effects possible"
        - "Low baseline anxiety scores (81% mild or less) reduced statistical power"
        - "Baseline group differences in anxiety levels (p=0.022)"

