---
herb: Skullcap
scientific_name: "Scutellaria lateriflora L. (American skullcap); Scutellaria baicalensis Georgi (Chinese/Baical skullcap)"
common_names:
  - "American skullcap (S. lateriflora)"
  - "Blue skullcap"
  - "Mad dog skullcap"
  - "Chinese skullcap (S. baicalensis)"
  - "Baical skullcap"
  - "Huang Qin"
bibliography_type: clinical_and_regulatory
last_updated: 2026-03-06
notes_on_scope: >
  Two distinct species are in common use: Scutellaria lateriflora (North American nervine,
  anxiety/sleep) and Scutellaria baicalensis (Chinese medicine, anti-inflammatory). Both are
  sold as 'skullcap' in commerce. Clinical evidence is limited; most RCTs use S. lateriflora
  whole herb, while pharmacokinetic data exists mainly for isolated baicalin/baicalein
  constituents from S. baicalensis. Adulterant concern: historical contamination with germander
  (Teucrium canadense) complicates safety attribution.

# Randomized Controlled Trials
clinical_trials:
  - citation:
      authors: "Di Minno A, Morone MV, Buccato DG, De Lellis LF, Ullah H, Piccinocchi R, Cordara M, Larsen DS, Di Guglielmo A, Baldi A, Piccinocchi G, Xiao X, Sacchi R, Daglia M"
      title: "Efficacy and Tolerability of a Chemically Characterized Scutellaria lateriflora L. Extract-Based Food Supplement for Sleep Management: A Single-Center, Controlled, Randomized, Crossover, Double-Blind Clinical Trial"
      journal: "Nutrients"
      year: 2025
      volume: "17"
      issue: "9"
      pages: "1491"
      pmid: "40362800"
      pmcid: "PMC12073644"
      doi: "10.3390/nu17091491"
      url: "https://pubmed.ncbi.nlm.nih.gov/40362800/"
    study_details:
      species: "S. lateriflora"
      design: "Single-center, randomized, crossover, double-blind, placebo-controlled"
      duration: "56 days per arm + 28-day washout"
      participants: 66  # 33 per group, aged 18-70, 29F/37M, mean age 44±15 years
      population: "Adults with mild to moderate primary insomnia"
      intervention: "400 mg/day S. lateriflora dried hydroethanolic extract standardized to 10% baicalin (BlueCALM)"
      comparator: "Placebo"
      outcomes:
        primary:
          - "PSQI total score: supplement decreased from 13.0±2.9 (baseline) to 9.5±3.5 (endpoint); placebo deteriorated from 11.5±3.0 to 13.3±3.0 (p<0.001)"
        secondary:
          - "Sleep Onset Latency: reduced 0.82 min with supplement vs increased 0.37 min with placebo"
          - "Sleep Efficiency: increased ~9% with supplement vs minimal change with placebo"
          - "Total Sleep Time: increased 1.22 hours with supplement"
          - "Visual Analog Scale: significantly improved (p<0.001)"
      safety: "No adverse effects reported; physicians assessed supplement as well-tolerated"
      extract_type: "Hydroethanolic extract standardized to 10% baicalin"

  - citation:
      authors: "Brock C, Whitehouse J, Tewfik I, Towell T"
      title: "American Skullcap (Scutellaria lateriflora): a randomised, double-blind placebo-controlled crossover study of its effects on mood in healthy volunteers"
