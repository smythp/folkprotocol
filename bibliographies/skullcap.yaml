      authors: "Ma Y, Zhou X, Zhang F, Huang C, Yang H, Chen W, Tao X"
      title: "The effect of scutellaria baicalensis and its active ingredients on major depressive disorder: a systematic review and meta-analysis of literature in pre-clinical research"
      journal: "Frontiers in Pharmacology"
      year: 2024
      volume: "15"
      pages: "1313871"
      pmid: "38572433"
      pmcid: "PMC10987764"
      doi: "10.3389/fphar.2024.1313871"
      url: "https://pubmed.ncbi.nlm.nih.gov/38572433/"
    study_details:
      species: "S. baicalensis and active constituents (baicalin, baicalein, scutellarin)"
      design: "Systematic review and meta-analysis of preclinical animal studies"
      scope: "373 records screened; 13 studies included in final meta-analysis"
      key_findings:
        - "Sucrose preference test: SMD = −2.80 (significant improvement with treatment vs control)"
        - "Open field test: SMD = −2.38 (enhanced behavioral indicators of depression relief)"
        - "Novelty suppressed feeding test: SMD = −2.98 (increased food consumption, indicating antidepressant effect)"
        - "Primary mechanisms: regulation of inflammatory responses, oxidative stress, apoptosis, and neurotransmitter production via TrkB-BDNF and PI3K-AKT pathways"
