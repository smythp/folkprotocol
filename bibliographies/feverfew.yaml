    study_type: "Quality control analysis of commercial feverfew products"
    key_findings:
      - finding: "Parthenolide content per dosage form varied 150-fold"
        range: "0.02 to 3.0 mg"
      - finding: "Percent parthenolide varied 5.3-fold"
