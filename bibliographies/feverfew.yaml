    doi: "10.1111/j.2042-7158.1992.tb03631.x"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/1359053/"
    study_type: "Analytical study of parthenolide content"
    key_findings:
      - finding: "Authenticated Tanacetum parthenium grown in UK contained high level of parthenolide in leaves, flowering tops and seeds"
      - finding: "Low level of parthenolide in stalks and roots"
      - finding: "Commercial feverfew products varied widely in parthenolide content"
      - finding: "In some commercial products parthenolide was not detected"
      - finding: "Parthenolide appeared primarily responsible for antisecretory effects on blood platelets"
    recommendations: "Manufacturers should use measurements of parthenolide as means of standardization and quality control"
    notes: "Foundational study establishing need for standardization"

  - id: "nelson_2002"
    title: "Variations in parthenolide content and daily dose of feverfew products"
    authors:
