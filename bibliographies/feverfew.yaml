# RANDOMIZED CONTROLLED TRIALS

randomized_controlled_trials:
  - id: "diener_2005"
    title: "Efficacy and safety of 6.25 mg t.i.d. feverfew CO2-extract (MIG-99) in migraine prevention--a randomized, double-blind, multicentre, placebo-controlled study"
    authors:
      - "Diener HC"
      - "Pfaffenrath V"
      - "Schnitker J"
      - "Friede M"
      - "Henneicke-von Zepelin HH"
    affiliations:
      - "Neurologische Universitätsklinik, Essen, Germany"
    journal: "Cephalalgia"
    year: 2005
    volume: 25
    issue: 11
    pages: "1031-1041"
    pmid: 16232154
    doi: "10.1111/j.1468-2982.2005.00950.x"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/16232154/"
    study_type: "Randomized, double-blind, placebo-controlled, multicenter trial"
    study_design: "Parallel-group"
    extract: "MIG-99 (CO2-extract of feverfew)"
    dosing:
      preparation: "MIG-99 feverfew CO2-extract"
      dose: "6.25 mg"
      frequency: "Three times daily (t.i.d.)"
      total_daily_dose: "18.75 mg"
    sample_size:
      intention_to_treat: 170
      mig99_group: 89
      placebo_group: 81
    baseline_period: "4 weeks"
    treatment_duration: "16 weeks"
    key_findings:
      - finding: "Migraine frequency decreased by 1.9 attacks per month in MIG-99 group"
        baseline: "4.76 attacks/month"
        p_value: "0.0456"
      - finding: "Migraine frequency decreased by 1.3 attacks per month in placebo group"
      - finding: "Responder rates showed odds ratio of 3.4 in favour of MIG-99"
        p_value: "0.0049"
      - finding: "Related adverse events: 8.4% in MIG-99 group (9/107 patients) vs 10.2% in placebo (11/108 patients)"
        p_value: "0.654"
    safety: "AEs were non-specific and similarly distributed in both treatment groups"
    conclusion: "Confirmed the efficacy of CO2-based feverfew extract MIG-99 in migraine prophylaxis"
    notes: "Phase III confirmatory trial with standardized extract"

  - id: "pfaffenrath_2002"
    title: "The efficacy and safety of Tanacetum parthenium (feverfew) in migraine prophylaxis--a double-blind, multicentre, randomized placebo-controlled dose-response study"
    authors:
      - "Pfaffenrath V"
      - "Diener HC"
      - "Fischer M"
      - "Friede M"
      - "Henneicke-von Zepelin HH"
    journal: "Cephalalgia"
    year: 2002
    month: "September"
    volume: 22
    issue: 7
    pages: "523-532"
    pmid: 12230594
    doi: "10.1046/j.1468-2982.2002.00396.x"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/12230594/"
    study_type: "Randomized, double-blind, multicentre, placebo-controlled dose-response trial"
    study_design: "Adaptive design"
    extract: "MIG-99 (CO2-extract of feverfew)"
    dosing:
      preparation: "MIG-99 feverfew CO2-extract"
      doses_tested:
        - "2.08 mg t.i.d."
        - "6.25 mg t.i.d."
        - "18.75 mg t.i.d."
      comparator: "Placebo"
    sample_size:
      total: 147
      confirmatory_subgroup: 49
      note: "Patients with ≥4 baseline attacks"
    baseline_period: "4 weeks"
    treatment_duration: "12 weeks"
    key_findings:
      - finding: "Failed to show significant migraine prophylactic effect overall"
      - finding: "In subgroup with ≥4 baseline attacks, migraine frequency decreased in dose-dependent manner"
        p_value: "0.001"
      - finding: "6.25 mg t.i.d. most favorable benefit-risk ratio in subgroup"
        statistic: "Mean reduction of 1.8 attacks per 28 days vs 0.3 for placebo"
        p_value: "0.02"
      - finding: "35% of all participants (52/147) reported at least one adverse event"
      - finding: "Incidence of AEs similar across all treatment groups including placebo"
      - finding: "No dose-related effect observed in any safety parameter"
      - finding: "Three withdrawals necessitated by adverse effects in feverfew groups"
    safety: "No dose-related safety concerns"
    notes: "Dose-response study identifying optimal dosing for subgroup with frequent migraines"

