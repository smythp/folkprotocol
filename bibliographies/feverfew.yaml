# SUMMARY

summary:
  efficacy: "Mixed evidence with most recent 2025 meta-analysis showing significant reductions in migraine frequency (1.11 attacks/month reduction) and duration (4.43 hours reduction). Cochrane review reports low quality evidence needing confirmation in larger trials."

  optimal_dosing: "6.25 mg three times daily of standardized CO2-extract (MIG-99) showed most favorable benefit-risk ratio in patients with frequent migraines (≥4 attacks/month)"

  bioavailability: "Poor oral bioavailability of parthenolide demonstrated in Phase I trial with no detectable plasma concentrations up to 4 mg daily dose. Synthetic analogs with improved bioavailability under development."

  safety: "Generally well tolerated with mild, reversible adverse effects. Most common: mouth ulceration (11%), gastrointestinal symptoms. No major safety concerns or dose-related toxicity. Not recommended for pregnant/lactating women or children."

  quality_control: "Severe quality control issues in commercial products with 150-fold variation in parthenolide content (0.02-3.0 mg per dose) and 160-fold variation in daily parthenolide intake (0.06-9.7 mg/day). Standardization to ≥0.2% parthenolide recommended."

  mechanism: "Primary mechanism involves inhibition of NF-κB pathway, reducing pro-inflammatory cytokines (TNF-α). Parthenolide is the key bioactive compound (germacranolide-type sesquiterpene lactone)."

  regulatory_status: "Included in British, European, and US pharmacopoeias. Recognized by EMA for migraine prevention. ESCOP and Commission E monographs available."

# NOTES

notes:
  - "WHO monograph: No evidence found of feverfew inclusion in WHO monographs on selected medicinal plants (Volumes 1-4 searched)"
  - "Commission E: Monographs published 1984-1994 in Bundesanzeiger, English translation by American Botanical Council 1998"
  - "Quality issues: Major concern is variability in parthenolide content across commercial products and between batches from same manufacturer"
  - "Bioavailability: Critical limitation for therapeutic use; parthenolide not detectable in plasma at oral doses up to 4 mg"
  - "Study heterogeneity: Pooled analysis difficult due to lack of common outcome measures across trials"
  - "Extract standardization: MIG-99 CO2-extract is the most studied standardized preparation with consistent efficacy in subgroup with frequent migraines"

