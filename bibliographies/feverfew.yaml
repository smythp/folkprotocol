    dosing:
      preparation: "Dried alcoholic extract of feverfew on microcrystalline cellulose"
      dose: "One capsule daily"
      parthenolide_content: "0.5 mg"
    sample_size:
      enrolled: 50
      completed: 44
    treatment_duration: "9 months"
    key_findings:
      - finding: "Both treatment groups suffered the same number of migraine attacks"
      - finding: "No prophylactic effect was demonstrated"
      - finding: "Patients showed tendency to use fewer symptomatic drugs during feverfew treatment period"
    notes: "Negative study - contradicted earlier positive results. Low parthenolide content may explain lack of efficacy"

