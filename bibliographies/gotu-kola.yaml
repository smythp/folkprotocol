systematic_reviews:
  - id: puttarak_2017
    title: "Effects of Centella asiatica (L.) Urb. on cognitive function and mood related outcomes: A Systematic Review and Meta-analysis"
    authors: "Puttarak P, Dilokthornsakul P, Saokaew S, Dhippayom T, Kongkaew C, Sruamsiri R, Chuthaputti A, Chaiyakunapruk N"
    year: 2017
    pubmed_id: "28878245"
