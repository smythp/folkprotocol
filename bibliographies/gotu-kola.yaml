      - endocrine_diseases
      - cardiovascular_diseases
      - gastrointestinal_diseases
      - immune_diseases
      - gynecological_diseases
    key_findings:
      mechanisms: "Anti-inflammatory, anti-oxidative stress, anti-apoptotic effects, and improvement in mitochondrial function"
      primary_benefits: "Extensive beneficial effects on neurological and skin diseases"
    conclusions: "Further clinical studies urgently required due to low level of evidence and lack of patients"

  - id: chong_2013
