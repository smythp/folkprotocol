pharmacokinetics_bioavailability:
  - id: wright_2022
    title: "Pharmacokinetics and Pharmacodynamics of Key Components of a Standardized Centella asiatica Product in Cognitively Impaired Older Adults: A Phase 1, Double-Blind, Randomized Clinical Trial"
    authors: "Wright KM, Bollen M, David J, Speers AB, Brandes MS, Gray NE, Alcázar Magaña A, McClure C, Stevens JF, Maier CS, Quinn JF, Soumyanath A"
    year: 2022
    pubmed_id: "35204098"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/35204098/"
    journal: "Antioxidants"
    study_type: "Phase 1, double-blind, randomized crossover clinical trial"
    sample_size: 4
    population: "Cognitively impaired older adults on cholinesterase inhibitor therapy"
    doses:
      - "2 grams CAP (Centella asiatica aqueous extract product)"
      - "4 grams CAP"
    duration: "10 hours post-dose"
    compounds_measured:
      - asiatic_acid
      - madecassic_acid
      - asiaticoside
      - madecassoside
      - caffeoylquinic_acids
    key_findings:
      bioavailability: "Triterpene aglycones (asiatic acid and madecassic acid) detected in plasma and urine"
      parent_compounds: "Parent glycosides (asiaticoside and madecassoside) absent in plasma despite abundance in extract"
      metabolites: "Bioavailable compounds were primarily metabolites rather than parent compounds"
      caffeoylquinic_acids: "Delayed absorption and limited presence in plasma or urine"
    conclusions: "Oral bioavailability of active compounds, NRF2 target engagement, and acute safety support validity of using CAP in future clinical studies"

