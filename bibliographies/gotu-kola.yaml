notes: |
  This bibliography focuses on human clinical trials with standardized extracts,
  systematic reviews, and pharmacokinetic studies. Animal studies and in vitro
  studies were generally excluded unless they provided critical mechanistic or
  safety information not available from human studies. The emphasis is on
  quantifiable outcomes with specific dosing information to guide clinical use.

  Key standardized preparations referenced:
  - ECa 233: ≥80% triterpenoid glycosides (madecassoside 53.1%, asiaticoside 32.3%)
  - TTFCA/TECA: 40% asiaticoside, 30% asiatic acid, 30% madecassic acid

  Most common clinical doses:
  - Cognitive/mood: 250-4000 mg daily
  - Anxiety: 500 mg BID (1000 mg/day)
  - Venous insufficiency: 60-180 mg TTFCA daily
  - Wound healing: 300 mg asiaticoside daily

  Safety notes:
  - Generally well-tolerated at therapeutic doses
  - Rare cases of hepatotoxicity documented (3 cases, Argentina 2005)
  - Avoid in pregnancy/lactation (insufficient data)
  - Potential moderate interactions with CNS depressants and diabetes medications
  - NOAEL: 1000 mg/kg in rats; no serious adverse effects at 250-500 mg in humans
