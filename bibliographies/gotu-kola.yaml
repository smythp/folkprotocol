contraindications_interactions:
  pregnancy: "Not recommended - insufficient data (EMA); avoid oral use; topical use may be acceptable"
  lactation: "Not recommended orally - no data on breast milk secretion; topical use believed compatible if not applied to breast"
  hypersensitivity: "Contraindicated in patients with hypersensitivity to C. asiatica or any components"

  drug_interactions:
    cns_depressants:
      severity: "Moderate"
      mechanism: "Pharmacodynamic synergism - may enhance CNS depression"
      examples:
        - azelastine
        - brompheniramine
        - butalbital

    diabetes_medications:
      severity: "Moderate"
      mechanism: "Potential pharmacodynamic synergism - may increase effects"
      examples:
        - insulin
        - metformin

    cyp450_enzymes:
      severity: "Moderate to low"
      mechanism: "In vitro inhibition of CYP3A4, 2C19, and 2B6 enzymes"
      clinical_significance: "Theoretical; clinical significance unclear"

    antiplatelet_drugs:
      severity: "Moderate"
      mechanism: "Demonstrated antiplatelet aggregation activity in vitro"
      caution: "Use with caution with antiplatelet or anticoagulant medications"

  total_moderate_interactions: "At least 28 different drugs"
  severe_interactions: "None known"

