    journal: "Scientific Reports"
    study_type: "Systematic review and meta-analysis"
    studies_included: 11
    rct_count: 11
    breakdown:
      - "5 RCTs examining C. asiatica alone"
      - "6 RCTs examining C. asiatica-containing products"
    key_findings:
      cognitive_function: "No significant differences in all cognitive function domains compared to placebo"
      mood_alert: "Increased alertness [SMD: 0.71 (95% CI; 0.01 to 1.41)]"
      mood_anger: "Decreased anger at 1 hour post-treatment [SMD: -0.81 (95%CI; -1.51 to -0.09)]"
      adverse_effects: "None of the studies reported adverse effects"
    conclusions: "Need for future trials using standardized preparations emphasized"

