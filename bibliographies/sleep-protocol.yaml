head_to_head_comparisons:
  - id: valerian_passionflower_hops_vs_zolpidem_2013
    title: "Efficacy and safety of a polyherbal sedative-hypnotic formulation NSF-3 in primary insomnia in comparison to zolpidem"
    journal: "Ayu"
    year: 2013
    study_type: randomized_controlled_trial
    design: double_blind_placebo_controlled
    intervention:
      herbal_combination:
        valerian: "300 mg extract"
        passionflower: "80 mg extract"
        hops: "30 mg extract"
      pharmaceutical_comparator:
        zolpidem: "10 mg"
    key_findings:
      sleep_latency_herbal:
        baseline: "84.0 minutes"
        post_treatment: "23.6 minutes"
      sleep_latency_zolpidem:
        baseline: "90.0 minutes"
        post_treatment: "26.4 minutes"
      statistical_difference: "No significant difference between treatments"
      conclusion: "Valerian, hops and passionflower combination was safe and effective alternative to zolpidem"
    pmc_url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC3608291/"

  - id: three_sisters_of_sleep
    concept: "Three plants with most potential for sleep"
    herbs:
      - "Valerian"
      - "Passionflower"
      - "Ashwagandha"
    best_combination: "Valerian with hops and passionflower"
    mechanism: "Combination gives best results in clinical tests; hops and passionflower potentiate valerian's effects; all affect GABA levels"
    sources:
      - url: "https://www.thieme-connect.com/products/ejournals/html/10.1055/a-1510-9826"
      - url: "https://www.psychologytoday.com/us/blog/rhythms-of-recovery/201707/how-the-3-sisters-of-sleep-can-help"

  - id: individual_herbs_comparative_effectiveness
    study_type: systematic_review
    key_findings:
      chamomile:
        doses_tested:
          - "200 mg extract capsules twice daily for 28 days (elderly)"
        effectiveness: "Improvements in sleep quality and sleep latency but scarce effect specifically for insomnia"
      hops_alone:
        doses_tested:
          - "500 mg"
          - "50 mg"
        effectiveness: "No significant effects on sleep quality measures when used alone"
      combination_superiority: "Combinations of herbs, particularly valerian-hops-passionflower, perform better than individual herbs and can match pharmaceutical sleep aids in effectiveness"
    source: "https://pmc.ncbi.nlm.nih.gov/articles/PMC7191368/"

