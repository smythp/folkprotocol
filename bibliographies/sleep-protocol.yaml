---
# Sleep Protocol Bibliography
# Compiled from systematic reviews, clinical trials, and mechanism studies
# Focus: comparative effectiveness, combination formulas, symptom-specific treatments

meta:
  protocol_name: Sleep Protocol
  indication: Insomnia and sleep disturbances
  compiled_date: 2026-01-15
  search_focus:
    - Systematic reviews on herbal treatments for sleep
    - Head-to-head trials comparing herbs
    - Traditional formulas used for sleep
    - Mechanism studies (GABA, serotonin pathways)
    - Comparative effectiveness
    - Combination formulas
    - Symptom-specific treatments

