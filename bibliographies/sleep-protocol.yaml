individual_herbs_mechanisms:
  valerian:
    species: "Valeriana officinalis"
    active_compounds:
      primary: "Valerenic acid"
      mechanism: "Subunit-specific allosteric modulator of GABAA receptors"
    mechanism_of_action:
      primary: "Modulation of gamma-aminobutyric acid (GABA) receptors in brain"
      specific:
        - "Inhibition of enzymatic destruction of GABA"
        - "Increases GABA availability"
        - "Positive allosteric modulation of GABAA receptors"
        - "Valerenic acid stimulates chloride currents through GABAA receptors"
        - "Binds to beta subunit of GABAA receptor (not gamma like benzodiazepines)"
        - "GABA modulation not gamma subunit dependent, not inhibited by flumazenil"
        - "Blocks GABA reuptake and inhibits GABA metabolism"
      neurotransmitter_effects:
        - "Increased GABA activity through multiple pathways"
        - "Sedation, muscle relaxation, anxiolysis mediated by GABAergic mechanisms"
      dosage_dependent_effects:
        high_dose: "300 mg/kg enhances both quantity and quality of sleep through GABAergic pathway"
    dosage_range: "160-600 mg/day"
    effectiveness_pattern: "More effective for chronic insomnia than acute episodes"
    evidence_quality: "Substantial evidence for effectiveness and safety"
    mechanism_studies:
      - title: "The gamma-aminobutyric acidergic effects of valerian and valerenic acid on rat brainstem neuronal activity"
        pubmed_id: "14742369"
        url: "https://pubmed.ncbi.nlm.nih.gov/14742369/"
      - title: "Valerenic acid potentiates and inhibits GABA(A) receptors: molecular mechanism and subunit specificity"
        pubmed_id: "17585957"
        url: "https://pubmed.ncbi.nlm.nih.gov/17585957/"
      - title: "Impact of a Novel Valerian Extract on Sleep Quality, Relaxation, and GABA/Serotonin Receptor Activity in a Murine Model"
        pmc_id: "PMC11200646"
        url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC11200646/"
    sources:
      - url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC7914492/"
      - url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC11321869/"
      - url: "https://www.ebmconsult.com/articles/valerian-valeriana-officinalis-treating-insomnia-sleep"

  hops:
    species: "Humulus lupulus"
    mechanism_of_action:
      multi_target:
        - "Modulation of GABA receptors"
        - "Modulation of serotonin receptors"
        - "Modulation of melatonin receptors"
    combination_benefits: "Synergistic effect with valerian well-documented"
    sources:
      - url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC7914492/"

  passionflower:
    species: "Passiflora incarnata"
    active_compounds:
      - "Flavonoids (chrysin, homoorientin, orientin, vitexin, isovitexin)"
      - "Oleamide (CB1 receptor affinity)"
    mechanism_of_action:
      gabaergic:
        - "Inhibits binding to both GABAA and GABAB receptors"
        - "Inhibits GABA uptake into rat cortical synaptosomes"
        - "No effect on GABA release"
        - "Elicits GABA currents in hippocampal neurons in vitro"
        - "Binding to GABA-site of GABAA receptor (flumazenil attenuates effects)"
        - "Bioactivity from synergistic actions: GABA + membrane permeation facilitators + flavonoid modulation"
        - "Positive modulation of GABAA receptors by flavonoids"
      adenosine:
        - "Involvement of adenosine receptors (single studies)"
      cannabinoid:
        - "Oleamide with CB1 receptor affinity suggests cannabimimetic pathways"
      other_neurotransmitters:
        - "Modulates opioidergic and nicotinic cholinergic systems"
        - "Modulates monoaminergic pathways (dopamine, norepinephrine, serotonin)"
        - "Modulates glutamate system"
    sleep_effects:
      slow_wave_sleep: "Facilitates slow-wave sleep (SWS)"
      rem_sleep: "Inhibits REM sleep"
      active_flavonoids: "Chrysin and/or homoorientin, orientin, vitexin, isovitexin shown anxiolytic via GABAergic system"
    clinical_evidence:
      healthy_adults: "Low-dose passionflower tea produced short-term benefits in sleep quality"
    combination_use: "Often combined with valerian for enhanced effect"
    mechanism_studies:
      - title: "Passiflora incarnata extracts elicit GABA currents in hippocampal neurons in vitro"
        pmc_id: "PMC2941540"
        url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC2941540/"
      - title: "A Systematic Review of Neurobiological Mechanisms of Passiflora: Beyond GABA Modulation"
        url: "https://www.mdpi.com/2673-6411/5/3/21"
      - title: "Effect of a medicinal plant (Passiflora incarnata L) on sleep"
        pmc_id: "PMC5699852"
        url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC5699852/"
    sources:
      - url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC7914492/"
      - pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/21089181/"

  ashwagandha:
    species: "Withania somnifera"
    active_compounds:
      sleep_inducing: "Triethylene glycol (TEG)"
      other:
        - "Withanolide A"
        - "Withaferin A"
    mechanism_of_action:
      primary_sleep_mechanism:
        active_component: "Triethylene glycol from water extract (not alcoholic extract with withanolides)"
        effects:
          - "Increases number of NREM episodes"
          - "Decreases duration of wake episodes"
          - "Induces sleep similar to normal physiological sleep"
        dose_response: "Dose-dependent (10-30 mg/mouse commercial TEG)"
      gabaergic:
        - "Interactions with GABAA and GABAC receptors"
      adaptogenic:
        - "Normalizes cortisol levels"
        - "Reduces stress and anxiety indirectly improving sleep"
    extraction_specificity:
      water_extract: "Contains high triethylene glycol, effective for sleep induction"
      alcoholic_extract: "Contains withanolides, ineffective for sleep induction in mice"
    clinical_evidence:
      meta_analysis:
        trials: 5
        participants: 400
        effect_size: "Small but significant effect on overall sleep"
        benefits:
          - "Improved sleep quality"
          - "Improved sleep efficiency"
          - "Increased total sleep time"
          - "Reduced sleep latency"
        effectiveness_pattern: "Benefits more pronounced among people with insomnia"
    research_needs:
      - "TEG primarily used for industrial purpose"
      - "Little known about applicability and toxicity in biological systems"
      - "Further studies needed to confirm safety of TEG"
    mechanism_studies:
      - title: "Triethylene glycol, an active component of Ashwagandha (Withania somnifera) leaves, is responsible for sleep induction"
        pubmed_id: "28207892"
        pmc_id: "PMC5313221"
        journal: "PLOS One"
        year: 2017
        url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC5313221/"
    pubmed_url: "https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0257843"
    sources:
      - url: "https://ods.od.nih.gov/factsheets/Ashwagandha-HealthProfessional/"
      - url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC12511158/"

  lemon_balm:
    species: "Melissa officinalis"
    active_compounds:
      primary: "Rosmarinic acid"
      others:
        - "Oleanolic acid"
        - "Ursolic acid"
    mechanism_of_action:
      gaba_transaminase_inhibition:
        - "Rosmarinic acid inhibits GABA transaminase (GABA-T)"
        - "GABA-T responsible for degradation of GABA"
        - "Inhibition leads to accumulation of GABA in brain"
        - "Oleanolic acid and ursolic acid also inhibit GABA-T"
      direct_receptor_binding:
        - "Rosmarinic acid and other compounds directly bind to GABA receptors (GABAA)"
        - "Enhances inhibitory action of GABAA receptors"
        - "Agonist activity at GABAA receptors similar to benzodiazepines mechanism"
      bioavailability:
        - "Rosmarinic acid crosses blood-brain barrier (essential for psychopharmacological effects)"
        - "Poor bioavailability may explain inconsistent human results"
    clinical_evidence:
      cardiac_surgery_study:
        design: "Double-blinded clinical study"
        population: "Patients after cardiac surgery"
        effect: "Anxiolytic effect, improved sleep quality"
      anxiety_insomnia_study:
        product: "Cyracos®"
        design: "Chronic treatment study"
        condition: "Mild-to-moderate anxiety disorders and insomnia"
        outcomes:
          anxiety_reduction: "18% (p < 0.01)"
          anxiety_symptoms_improvement: "15% (p < 0.01)"
          insomnia_reduction: "42% (p < 0.01)"
        significance: "First demonstration of effectiveness in humans"
      sleep_quality_study:
        participants: 40
        condition: "Mild-to-moderate insomnia"
        dose: "240 mg lemon balm"
        outcomes:
          - "Enhanced sleep quality"
          - "Longer duration of sleep"
          - "Reduced latency to sleep onset"
          - "Fewer night-time wakings"
      phytosome_study:
        design: "Prospective, double-blind, placebo-controlled, cross-over"
        intervention: "Melissa officinalis Phytosome"
        outcomes:
          sws_phase: "Increased by average of 15%"
          rem_phase: "Decreased by 10%"
          sleep_quality_improvement: "87% in treated group vs 30% in placebo"
      combination_study:
        participants: 23
        diagnosis: "Diagnosed insomnia"
        intervention: "1000 mg lemon balm + 400 mg lavender"
        duration: "4 weeks"
