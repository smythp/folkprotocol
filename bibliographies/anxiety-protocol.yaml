      year: 2024
      key_findings:
        evidence_quality: "Encouraging early results"
        limitation: "Not yet studied at same scale as other herbal remedies"
        safety: "Short-term use generally considered safe"
        efficacy: "Can be effective in reducing anxiety symptoms"

  mechanisms:
    - type: "Multiple neurotransmitter systems"
      systems:
        - "GABA modulation"
        - "Noradrenalin (NA)"
        - "Dopamine (DA)"
        - "Serotonin neurotransmission"
    - type: "HPA axis modulation"
