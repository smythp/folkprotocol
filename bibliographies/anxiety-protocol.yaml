---
# Anxiety Protocol Bibliography
# Focus: Comparative effectiveness, traditional formulas, mechanism studies, combination therapies
# Key herbs: Lavender, Passionflower, Kava, Ashwagandha, Chamomile, Valerian, Lemon Balm
# Compiled: 2026-01-15

meta:
  topic: Herbal Treatments for Anxiety
  focus_areas:
    - Systematic reviews and meta-analyses
    - Head-to-head comparisons between herbs
    - Traditional combination formulas (TCM, Ayurveda)
    - Mechanism studies (GABA, serotonin, HPA axis, gut microbiota)
    - Symptom-specific treatments
  compiled_date: 2026-01-15

# LAVENDER (Lavandula angustifolia) / SILEXAN

lavender:
  summary: "Strongest evidence among herbal anxiolytics; Silexan (lavender oil) shows effects comparable to standard anxiolytics with excellent safety profile"

  network_meta_analysis:
    - id: qaseem_2022
      title: "Medicinal herbs for the treatment of anxiety: A systematic review and network meta-analysis"
      pubmed_id: "35378276"
      year: 2022
      trials: 29
      herbs_compared: 12
      design: "Bayesian network meta-analysis"
      key_findings:
        silexan_efficacy: "Mean difference -3.84 (95% CrI: -6.31 to -1.34) on HAMA - STRONGEST effect"
        head_to_head: "No statistical differences between most herbs except Ginkgo vs Kava"
        safety: "All herbs well-tolerated with good safety profiles"
      conclusion: "Silexan displayed most significant anxiolytic effect"

  mechanisms:
    - type: "Serotonergic (5-HT1A receptor)"
      evidence:
        study: "Anxiolytic-like effect of lavender essential oil in mice"
        pubmed_id: "23524167"
        findings:
          - "5-HT1A receptor antagonist WAY100635 blocked anxiolytic effect"
          - "Mediated via serotonergic system, NOT GABAergic"
          - "Binds serotonin transporter (SERT), no affinity for GABAA-benzodiazepine receptor"
    - type: "Multiple neurotransmitter modulation"
      pubmed_id: "PMC5437114"
      mechanisms:
        - "Inhibition of serotonin transporter (SERT)"
        - "NMDA receptor antagonism"
        - "Inhibition of voltage-dependent calcium channels"
        - "Effects on 5-HT1A receptor in temporal gyrus"

  dosing:
    silexan: "80-160 mg daily (standardized lavender oil)"
    aromatherapy: "Essential oil inhalation"
    note: "Silexan is specific preparation studied in clinical trials"

  safety:
    general: "Excellent safety profile"
    adverse_events: "Minimal, generally mild GI symptoms"
    pregnancy: "Insufficient data"

# PASSIONFLOWER (Passiflora incarnata)

passionflower:
  summary: "Strong evidence as anxiolytic; comparable to benzodiazepines in clinical trials; multi-mechanism action beyond GABA"

  systematic_reviews:
    - id: lakhan_2010
      title: "Nutritional and herbal supplements for anxiety and anxiety-related disorders"
      pubmed_id: "20929532"
      year: 2010
      conclusion: "Strong evidence for passionflower extracts as treatment for anxiety symptoms and disorders"

  clinical_trials:
    - id: akhondzadeh_2001
      title: "Passionflower vs oxazepam in GAD (double-blind)"
      participants: 36
      duration: "4 weeks"
      key_findings:
        efficacy: "Equally effective as oxazepam by end of trial"
        onset: "Oxazepam worked faster initially"
        side_effects: "Passionflower showed fewer job-related impairment problems"

  mechanisms:
    - type: "GABAergic modulation"
      pubmed_id: "21089181"
      findings:
        - "Inhibits GABA uptake into rat cortical synaptosomes"
        - "No effect on GABA release or GABA transaminase activity"
        - "Affinity to GABAA and GABAB receptors"
    - type: "Beyond GABA - multiple systems"
      mdpi_study: "A Systematic Review of Neurobiological Mechanisms"
      doi: "10.3390/2673-6411-5-3-21"
      broader_mechanisms:
        - "Multiple neurotransmitter systems"
        - "Neuroprotective effects"
        - "Anti-inflammatory activity"
        - "Antioxidant properties"
        - "HPA axis regulation"

  dosing:
    extract: "Standardized extract comparable to oxazepam dosing"
    traditional: "Tea made from dried herb"
    note: "Less potent than kava and valerian, but nonetheless useful"

  safety:
    general: "Good safety profile"
    comparison: "Safer side effect profile than benzodiazepines"

# KAVA (Piper methysticum)

kava:
  summary: "Well-established anxiolytic; reduces anxiety without sedation; CAUTION: liver toxicity concerns require medical supervision"

  network_meta_analysis:
    - id: qaseem_2022
      pubmed_id: "35378276"
      year: 2022
      key_findings:
        overall_anxiety: "Effective anxiolytic (MD: -2.46, 95% CrI: -4.47 to -0.32)"
        gad_specific: "Possibly ineffective in GAD patients (MD: -0.17, 95% CrI: -2.55 to -1.97)"
        note: "Different efficacy for general anxiety vs specific GAD diagnosis"

  systematic_reviews:
    - id: lakhan_2010
      pubmed_id: "20929532"
      conclusion: "Strong evidence for kava extracts as treatment for anxiety disorders"

  mechanisms:
    - type: "GABAergic modulation"
      actions:
        - "Enhanced ligand binding to GABA type A receptors"
        - "NOT through direct GABA receptor agonism"
    - type: "Ion channel modulation"
      actions:
        - "Blockade of voltage-gated sodium ion channels"
        - "Calcium ion channel blockade (diminishes excitatory neurotransmitter release)"
    - type: "Non-addictive anxiolytic"
      note: "Non-addictive, non-hypnotic anxiolytic via GABA pathway"

  dosing:
    general: "Standardized kava extract"
    note: "Specific dosing varies by preparation; follow medical guidance"

  safety:
    liver_toxicity: "MAJOR CONCERN - hepatotoxicity risk"
    requirement: "Essential to work with healthcare provider"
    monitoring: "Liver function monitoring recommended"
    contraindications: "Pre-existing liver disease, alcohol use"
    quality: "Water-extracted preparations may be safer than alcohol extracts"

# ASHWAGANDHA (Withania somnifera)

ashwagandha:
  summary: "Strong adaptogenic effects; reduces anxiety via HPA axis modulation and cortisol reduction; 23-33% cortisol decrease in clinical trials"

  network_meta_analysis:
    - id: qaseem_2022
      pubmed_id: "35378276"
      key_findings:
        hama_reduction: "Mean difference -4.90 (95% CrI: -9.70 to -0.17) - SIGNIFICANT"
        limitation: "Small sample sizes in trials"
        efficacy: "Demonstrated efficacy despite limited trial sizes"

  clinical_trials:
    - id: lopresti_2019
      title: "Investigation into stress-relieving actions of ashwagandha extract"
      pubmed_id: "31517876"
      year: 2019
      design: "Randomized, double-blind, placebo-controlled"
      dose: "250-500 mg daily"
      duration: "4-13 weeks"
      key_findings:
        cortisol_reduction: "23-33% reduction in cortisol levels"
        morning_cortisol: "Greater reductions vs placebo"
        dhea_s: "Greater reductions vs placebo"
        stress_anxiety: "Significant reduction in stress and anxiety levels"
        sleep: "Reduced sleeplessness and fatigue"
        hama_scores: "Statistically significant reduction"

    - id: chandrasekhar_2012
      title: "Adaptogenic and anxiolytic effects in healthy adults"
      pubmed_id: "PMC6979308"
      design: "Double-blind, randomized, placebo-controlled"
      key_findings:
        anxiety_reduction: "Significant reduction on Hamilton Anxiety Rating Scale"
        adaptogenic_effect: "Balancing effect on HPA axis demonstrated"

  mechanisms:
    - type: "HPA axis modulation (PRIMARY)"
      evidence:
        - "Moderates hypothalamus-pituitary-adrenal (HPA) axis"
        - "HPA disturbances associated with anxiety/depression lead to excess cortisol"
        - "Ashwagandha exerts balancing effect, normalizing HPA function"
    - type: "GABAergic enhancement"
      note: "Withanolides enhance GABAergic activity"
    - type: "Neuroendocrine stability"
      mechanisms:
        - "Modulates HPA axis"
        - "Enhances GABAergic activity"
        - "Promotes neuroendocrine stability"
    - type: "Anti-inflammatory and antioxidant"
      note: "Inflammation and oxidative stress increased during high stress periods"

  dosing:
    clinical_dose: "250-500 mg daily (standardized extract)"
    duration: "4-13 weeks studied"
    standardization: "Withanolide content standardized"

  safety:
    general: "Good safety profile in clinical studies"
    adverse_events: "Generally mild and well-tolerated"
    pregnancy: "Insufficient data - avoid"

