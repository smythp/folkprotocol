# MECHANISM STUDIES

mechanisms:

  gaba_system:
    overview: "Major inhibitory neurotransmitter system; key target for anxiolytics"

    herbs_via_gaba:
      passionflower:
        mechanism: "Inhibits GABA uptake; affinity to GABAA and GABAB receptors"
        pubmed_id: "21089181"
        note: "Also acts beyond GABA on multiple systems"

      kava:
        mechanism: "Enhanced ligand binding to GABA-A receptors; voltage-gated sodium channel blockade"
        note: "Non-addictive, non-hypnotic anxiolytic"

      chamomile:
        mechanism: "Flavonoids affect GABA neurotransmission"
        note: "Part of multi-system action"

      valerian:
        mechanism: "Modulates GABA system, promotes relaxation"

  serotonergic_system:
    overview: "5-HT (serotonin) system crucial for mood and anxiety regulation"

    herbs_via_serotonin:
      lavender:
        primary_mechanism: "5-HT1A receptor involvement (PRIMARY)"
        pubmed_id: "23524167"
        evidence:
          - "5-HT1A antagonist blocks anxiolytic effect"
          - "Mediated via serotonergic system, NOT GABAergic"
          - "Binds serotonin transporter (SERT)"
          - "Inhibits SERT"
          - "NMDA receptor antagonism"
          - "Affects 5-HT1A in temporal gyrus"

      chamomile:
        mechanism: "Serotonin synapse modulation; neuroactive ligand-receptor interaction"
        pathways: "cAMP signaling pathway involvement"

      l_lysine:
        mechanism: "5-HT4 receptor antagonist"
        effect: "Lessens stress reaction, lowers cortisol"

  hpa_axis:
    overview: "Hypothalamic-Pituitary-Adrenal axis - central stress response system"
    clinical_relevance: "HPA disturbances in anxiety/depression lead to excess cortisol secretion"

    herbs_via_hpa:
      ashwagandha:
        mechanism: "PRIMARY MECHANISM - HPA axis modulation"
        effect: "Balancing effect on HPA axis"
        cortisol_reduction: "23-33% reduction in clinical trials"
        pubmed_id: "31517876"
        evidence_strength: "STRONG - multiple RCTs"

        additional_mechanisms:
          - "Enhanced GABAergic activity (withanolides)"
          - "Neuroendocrine stability"
          - "Anti-inflammatory effects"
          - "Antioxidant properties"

      passionflower:
        mechanism: "HPA axis regulation (among multiple systems)"
        evidence: "Systematic review of neurobiological mechanisms"

      chamomile:
        mechanism: "Flavonoids modulate HPA axis function"

  gut_brain_axis:
    overview: "Emerging mechanism - herbs influence gut microbiota, affecting anxiety via multiple pathways"

    review_2025:
      title: "Medicinal Plants for Managing Anxiety via Gut Microbiota Modulation"
      wiley_doi: "10.1155/agm3/3675425"
      year: 2025

      key_concepts:
        psychobiotics: "Substances exerting psychological effects mediated by microbiome (probiotics, prebiotics, synbiotics, postbiotics)"

        pathways:
          neural: "Vagus nerve signaling"
          endocrine: "HPA axis regulation"
          immune: "Inflammatory modulation"
          metabolic: "Short-chain fatty acids (SCFAs), neuroactive metabolites"

        scfa_mechanisms:
          - "Cross blood-brain barrier"
          - "Neuroprotection via neuroinflammation regulation"
          - "Enhance barrier integrity"
          - "Inhibit histone deacetylase (HDAC) to dampen inflammation"
          - "Trigger free fatty acid receptors for microglial activation"

    herbs_via_microbiota:
      st_johns_wort:
        effect: "Influences gut microbiota structure and neuroactive metabolite production"
        pathways: "Gut-brain axis, neurochemical pathways, gut barrier integrity, systemic inflammation"

      saffron:
        effect: "Complex interactions within gut-brain axis"

      valerian:
        effect: "Modulates gut microbiota for anxiolytic effects"

      herbal_compounds_general:
        mechanism: "Modulate gut microbiota composition → metabolites improve anxiety behaviors"
        evidence: "Animal models and emerging human studies"

    clinical_evidence:
      meta_analysis_2025:
        finding: "Probiotics, prebiotics, synbiotics significantly alleviate anxiety symptoms in depression patients"
        limitation: "High heterogeneity; more research needed for mechanisms, dosing, long-term safety"

  multi_system_integration:
    note: "Most effective anxiolytic herbs work through MULTIPLE mechanisms simultaneously"

    examples:
      passionflower:
        - "GABAergic"
        - "HPA axis"
        - "Neuroprotective"
        - "Anti-inflammatory"
        - "Antioxidant"

      chamomile:
        - "GABA"
        - "Serotonin"
        - "Noradrenalin"
        - "Dopamine"
        - "HPA axis"

      ashwagandha:
        - "HPA axis (primary)"
        - "GABAergic"
        - "Anti-inflammatory"
        - "Antioxidant"

      lavender:
        - "Serotonergic (primary)"
        - "SERT inhibition"
        - "NMDA antagonism"
        - "Calcium channel inhibition"


# COMPARATIVE EFFECTIVENESS

comparative_effectiveness:

  network_meta_analysis_ranking:
    source: "Qaseem et al. 2022, PMID 35378276"
    design: "Bayesian network meta-analysis, 29 trials, 12 herbs"

    strongest_evidence:
      1:
        herb: "Silexan (Lavender oil)"
        hama_reduction: "-3.84 (95% CrI: -6.31 to -1.34)"
        strength: "STRONGEST EFFECT"
      2:
        herb: "Withania somnifera (Ashwagandha)"
