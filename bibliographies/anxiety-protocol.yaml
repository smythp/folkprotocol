      wiley_doi: "10.1111/jfbc.13547"
      pathways:
        - "Neuroactive ligand-receptor interaction"
        - "Serotonin synapse modulation"
        - "cAMP signaling pathway"

  dosing:
    tea: "Traditional chamomile tea preparation"
    extract: "Standardized extract forms available"
    note: "Dosing varies across studies"

  safety:
    short_term: "Generally safe"
    adverse_events: "Minimal in clinical studies"
    allergies: "Possible allergic reactions in those sensitive to Asteraceae family"

