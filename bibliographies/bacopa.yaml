clinical_summary:
  typical_dosing:
    standardized_extract: 300-450 mg daily
    bacosides_content: 20-50% bacosides
    common_preparations:
    - CDRI 08
    - Bacumen
    - KeenMind
    duration: 12 weeks minimum for cognitive effects
  safety_profile:
    overall: Generally well-tolerated in clinical trials
    common_adverse_effects:
    - Gastrointestinal discomfort (mild)
    - Nausea (occasional)
    contraindications:
    - May interact with cholinergic medications
    - Caution with thyroid medications
    special_populations:
      children: Studied in ages 6-14 years for attention/hyperactivity
      elderly: Multiple studies in older adults (>65 years)
      pregnancy: Insufficient safety data
  evidence_strength:
    memory_enhancement: Moderate to strong (multiple RCTs, meta-analyses)
    cognitive_function: Moderate (consistent improvements in several domains)
    anxiety_reduction: Preliminary (some positive findings)
    adhd_symptoms: Mixed results (some positive, requires more research)
    neuroprotection: Promising preclinical data, limited human evidence
  bioavailability_notes:
  - Low oral bioavailability is a known limitation
  - Various formulation strategies under investigation
  - Fat-soluble compounds may benefit from administration with meals
