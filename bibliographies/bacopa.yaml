traditional_use_notes:
- Used in Ayurvedic medicine for centuries as a memory enhancer and cognitive tonic
- Traditional indications include improving intellect, consciousness, mental acuity, and longevity
- Historically used for anxiety, epilepsy, and as a general tonic
regulatory_notes:
- No WHO monograph identified in PubMed search (may require direct WHO database access)
- Not listed in Commission E monographs (German regulatory system)
- Listed in Indian Pharmacopoeia
- Considered dietary supplement in US (not FDA-approved drug)
standardization_notes:
- CDRI 08 is a commonly studied standardized extract
- Typical standardization to bacosides (20-50%)
- Active compounds include bacoside A and bacoside B
- Quality varies significantly between commercial preparations
