### Licorice (Glycyrrhiza glabra)

- title: "Licorice: From Pseudohyperaldosteronism to Therapeutic Uses"
  year: 2019
  journal: "Experimental and Clinical Endocrinology & Diabetes"
  url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC6657287/"
  key_findings: |
    Glycyrrhiza inhibits 11-beta-hydroxysteroid dehydrogenase (11β-HSD2), enzyme
    responsible for inactivating cortisol by converting it to cortisone, which may
    elevate abnormally low cortisol levels. Slows cortisol breakdown, allowing
    naturally produced cortisol to remain active longer. Licorice-induced effects
    mainly due to glycyrrhetinic acid (GA), which blocks 11HSD2 and directly binds
    mineralocorticoid receptor (MR) as agonist.

- title: "Liquorice (Glycyrrhiza glabra) and the adrenal-kidney-pituitary axis in rats"
  year: 2002
  journal: "Food and Chemical Toxicology"
  url: "https://pubmed.ncbi.nlm.nih.gov/12387318/"
  key_findings: |
    Animal study showed Glycyrrhiza decreased elevated serum cortisol, ACTH, and
    potassium, while increasing renin, aldosterone, and sodium concentrations,
    suggesting direct activity on adrenal-renal-pituitary axis. Glycyrrhizin
    reduced suppressive effect of cortisol on ACTH secretion and adrenal weight.

