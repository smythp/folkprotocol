    Produces antidepressant-like effect in corticosterone-induced depression in
    mice, possibly by rectifying stress-based HPA axis dysfunction and upregulation
    of BDNF/TrkB/CREB signaling pathway.

- title: "The Adaptogens Rhodiola and Schizandra Modify the Response to Immobilization Stress in Rabbits by Suppressing the Increase of Phosphorylated Stress-activated Protein Kinase, Nitric Oxide and Cortisol"
  year: 2011
  journal: "Drug Target Insights"
  url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC3155223/"
