# Herbal Treatments for Stress and Burnout
# Research compiled 2026-01-15

## SYSTEMATIC REVIEWS AND META-ANALYSES

- title: "The effect of adaptogenic plants on stress: A systematic review and meta-analysis"
  year: 2023
  journal: "Journal of Ethnopharmacology"
  url: "https://www.sciencedirect.com/science/article/pii/S1756464623002955"
  key_findings: |
    Systematic review of 25 RCTs on nine adaptogenic herbs (Bacopa monnieri,
    Eleutherococcus senticosus, Eurycoma longifolia, Gynostemma pentaphyllum,
    Lepidium peruvianum, Ocimum sanctum, Panax ginseng, Rhodiola rosea,
    Withania somnifera). Found adaptogens may affect cortisol pathway and
    subjective perception of stress. Ashwagandha significantly decreased serum
    cortisol levels and Perceived Stress Scale scores after 56-60 days treatment.

- title: "Effects of Ashwagandha (Withania Somnifera) on stress and anxiety: A systematic review and meta-analysis"
  year: 2024
  journal: "PubMed"
  url: "https://pubmed.ncbi.nlm.nih.gov/39348746/"
  key_findings: |
    Meta-analysis showed significant effects of Ashwagandha on the Perceived
    Stress Scale. Evaluated effects and safety on psychosomatic functions
    related to stress and anxiety.

- title: "The Effects of Psychobiotics and Adaptogens on the Human Stress and Anxiety Response: A Systematic Review"
  year: 2025
  journal: "Applied Sciences"
  url: "https://www.mdpi.com/2076-3417/15/8/4564"
  key_findings: |
    Assessed effectiveness of psychobiotics and adaptogens in alleviating
    stress- and anxiety-related psychophysiological symptoms. Examined research
    from 2014-2024 across multiple databases.

- title: "The Role of Adaptogenic Herbs in Stress Management and Immune Support"
  year: 2025
  journal: "Revista Brasileira de Farmacognosia"
  url: "https://link.springer.com/article/10.1007/s43450-025-00729-6"
  key_findings: |
    Review of adaptogenic herbs including Withania somnifera (ashwagandha),
    Panax ginseng, Rhodiola rosea, Eleutherococcus senticosus, Schisandra
    chinensis, and Glycyrrhiza glabra (licorice) for stress management and
    immune support.

- title: "Evidence-based efficacy of adaptogens in fatigue, and molecular mechanisms related to their stress-protective activity"
  year: 2009
  journal: "Current Clinical Pharmacology"
  url: "https://pubmed.ncbi.nlm.nih.gov/19500070/"
  key_findings: |
    Strong scientific evidence for Rhodiola rosea SHR-5 extract improving
    attention, cognitive function and mental performance in fatigue and chronic
    fatigue syndrome. Good evidence for Schisandra chinensis and Eleutherococcus
    senticosus increasing endurance and mental performance in patients with mild
    fatigue and weakness.

- title: "The Clinical Efficacy and Safety of Tulsi in Humans: A Systematic Review of the Literature"
  year: 2017
  journal: "Evidence-Based Complementary and Alternative Medicine"
  url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC5376420/"
  key_findings: |
    Review of 24 studies investigating tulsi's therapeutic effects on metabolic
    disorders, cardiovascular disease, immunity, and neurocognition. All studies
    reported favorable clinical outcomes with no significant adverse events.
    Concluded tulsi is effective for lifestyle-related chronic diseases including
    psychological stress.

- title: "Rhodiola rosea for physical and mental fatigue: a systematic review"
  year: 2012
  journal: "BMC Complementary Medicine and Therapies"
  url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC3541197/"
  key_findings: |
    Identified 206 articles, 11 met inclusion criteria. Studies showed herb may
    be helpful for enhancing physical performance and alleviating mental fatigue,
    though methodological flaws limit accurate assessment of efficacy.

- title: "Effects of ginseng on stress-related depression, anxiety, and the hypothalamic–pituitary–adrenal axis"
  year: 2017
  journal: "Journal of Ginseng Research"
  url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC5628357/"
  key_findings: |
    Ginseng regulates the hypothalamic–pituitary–adrenal (HPA) axis and prevents
    various diseases by ameliorating tissue injury. Ginsenoside Rd significantly
    dampened cortisol production triggered by stress hormone stimulation.

- title: "Traditional Chinese Medicine for Chronic Fatigue Syndrome"
  year: 2010
  journal: "Evidence-Based Complementary and Alternative Medicine"
  url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC2816380/"
  key_findings: |
    Modern mechanisms of TCM on CFS mainly focus on adjusting immune dysfunction,
    regulating abnormal activity in the hypothalamic-pituitary-adrenal (HPA) axis,
    and serving as an antioxidant.

- title: "Adaptogens in Long-Lasting Brain Fatigue: An Insight from Systems Biology and Network Pharmacology"
  year: 2025
  journal: "Pharmaceuticals"
  url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC12128733/"
  key_findings: |
    Early and recent studies show adaptogens may improve cognitive functions and
    exhibit antifatigue effects in human subjects under stressful conditions.
    Increase resistance and decrease sensitivity to conditional stressors.

## INDIVIDUAL HERB CLINICAL TRIALS

### Rhodiola rosea

- title: "A randomised, double-blind, placebo-controlled, parallel-group study of the standardised extract shr-5 of the roots of Rhodiola rosea in the treatment of subjects with stress-related fatigue"
  year: 2009
  journal: "Planta Medica"
  url: "https://pubmed.ncbi.nlm.nih.gov/19016404/"
  dose: "576 mg daily"
  duration: "4 weeks"
  key_findings: |
    Phase III RCT with 60 individuals. Found significant effects on Pines'
    burnout scale and attention indices. Anti-fatigue effect increases mental
    performance, particularly ability to concentrate, and decreases cortisol
    response to awakening stress in burnout patients.

- title: "The Effectiveness of Rhodiola rosea L. Preparations in Alleviating Various Aspects of Life-Stress Symptoms and Stress-Induced Conditions"
  year: 2022
  journal: "Molecules"
  url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC9228580/"
  key_findings: |
    Non-interventional study in 128 primary care practices in Germany with 330
    patients with burnout symptoms (exhaustion, depression, insomnia, fatigue,
    drop in performance). Reported considerable alleviation of complaints after
    R. rosea administration over 8 weeks.

- title: "Stress management and the role of Rhodiola rosea: a review"
  year: 2018
  journal: "International Journal of Psychiatry in Clinical Practice"
  url: "https://www.tandfonline.com/doi/full/10.1080/13651501.2017.1417442"
  key_findings: |
    Review of more than 70 human clinical trials on Rhodiola rosea. Clear
    evidence demonstrating that Rhodiola rosea can effectively combat physical
    stress-related fatigue, low mood, anxiety, depression and may improve
    physical-mental working capacity. Energizing effect noted.

### Ashwagandha (Withania somnifera)

- title: "Effects of Withania somnifera on Cortisol Levels in Stressed Human Subjects: A Systematic Review"
  year: 2023
  journal: "Journal of Clinical Medicine"
  url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC10745833/"
  key_findings: |
    Ashwagandha shows clinical evidence to directly lower cortisol levels and
    reduce stress. Significantly outperforms Rhodiola for anxiety reduction,
    with multiple clinical trials showing remarkable improvements in anxiety
    scores. Distinctly calming effect felt within days to weeks of consistent use.

- title: "Combatting stress: Efficacy and safety of Rhodiola rosea and Ashwagandha reviewed"
  year: 2024
  journal: "Nutraingredients"
  url: "https://www.nutraingredients.com/Article/2024/02/22/Combatting-stress-Efficacy-and-safety-of-Rhodiola-rosea-and-Ashwagandha-reviewed/"
  key_findings: |
    Analyzing existing in vitro, in vivo and clinical trials, overall evidence
    indicates both have effective anti-stress activity with different mechanisms.
    Rhodiola has more of an energising effect while Ashwagandha has sleep-promoting
    effects.

### Holy Basil (Ocimum tenuiflorum/Tulsi)

- title: "A randomized, double-blind, placebo-controlled trial investigating the effects of an Ocimum tenuiflorum (Holy Basil) extract (HolixerTM) on stress, mood, and sleep in adults experiencing stress"
  year: 2022
  journal: "Frontiers in Nutrition"
  url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC9524226/"
  dose: "125 mg twice daily"
  duration: "8 weeks"
  participants: "100 volunteers aged 18-65"
  key_findings: |
    Hair cortisol concentrations were significantly lower in holy basil group,
    suggesting dampened HPA-axis activity long-term. After acute stress test,
    holy basil associated with significantly lower salivary cortisol (p=0.001),
    salivary amylase (p=0.001), systolic (p=0.010) and diastolic (p=0.025) blood
    pressure, and subjective stress ratings (p<0.001). Greater improvements in
    Perceived Stress Scale scores (p=0.003) and Athens Insomnia Scale scores
    (p=0.025). Well tolerated with no significant adverse effects.

