      - Qi, Runzhi
      - Chen, Shuntai
      - Li, Yaoyuan
      - Zheng, Honggang
      - Liu, Rui
      - Guo, Qiujun
      - Zhang, Xing
      - Qin, Yinggang
      - Hua, Baojin
    year: 2021
    journal: Frontiers in Oncology
    pubmed_id: "34422628"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/34422628/"
    study_type: systematic_review_meta_analysis
    key_findings:
      objective_response_rate:
