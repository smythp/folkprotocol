research_gaps:
  - "Oral bioavailability of astragaloside IV extremely low (2.2-7.4%); need for formulation strategies to enhance absorption"
  - "Human pharmacokinetic data limited; one study could not detect astragalosides in human serum"
  - "Long-term safety data (>4 months) lacking"
  - "Mechanism of immunomodulatory effects requires further elucidation"
  - "Optimal dosing for different conditions not well-established"
  - "Interactions with other herbs and conventional medications understudied"
  - "Quality control and standardization methods need harmonization across studies"
  - "Astragalus polysaccharide bioavailability challenges require investigation"
  - "Limited data on pregnancy/lactation safety"
  - "Need for larger, higher-quality RCTs with standardized preparations"
  - "Tissue-specific effects and distribution in humans unclear"

notes:
  - "Radix Astragali (Huangqi) official in Chinese Pharmacopoeia 2020 edition"
  - "No WHO or Commission E monographs exist (herb primarily used in Traditional Chinese Medicine, not European phytotherapy)"
  - "Listed in 204 patented traditional Chinese medicines (~14% of total in Chinese Pharmacopoeia 2015)"
  - "Two species recognized: A. membranaceus and A. membranaceus var. mongholicus"
  - "Primary traditional uses: immune support, qi tonification, cardiovascular support"
  - "Modern evidence strongest for: immunomodulation, adjuvant diabetes treatment, cancer-related fatigue, diabetic nephropathy"
  - "Bioavailability of astragaloside IV remarkably poor despite being considered an active constituent"
  - "Whole extract absorption superior to isolated compounds, suggesting synergistic effects"
  - "Safety profile excellent in animal studies at doses 35-70× human equivalent"
  - "Clinical evidence growing but limited by study quality heterogeneity"
  - "Astragalus polysaccharides show promise in cancer immunotherapy applications"
  - "Root extract form appears safer and more effective than isolated derivative compounds"
