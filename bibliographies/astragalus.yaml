          p_value: "<0.00001"
      urinary_protein_excretion:
        - metric: mean_difference
          result: "-24.76"
          ci_95: "[-27.12, -22.39]"
          p_value: "<0.00001"
          interpretation: "Significant reduction"
      serum_creatinine:
        - metric: mean_difference
          result: "-3.50"
          ci_95: "[-4.91, -2.09]"
          p_value: "<0.00001"
      blood_urea_nitrogen:
        - metric: mean_difference
          result: "-0.35"
          ci_95: "[-0.50, -0.19]"
          p_value: "<0.00001"
      hba1c:
        - metric: mean_difference
