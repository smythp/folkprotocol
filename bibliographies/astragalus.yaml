bioavailability_notes:
  astragaloside_iv:
    - "Oral bioavailability extremely low: 2.2% in rats, 7.4% in dogs"
    - "Very low permeability in Caco-2 cell model (Papp 6.7 × 10⁻⁸ cm/sec)"
    - "Absorption minimal from aqueous solution but significantly increased in whole extract"
    - "Not affected by P-glycoprotein; does not rely on active efflux"
    - "Half-life in rats: 34-131 minutes depending on dose and sex"
    - "Systemic clearance in dogs: ~0.004 l/kg/min (slow hepatic clearance)"
    - "Plasma protein binding: ~83%"
    - "Highest tissue distribution: lung and liver"
    - "Limited brain distribution (does not readily cross blood-brain barrier)"
    - "Only 50% recovered in urine and feces combined"
    - "Human serum levels: one study could not detect astragalosides in human serum"

  astragalus_polysaccharides:
    - "Low bioavailability due to excessive molecular weight, bulky structure, low solubility, and negatively charged characteristics"

safety_summary:
  general_safety: "Astragalus considered generally safe without major adverse effects"
  clinical_trial_safety: "Few human studies reporting no serum enzyme elevations during therapy; no mention of serious adverse events or hepatotoxicity"
  dose_range_safety: "Taking up to 60 grams per day for as long as 4 months appears safe; clinical trials show doses 30 mg to 7.5 g daily for 1-3 months generally safe"

  animal_toxicity_studies:
    cycloastragenol:
      - noael: ">150 mg/kg/day in rats"
      - genotoxicity: "Not mutagenic at ≤5000 μg/plate in bacterial strains"
    radix_astragali_extract:
      - safety_margin: "70× human dose in rats, 35× in dogs with no adverse effects"
      - duration: "3 months continuous administration"
      - findings: "No changes in body weight, organ weights, hematology, or histopathology"
    ht042_mixture:
      - acute_lethal_dose: ">5,000 mg/kg"
      - noael: "4,000 mg/kg/day"
      - findings: "No deaths, no toxicity, minor treatment-related alterations within normal ranges"

  hepatotoxicity: "Not associated with serum enzyme elevations or clinically apparent liver injury; LiverTox database records no significant hepatotoxicity"

  cancer_patient_safety: "Low incidence of hand-foot numbness and weakness; high safety profile in malignant tumor patients receiving astragalus polysaccharides"

  limitations: "Long-term effects not examined; lack of information on adverse effects in combination with other herbs and supplements"

  contraindications:
    - "Use caution in pregnancy and lactation (insufficient safety data)"
    - "Potential autoimmune considerations (due to immunostimulatory effects)"

