---
# Astragalus Bibliography
# Compiled from PubMed clinical studies, systematic reviews, and regulatory monographs
# Focus: dosing, bioavailability, safety, standardized extracts

meta:
  plant_name: Astragalus
  species: Astragalus membranaceus (Fisch.) Bge. and Astragalus membranaceus (Fisch.) Bge. var. mongholicus (Bge.) Hsiao
  common_names:
    - Huangqi
    - Huang Qi
    - Radix Astragali
    - Milk Vetch Root
  family: Fabaceae (Leguminosae)
  compiled_date: 2026-01-15
  last_updated: 2026-01-15
  update_notes: "Enhanced with additional systematic reviews, RCTs, pharmacokinetic data, and safety studies from PubMed search"

regulatory_monographs:
  - id: chinese_pharmacopoeia_2020
    title: "Chinese Pharmacopoeia - Radix Astragali (Huangqi)"
    organization: Chinese Pharmacopoeia Commission
    year: 2020
    type: regulatory_monograph
    location: Beijing, China
    definition: "Dried root of Astragalus membranaceus (Fisch.) Bge. var. mongholicus (Bge.) Hsiao or Astragalus membranaceus (Fisch.) Bge."
    physical_specifications:
      shape: "Cylindrical"
      length: "30-90 cm"
      diameter: "1-3.5 cm"
      surface_color: "Light brownish yellow or light brownish"
      characteristics: "Irregular longitudinal wrinkles or grooves; fracture surface with strong fiber texture showing powdery appearance"
    dosage_recommendations:
      - condition: general_use
        dose: "9-30 g daily"
        administration: "Decoction"
    notes: "AR listed in 204 species of patented traditional Chinese medicines, accounting for approximately 14% of total number of traditional medicines (2015 edition)"
    url: "https://cmjournal.biomedcentral.com/articles/10.1186/s13020-024-00977-z"

  - id: who_monograph_status
    title: "WHO Monograph Status"
    organization: World Health Organization
    type: regulatory_note
    status: "No monograph published as of 2026"
    notes: "Astragalus has not been included in WHO Selected Medicinal Plants monograph series (Volumes 1-4); primarily used in Traditional Chinese Medicine systems rather than European/Western herbal medicine where WHO monographs focused"

  - id: commission_e_status
    title: "Commission E Monograph Status"
    organization: German Commission E
    type: regulatory_note
    status: "No monograph published"
    notes: "Commission E did not evaluate Astragalus membranaceus; primarily assessed herbs used in German phytotherapy; Astragalus is primarily an Asian medicinal plant"

systematic_reviews_meta_analyses:
  - id: zhang_2023_immune
    title: "The Effect of Astragalus on Humoral and Cellular Immune Response: A Systematic Review and Meta-Analysis of Human Studies"
    authors:
      - Zhang, Xueling
      - Qu, Xixi
      - Zou, Yu
    year: 2023
    journal: Complement Med Res
    volume: 30
    issue: 6
    pages: "535-543"
    pubmed_id: "37952511"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/37952511/"
    doi: "10.1159/000534826"
    study_type: systematic_review_meta_analysis
    studies_included: 19
    total_participants: 1094
    key_findings:
      humoral_immunity:
        - metric: proinflammatory_cytokines_reduction
          result: "SMD -2.8765"
          ci_95: "[-3.2385, -2.5145]"
          p_value: "<0.0001"
          markers: "IL-2, IL-4, IL-6, IL-10, TNF-α, IFN-γ"
          interpretation: "Significant reduction in proinflammatory cytokines"
      cellular_immunity:
        - metric: cd3_and_cd4_cd8_ratio_increase
          result: "SMD 2.4629"
          ci_95: "[1.9598, 2.9661]"
          interpretation: "Significantly increased CD3 levels and CD4/CD8 ratio"
      limitations: "Substantial heterogeneity observed among included studies"
      conclusion: "Astragalus demonstrated immunomodulatory effects on both humoral and cellular immune response"

  - id: hong_2024_diabetes
    title: "The Efficacy and Safety of Astragalus as an Adjuvant Treatment for Type 2 Diabetes Mellitus: A Systematic Review and Meta-Analysis"
    authors:
      - Hong, Kin-Fong
      - Liu, Pei-Yu
      - Zhang, Wei
      - Gui, Ding-Kun
      - Xu, You-Hua
    year: 2024
    journal: Journal of Integrative and Complementary Medicine
    pubmed_id: "37433206"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/37433206/"
    study_type: systematic_review_meta_analysis
    studies_included: 20
    total_participants: 953
    key_findings:
      fasting_plasma_glucose:
        - metric: weighted_mean_difference
          result: "-0.67 mmol/L"
          ci_95: "[-1.13, -0.20]"
          p_value: 0.005
          interpretation: "Significant reduction"
      postprandial_glucose_2h:
        - metric: weighted_mean_difference
          result: "-0.67 mmol/L"
          ci_95: "[-1.13, -0.20]"
          p_value: 0.005
          interpretation: "Significant reduction"
      hba1c:
        - metric: weighted_mean_difference
          result: "-0.93%"
          ci_95: "[-1.22, -0.64]"
          p_value: "<0.001"
          interpretation: "Significant reduction"
      insulin_sensitivity_index:
        - metric: weighted_mean_difference
          result: "+0.42"
          ci_95: "[0.13, 0.72]"
          p_value: 0.004
          interpretation: "Significant improvement"
      overall_effectiveness:
        - metric: risk_ratio
          result: "1.33"
          ci_95: "[1.26, 1.40]"
          p_value: "<0.001"
          interpretation: "Treatment group superior to control"
      conclusion: "Astragalus may benefit T2DM patients as adjuvant treatment; certainty of evidence fell short of optimal performance"

  - id: sheng_2025_cancer_fatigue
    title: "Efficacy of Astragalus Membranaceus (Huang Qi) for Cancer-Related Fatigue: A Systematic Review and Meta-Analysis of Randomized Controlled Studies"
    authors:
      - Sheng, Xia
      - Yang, Liu
      - Huang, Bichun
      - Lin, Guijiao
      - Wang, Yajiao
      - Wu, Xinlei
      - Lin, RuJia
    year: 2025
    journal: Integrative Cancer Therapy
    pubmed_id: "40302232"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/40302232/"
    study_type: systematic_review_meta_analysis
    trials_included: 8
    key_findings:
      cancer_related_fatigue_reduction:
        - metric: standardized_mean_difference
          result: "-1.63"
          ci_95: "[-1.90, -1.36]"
          p_value: "<0.00001"
          interpretation: "Significant reduction in fatigue"
      fatigue_efficacy_rate:
        - metric: risk_ratio
          result: "1.55"
          ci_95: "[1.19, 2.02]"
          p_value: 0.001
      quality_of_life_improvement:
        - metric: standardized_mean_difference
          result: "0.86"
          ci_95: "[0.17, 1.55]"
          p_value: 0.01
      quality_of_life_efficacy_rate:
        - metric: risk_ratio
          result: "1.57"
          ci_95: "[1.10, 2.23]"
          p_value: 0.01
      limitations: "Insufficient evidence due to small sample sizes, low study quality, and inconsistent cancer types"
      conclusion: "Results supportive but insufficient to strongly recommend clinical use at this time"

  - id: lin_2024_diabetic_nephropathy
