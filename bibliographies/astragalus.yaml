    intervention: "Astragalus (huang qi) alone or as extract vs placebo/no treatment/conventional therapy"
    key_findings:
      creatinine_clearance:
        - metric: increase
          result: "5.75 mL/min"
          studies: 4
      serum_creatinine:
        - metric: decrease
          result: "21.39 µmol/L"
          studies: 13
      proteinuria_24h:
        - metric: reduction
          result: "0.53 g/24h"
          studies: 10
          interpretation: "Significant decrease"
      hemoglobin:
        - metric: increase
          result: "9.51 g/L"
      serum_albumin:
        - metric: increase
          result: "3.55 g/L"
          studies: 9
      systolic_blood_pressure:
        - metric: decrease
          result: "16.65 mm Hg"
      diastolic_blood_pressure:
        - metric: decrease
          result: "6.02 mm Hg"
