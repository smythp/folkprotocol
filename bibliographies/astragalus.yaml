    authors:
      - Latour, Ewa
      - Arlet, Jaroslaw
      - Latour, Emilia E
      - Juszkiewicz, Artur
      - Łuczkowska, Karolina
      - Marcinkiewicz, Anita
      - Basta, Piotr
      - Trzeciak, Jerzy
      - Machaliński, Bogusław
      - Skarpańska-Stejnborn, Anna
    year: 2021
    journal: Journal of the International Society of Sports Nutrition
    pubmed_id: "34271953"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/34271953/"
    study_type: randomized_controlled_trial
    design: double_blind_placebo_controlled
    sample_size: 18
    intervention_group: 10
    placebo_group: 8
    population: "Polish rowing team members"
    intervention:
      type: "Standardized Astragalus Membranaceus Root (AMR)"
      dose: "500 mg daily"
      standardization: "0.5% 3-hydroxy 7-methoxy isoflavonoids"
      duration: "6 weeks intensive training camp"
    key_findings:
      il2_post_exertion_decrease:
        - metric: effect_size
          result: "d = 1.22"
          p_value: 0.02
          interpretation: "Significant difference"
      il2_il10_ratio_after_recovery:
        - metric: effect_size
          result: "d = 1.61"
          p_value: "<0.01"
      treg_tγδ_ratio:
        - metric: effect_size
          result: "d = 0.86"
          p_value: 0.09
          interpretation: "Approached significance"
      immune_stabilization: "AMR maintained natural killer cell and regulatory T cell baseline levels while placebo group experienced decline"
      conclusion: "AMR stabilizes immune system in athletes by restoring immunological balance towards Th1 response during restitution after strenuous exercise"

  - id: li_2018_diastolic_dysfunction
    title: "Astragalus Membranaceus Improving Asymptomatic Left Ventricular Diastolic Dysfunction in Postmenopausal Hypertensive Women with Metabolic Syndrome: A Prospective, Open-Labeled, Randomized Controlled Trial"
