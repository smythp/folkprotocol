description: Research bibliography on herbal treatments for blood sugar management and diabetes, including systematic reviews, comparative trials, traditional formulas, and mechanistic studies

# SYSTEMATIC REVIEWS & META-ANALYSES

systematic_reviews:

  - title: "The efficacy and safety of herbal medicines for glycaemic control and insulin resistance in individuals with type 2 diabetes: an umbrella review"
    year: 2025
    type: umbrella_review
    pubmed: "41029669"
    key_findings: "Ginger, turmeric, and Jinlida granules significantly decreased HbA1c compared to placebo with moderate to high certainty evidence. Eight meta-analyses and two systematic reviews were included."
    herbs_studied: [ginger, turmeric, jinlida]

  - title: "Comparative effectiveness of six herbs in the management of glycemic status of type 2 diabetes mellitus patients: A systematic review and network meta-analysis of randomized controlled trials"
    year: 2023
    type: network_meta_analysis
    pubmed: "37451111"
    sciencedirect: "S1871402123001224"
    participants: 3130
    trials: 44
    key_findings: "Apple cider vinegar, cinnamon, curcumin, and fenugreek significantly reduced fasting blood glucose compared with placebo. Only ACV and fenugreek seeds were found significantly effective in reducing HbA1C."
    herbs_compared: [apple_cider_vinegar, cinnamon, curcumin, fenugreek, ginger, turmeric]

  - title: "Evidence of traditional Chinese medicine for treating type 2 diabetes mellitus: from molecular mechanisms to clinical efficacy"
    year: 2024
    month: July
    type: systematic_review
    papers_reviewed: 108
    key_findings: "TCMs demonstrate clinical efficacy comparable to existing Western medications in managing hypoglycemia but also offer fewer adverse effects and a multitarget therapeutic approach."
    source: "https://www.tandfonline.com/doi/full/10.1080/13880209.2024.2374794"

  - title: "Efficacy and safety of Qingre Lishi decoction for type 2 diabetes"
    year: 2025
    month: January
    type: meta_analysis
    trials: 18
    formula: qingre_lishi_decoction
    key_findings: "QRLSD reduced the levels of fasting blood glucose, 2-hour postprandial blood glucose, and glycated hemoglobin."
    source: "https://www.frontiersin.org/journals/endocrinology/articles/10.3389/fendo.2025.1604633/pdf"

  - title: "The Effect of Fenugreek in Type 2 Diabetes and Prediabetes: A Systematic Review and Meta-Analysis of Randomized Controlled Trials"
    year: 2024
    type: meta_analysis
    herb: fenugreek
    key_findings: "Fenugreek supplementation significantly decreased fasting plasma glucose by 20.32 mg/dl and reduced HbA1c levels by 0.54% compared to placebo."
    source: "https://www.mdpi.com/1422-0067/24/18/13999"

  - title: "Therapeutic effect of fenugreek supplementation on type 2 diabetes mellitus: A systematic review and meta-analysis of clinical trials"
    year: 2024
    type: meta_analysis
    herb: fenugreek
    sciencedirect: "S2405844024126801"
    key_findings: "Significant reductions in fasting blood glucose and HbA1c levels with fenugreek supplementation in type 2 diabetes patients."

  - title: "Curcumin Attenuates Hyperglycemia and Inflammation in Type 2 Diabetes Mellitus: Quantitative Analysis of Randomized Controlled Trial"
    year: 2024
    type: meta_analysis
    herb: curcumin
    trials: 18
    participants: 1382
    pubmed: "39683570"
    key_findings: "Curcumin supplementation led to a significant decrease in fasting blood glucose (mean difference = −11.48 mg/dL) and glycated hemoglobin (mean difference = −0.54%)."
    source: "https://www.mdpi.com/2072-6643/16/23/4177"

  - title: "Antidiabetic and Metabolic Effects of Turmeric (Curcuma Longa) in Patients with Type 2 Diabetes Mellitus or Hyperglycemia - A Systematic Meta-Review and Meta-Analysis"
    year: 2025
    type: meta_review
    herb: turmeric
    trials: 63
    participants: 3706
    pubmed: "41319069"
    key_findings: "Curcumin significantly reduced fasting blood glucose (mean difference = -6.30 mg/dL), HbA1c (mean difference = -0.31%), LDL cholesterol, and triglycerides while increasing HDL cholesterol."

  - title: "Effects of curcumin/turmeric supplementation on glycemic indices in adults: A grade-assessed systematic review and dose–response meta-analysis of randomized controlled trials"
    year: 2023
    type: dose_response_meta_analysis
    herb: curcumin
    pubmed: "37748368"
    key_findings: "Turmeric/curcumin supplementation significantly improves fasting blood sugar (reduction of 4.60 mg/dl), fasting insulin levels, hemoglobin A1c (HbA1c) (reduction of 0.32%), and HOMA-IR (reduction of 0.33)."

  - title: "The Effect of Ginseng (The Genus Panax) on Glycemic Control: A Systematic Review and Meta-Analysis of Randomized Controlled Clinical Trials"
    type: meta_analysis
    herb: ginseng
    key_findings: "Ginseng significantly reduced fasting blood glucose compared to control, though there was no significant effect on fasting plasma insulin, glycated hemoglobin, or HOMA-IR."
    source: "https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0107391"

  - title: "The effects of alpha-lipoic acid supplementation on glucose control and lipid profiles among patients with metabolic diseases: A systematic review and meta-analysis of randomized controlled trials"
    type: meta_analysis
    supplement: alpha_lipoic_acid
    pubmed: "29990473"
    key_findings: "ALA supplementation significantly decreased fasting glucose levels in patients with metabolic diseases."

  - title: "The effects of silymarin on type 2 diabetes mellitus: A systematic review and meta-analysis"
    type: meta_analysis
    herb: milk_thistle
    key_findings: "Silymarin supplementation can decrease fasting blood sugar, hemoglobin A1C, and LDL cholesterol."
    source: "https://www.sciencedirect.com/science/article/abs/pii/S2451847621000518"

  - title: "Effectiveness of polyherbal formulations for the treatment of type 2 Diabetes mellitus - A systematic review and meta-analysis"
    type: meta_analysis
    focus: polyherbal_formulations
    pmc: "PMC8039362"
    key_findings: "Polyherbal formulations have a blood sugar lowering effect in type 2 Diabetes mellitus patients, though efficacy remains to be validated due to the lack of good quality randomized trials."

# HEAD-TO-HEAD & COMPARATIVE TRIALS

comparative_trials:

  - title: "The efficacy and safety of berberine in combination with cinnamon supplementation in patients with type 2 diabetes: a randomized clinical trial"
    year: 2025
    type: rct_combination
    pubmed: "39998703"
    duration: 12_weeks
    intervention: "1200 mg berberine + 600 mg cinnamon daily (divided dose)"
    key_findings: "Fasting blood sugar (P = 0.031) and hemoglobin A1C (HbA1c) (P = 0.013) were significantly lower in participants taking berberine plus cinnamon than those taking placebo. Significant difference in LDL-C (P = 0.039)."
    herbs_compared: [berberine, cinnamon]
    combination_effect: synergistic
    source: "https://link.springer.com/article/10.1007/s00394-025-03618-9"

  - title: "Efficacy of Berberine in Patients with Type 2 Diabetes"
    year: 2008
    type: rct
    pubmed: "18442638"
    herb: berberine
    key_findings: "Compared to control groups, berberine was associated with a significant reduction in fasting plasma glucose (-14.8 mg/dL), HbA1c (-0.63%), and two-hour post prandial blood glucose (-20.9 mg/dL)."
    pmc: "PMC2410097"

# TRADITIONAL FORMULAS

traditional_formulas:

  - name: "Jinlida Granules"
    tradition: traditional_chinese_medicine
    composition: "17 herbs: ginseng, polygonati, atractylodis lanceae, sophorae flavescentis, ophiopogon japonicus, rehmanniae, polygoni multiflori, dogwood, poria, perrin, coptis chinensis, anemarrhena, epimedium, salvia, puerariae, semen litchi, cortex lycii radicis"
    clinical_trials:
      - title: "Jinlida for Diabetes Prevention in Impaired Glucose Tolerance and Multiple Metabolic Abnormalities: The FOCUS Randomized Clinical Trial"
        year: 2024
        type: multicenter_rct
        centers: 35
        cities: 21
        duration: "2019-06 to 2023-02"
        key_findings: "People taking Jinlida had a 41% lower risk of developing type 2 diabetes compared to those taking placebo. Associated with improved blood glucose levels, lower A1c, better cholesterol levels, and reduced insulin resistance."
        source: "https://jamanetwork.com/journals/jamainternalmedicine/fullarticle/2819475"

      - title: "The Efficacy and Safety of Chinese Herbal Medicine Jinlida as Add-On Medication in Type 2 Diabetes Patients Ineffectively Managed by Metformin Monotherapy"
        type: multicenter_rct
        participants: 186
        duration: 12_weeks
        key_findings: "At week 12, the Jinlida group showed HbA1c reduction of 0.92 ± 1.09% compared to 0.53 ± 0.94% in the placebo group (p < 0.01)."
        pmc: "PMC4476735"

      - title: "Effect of Chinese Herbal Medicine Jinlida Granule in Treatment of Patients with Impaired Glucose Tolerance"
        participants: 65
        duration: 12_weeks
        key_findings: "2-h PG showed statistically significant difference between groups after treatment (F = 14.425, P < 0.001), and HbA1c was very significantly decreased in JLD group (t = 4.107, P < 0.001)."
        pubmed: "27647185"

      - title: "The Effectiveness of Traditional Chinese Medicine Jinlida Granules on Glycemic Variability in Newly Diagnosed Type 2 Diabetes"
        type: double_blind_rct
        duration: 16_weeks
        groups: [control, jinlida, metformin, combination]
        key_findings: "Only the Jinlida group showed decreased glucose standard deviation after intervention (1.57 ± 0.61 vs. 1.96 ± 0.95; P < 0.01). Jinlida granules can improve glycemic control and glycemic variability."
        pmc: "PMC8519714"

