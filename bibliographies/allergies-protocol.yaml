---
# Allergies Protocol Bibliography
# Compiled from systematic reviews, clinical trials, traditional formulas, and mechanism studies
# Focus: comparative effectiveness, combination formulas, symptom-specific treatments

meta:
  protocol_name: Allergies Protocol
  indication: Allergic rhinitis, hay fever, seasonal and perennial allergies
  compiled_date: 2026-01-15
  search_focus:
    - Systematic reviews on herbal treatments for allergies
    - Head-to-head trials comparing herbs
    - Traditional formulas used for allergies
    - Mechanism studies (antihistamine, mast cell stabilization, immune modulation)
    - Comparative effectiveness
    - Combination formulas
    - Symptom-specific treatments (sneezing, congestion, itchy eyes, runny nose)

systematic_reviews_meta_analyses:
  - id: medicinal_plants_allergic_rhinitis_2024
    title: "Medicinal plants for allergic rhinitis: A systematic review and meta-analysis"
    journal: PLOS One
    year: 2024
    pubmed_id: "38613721"
    study_type: systematic_review_meta_analysis
    database_search_period: "Inception to June 2022"
    trials_included: 55
    participants: 5085
    primary_outcomes:
      - "Total nasal symptom score (TNSS)"
      - "Quality of life assessments"
      - "Comparison to antihistamines"
    key_findings:
      overall_evidence: "Very low to low certainty evidence for most single herbs"
      vs_antihistamines: "Moderate-certainty evidence shows no clear differences between single medicinal plants and antihistamines"
      safety: "Well-tolerated up to 8 weeks, common side effects (headache, dizziness, GI) comparable to placebo"
      most_studied:
        - herb: "Butterbur (Petasites hybridus)"
          trials: 6+
          finding: "Similar efficacy to cetirizine"
          safety_note: "Only PA-free (pyrrolizidine alkaloid-free) preparations safe"
        - herb: "Stinging Nettle (Urtica dioica)"
          effectiveness: "58% of patients found it effective, 48% said equal/better than previous medications"
          dose: "600 mg/day"
        - herb: "Spirulina"
          finding: "May be superior to cetirizine in head-to-head trial"
          dose: "2 g daily"
          mechanism: "Reduced IL-4 by 32%"
        - herb: "Quercetin"
          dose: "200 mg daily"
          mechanism: "Mast cell stabilizer similar to cromolyn sodium"
    url: "https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0297839"
    pmc_url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC11008904/"

  - id: phytotherapy_anthroposophic_2024
    title: "Efficacy and Safety of Phytotherapy and Anthroposophic Medicine in the Treatment of Allergic Rhinitis"
    journal: Current Allergy and Asthma Reports
    year: 2024
    pubmed_id: "39084196"
    study_type: systematic_review
    key_findings:
      - "Phytotherapy shows efficacy for allergic rhinitis"
      - "Safety profile favorable"
      - "Quality of evidence varies by herb"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/39084196/"

  - id: tcm_allergic_rhinitis_guidelines_2024
    title: "International evidence-based guidelines on the diagnosis and management of allergic rhinitis using traditional Chinese medicine"
    journal: Allergy
    year: 2024
    pubmed_id: "39370507"
    study_type: clinical_practice_guidelines
    organization: "WHO-affiliated"
    database_search: "351 RCTs with 43,276 participants"
    publication_date: "September 2024"
    key_findings:
      - "Evidence-based support for herbal medicine in allergic rhinitis"
      - "Supports acupuncture and moxibustion"
      - "Largest analysis of TCM for allergies to date"
    url: "https://onlinelibrary.wiley.com/doi/10.1111/all.70057"

  - id: chinese_herbal_medicine_meta_2023
    title: "Chinese Herbal Medicine to Treat Allergic Rhinitis: Evidence From a Meta-Analysis"
    journal: Frontiers in Pharmacology
    year: 2017
    pubmed_id: "29225576"
    study_type: meta_analysis
    key_findings:
      - "TCM formulas show significant improvements in clinical effectiveness"
      - "Superior to antihistamines in some measures"
      - "Combination with conventional treatment beneficial"
    pmc_url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC5705481/"

  - id: complementary_therapies_review_2013
    title: "Complementary Therapies in Allergic Rhinitis"
    journal: Current Allergy and Asthma Reports
    year: 2013
    study_type: comprehensive_review
    key_findings:
      butterbur:
        finding: "Comparable to cetirizine and fexofenadine"
        safety: "Fewer sedating effects"
      perilla:
        finding: "More effective than tranilast (modern anti-allergic drug)"
        mechanism: "Stronger inhibitory efficacy on histamine release than sodium cromoglycate"
      evidence_quality: "Several herbs have RCT evidence supporting use"
    pmc_url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC3845706/"

  - id: herbal_medicines_systematic_2008
    title: "Herbal medicines for treating allergic rhinitis: a systematic review"
    journal: Annals of Allergy, Asthma & Immunology
    year: 2008
    pubmed_id: "18219828"
    study_type: systematic_review
    key_findings:
      - "Butterbur and Biminne (TCM formula) show promise"
      - "Limited but encouraging evidence for several herbs"
      - "Need for larger, higher-quality trials"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/18219828/"

  - id: nigella_sativa_meta_2024
    title: "Herbal Treatment with Nigella sativa in Allergic Rhinitis: A Systematic Review and Meta-analysis"
    journal: Evidence-Based Complementary and Alternative Medicine
    year: 2024
    study_type: systematic_review_meta_analysis
    trials_included: 7
    key_findings:
      effectiveness: "4.24x higher effectiveness vs control"
      nasal_symptoms: "41.5% improvement vs 13.4% placebo"
      ocular_symptoms: "53.1% improvement vs 26.3% placebo"
      comparison: "As effective as mometasone furoate (steroid nasal spray) in animal studies"
    pmc_url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC11449843/"

