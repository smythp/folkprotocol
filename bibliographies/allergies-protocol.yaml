  - id: cure_allergic_rhinitis_syrup
    name: "Cure-allergic-rhinitis Syrup (CS)"
    study_type: randomized_controlled_trial
    participants: 249
    duration: "3 months follow-up"
    key_findings:
      symptom_reduction: "Mean difference 26.13-34.55 vs placebo (P<0.0005)"
      quality_of_life: "Mean difference 12.81-16.76 vs placebo (P<0.001)"
      comparison: "Greater and more sustainable effects than Yu-ping-feng San"
