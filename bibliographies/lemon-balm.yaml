systematic_reviews_meta_analyses:
  - id: ghazizadeh2021
    title: "The effects of lemon balm (Melissa officinalis L.) on depression and anxiety in clinical trials: A systematic review and meta-analysis"
    authors: "Ghazizadeh J, Sadigh-Eteghad S, Marx W, Fakhari A, Hamedeyazdan S, Torbati M, Taheri-Tarighi S, Araj-Khodaei M, Mirghafourvand M"
    year: 2021
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/34449930/"
    study_type: "Systematic review and meta-analysis"
    sample_size: "Multiple clinical trials"
    key_findings:
      - "Anxiety improvement: SMD -0.98 (95% CI: -1.63 to -0.33; p=0.003)"
      - "Depression improvement: SMD -0.47 (95% CI: -0.73 to -0.21; p=0.0005)"
      - "No serious adverse effects reported"
      - "High heterogeneity between studies - interpret with caution"
    notes: "Significant improvements in both anxiety and depression compared to placebo"

  - id: heshmati2020
    title: "Effects of Melissa officinalis (Lemon Balm) on cardio-metabolic outcomes: A systematic review and meta-analysis"
    authors: "Heshmati J, Morvaridzadeh M, Sepidarkish M, Fazelian S, Rahimlou M, Omidi A, Palmowski A, Asadi A, Shidfar F"
    year: 2020
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/32614129/"
    study_type: "Systematic review and meta-analysis of RCTs"
    studies_included: 7
    key_findings:
      - "Total cholesterol reduced: SMD -0.26 (95% CI: -0.52, -0.01; I²=13.7%; k=6)"
      - "Systolic blood pressure reduced: SMD -0.56 (95% CI: -0.85, -0.27; I²=0.0%; k=3)"
      - "No significant effects on: triglycerides, LDL, diastolic BP, CRP, FBS, HbA1c, insulin, or HDL"
      - "No serious adverse events reported"
    limitations: "Low number of included studies and serious risk of bias"

  - id: shahsavari2024
    title: "Effects of Melissa officinalis (lemon balm) consumption on serum lipid profile: a meta-analysis of randomized controlled trials"
    authors: "Shahsavari K, Shams Ardekani MR, Khanavi M, Jamialahmadi T, Iranshahi M, Hasanpour M"
    year: 2024
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/38575930/"
    study_type: "Meta-analysis of RCTs"
    studies_included: 5
    sample_size: 302
    key_findings:
      - "Triglycerides decreased: SMD -0.396 (95% CI: -0.620, -0.173; p=0.001)"
      - "Total cholesterol decreased: SMD -0.416 (95% CI: -0.641, -0.192; p<0.001)"
      - "LDL cholesterol decreased: SMD -0.23 (95% CI: -0.45, -0.008; p<0.05)"
      - "HDL cholesterol: no significant effect, SMD 0.336 (95% CI: -0.091, 0.767; p=0.123)"
    conclusion: "May be administered as safe and beneficial herbal medicine for reducing TC, TG and LDL"

  - id: ulbricht2005
    title: "Lemon balm (Melissa officinalis L.): an evidence-based systematic review by the Natural Standard Research Collaboration"
    authors: "Ulbricht C, Brendler T, Gruenwald J, Kligler B, Keifer D, Abrams TR, Woods J, Boon H, Kirkwood CDF, Hackman DA, Basch E, Lafferty HJ"
    year: 2005
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/16635970/"
    study_type: "Systematic review"
    notes: "Comprehensive evidence-based review by Natural Standard Research Collaboration"

randomized_controlled_trials_cognition:
  - id: akhondzadeh2003
    title: "Melissa officinalis extract in the treatment of patients with mild to moderate Alzheimer's disease: a double blind, randomised, placebo controlled trial"
    authors: "Akhondzadeh S, Noroozian M, Mohammadi M, Ohadinia S, Jamshidi AH, Khani M"
    year: 2003
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/12810768/"
    study_type: "Double-blind, randomized, placebo-controlled trial"
    sample_size: 42
    demographics: "18 women, 24 men, aged 65-80 years"
    intervention:
      dose: "60 drops daily of Melissa officinalis extract (fixed dose)"
      duration: "4 months"
    outcomes:
      - "ADAS-cog score: significantly better cognitive function vs placebo (F=6.93, p=0.01)"
      - "Clinical Dementia Rating (CDR): significantly better (F=16.87, p<0.0001)"
      - "Agitation: more common in placebo group (p=0.03)"
    safety: "No significant differences in side effects between groups except agitation"

  - id: noguchi_shinohara2023
    title: "Effects of Melissa officinalis Extract Containing Rosmarinic Acid on Cognition in Older Adults Without Dementia: A Randomized Controlled Trial"
    authors: "Noguchi-Shinohara M, Hamaguchi T, Sakai K, Komatsu J, Iwasa K, Horimoto K, Nakamura H, Yamada M, Ono K"
    year: 2023
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/36502333/"
    study_type: "Randomized controlled trial"
    sample_size: 323
    diagnosis: "Subjective or mild cognitive impairment"
    intervention:
      dose: "500 mg rosmarinic acid daily"
      duration: "96 weeks treatment + 24 weeks washout"
    outcomes:
      - "Primary outcome: No significant differences in ADAS-cog scores between groups at 96 weeks"
      - "Secondary finding: In hypertension-free participants, CDR scores increased 0.006 in treatment group vs decreased 0.085 in placebo (p=0.036)"
    conclusion: "Potential preventive benefits in hypertension-free subgroup"

  - id: noguchi_shinohara2020
    title: "Safety and efficacy of Melissa officinalis extract containing rosmarinic acid in the prevention of Alzheimer's disease progression"
    authors: "Noguchi-Shinohara M, Ono K, Hamaguchi T, Nagai T, Kobayashi S, Komatsu J, Samuraki-Yokohama M, Iwasa K, Yokoyama K, Nakamura H, Yamada M"
    year: 2020
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/33122694/"
    study_type: "24-week randomized placebo-controlled trial"
    sample_size: 23
    diagnosis: "Mild dementia due to probable Alzheimer's disease"
    intervention:
      dose: "500 mg rosmarinic acid daily"
      duration: "24 weeks"
    outcomes:
      - "No significant differences in cognitive measures"
      - "NPI-Q scores improved by 0.5 points in treatment vs worsened by 0.7 in placebo (p=0.012)"
      - "No significant differences in disease biomarkers"
    safety: "No serious adverse events; safe and well-tolerated"
    conclusion: "May help prevent worsening of AD-related neuropsychiatric symptoms"

  - id: kennedy2003
    title: "Modulation of mood and cognitive performance following acute administration of single doses of Melissa officinalis (Lemon balm) with human CNS nicotinic and muscarinic receptor-binding properties"
    authors: "Kennedy DO, Wake G, Savelev S, Tildesley NTJ, Perry EK, Wesnes KA, Scholey AB"
    year: 2003
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/12888775/"
    study_type: "Randomized, placebo-controlled, double-blind, balanced crossover trial"
    sample_size: 20
    demographics: "Healthy young participants"
    intervention:
      doses: "600 mg, 1000 mg, 1600 mg encapsulated dried leaf, plus placebo"
      duration: "Single doses at 7-day intervals"
      assessment_times: "Predose, 1h, 3h, 6h postdose"
    outcomes:
      - "1600 mg dose: improved memory performance and increased calmness at all postdose times"
      - "Lower doses (600-1000 mg): decrements in speed of timed memory tasks and rapid visual information processing"
    conclusion: "May be valuable adjunct in treatment of Alzheimer's disease"

randomized_controlled_trials_diabetes:
  - id: asadi2019_glycemic
    title: "Efficacy of Melissa officinalis L. (lemon balm) extract on glycemic control and cardiovascular risk factors in individuals with type 2 diabetes: A randomized, double-blind, clinical trial"
    authors: "Asadi A, Shidfar F, Safari M, Hosseini AF, Fallah Huseini H, Heidari I, Rajab A"
    year: 2019
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/30548118/"
    study_type: "Randomized, double-blind, placebo-controlled trial"
    sample_size: 62
    allocation: "31 treatment, 31 placebo"
    intervention:
      dose: "700 mg/day Melissa officinalis capsules (twice daily)"
      duration: "12 weeks"
    outcomes:
      glycemic:
        - "Fasting blood sugar: significant difference (p=0.007)"
        - "HbA1c: significant difference (p=0.002)"
        - "β-cell activity: significant difference (p=0.05)"
        - "HOMA-IR and insulin: no significant changes"
      cardiovascular:
        - "Triglycerides: significant difference (p=0.04)"
        - "HDL-cholesterol: significant improvement (p=0.05 between groups; p=0.009 within treatment)"
        - "Total cholesterol and LDL-cholesterol: no significant changes"
        - "High-sensitivity CRP: significant reduction (p=0.001)"
        - "Systolic blood pressure: significant reduction (p=0.04)"

  - id: asadi2018_apolipoproteins
    title: "Safety and efficacy of Melissa officinalis (lemon balm) on ApoA-I, Apo B, lipid ratio and ICAM-1 in type 2 diabetes patients: A randomized, double-blinded clinical trial"
    authors: "Asadi A, Shidfar F, Safari M, Malek M, Hosseini AF, Rezazadeh S, Rajab A, Shidfar S, Hosseini S"
    year: 2018
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/30219475/"
    study_type: "Randomized, double-blind, placebo-controlled trial"
    sample_size: 70
    demographics: "Type 2 diabetic patients aged 20-65 years"
    intervention:
      dose: "700 mg/day hydroalcoholic extract (twice daily)"
      duration: "12 weeks"
    outcomes:
      - "ApoA-I: significant increase in treatment group (p=0.003); significant reduction in placebo (p=0.001)"
      - "ApoB: no significant differences between groups"
      - "TC/HDL-c and LDL-c/HDL-c ratios: significant improvements (p<0.05)"
      - "TG/HDL-c ratio: significant reduction in treatment group (p=0.05)"
      - "ICAM-1: both groups showed reduction, but no significant differences between groups"
    safety: "No significant differences in liver enzymes (AST, ALT, ALP) between groups"

  - id: nayebi2019
    title: "The effects of a Melissa officinalis L. based product on metabolic parameters in patients with type 2 diabetes mellitus: A randomized double-blinded controlled clinical trial"
    authors: "Nayebi N, Esteghamati A, Meysamie A, Khalili N, Kamalinejad M, Emtiazy M, Hashempur MH"
    year: 2019
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/30681971/"
    study_type: "Randomized, double-blind, placebo-controlled trial"
    sample_size: 37
    completers: 32
    allocation: "16 Melissa officinalis group, 16 placebo"
    intervention:
      product: "Melissa officinalis L. combined with Rosa damascena Mill."
      dose: "Two 500 mg capsules daily"
      duration: "3 months"
    outcomes:
      - "Triglycerides: significant decrease in all patients after 2 months (p=0.02)"
      - "Triglycerides in patients with baseline TG≥200 mg/dl: significant decrease after 3 months (p=0.04)"
      - "Systolic BP (baseline ≥130 mmHg): significant reduction (p=0.02)"
      - "Diastolic BP (baseline ≥85 mmHg): significant reduction (p=0.02)"
      - "Overall metabolic changes: no significant changes compared to control group"

randomized_controlled_trials_anxiety_sleep:
  - id: cases2011
    title: "Pilot trial of Melissa officinalis L. leaf extract in the treatment of volunteers suffering from mild-to-moderate anxiety disorders and sleep disturbances"
    authors: "Cases J, Ibarra A, Feuillère N, Roller M, Sukkar SG"
    year: 2011
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/22207903/"
    study_type: "Pilot trial"
    sample_size: 20
    intervention:
      product: "Cyracos® (standardized M. officinalis extract)"
      dose: "600 mg daily (300 mg twice daily)"
      duration: "15 days"
    outcomes:
      - "Anxiety manifestations reduced by 18% (p<0.01)"
      - "Anxiety-associated symptoms ameliorated by 15% (p<0.01)"
      - "Insomnia lowered by 42% (p<0.01)"
      - "Response rate: 95% of participants"
      - "Complete remission: 70% for anxiety, 85% for insomnia"

  - id: dipierro2024
    title: "Effects of Melissa officinalis Phytosome on Sleep Quality: Results of a Prospective, Double-Blind, Placebo-Controlled, and Cross-Over Study"
    authors: "Di Pierro F, Sisti D, Rocchi M, Belli A, Bertuccioli A, Cazzaniga M, Palazzi CM, Tanda ML, Zerbinati N"
    year: 2024
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/39683592/"
    study_type: "Prospective, double-blind, placebo-controlled, cross-over study"
    intervention:
      product: "Melissa officinalis Phytosome (MOP)"
      duration: "Two-week treatment periods"
    outcomes:
      - "ISI score: 6.8±4.1 in treatment vs 9.7±3.7 in placebo (reduction of 2.9 points, p=0.003)"
      - "SWS phase duration increased by average of 15%"
      - "REM phase decreased by 10%"
      - "Subjective sleep quality improvement: 87% in treatment vs 30% in placebo (p=0.0003)"

  - id: shirazi2021
    title: "The Effectiveness of Melissa Officinalis L. versus Citalopram on Quality of Life of Menopausal Women with Sleep Disorder: A Randomized Double-Blind Clinical Trial"
    authors: "Shirazi M, Jalalian MN, Abed M, Ghaemi M"
    year: 2021
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/33465795/"
    study_type: "Randomized, double-blind clinical trial"
    sample_size: 60
    population: "Postmenopausal women with sleep disturbance"
    intervention:
      groups:
        - "Melissa officinalis: 500 mg daily"
        - "Citalopram: 30 mg daily"
        - "Placebo: daily control"
      duration: "8 weeks"
    outcomes:
      - "Vasomotor domain (MENQOL): 2.2±0.84 (M.off) vs 0.56±0.58 (cit) vs 0.36±0.55 (pla), p<0.001"
      - "Psychomotor-social: 1.02±0.6 vs 0.28±0.2 vs 0.17±0.1, p<0.001"
      - "Physical: 0.76±0.4 vs 0.25±0.1 vs 0.11±0.1, p<0.001"
      - "Sexual: 2.3±1.0 vs 0.35±0.5 vs 0.41±0.5, p<0.001"
    conclusion: "Superior improvements across all quality-of-life domains compared to antidepressant and placebo"

  - id: alijaniha2015
    title: "Heart palpitation relief with Melissa officinalis leaf extract: double blind, randomized, placebo controlled trial of efficacy and safety"
    authors: "Alijaniha F, Naseri M, Afsharypuor S, Fallahi F, Noorbala A, Mosaddegh M, Faghihzadeh S, Sadrai S"
    year: 2015
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/25680840/"
    study_type: "Double-blind, randomized, placebo-controlled trial"
    sample_size: 55
    enrolled: 71
    intervention:
      product: "Lyophilized aqueous extract of M. officinalis leaves"
      dose: "500 mg twice daily"
      duration: "14 days"
    outcomes:
      - "Reduced frequency of palpitation episodes compared to placebo"
      - "Significantly reduced number of anxious patients vs placebo (p=0.004)"
      - "No serious side effects reported"
    conclusion: "Safe herbal drug for treatment of benign palpitations"

  - id: burns2011
    title: "A double-blind placebo-controlled randomized trial of Melissa officinalis oil and donepezil for the treatment of agitation in Alzheimer's disease"
    authors: "Burns A, Perry E, Holmes C, Francis P, Morris J, Howes MJ, Chazot P, Lees G, Ballard C"
    year: 2011
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/21335973/"
    study_type: "Double-blind, randomized, placebo-controlled trial"
    sample_size: 114
    completers: "94 at week 4; 81 at week 12"
    intervention:
      groups:
        - "Placebo medication + active aromatherapy (Melissa oil)"
        - "Active medication (donepezil) + placebo aromatherapy"
        - "Placebo of both"
      duration: "12 weeks (primary assessment at 4 weeks)"
    outcomes:
      - "No significant differences between aromatherapy, donepezil and placebo at week 4 and week 12"
      - "18% improvement in PAS and 37% improvement in NPI over 12 weeks across all groups"
    conclusion: "Substantial placebo effects; no treatment-specific benefits demonstrated"

