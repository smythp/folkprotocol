safety_profile:
  general: "Generally recognized as safe (GRAS status considerations)"
  adverse_events: "Rare; most studies report no serious adverse events"
  common_side_effects:
    - "Occasional headache"
    - "Occasional dizziness"
  hepatotoxicity: "Not linked to serum aminotransferase elevations or clinically apparent liver injury"
  liver_enzymes: "No significant changes in AST, ALT, ALP in clinical trials"
  genotoxicity: "Not genotoxic at concentrations up to 5000 μg/mL"
  noael: "≥3000 mg/kg body weight/day (rat studies)"
  pregnancy_lactation: "Insufficient data; traditional use suggests caution"
  drug_interactions: "Limited data; theoretical interactions with sedatives and thyroid medications"

