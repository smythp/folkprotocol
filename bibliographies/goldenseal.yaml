      url: "https://pubmed.ncbi.nlm.nih.gov/18800897/"
    study_details:
      design: "In vitro immunopharmacology study (mouse macrophages)"
      key_findings:
        unstimulated: "Little to no direct macrophage stimulation from goldenseal or Astragalus extract alone"
        lps_combination: "When combined with LPS stimulation, both extracts dose-dependently reduced TNF-α, IL-6, IL-10, and IL-12 production"
      conclusion: "Traditional therapeutic uses may relate to reduction of pro-inflammatory response during infection rather than direct immune stimulation"

# Antimicrobial Studies (In Vitro — No Human Clinical Trials)
antimicrobial_studies:
  - citation:
      authors: "Cech NB, Junio HA, Ackermann LW, Kavanaugh JS, Horswill AR"
      title: "Quorum quenching and antimicrobial activity of goldenseal (Hydrastis canadensis) against methicillin-resistant Staphylococcus aureus (MRSA)"
      journal: "Planta Medica"
      year: 2012
      volume: "78"
      issue: "14"
      pages: "1556-1561"
      pmid: "22814821"
      doi: "10.1055/s-0032-1315042"
      url: "https://pubmed.ncbi.nlm.nih.gov/22814821/"
    study_details:
      design: "In vitro antimicrobial and quorum sensing study"
      model: "Clinical MRSA isolates (USA300 strains)"
      key_findings:
        leaf_extract_mic: "38 μg/mL (standardized to berberine) vs isolated berberine alone at 150 μg/mL — ~4× more potent"
        mechanism_antimicrobial: "Alkaloids + efflux-pump inhibitory flavonoids (sideroxylin series) synergize"
        mechanism_quorum: "Attenuated AgrCA two-component signaling system in MRSA; reduced virulence factor production"
        leaf_vs_root: "Leaves contain synergistic flavonoids; roots contain berberine; combination may be optimal"
      conclusion: "Goldenseal extract acts through multiple mechanisms against MRSA including direct antimicrobial and anti-virulence activity; clinical trials not yet conducted"

  - citation:
      authors: "Junio HA, Sy-Cordero AA, Ettefagh KA, Burns JT, Micko KT, Graf TN, Richter SJ, Cannon RE, Oberlies NH, Cech NB"
      title: "Synergy-directed fractionation of botanical medicines: a case study with goldenseal (Hydrastis canadensis)"
      journal: "Journal of Natural Products"
      year: 2011
      volume: "74"
      issue: "7"
      pages: "1621-1629"
      pmid: "21661731"
      doi: "10.1021/np200336g"
      url: "https://pubmed.ncbi.nlm.nih.gov/21661731/"
    study_details:
      design: "In vitro synergy-directed fractionation study"
      key_findings:
        synergists_identified: "Sideroxylin, 8-desmethyl-sideroxylin, and 6-desmethyl-sideroxylin (flavonoids)"
        synergy_mechanism: "Flavonoids inhibit NorA multidrug resistance efflux pump in S. aureus"
        flavonoid_activity: "Flavonoids possess no inherent antimicrobial activity against S. aureus — would be missed by traditional bioactivity-directed fractionation"
        distribution: "Synergistic flavonoids concentrate in leaves; berberine concentrates in roots"
