---
herb: Goldenseal
scientific_name: "Hydrastis canadensis L."
family: "Ranunculaceae"
common_names:
  - "Goldenseal"
  - "Yellow root"
  - "Orange root"
  - "Ground raspberry"
  - "Eye root"
  - "Indian dye"
bibliography_type: clinical_and_regulatory
last_updated: 2026-03-06
notes_on_scope: >
  Hydrastis canadensis is a North American woodland perennial with a long history of use by Cherokee and
  other Native American peoples for eye infections, mucosal conditions, skin ailments, and digestive disorders.
  The primary active alkaloids are berberine (2.5–5.8% dry weight), (-)-β-hydrastine (1.5–4.0%), and
  canadine (0.5–1.0%). Berberine is the more studied alkaloid systemically; hydrastine is more specific to
  goldenseal and exhibits poor oral bioavailability. Clinical evidence supporting efficacy for any therapeutic
  indication is absent — no RCTs have tested goldenseal for its folk uses (upper respiratory infections, UTIs,
  digestive disorders). The documented clinical research is dominated by pharmacokinetic drug interaction
  studies, where goldenseal consistently shows significant inhibition of CYP2D6 (~40–50%), CYP3A4/5 (~40–60%),
  and CYP2C9 in humans. A major safety signal is the 2-year NTP bioassay demonstrating hepatocarcinogenicity
  in rats and mice; mechanism involves berberine-mediated topoisomerase II inhibition and DNA damage.
  Berberine displaces bilirubin from albumin — use in pregnancy and neonatal exposure is contraindicated.
  Commission E published a negative (unapproved) monograph (1991); no WHO or EMA monograph exists for
  goldenseal. USP draft standards require ≥2% hydrastine and ≥2.5% berberine; commercial product quality
  is highly variable.

