# Randomized Controlled Trials (Pharmacokinetic / Drug Interaction)
# NOTE: No RCTs testing goldenseal for therapeutic efficacy have been identified. All human RCTs
# involve pharmacokinetic drug interaction endpoints.
clinical_trials:
  - citation:
      authors: "Gurley BJ, Swain A, Hubbard MA, Hartsfield F, Thaden J, Williams DK, Gentry WB, Tong Y"
      title: "Supplementation with goldenseal (Hydrastis canadensis), but not kava kava (Piper methysticum), inhibits human CYP3A activity in vivo"
      journal: "Clinical Pharmacology & Therapeutics"
      year: 2008
      volume: "83"
      issue: "1"
      pages: "61-69"
      pmid: "17495878"
      doi: "10.1038/sj.clpt.6100222"
      url: "https://pubmed.ncbi.nlm.nih.gov/17495878/"
    study_details:
      design: "Randomized controlled trial (crossover)"
      participants: 16  # healthy volunteers
      population: "Healthy adult volunteers"
      intervention: "Goldenseal supplementation 14 days; midazolam as CYP3A probe"
      endpoint: "Midazolam pharmacokinetics before and after supplementation"
      key_findings:
        auc: "Midazolam AUC increased from 107.9 to 175.3 ng·h/mL (62% increase)"
        clearance: "Cl/F/kg decreased from 1.26 to 0.81 L/h/kg"
        half_life: "Extended from 2.01 to 3.15 hours"
        cmax: "Increased from 50.6 to 71.2 ng/mL"
        kava_comparison: "Kava kava had no significant effect on CYP3A activity"
      conclusion: "Significant herb-drug interactions may result from concurrent ingestion of goldenseal and CYP3A substrates"

  - citation:
      authors: "Gurley BJ, Gardner SF, Hubbard MA, Williams DK, Gentry WB, Khan IA, Shah A"
