  - citation:
      authors: "Nguyen JT, Tian DD, Tanna RS, Hadi DL, Bansal S, Calamia JC, Rettie AE, Thummel KE, Levy RH, Tian X, Paine MF"
      title: "Assessing Transporter-Mediated Natural Product-Drug Interactions Via In vitro-In Vivo Extrapolation: Clinical Evaluation With a Probe Cocktail"
      journal: "Clinical Pharmacology & Therapeutics"
      year: 2021
      volume: "109"
      issue: "5"
      pages: "1342-1352"
      pmid: "33174626"
      pmcid: "PMC8058163"
      doi: "10.1002/cpt.2107"
      url: "https://pubmed.ncbi.nlm.nih.gov/33174626/"
    study_details:
      design: "Crossover clinical study with probe cocktail"
      participants: 16  # healthy volunteers
      population: "Healthy adult volunteers"
      intervention: "Goldenseal extract; probe cocktail including midazolam (CYP3A), rosuvastatin (BCRP/OATP1B1/3), furosemide (OAT1/3), metformin (OCT1/2, MATE)"
      funding: "NaPDI Center (NCCIH/NIH)"
      key_findings:
        midazolam_cyp3a: "Geometric mean ratio (GMR) 1.43 (90% CI: 1.35–1.53); 43% increase in midazolam AUC; primarily intestinal CYP3A inhibition (no significant change in t½)"
        rosuvastatin: "No significant effect on rosuvastatin (BCRP/OATP1B1/3 transporters not inhibited)"
        furosemide: "No significant effect (OAT1/3 not inhibited)"
