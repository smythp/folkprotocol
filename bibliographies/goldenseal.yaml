      volume: "43"
      issue: "4"
      pages: "534-552"
      pmid: "25609220"
      doi: "10.1124/dmd.114.059410"
      url: "https://pubmed.ncbi.nlm.nih.gov/25609220/"
    study_details:
      design: "Single-dose pharmacokinetic study (open-label)"
      participants: 11  # healthy subjects
      dose: "2.7 g goldenseal supplement containing 78 mg hydrastine and 132 mg berberine"
      key_findings:
        hydrastine_cmax: "225 ± 100 ng/mL"
        hydrastine_tmax: "1.5 ± 0.3 hours"
        hydrastine_t_half: "4.8 ± 1.4 hours"
        hydrastine_auc: "6.4 ± 4.1 ng·h/mL·kg"
        berberine_cmax: "1.1 ± 1.2 ng/mL (substantially lower — poor oral bioavailability)"
        berberine_tmax: "3.0 ± 3.3 hours"
        berberine_auc: "0.15 ± 0.09 ng·h/mL·kg"
        hydrastine_metabolism: "Rapid and extensive phase I (reduction, demethylation, hydroxylation) and phase II (glucuronidation > sulfation) metabolism"
