        metformin_concern: "Decreased metformin exposure may have unfavorable effects on glucose control in diabetic patients"
      conclusion: "Goldenseal inhibits intestinal CYP3A; in vitro predictions overstated transporter inhibition; highlights need for refined in vitro-in vivo extrapolation models"

  - citation:
      authors: "Nguyen JT, Tian DD, Tanna RS, Arian CM, Calamia JC, Rettie AE, Thummel KE, Paine MF"
      title: "An Integrative Approach to Elucidate Mechanisms Underlying the Pharmacokinetic Goldenseal-Midazolam Interaction: Application of In Vitro Assays and Physiologically Based Pharmacokinetic Models to Understand Clinical Observations"
      journal: "Journal of Pharmacology and Experimental Therapeutics"
      year: 2023
      pmid: "37541764"
      doi: "10.1124/jpet.123.001681"
      url: "https://pubmed.ncbi.nlm.nih.gov/37541764/"
      pmcid: "PMC10658920"
    study_details:
      design: "Integrated in vitro/in vivo/in silico mechanistic study with clinical pharmacokinetic evaluation"
      participants: 16  # chronic arm: 16 healthy adults (8M, 8F); acute arm: 8 participants
      population: "Healthy adults (chronic arm: 16, 8M/8F; acute arm: 8)"
      intervention_chronic: "1 g goldenseal three times daily for 6 days; 2.5 mg oral midazolam as CYP3A probe"
      intervention_acute: "Single 3 g goldenseal dose; 2.5 mg oral midazolam"
      funding: "NaPDI Center (NCCIH/NIH)"
      key_findings:
        chronic_auc_ratio: "Midazolam AUC GMR 1.39 (90% CI: 1.30–1.48) after chronic goldenseal"
        chronic_cmax_ratio: "Midazolam Cmax GMR 1.31 (90% CI: 1.16–1.48)"
        acute_auc_ratio: "Midazolam AUC GMR 1.57 (90% CI: 1.39–1.77) after single acute dose — greater inhibition than chronic"
        acute_cmax_ratio: "Midazolam Cmax GMR 1.40 (90% CI: 1.12–1.74)"
        mechanism: "Time-dependent inhibition of intestinal CYP3A by (−)-β-hydrastine identified as predominant mechanism; PBPK predictions within 1.2-fold of observed values"
        pbpk_performance: "Integrated PBPK model successfully predicted clinical interaction magnitude for both chronic and acute exposures"
