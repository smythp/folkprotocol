# Pharmacokinetics and Bioavailability
pharmacokinetics:
  - citation:
      authors: "Gupta PK, Barone G, Gurley BJ, Fifer EK, Hendrickson HP"
      title: "Hydrastine pharmacokinetics and metabolism after a single oral dose of goldenseal (Hydrastis canadensis) to humans"
      journal: "Drug Metabolism and Disposition"
