    study_details:
      study_type: "Critical narrative review"
      scope: "Efficacy, pharmacology, toxicology of goldenseal and alkaloid constituents"
      key_findings:
        efficacy_conclusion: "No rigorous clinical studies have been done on goldenseal for health conditions in humans; large randomized double-blind trials needed"
        documented_activities: "Antimicrobial, anti-inflammatory, hypolipidemic, hypoglycemic, antioxidant, neuroprotective, cardioprotective, GI-protective (preclinical only)"
        safety_signals: "Possible neurotoxic, hepatotoxic, and phototoxic activity from goldenseal extract and its alkaloids; significant CYP450 interactions"
