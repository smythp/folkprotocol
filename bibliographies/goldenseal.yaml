        cyp1a2: "No significant inhibition"
        cyp2e1: "No significant inhibition"
        highest_risk_herb: "Goldenseal posed greatest interaction risk among the four herbs tested"
        kava: "Kava caused ~40% CYP2E1 reduction only"
        black_cohosh: "~7% CYP2D6 inhibition (statistically significant, clinically weak)"
        valerian: "No significant CYP effects"
      conclusion: "Goldenseal clinically significantly inhibits CYP2D6 and CYP3A4/5; significant herb-drug interaction potential"

  - citation:
      authors: "Gurley BJ, Swain A, Hubbard MA, Williams DK, Breen P, Yates CR, Stuart LB, Hubbard MA, Tong Y, Cheboyina S"
