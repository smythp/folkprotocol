compiler_notes: "Comprehensive bibliography of American ginseng (Panax quinquefolius) clinical studies focusing on RCTs, systematic reviews, standardized preparations, dosing studies, bioavailability, and safety profiles. Emphasis on quantitative findings with specific numbers from high-quality trials. Includes traditional use history, official monographs (AHP, Chinese Pharmacopoeia, WHO), analytical methods, and product standardization information. Notable findings: excellent safety profile, well-established efficacy for cancer-related fatigue (2000mg daily), glycemic control in diabetes (3g daily, 40min pre-meal), cognitive enhancement (100-400mg), and respiratory infection prevention in elderly (400-800mg daily). Key limitation: low bioavailability of parent ginsenosides (<5%) suggests importance of formulation quality."
