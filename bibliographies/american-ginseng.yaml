# Traditional Use

traditional_use:
  chinese_medicine:
    category: "Tonic herbs for Qi Deficiency - nourishing yin"
    properties: "Cooling and moistening (differs from Asian ginseng's warming properties)"
    traditional_name: "Xi Yang Shen (西洋参)"
    added_to_materia_medica: "Following commercial trade beginning in 1718 CE"
    indications:
      - "Excess heat or dryness in body"
      - "Chronic dry cough"
      - "Effects of chemotherapy and radiation in cancer remission patients"
    trade_history: "Commercial wild collection by Indigenous Peoples for export to China began 1718 CE in Montreal; firmly became part of Chinese Materia Medica over 300 years"

# Dosing Guidelines Summary

dosing_summary:
  cancer_related_fatigue:
    dose: "2000 mg daily"
    duration: "8 weeks minimum"
    evidence: "Phase III RCT with 364 participants"

  type_2_diabetes_glycemic_control:
    dose: "1 gram per meal (3 grams daily)"
    timing: "40 minutes before meals for optimal postprandial glycemic effect"
    duration: "8-12 weeks"
    evidence: "Multiple RCTs demonstrating HbA1c reduction and cardiovascular benefits"

  cognitive_function:
    dose: "100-400 mg acute dose"
    standardization: "10.65% ginsenosides (Cereboost™)"
    evidence: "RCT with 32 participants showing working memory improvement"

  respiratory_infection_prevention:
    dose: "400-800 mg daily"
    duration: "6 months (through cold/flu season)"
    population: "Community-dwelling adults ≥65 years"
    evidence: "Multicenter RCT with 783 participants"

  general_range:
    typical_clinical_doses: "400-3000 mg daily"
    most_common: "1000-2000 mg daily in divided doses"

# Safety Profile Summary

safety_summary:
  overall: "Very safe profile with mild and temporary adverse events; no serious or severe adverse events in clinical trials"

  common_adverse_events:
    - "Hot flushes"
    - "Insomnia"
    - "Dyspepsia"
    - "Stomach heaviness (rare)"
    - "Nausea"

  hepatic_safety:
    finding: "No significant changes in AST or ALT in 12-week trial with diabetic patients"
    conclusion: "Safe for hepatic function"

  renal_safety:
    finding: "No changes in serum urates or creatinine"
    conclusion: "Safe for renal function"

  haemostatic_safety:
    finding: "No changes in prothrombin time or INR"
    conclusion: "Safe for patients on anticoagulation (though monitoring advised)"

  cardiovascular_safety:
    finding: "Neutral or beneficial effects on blood pressure; reduces arterial stiffness in diabetic hypertensive patients"
    conclusion: "Should not be discouraged for concern of increased blood pressure"

  hypoglycemia_risk:
    finding: "Reduces postprandial and fasting blood glucose"
    precaution: "Monitor blood glucose in diabetic patients; may require adjustment of diabetes medications"

  drug_interactions:
    indinavir: "No significant interaction; may counteract metabolic side effects"
    warfarin: "Theoretical interaction - monitor INR"
    antidiabetic_medications: "May enhance hypoglycemic effects - monitor closely"

  contraindications:
    - "Pregnancy (lack of safety data)"
    - "Lactation (lack of safety data)"

  clinical_trial_tolerability:
    dropout_rate: "Very low - adverse events rarely caused discontinuation"
    severity: "Mild and generally infrequent"

# Key Active Compounds

active_constituents:
  ginsenosides:
    primary_markers:
      - name: "Ginsenoside Re"
        note: "One of two main saponins in American ginseng; higher in P. quinquefolius than P. ginseng"
      - name: "Ginsenoside Rb1"
        note: "One of two main saponins in American ginseng"
