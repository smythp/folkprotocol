---
herb: Panax quinquefolius
common_names:
  - American ginseng
  - Xi Yang Shen
  - North American ginseng
  - Wisconsin ginseng

# Systematic Reviews and Meta-Analyses

systematic_reviews:
  - title: "Effects of Ginseng on Cognitive Function: A Systematic Review and Meta-Analysis"
    authors:
      - Zeng M
      - Zhang K
      - Yang J
      - Zhang Y
      - You P
      - Yan L
      - Weng Y
    year: 2024
    journal: "Phytotherapy Research"
    volume: 38
    issue: 12
    pages: "6023-6034"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/39474788/"
    doi: "10.1002/ptr.8359"
    study_type: "Systematic review and meta-analysis"
    studies_included: 15
    breakdown: "15 randomized controlled trials"
    sample_size: 671
    key_findings:
      - "Significant effect on memory improvement: SMD = 0.19 (95%CI: 0.02-0.36, p < 0.05)"
      - "High-dose preparations showed stronger effects: SMD = 0.33 (95%CI: 0.04-0.61)"
      - "No positive effects on overall cognition, attention, or executive function"
      - "Lower doses (100-400 mg) enhanced attentional and working memory performance in healthy adults"
    notes: "Meta-analysis included both Panax ginseng and Panax quinquefolius studies"

  - title: "Safety Analysis of Panax Ginseng in Randomized Clinical Trials: A Systematic Review"
    authors:
      - Kim YS
      - Woo JY
      - Han CK
      - Chang IM
    year: 2015
    journal: "Medicines (Basel)"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/28930204/"
    study_type: "Systematic review of safety in RCTs"
    trials_reviewed: 44
    time_period: "2005-2014"
    key_findings:
      - "5 studies reported no adverse events; 16 documented adverse events; 23 did not mention adverse events"
      - "Main adverse events: hot flushes, insomnia, dyspepsia"
      - "No significant difference in frequency and symptoms between ginseng and placebo groups"
      - "Symptoms were mild and temporary with no serious or severe adverse events"
      - "One case of hypoglycemia; two instances of vaginal bleeding reported"
      - "Panax ginseng showed a very safe profile across reviewed trials"
    notes: "Primarily focused on Panax ginseng but relevant to ginseng safety profile generally"

  - title: "Ginseng supplementation and vascular function: a systematic review and meta-analysis of clinical trials"
    authors: (Not fully extracted)
    year: 2025
    journal: "BMC Complementary Medicine and Therapies"
    pubmed_url: "https://link.springer.com/article/10.1186/s12906-025-04936-5"
    study_type: "Systematic review and meta-analysis"
    key_findings:
      - "Pooled analysis showed significant increase in FMD (flow-mediated dilation) level"
      - "Significant increase in endothelium-derived nitric oxide levels"
      - "Ginseng appears to have neutral vascular effects overall"
    notes: "Searched databases through February 2025"

  - title: "The effect of ginseng (genus Panax) on blood pressure: a systematic review and meta-analysis of randomized controlled clinical trials"
    authors: (Not fully extracted)
    year: 2016
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/27074879/"
    study_type: "Systematic review and meta-analysis"
    key_findings:
      - "No significant effect on systolic blood pressure (SBP), diastolic blood pressure (DBP) and mean arterial pressure (MAP)"
      - "Stratified analysis favoured systolic BP improvement in diabetes, metabolic syndrome and obesity"
      - "Ginseng should not be discouraged for concern of increased blood pressure"
    notes: "Covered both Panax ginseng and Panax quinquefolius"

# Randomized Controlled Trials - Cancer-Related Fatigue

rcts_cancer_fatigue:
  - title: "Wisconsin Ginseng (Panax quinquefolius) to improve cancer-related fatigue: a randomized, double-blind trial, N07C2"
    authors:
      - Barton DL
      - Liu H
      - Dakhil SR
      - Linquist B
      - Sloan JA
      - Nichols CR
      - McGinn TW
      - Stella PJ
      - Seeger GR
      - Sood A
      - Loprinzi CL
    year: 2013
    journal: "Journal of the National Cancer Institute"
    volume: 105
    issue: 16
    pages: "1230-8"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/23853057/"
    study_design: "Phase III randomized, double-blind, multicenter clinical trial"
    sample_size: 364
    institutions: 40
    dosage: "2000 mg daily"
    duration: "8 weeks"
    key_findings:
      - "At 4 weeks: ginseng group 14.4-point improvement vs 8.2 points placebo (p=0.07, not significant)"
      - "At 8 weeks: ginseng group 20-point improvement (SD=27) vs 10.3 (SD=26.1) placebo (p=0.003, statistically significant)"
      - "Greater benefit in patients receiving active cancer treatment vs those who had completed treatment"
      - "No statistically significant toxicity differences between groups"
    notes: "Largest RCT of American ginseng for cancer-related fatigue"

  - title: "Pilot study of Panax quinquefolius (American ginseng) to improve cancer-related fatigue: a randomized, double-blind, dose-finding evaluation: NCCTG trial N03CA"
    authors:
      - Barton DL
      - Soori GS
      - Bauer BA
      - Sloan JA
      - Johnson PA
      - Figueras C
      - Duane S
      - Mattar B
      - Liu H
      - Atherton PJ
      - Christensen B
      - Loprinzi CL
    year: 2010
    journal: "Supportive Care in Cancer"
    volume: 18
    issue: 2
    pages: "179-87"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/19415341/"
    study_design: "Phase III pilot study, randomized, double-blind, dose-finding"
    sample_size: 290
    treatment_groups:
      - "Placebo"
      - "750 mg/day"
      - "1,000 mg/day"
      - "2,000 mg/day"
    dosing_frequency: "Twice daily"
    duration: "8 weeks"
    key_findings:
      - "Activity interference scores: placebo/750-mg group 460-467 vs 480-551 for 1,000-2,000 mg groups"
      - "SF-36 vitality subscale change: 7.3-7.8 points (placebo/750-mg) vs 10.5-14.6 points (higher-dose groups)"
      - "Over twice as many patients on ginseng perceived benefit and were satisfied compared to placebo"
      - "No significant toxicity differences between groups"
      - "Tolerable toxicity at 1,000-2,000 mg/day doses"
    notes: "Dose-finding study established 2,000 mg/day for subsequent Phase III trial"

# Randomized Controlled Trials - Type 2 Diabetes and Glycemic Control

rcts_diabetes:
  - title: "Efficacy and safety of American ginseng (Panax quinquefolius L.) extract on glycemic control and cardiovascular risk factors in individuals with type 2 diabetes: a double-blind, randomized, cross-over clinical trial"
    authors:
      - Vuksan V
      - Xu ZZ
      - Jovanovski E
      - Jenkins AL
      - Beljan-Zdravkovic U
      - Sievenpiper JL
      - Stavro PM
      - Zurbau A
      - Duvnjak L
      - Li MZC
    year: 2019
    journal: "European Journal of Nutrition"
    volume: 58
    issue: 3
    pages: "1237-1245"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/29478187/"
    study_design: "Double-blind, randomized, cross-over controlled trial"
    sample_size: 24
    demographics: "11 female, 13 male; mean age 64±7 years"
    dosage: "1 gram per meal (3 grams daily)"
    duration: "8 weeks, followed by washout period and crossover"
    key_findings:
      - "HbA1c reduction: -0.29% (p=0.041)"
      - "Fasting blood glucose reduction: -0.71 mmol/L (p=0.008)"
      - "Systolic blood pressure reduction: -5.6±2.7 mmHg (p<0.001)"
      - "LDL-C reduction: -12.3±3.9%"
      - "Serum NOx increase: +1.85±2.13 µmol/L (p<0.03)"
    notes: "Demonstrated cardiovascular benefits alongside glycemic control"

  - title: "American ginseng (Panax quinquefolius L.) attenuates postprandial glycemia in a time-dependent but not dose-dependent manner in healthy individuals"
    authors:
      - Vuksan V
      - Sievenpiper JL
      - Wong J
      - Xu Z
      - Beljan-Zdravkovic U
      - Arnason JT
      - Assinewe V
      - Stavro MP
      - Jenkins AL
      - Leiter LA
      - Francis T
    year: 2001
    journal: "American Journal of Clinical Nutrition"
    volume: 73
    issue: 4
    pages: "753-8"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/11273850/"
    study_design: "Randomized controlled trial"
    sample_size: 12
    demographics: "Mean age 42±7 years; BMI 24.1±1.1 kg/m²"
    treatments: "16 treatments total"
    dosages: "0 (placebo), 1, 2, or 3 g"
    timing: "40, 20, 10, or 0 min before 25-g oral glucose challenge"
    key_findings:
      - "All three ginseng doses reduced postprandial glycemia compared to placebo during final 45 minutes"
      - "Area under curve reductions: 14.4±6.5% (1g), 10.6±4.0% (2g), 9.1±6% (3g)"
      - "No significant differences between doses"
      - "Optimal timing: 40 minutes before glucose challenge significantly better than 20, 10, or 0 minutes"
    notes: "First study demonstrating time-dependent glycemic effects; established optimal pre-meal timing"

  - title: "American Ginseng Extract (Panax quinquefolius L.) Is Safe in Long-Term Use in Type 2 Diabetic Patients"
    authors:
      - Mucalo I
      - Jovanovski E
      - Vuksan V
      - Božikov V
      - Romić Ž
      - Rahelić D
    year: 2014
    journal: "Evidence-Based Complementary and Alternative Medicine"
    volume: 2014
    pages: "969168"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/24891873/"
    doi: "10.1155/2014/969168"
    study_design: "Double-blind, randomized, placebo-controlled, parallel design trial"
    sample_size: 74
    breakdown: "35 intervention, 39 control"
    demographics: "Mean age 63±9.5 years, BMI 32±5"
    dosage: "500 mg capsules taken three times daily with meals (3 g/day)"
    standardization: "10% ginsenosides"
    duration: "12 weeks"
    key_findings:
      - "No significant changes in AST (P=0.107) or ALT (P=0.763) - hepatic safety confirmed"
      - "No changes in serum urates (P=0.498) or creatinine (P=0.808) - renal safety confirmed"
      - "No changes in prothrombin time (P=0.469) or INR (P=0.413) - haemostatic safety confirmed"
      - "Only one adverse event: stomach heaviness in one participant who continued treatment"
      - "Twelve weeks supplementation demonstrated clinical safety"
    notes: "Important safety study for long-term use in diabetic patients"

# Randomized Controlled Trials - Cardiovascular Effects

rcts_cardiovascular:
  - title: "Effect of American ginseng (Panax quinquefolius L.) on arterial stiffness in subjects with type-2 diabetes and concomitant hypertension"
    authors:
      - Mucalo I
      - Jovanovski E
      - Rahelić D
      - Božikov V
      - Romić Z
      - Vuksan V
    year: 2013
    journal: "Journal of Ethnopharmacology"
    volume: 150
    issue: 1
    pages: "148-53"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/23973636/"
    study_design: "Randomized controlled trial (double-blind, placebo-controlled, parallel design)"
    sample_size: 64
    demographics: "22 male, 42 female; mean age 63±9.3 years"
    baseline_characteristics: "BP 145±10.8/84±8.0 mmHg; HbA1c 7.0±1.3%; fasting glucose 8.1±2.3 mmol/L"
    dosage: "3 grams daily"
    duration: "12 weeks as adjunct to existing therapy"
    key_findings:
      - "Radial augmentation index reduced by 5.3% compared to placebo (P=0.041)"
      - "Systolic blood pressure decreased by 11.7% (P<0.001)"
      - "No significant effect on diastolic blood pressure"
    notes: "First study examining arterial stiffness effects of American ginseng in diabetic hypertensive patients"

# Randomized Controlled Trials - Neurocognitive Function

rcts_cognitive:
  - title: "Effects of American ginseng (Panax quinquefolius) on neurocognitive function: an acute, randomised, double-blind, placebo-controlled, crossover study"
    authors:
      - Scholey A
      - Ossoukhova A
      - Owen L
      - Ibarra A
      - Pipingas A
      - He K
      - Roller M
      - Stough C
    year: 2010
    journal: "Psychopharmacology (Berlin)"
    volume: 212
    issue: 3
    pages: "345-56"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/20676609/"
    study_design: "Randomized controlled trial (acute, crossover, double-blind)"
    sample_size: 32
    population: "Healthy young adults"
    extract: "Cereboost™ (standardized American ginseng extract)"
    standardization: "10.65% ginsenosides"
    dosages: "100 mg, 200 mg, 400 mg"
    measurement_times: "1, 3, and 6 hours post-administration"
    key_findings:
      - "Significant improvement of working memory (WM) performance associated with P. quinquefolius"
      - "Corsi block performance improved across all doses at all testing times"
      - "Choice reaction time accuracy and calmness significantly improved with 100 mg dose"
      - "No changes in blood glucose levels observed"
    notes: "Demonstrated acute cognitive effects independent of glucose regulation"

# Randomized Controlled Trials - Respiratory Infections

rcts_respiratory:
  - title: "Efficacy and Safety of CVT-E002, a Proprietary Extract of Panax quinquefolius in the Prevention of Respiratory Infections in Influenza-Vaccinated Community-Dwelling Adults: A Multicenter, Randomized, Double-Blind, and Placebo-Controlled Trial"
    authors:
      - McElhaney JE
      - Simor AE
      - McNeil S
      - Predy GN
    year: 2011
    journal: "Influenza Research and Treatment"
    volume: 2011
    pages: "759051"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/23074661/"
    study_design: "Multicenter, randomized, double-blind, placebo-controlled trial"
    sample_size: 783
    population: "Community-dwelling adults aged ≥65 years (748 in primary analysis)"
    treatment_groups:
      - "Placebo"
      - "400 mg/day CVT-E002"
      - "800 mg/day CVT-E002"
    duration: "6 months"
    key_findings:
      - "Laboratory-confirmed clinical URI incidence: 5.5% (placebo), 5.2% (400mg), 4.6% (800mg); P=0.89 - not significant"
      - "Jackson-confirmed URIs (study completers): 28.9% (placebo), 20.0% (400mg), 19.4% (800mg); P<0.04 - significant"
      - "CVT-E002 reduced relative risk of Jackson-confirmed URIs by 31-33%"
      - "Number needed to treat: 10.5-11.2"
      - "No significant differences in adverse events; well tolerated at both doses"
    notes: "Demonstrated efficacy for reducing respiratory infection severity and duration in elderly population"

  - title: "Safety and tolerability of North American ginseng extract in the treatment of pediatric upper respiratory tract infection: a phase II randomized, controlled trial of 2 dosing schedules"
    authors: (Not fully extracted)
    year: 2008
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/18676527/"
    study_design: "Phase II randomized controlled trial"
    population: "Children 3 to 12 years of age"
    treatment_groups:
      - "Standard dose"
      - "Low dose"
      - "Placebo"
    key_findings:
      - "Documented safety and tolerability of 2 weight-based dosing schedules"
    notes: "Pediatric safety study"

# Randomized Controlled Trials - Pharmacokinetics and Drug Interactions

rcts_pharmacokinetics:
  - title: "Pharmacokinetic and metabolic effects of American ginseng (Panax quinquefolius) in healthy volunteers receiving the HIV protease inhibitor indinavir"
    authors:
      - Andrade ASA
      - Hendrix C
      - Parsons TL
      - Caballero B
      - Yuan CS
      - Flexner CW
      - Dobs AS
      - Brown TT
    year: 2008
    journal: "BMC Complementary and Alternative Medicine"
    volume: 8
    pages: "50"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/18713456/"
    study_design: "Controlled clinical trial"
    sample_size: "13 for pharmacokinetic analysis; 11 for insulin sensitivity assessment"
    dosing_regimen:
      - "Indinavir: 800 mg every 8 hours for 3 days, then continued for 14 additional days"
      - "American ginseng: 1 gram every 8 hours for 14 days (co-administered with indinavir)"
    key_findings:
      - "No significant difference in indinavir concentrations with ginseng co-administration"
      - "Insulin sensitivity decreased 14.8% (±5.9%) after 3 days of indinavir alone (p=0.03)"
      - "Insulin sensitivity remained unchanged when ginseng was added to indinavir therapy"
    notes: "Important drug interaction study; suggests American ginseng may counteract metabolic side effects of protease inhibitors"

