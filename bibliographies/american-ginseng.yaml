# Clinical Efficacy Summary by Condition

efficacy_by_condition:
  cancer_related_fatigue:
    evidence_quality: "High - Phase III multicenter RCT (n=364)"
    effect_size: "20-point improvement vs 10.3 placebo at 8 weeks (p=0.003)"
    optimal_dose: "2000 mg daily"
    time_to_effect: "8 weeks"
    population_response: "Greater benefit in patients receiving active cancer treatment"

  type_2_diabetes:
    evidence_quality: "Multiple RCTs with consistent findings"
    glycemic_effects:
      - "HbA1c reduction: -0.29% (p=0.041)"
      - "Fasting blood glucose: -0.71 mmol/L (p=0.008)"
      - "Postprandial glucose: 9-14% reduction in area under curve"
    cardiovascular_effects:
      - "Systolic BP reduction: -5.6 to -11.7 mmHg"
      - "LDL-C reduction: -12.3%"
      - "Arterial stiffness reduction: -5.3%"
    timing_importance: "40 minutes pre-meal optimal for glycemic control"
    safety: "Excellent - 12-week study showed no hepatic, renal, or haemostatic concerns"

  cognitive_function:
    evidence_quality: "Systematic review/meta-analysis plus acute RCT"
    effects:
      - "Working memory improvement (Corsi block performance)"
      - "Choice reaction time accuracy improvement"
      - "Increased calmness"
    dose_range: "100-400 mg acute dosing"
    mechanism: "Independent of blood glucose effects"
    note: "Meta-analysis showed memory improvement SMD=0.19, stronger with high doses SMD=0.33"

  respiratory_infections:
    evidence_quality: "Large multicenter RCT (n=783)"
    effects:
      - "31-33% relative risk reduction for Jackson-confirmed URIs"
      - "Reduced severity and duration of infections"
    population: "Community-dwelling adults ≥65 years with influenza vaccination"
    dose: "400-800 mg daily"
    duration: "6 months"
    number_needed_to_treat: "10.5-11.2"

  arterial_stiffness_hypertension:
    evidence_quality: "RCT in diabetic hypertensive patients (n=64)"
    effects:
      - "Radial augmentation index: -5.3% (p=0.041)"
      - "Systolic BP: -11.7% (p<0.001)"
    population: "Type 2 diabetes with concomitant hypertension"
    dose: "3 grams daily"
    duration: "12 weeks"

# Research Quality Notes

research_considerations:
  strengths:
    - "Multiple well-designed double-blind RCTs"
    - "Large Phase III trials for cancer fatigue (n=364) and respiratory infections (n=783)"
    - "Dose-finding studies available (750-2000 mg range)"
    - "Timing studies for glycemic effects (pre-meal administration)"
    - "Systematic reviews and meta-analyses available"
    - "Safety studies in vulnerable populations (diabetics, cancer patients, elderly)"
    - "Pharmacokinetic and drug interaction data"
    - "Traditional use history supporting safety (300+ years in Chinese medicine)"

  limitations:
    - "Low bioavailability of parent ginsenosides (<5% for most)"
    - "Limited human pharmacokinetic data"
    - "Product quality and adulteration concerns (addressed by AHP monograph)"
    - "Formulation variability affects bioavailability"
    - "Most cognitive studies are acute; limited long-term data"
    - "Lack of pregnancy and lactation safety data"
    - "Need for more standardization across products"

  future_research_needs:
    - "Human pharmacokinetic studies with standardized extracts"
    - "Long-term cognitive function trials"
    - "Formulation optimization for improved bioavailability"
    - "Pregnancy and lactation safety studies"
    - "Mechanism of action studies for cancer fatigue"
    - "Comparative effectiveness trials vs. pharmaceutical agents"
    - "Quality control and authentication standards enforcement"

