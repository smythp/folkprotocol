# SYSTEMATIC REVIEWS AND META-ANALYSES

systematic_reviews:
  - id: jafari2024_comprehensive
    authors: "Jafari A, Abbastabar M, Alaghi A, Heshmati J, Crowe FL, Sepidarkish M"
    title: "Curcumin on Human Health: A Comprehensive Systematic Review and Meta-Analysis of 103 Randomized Controlled Trials"
    journal: "Phytotherapy Research"
    year: 2024
    pmid: "39478418"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/39478418/"
    doi: null
    study_type: "Systematic review and meta-analysis"
    trials_included: 103
    participants: 7216
    key_findings: |
      - 55% of 42 analyzed outcomes showed statistically significant improvements
      - High-certainty evidence for: fasting blood sugar (FBS), C-reactive protein (CRP), high-density lipoprotein (HDL), and weight
      - Significant effects on glycemic indices, lipid parameters, inflammatory markers, and oxidative parameters
    quality: "High-certainty evidence for 4 primary outcomes"
    notes: "Most comprehensive meta-analysis to date; authors recommend well-designed long-term RCTs with larger sample sizes"

  - id: dehzad2023_antioxidant
    authors: "Dehzad MJ, Ghalandari H, Nouri M, Askarpour M"
    title: "Antioxidant and anti-inflammatory effects of curcumin/turmeric supplementation in adults: A GRADE-assessed systematic review and dose-response meta-analysis of randomized controlled trials"
    journal: "Cytokine"
    year: 2023
    volume: "164"
    pmid: "36804260"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/36804260/"
    doi: null
    study_type: "Systematic review and dose-response meta-analysis"
    trials_included: 66
    participants: null
    search_period: "Inception to October 2022"
    key_findings: |
      - C-reactive protein (CRP): reduced by 0.58 mg/L
      - Tumor necrosis factor-alpha (TNF-α): reduced by 3.48 pg/mL
      - Interleukin-6 (IL-6): reduced by 1.31 pg/mL
      - Interleukin-1 beta (IL-1β): no significant change
      - Total antioxidant capacity (TAC): improved by 0.21 mmol/L
      - Malondialdehyde (MDA): reduced by 0.33 µmol/L
      - Superoxide dismutase (SOD): increased by 20.51 U/L
    quality: "GRADE-assessed"

  - id: doyle2023_musculoskeletal
    authors: "Doyle L, Desomayanandam P, Bhuvanendran A, Thanawala S, Shah R, Somepalli V, Bachu S"
    title: "Safety and Efficacy of Turmeric (Curcuma longa) Extract and Curcumin Supplements in Musculoskeletal Health: A Systematic Review and Meta-Analysis"
    journal: "Alternative Therapies in Health and Medicine"
    year: 2023
    pmid: "37574203"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/37574203/"
    doi: null
    study_type: "Systematic review and meta-analysis"
    trials_included: 21
    rct_breakdown:
      skeletal_muscle_health: 7
      joint_health: 14
    participants: null
    key_findings: |
      - Turmeric extract and curcumin supplements effective as adjuvants for musculoskeletal health management
      - Water-dispersible turmeric extract (WDTE60N) at 250 mg/day more effective than other curcumin products
      - Statistical significance (P < .0001) for both musculoskeletal and joint health outcomes
      - Low incidence of adverse events
    dosing_recommendation: "Water-dispersible turmeric extract at 250 mg/day"
    safety: "Low incidence of adverse events"

  - id: dehzad2024_blood_pressure
    authors: "Dehzad MJ, Ghalandari H, Askarpour M"
    title: "Curcumin/turmeric supplementation could improve blood pressure and endothelial function: A grade-assessed systematic review and dose-response meta-analysis of randomized controlled trials"
    journal: "Clinical Nutrition ESPEN"
    year: 2024
    pmid: "38220376"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/38220376/"
    doi: null
    study_type: "Systematic review and dose-response meta-analysis"
    trials_included: 35
    search_results: 4182
    participants: null
    key_findings: |
      - Systolic blood pressure: improved by 2.02 mmHg
      - Diastolic blood pressure: improved by 0.82 mmHg
      - Flow-mediated vasodilation: improved by 2.00%
      - Vascular cell adhesion molecule-1: improved
      - No significant change in ICAM-1 or pulse-wave velocity
    quality: "GRADE-assessed"
    notes: "Authors suggest curcumin/turmeric could be regarded as complementary method for cardiovascular health support"

  - id: zeng2022_arthritis
    authors: "Zeng L, Yang T, Yang K, Yu G, Li J, Xiang W, Chen H"
    title: "Efficacy and Safety of Curcumin and Curcuma longa Extract in the Treatment of Arthritis: A Systematic Review and Meta-Analysis of Randomized Controlled Trial"
    journal: "Frontiers in Immunology"
    year: 2022
    pmid: "35935936"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/35935936/"
    doi: null
    study_type: "Systematic review and meta-analysis"
    trials_included: 29
    participants: 2396
    arthritis_types_studied:
      - "Ankylosing Spondylitis (AS)"
      - "Rheumatoid Arthritis (RA)"
      - "Osteoarthritis (OA)"
      - "Juvenile idiopathic arthritis (JIA)"
      - "Gout/hyperuricemia"
    dosing_range: "120-1500 mg"
    treatment_duration: "4-36 weeks"
    key_findings: |
      - Curcumin and Curcuma longa extract showed safety in all studies
      - Improved severity of inflammation and pain levels in arthritis patients
