  - id: white2019_inflammatory
    authors: "White CM, Pasupuleti V, Roman YM, Li Y, Hernandez AV"
    title: "Oral turmeric/curcumin effects on inflammatory markers in chronic inflammatory diseases: A systematic review and meta-analysis of randomized controlled trials"
    journal: "Pharmacological Research"
    year: 2019
    pmid: "31121255"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/31121255/"
    doi: null
    study_type: "Systematic review and meta-analysis"
    trials_included: 19
    turmeric_trials: 5
    curcumin_trials: 14
    participants:
      turmeric: 356
      curcumin: 988
    treatment_duration: "4-16 weeks"
    key_findings: |
      - CRP: MD -2.71 mg/L (95% CI -5.73 to 0.31, p=0.08) - not significant
      - hsCRP: MD -1.44 mg/L (95% CI -2.94 to 0.06, p=0.06) - not significant
      - IL-1 beta: MD -4.25 pg/mL (95% CI -13.32 to 4.82, p=0.36) - not significant
      - IL-6: MD -0.71 pg/mL (95% CI -1.68 to 0.25, p=0.15) - not significant
      - TNF alpha: MD -1.23 pg/mL (95% CI -3.01 to 0.55, p=0.18) - not significant
      - Overall: turmeric or curcumin did not significantly decrease inflammatory markers in chronic inflammatory diseases
    notes: "Contrasts with other meta-analyses; highlights heterogeneity in study designs and patient populations"

