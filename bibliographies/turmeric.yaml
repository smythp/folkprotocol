# BIOAVAILABILITY STUDIES

bioavailability_studies:
  - id: anand2007_problems
    authors: "Anand P, Kunnumakkara AB, Newman RA, Aggarwal BB"
    title: "Bioavailability of curcumin: problems and promises"
    journal: "Molecular Pharmaceutics"
    year: 2007
    volume: "4"
    issue: "6"
    pages: "807-818"
    pmid: "17999464"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/17999464/"
    doi: null
    study_type: "Review article"
    key_findings: |
      - Phase I clinical trials show curcumin is safe even at high doses (12 g/day)
      - Poor bioavailability due to: poor absorption, rapid metabolism, rapid systemic elimination
      - Five approaches to improve bioavailability:
        1. Adjuvants (piperine) - interferes with glucuronidation
        2. Liposomal curcumin
        3. Curcumin nanoparticles
        4. Curcumin phospholipid complex
        5. Structural analogues (e.g., EF-24)
    safety: "Safe at doses up to 12 g/day in humans"
    notes: "Foundational review on bioavailability challenges"

  - id: shoba1998_piperine
    authors: "Shoba G, Joy D, Joseph T, Majeed M, Rajendran R, Srinivas PS"
    title: "Influence of piperine on the pharmacokinetics of curcumin in animals and human volunteers"
    journal: "Planta Medica"
    year: 1998
    pmid: "9619120"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/9619120/"
    doi: null
    study_type: "Clinical trial (animal and human)"
    participants:
      animals: "Wistar rats"
      humans: "Healthy human volunteers"
    dosing:
      curcumin_rats: "2 g/kg"
      curcumin_humans: "2 g"
      piperine_rats: "20 mg/kg"
      piperine_humans: "20 mg"
    key_findings: |
      - Bioavailability enhancement in rats: 154%
      - Bioavailability enhancement in humans: 2000%
      - Curcumin alone: serum levels undetectable or very low
      - With piperine: much higher concentrations from 0.25 to 1 h post-drug
      - Time to maximum concentration increased significantly (P < 0.02)
      - Elimination half-life decreased significantly (P < 0.02)
      - Clearance decreased significantly (P < 0.02)
    notes: "Most cited bioavailability enhancement study; recent research has questioned replicability of 2000% figure"

  - id: sunagawa2015_theracurmin
    authors: "Sunagawa Y, Hirano S, Katanasaka Y, Miyazaki Y, Funamoto M, Okamura N, Hojo Y, Suzuki H, Doi O, Yokoji T, Morimoto E, Takashi T, Ozawa H, Imaizumi A, Ueno M, Kakeya H, Shimatsu A, Wada H, Hasegawa K, Morimoto T"
    title: "Colloidal submicron-particle curcumin exhibits high absorption efficiency-a double-blind, 3-way crossover study"
    journal: "Journal of Nutritional Science and Vitaminology (Tokyo)"
    year: 2015
    pmid: "25994138"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/25994138/"
    doi: null
    study_type: "Double-blind, 3-way crossover trial"
    participants: "Nine healthy subjects (5 male, 4 female; ages 24-32 years)"
    formulations_compared:
      - "Theracurmin (colloidal submicron-particle)"
      - "BCM-95 (micronized with turmeric essential oils)"
      - "Meriva (curcumin-phospholipid complex)"
    key_findings: |
      - Theracurmin maximal plasma curcumin concentration: 10.7× higher than BCM-95, 5.6× higher than Meriva
      - Theracurmin AUC (area under curve): 11.0× higher than BCM-95, 4.6× higher than Meriva
      - Theracurmin demonstrated superior bioavailability compared to competing formulations
    quality: "Double-blind crossover design with rigorous pharmacokinetic measurement"
    notes: "Direct head-to-head comparison of major commercial formulations"

  - id: khosravi2024_critical
    authors: "Khosravi MA, Seifert R"
    title: "Clinical trials on curcumin in relation to its bioavailability and effect on malignant diseases: critical analysis"
    journal: "Naunyn Schmiedebergs Archives of Pharmacology"
    year: 2024
    pmid: "37966571"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/37966571/"
    published: "May 2024 (Epub November 15, 2023)"
    doi: null
    study_type: "Systematic review and critical analysis"
    studies_analyzed: 293
    focus: "Bioavailability and malignant disease treatment"
    key_findings: |
      - Curcumin suffers from extremely low bioavailability
      - Independent studies could not achieve increased bioavailability of curcumin
      - Positive bioavailability results obtained in studies "in proximity to pharmaceutical industry"
      - Failed to convincingly demonstrate significant positive effect on therapy of malignant diseases
      - Authors conclude: "the use of curcumin in malignant diseases is not justified scientifically"
    notes: "Critical perspective highlighting industry bias concerns and replication failures"

# STANDARDIZED EXTRACT STUDIES

standardized_extracts:
  - name: "BCM-95 (Biocurcumax)"
    description: "Bioenhanced preparation combining micronized curcumin with turmeric essential oils"
    bioavailability_enhancement: "6.93× higher free curcumin AUC compared to standard curcumin"
    clinical_applications:
      - "Multiple myeloma"
      - "Multiple sclerosis"
      - "Non-alcoholic fatty liver disease (NAFLD)"
      - "Prediabetic conditions"
      - "Knee osteoarthritis"
    key_findings: |
      - Reduced inflammatory molecules and liver enzymes
      - Significant symptom improvement in osteoarthritis
      - Reduced gastrointestinal side effects compared to diclofenac or paracetamol
    dosing: "Variable by indication"
    safety: "Well-tolerated with reduced GI side effects"
    references:
      - "PMC2792534 (pilot crossover study)"
      - "PMC10061533 (comprehensive review)"

  - name: "Meriva (Curcumin-Phospholipid Complex)"
    description: "Curcumin complexed with phospholipids to enhance absorption"
    bioavailability_enhancement: "29× higher total curcuminoid absorption; 18× higher when measured in volunteers"
    clinical_applications:
      - "Joint health"
      - "Inflammation management"
    key_findings: |
      - Significantly higher plasma curcumin levels compared to unformulated curcumin
      - Well-established safety profile in clinical trials
    dosing: "Variable by indication"
    safety: "Well-tolerated"
    references:
      - "PMC10061533 (comprehensive review)"

  - name: "Theracurmin"
    description: "Colloidal submicron-particle curcumin formulation"
    bioavailability_enhancement: "185× higher compared to unformulated powder (based on total curcumin AUC)"
    comparative_performance: "Superior to BCM-95 (11× higher AUC) and Meriva (4.6× higher AUC) in head-to-head trials"
    clinical_applications:
      - "Knee osteoarthritis"
      - "General inflammatory conditions"
    key_findings: |
      - 75.6% treatment effectiveness in 6-month knee osteoarthritis study (180 mg/day)
      - Highest bioavailability among major commercial formulations in direct comparison
    dosing: "180 mg/day (osteoarthritis studies)"
    safety: "Safe and well-tolerated at doses ranging from 2 g/day to 12 g/day for 6 months to a year"
    references:
      - "PMID 25994138 (3-way crossover study)"
      - "PMC10061533 (comprehensive review)"

# SAFETY STUDIES

safety_studies:
  - id: soleimani2018_safety
    authors: "Soleimani V, Sahebkar A, Hosseinzadeh H"
    title: "Turmeric (Curcuma longa) and its major constituent (curcumin) as nontoxic and safe substances: Review"
    journal: "Phytotherapy Research"
    year: 2018
    pmid: "29480523"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/29480523/"
    doi: null
    study_type: "Literature review on safety and toxicity"
    key_findings: |
      - Curcumin safe at 6 g/day orally for 4-7 weeks in human studies
      - Bioavailable formulations safe at 500 mg twice daily for 30 days
      - No toxic effects found at doses up to 8 g/day
      - Doses higher than 8 g/day found to be intolerable
      - Some adverse effects such as gastrointestinal upsets may occur
      - Nontoxic, nonmutagenic, and nongenotoxic for humans especially in oral administration
    maximum_tolerated_dose: "8 g/day"
    common_adverse_effects:
      - "Gastrointestinal upsets"
      - "Nausea"
      - "Diarrhea"
    notes: "Additional research needed on nanoformulations and pregnancy safety"

  - id: ncbi_livertox
    title: "Turmeric - LiverTox Clinical and Research Information on Drug-Induced Liver Injury"
    source: "NCBI Bookshelf"
    year: "Updated regularly"
    url: "https://www.ncbi.nlm.nih.gov/books/NBK548561/"
    key_findings: |
      - Turmeric and curcumin associated with low rate of transient serum enzyme elevations during therapy
      - Long history of safety overall
      - Some turmeric products (especially bioavailable formulations) implicated in clinically apparent acute liver injury
      - Liver damage reported in some people consuming bioavailable formulations
      - Many curcumin products with increased bioavailability are on market
    warnings: "Caution with bioavailable formulations; potential for liver injury in susceptible individuals"

  - id: general_safety_profile
    title: "General Safety Profile from Clinical Trials"
    study_type: "Summary from multiple clinical trials"
    key_findings: |
      - Most clinical studies demonstrate few, if any, associated adverse effects
      - Common adverse effects when present:
        * Gastrointestinal: nausea, vomiting, acid reflux, stomach upset, diarrhea, constipation
        * Allergic reactions
        * Contact dermatitis after skin contact with curcumin-containing products
      - Serious adverse effects rare:
        * One pancreatic cancer trial (N=17): ~30% (N=5) receiving 8,000 mg/day discontinued due to intractable abdominal fullness
      - May stimulate gallbladder contractions and potentially cause gallstone development
      - Accumulating evidence suggests curcumin consumption is safe and well tolerated with no or limited side effects
    maximum_safe_dose: "8 g/day (8,000 mg/day may cause tolerability issues)"
    contraindications:
      - "Gallbladder disease"
      - "High risk for liver injury (when using bioavailable formulations)"

