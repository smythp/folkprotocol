notes: |
  This bibliography compiles clinical evidence for St. John's Wort (Hypericum perforatum) focusing on:
  - Systematic reviews and meta-analyses demonstrating efficacy comparable to SSRIs for mild-to-moderate depression
  - Randomized controlled trials of standardized extracts (especially WS 5570, WS 5572, LI 160)
  - Pharmacokinetic studies showing bioavailability and plasma levels of active constituents
  - Safety studies demonstrating 10-fold lower adverse event rates than synthetic antidepressants
  - Drug interaction data emphasizing importance of low-hyperforin formulations
  - Regulatory monographs from WHO, Commission E, EMA, and ESCOP

  Key clinical points:
  - Effective for mild-to-moderate depression with evidence comparable to SSRIs
  - Standard dose: 900 mg/day standardized extract (0.3% hypericin, 2-4% hyperforin)
  - Better tolerability than SSRIs (lower dropout rates)
  - Significant drug interactions via CYP3A4 induction (hyperforin-dependent)
  - Use low-hyperforin preparations (≤1 mg/day) when drug interactions are a concern
  - Less effective in severe major depression
  - Safe for long-term use (up to 1 year demonstrated)
