title: "St. John's Wort (Hypericum perforatum) Clinical Bibliography"
description: "Clinical studies on St. John's Wort (Hypericum perforatum) focusing on systematic reviews, RCTs, dosing, bioavailability, safety, standardized extracts, and drug interactions"
created: 2026-01-08
last_updated: 2026-01-08

# SYSTEMATIC REVIEWS AND META-ANALYSES

systematic_reviews:
  - id: ng2017_depression_ssri
    authors: "Ng QX, Venkatanarayanan N, Ho CYX"
    title: "Clinical use of Hypericum perforatum (St John's wort) in depression: A meta-analysis"
    journal: "Journal of Affective Disorders"
    year: 2017
    volume: "210"
    pages: "211-221"
    pmid: "28064110"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/28064110/"
    doi: null
    study_type: "Meta-analysis of clinical trials"
    trials_included: 27
    participants: 3808
    comparison: "St. John's wort vs. SSRIs for mild-to-moderate depression"
    key_findings: |
      - Response rate: pooled RR 0.983 (95% CI 0.924-1.042) - no significant difference from SSRIs
      - Remission rate: pooled RR 1.013 (95% CI 0.892-1.134) - comparable to SSRIs
      - Discontinuation/dropout rate: pooled OR 0.587 (95% CI 0.478-0.697) - significantly lower than SSRIs
      - HAM-D score improvement: pooled SMD -0.068 (95% CI -0.127 to 0.021)
      - Comparable efficacy to SSRIs with notably better retention rates
    adverse_effects: "Significantly lower discontinuation rates than SSRIs, suggesting better tolerability"
    quality: "27 clinical trials with 3,808 patients"

  - id: linde2005_depression
    authors: "Linde K, Berner M, Egger M, Mulrow C"
    title: "St John's wort for depression: meta-analysis of randomised controlled trials"
    journal: "British Journal of Psychiatry"
    year: 2005
    volume: "186"
    pages: "99-107"
    pmid: "15684231"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/15684231/"
    doi: null
    study_type: "Meta-analysis of double-blind RCTs"
    trials_included: 37
    key_findings: |
      - Larger, recent placebo-controlled trials restricted to major depression showed only minor effects over placebo
      - Older and smaller trials not restricted to major depression showed marked effects
      - Compared to standard antidepressants, Hypericum extracts had similar effects
      - Evidence is inconsistent and confusing, varying by trial size and patient selection
      - Response rate significantly better than placebo in smaller trials
    interpretation: "Divergent results depending on trial characteristics - effectiveness varies by depression severity and trial design"
    quality: "37 double-blind randomized controlled trials"

  - id: zhao2023_ssri_comparison
    authors: "Zhao X, Zhang H, Wu Y, Yu C"
    title: "The efficacy and safety of St. John's wort extract in depression therapy compared to SSRIs in adults: A meta-analysis of randomized clinical trials"
    journal: "Advances in Clinical and Experimental Medicine"
    year: 2023
    volume: "32"
    issue: "2"
    pmid: "36226689"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/36226689/"
    doi: null
    study_type: "Meta-analysis of RCTs"
    trials_included: 14
    participants: 2270
    publication_range: "2000-2022"
    key_findings: |
      - Pooled OR of 2.44 (95% CI 1.33-4.45) favoring St. John's wort
      - Reduced number of depressive patients and HAMD scores
      - Fewer risks and side effects than conventional SSRIs
      - Heterogeneity: I² = 77%, p = 0.004
    conclusion: "Supports the use of SJW with fewer side effects than conventional medications"
    quality: "14 clinical trials, 2,270 patients total"

  - id: rahimi2009_ssri_tolerability
    authors: "Rahimi R, Nikfar S, Abdollahi M"
    title: "Efficacy and tolerability of Hypericum perforatum in major depressive disorder in comparison with selective serotonin reuptake inhibitors: a meta-analysis"
    journal: "Progress in Neuropsychopharmacology and Biological Psychiatry"
    year: 2009
    pmid: "19028540"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/19028540/"
    doi: null
    study_type: "Meta-analysis of randomized placebo-controlled trials"
    trials_included: 13
    key_findings: |
      - Clinical response: non-significant RR of 0.99 (comparable efficacy to SSRIs)
      - Adverse events causing withdrawal: significant RR of 0.53 (substantially fewer dropouts than SSRIs)
      - Comparable benefits in depression symptom reduction and remission rates
      - Superior tolerability profile with fewer discontinuations due to side effects
    quality: "13 placebo-controlled trials directly comparing St. John's wort to SSRIs"

  - id: kim1999_metaanalysis
    authors: "Kim HL, Streltzer J, Goebert D"
    title: "St. John's wort for depression: a meta-analysis of well-defined clinical trials"
    journal: "Journal of Nervous and Mental Disease"
    year: 1999
    volume: "187"
    issue: "9"
    pages: "532-8"
    pmid: "10496508"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/10496508/"
    doi: null
    study_type: "Meta-analysis of clinical trials"
    key_findings: |
      - Hypericum was 1.5 times more likely to result in an antidepressant response than placebo
      - Equivalent efficacy to tricyclic antidepressants (TCAs) for mild to moderate depression in short-term use
      - TCA group showed higher dropout rates
      - TCAs were nearly twice as likely to cause side effects
    limitations: "Design problems in existing studies prevent definitively concluding effectiveness"
    quality: "Analysis of well-defined clinical trials"

# RANDOMIZED CONTROLLED TRIALS

clinical_trials:
  - id: kasper2006_ws5570
    authors: "Kasper S, Anghelescu IG, Szegedi A, Dienel A, Kieser M"
    title: "Superior efficacy of St John's wort extract WS 5570 compared to placebo in patients with major depression: a randomized, double-blind, placebo-controlled, multi-center trial"
    journal: "BMC Medicine"
    year: 2006
    volume: "4"
    pages: "14"
    pmid: "16796730"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/16796730/"
    doi: null
    study_design: "Randomized, double-blind, placebo-controlled, multicenter trial"
    duration: "6 weeks"
    sample_size: 332
    groups:
      ws5570_600mg: 123
      ws5570_1200mg: 127
      placebo: 82
    intervention:
      extract: "WS 5570 (standardized St. John's wort extract)"
      dose_1: "600 mg once daily"
      dose_2: "1200 mg in two divided doses"
    outcome_measures:
      primary: "Hamilton Rating Scale for Depression (HAM-D, 17-item) total score change"
    results: |
      - HAM-D decreases: 600mg = 11.6±6.4 points, 1200mg = 10.8±7.3 points, placebo = 6.0±8.1 points
      - Both treatment groups statistically superior to placebo
      - Dose-dependent response pattern
      - Safe and effective for mild to moderate major depression
    adverse_effects: "Well tolerated at both doses"
    quality: "High-quality multicenter RCT, 332 patients randomized"

  - id: lecrubier2002_ws5570
    authors: "Lecrubier Y, Clerc G, Didi R, Kieser M"
    title: "Efficacy of St. John's wort extract WS 5570 in major depression: a double-blind, placebo-controlled trial"
    journal: "American Journal of Psychiatry"
    year: 2002
    volume: "159"
    pages: "1361-1366"
    pmid: "12153829"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/12153829/"
    doi: null
    study_design: "Double-blind, randomized, placebo-controlled trial"
    duration: "6 weeks double-blind treatment"
    sample_size: 375
    groups:
      ws5570: 186
      placebo: 189
    intervention:
      extract: "WS 5570 (hydroalcoholic Hypericum perforatum extract)"
      dose: "300 mg three times daily (900 mg/day total)"
    outcome_measures:
      primary: "Hamilton depression scale total score"
    results: |
      - Significantly greater reduction in HAM-D total score with WS 5570 vs placebo
      - Significantly more patients with treatment response or remission in WS 5570 group
      - Safe and more effective than placebo for mild to moderate depression
    adverse_effects: "Safe profile, well-tolerated"
    quality: "High-quality RCT, 375 patients with mild to moderate major depression"

  - id: shelton2001_major_depression
    authors: "Shelton RC, Keller MB, Gelenberg A, Dunner DL, Hirschfeld R, Thase ME, Russell J, Lydiard RB, Crits-Cristoph P, Gallop R, Todd L, Hellerstein D, Goodnick P, Keitner G, Stahl SM, Halbreich U"
    title: "Effectiveness of St John's wort in major depression: a randomized controlled trial"
    journal: "JAMA"
    year: 2001
    volume: "285"
    issue: "15"
    pages: "1978-86"
    pmid: "11308434"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/11308434/"
    doi: null
    study_design: "Randomized, double-blind, placebo-controlled clinical trial"
    duration: "8 weeks (following 1-week placebo run-in)"
    sample_size: 200
    population: "Adult outpatients (67% female, mean age 42.4 years, 85.9% white)"
    intervention:
      dose: "900 mg/day for 4 weeks, increased to 1200 mg/day if inadequate response"
    results: |
      - St John's wort was not effective for treatment of major depression
      - Remission rates: 14.3% (St. John's wort) vs 4.9% (placebo) - both remained low
      - No significant improvement over placebo in this severely depressed population
    adverse_effects: "Headache more frequent with St. John's wort (41%) than placebo (25%)"
    interpretation: "Negative trial in severe major depression - suggests limited efficacy in more severe cases"
    quality: "Large-scale RCT in major depression (200 patients)"

  - id: brattström2009_longterm
    authors: "Brattström A"
    title: "Long-term effects of St. John's wort (Hypericum perforatum) treatment: a 1-year safety study in mild to moderate depression"
    journal: "Phytomedicine"
    year: 2009
    pmid: "19299116"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/19299116/"
    doi: null
    study_design: "Open multicentre clinical trial"
    duration: "Up to 1 year"
    sample_size: 440
    population: "Outpatients with mild to moderate depression"
    intervention:
      extract: "Ze 117 (St. John's wort extract)"
      dose: "500 mg daily"
    safety_findings: |
      - 217 patients (49%) reported 504 adverse events
      - 30 adverse events (6%) possibly or probably related to treatment
      - Most common: gastrointestinal and skin complaints
      - No changes in clinical chemistry and electrocardiogram recordings
      - Body mass index remained stable
    conclusion: "Safe and effective way to treat mild to moderate depression over long periods of time"
    quality: "Long-term safety study, 440 patients, 1-year duration"

# PHARMACOKINETICS AND BIOAVAILABILITY

pharmacokinetics:
  - id: schulz2005_bioavailability
    authors: "Schulz HU, Schürer M, Bässler D, Weiser D"
    title: "Investigation of the bioavailability of hypericin, pseudohypericin, hyperforin and the flavonoids quercetin and isorhamnetin following single and multiple oral dosing of a hypericum extract containing tablet"
    journal: "Arzneimittelforschung"
    year: 2005
    volume: "55"
    issue: "1"
    pages: "15-22"
    pmid: "15727160"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/15727160/"
    doi: null
    study_type: "Clinical Trial, Phase I"
    sample_size: 36
    population: "Healthy male volunteers (18 per trial)"
    dosing_regimen:
      single_dose: "612 mg dry extract"
      multiple_dose: "Once-daily dosing for 14 consecutive days"
    bioavailability_data:
      hypericin:
        auc: "75.96 h × ng/ml"
        cmax: "3.14 ng/ml"
        tmax: "8.1 hours"
        half_life: "23.76 hours"
        bioavailability: "Low, approximately 15-20%"
      pseudohypericin:
        auc: "93.03 h × ng/ml"
        cmax: "8.50 ng/ml"
        tmax: "3.0 hours"
        half_life: "25.39 hours"
        bioavailability: "Low, approximately 15-20%"
      hyperforin:
        auc: "1009.0 h × ng/ml"
        cmax: "83.5 ng/ml"
        tmax: "4.4 hours"
        half_life: "19.64 hours"
        steady_state: "~100 ng/mL at 900 mg/day"
        half_life_repeat_dose: "9 hours"
    key_findings: |
      - Bioavailability of active constituents is low (15-20%) after oral administration
      - Hyperforin achieves higher plasma concentrations than hypericin compounds
      - Steady-state levels reached with daily dosing
    quality: "Phase I pharmacokinetic study, 36 healthy volunteers"

  - id: nicolussi2020_drug_interactions
    authors: "Nicolussi S, Drewe J, Butterweck V, Meyer Zu Schwabedissen HE"
    title: "Clinical relevance of St. John's wort drug interactions revisited"
    journal: "British Journal of Pharmacology"
    year: 2020
    volume: "177"
    issue: "6"
    pages: "1212-1226"
    pmid: "31742659"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/31742659/"
    doi: null
    study_type: "Comprehensive review of drug interactions"
    focus: "Pharmacokinetic interactions and mechanisms"
    key_findings:
      hyperforin_role: "Degree of CYP3A4 induction correlates significantly with hyperforin content"
      mechanism: "St. John's wort preparations are potent activators of PXR and hence inducers of cytochrome P450 enzymes (most importantly CYP3A4) and P-glycoprotein"
      low_hyperforin: "≤1 mg/day - no clinically relevant pharmacokinetic interactions observed"
      high_hyperforin: ">1 mg/day - significant drug interactions possible"
      affected_drugs: "Cyclosporine, digoxin, tacrolimus, indinavir, warfarin, alprazolam, simvastatin, oral contraceptives"
      clinical_significance: "Acute rejection episodes in two heart transplant patients due to reduced cyclosporine levels"
    recommendations: |
      - Low-hyperforin preparations (≤1 mg/day) preferred to minimize drug interactions
      - Avoid concurrent use with narrow therapeutic index drugs
      - Monitor patients on immunosuppressants, anticoagulants, and oral contraceptives
    quality: "Comprehensive review published in British Journal of Pharmacology 2020"

# SAFETY STUDIES

safety_studies:
  - id: schulz2006_safety_surveillance
    authors: "Schulz V"
    title: "Safety of St. John's Wort extract compared to synthetic antidepressants"
    journal: "Phytomedicine"
    year: 2006
    pmid: "16428030"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/16428030/"
    doi: null
    study_type: "Review and comparative study of post-marketing surveillance"
    surveillance_studies: 16
    total_participants: 34804
    large_scale_studies:
      count: 4
      participants: 14245
      adverse_event_rate: "0.1% to 2.4%"
    overall_adverse_event_rate: "0% to 6%"
    dropout_rate: "0.1% to 0.9%"
    key_findings: |
      - Adverse event rates at least ten-fold lower than synthetic antidepressants
      - Adverse effects mild and transient in nearly all cases
      - Drug interactions via CYP 3A4 and P-gp present risk for narrow therapeutic range medications
    comparison: "Substantially safer than synthetic antidepressants based on large-scale surveillance"
    quality: "16 post-marketing surveillance studies, 34,804 patients"

  - id: knüppel2004_adverse_effects
    authors: "Knüppel L, Linde K"
    title: "Adverse effects of St. John's Wort: a systematic review"
    journal: "Journal of Clinical Psychiatry"
    year: 2004
    volume: "65"
    issue: "11"
    pages: "1470-9"
    pmid: "15554758"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/15554758/"
    doi: null
    study_type: "Systematic review"
    evidence_sources:
      rcts: "35 double-blind randomized trials (hypericum vs placebo or standard antidepressants)"
      observational: "17 large observational studies (35,562 patients)"
      case_reports: "Case reports and surveillance agency data (1966-2003)"
    key_findings:
      rct_findings: "Adverse effect rates comparable to placebo, lower than older antidepressants, slightly lower than SSRIs"
      observational_findings: "Dropout rates due to adverse effects ranged from 0% to 5.7%; no interactions or serious adverse effects reported"
      primary_concern: "Drug interactions, particularly with cyclosporine in transplant patients, represented the most clinically relevant adverse effects"
    adverse_effect_categories:
      common: "Gastrointestinal symptoms, dizziness/confusion, tiredness/sedation"
      serious: "Drug interactions with medications metabolized by CYP 3A4 and P-gp"
      photosensitivity: "Severe skin reactions possible with high doses or topical application after sun exposure"
    quality: "Comprehensive systematic review: 35 RCTs + 17 observational studies (35,562 patients)"

  - id: safety_summary
    summary_of_safety_profile:
      overall_tolerability: "Generally well tolerated with mild adverse effects"
      common_adverse_effects: "Gastrointestinal symptoms (nausea, diarrhea), dizziness, confusion, tiredness/sedation, skin tingling"
      serious_adverse_effects: "Photosensitivity (with high doses or sun exposure), serotonin syndrome (when combined with other serotonergic drugs)"
      drug_interactions: |
        - Major interactions via CYP 3A4 and P-gp induction
        - Affects: immunosuppressants (cyclosporine, tacrolimus), anticoagulants (warfarin), oral contraceptives, HIV medications (indinavir), cardiovascular drugs (digoxin), statins, benzodiazepines
        - Use low-hyperforin preparations (≤1 mg/day) to minimize interactions
      contraindications:
        pregnancy: "May be unsafe - possible increased risk of birth defects"
        breastfeeding: "Caution recommended - insufficient data"
        serotonergic_drugs: "Risk of serotonin syndrome when combined with SSRIs, MAOIs, or other serotonergic medications"
      long_term_safety: "1-year study showed no changes in clinical chemistry, ECG, or BMI; safe for long-term use in mild to moderate depression"
      comparative_safety: "Ten-fold lower adverse event rates than synthetic antidepressants based on surveillance studies"
    quality_of_evidence: "Multiple RCTs, systematic reviews, and large-scale post-marketing surveillance studies support favorable safety profile"

