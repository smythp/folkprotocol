      rem_sleep: "Increased duration during 3-hour post-administration period"
      sleep_architecture:
        - "Enhanced NREM and REM sleep episode frequency"
        - "Increased wakefulness bouts while reducing their duration"
        - "Greater state transitions between wake and NREM sleep stages"
      conclusion: "Magnolol induces sleep through GABAergic pathway via benzodiazepine receptor site"

