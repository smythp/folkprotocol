  - id: alexeev_2012
    title: "The natural products magnolol and honokiol are positive allosteric modulators of both synaptic and extra-synaptic GABAA receptors"
    authors:
      - Alexeev, Mikhail
      - Grosenbaugh, Denise K
      - Mott, David D
      - Fisher, Janet L
    year: 2012
    journal: Neuropharmacology
    volume: 62
    issue: 8
    pages: "2507-2514"
    pubmed_id: "PMC3652012"
    pubmed_url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC3652012/"
    doi: "10.1016/j.neuropharm.2012.03.002"
    study_type: preclinical_mechanistic
    methods: "Whole-cell patch-clamp recordings from rat hippocampal neurons; recombinant GABAA receptors in mammalian cells; site-directed mutagenesis"
    key_findings:
      neuronal_effects: "Prolonged decay of evoked inhibitory postsynaptic currents (IPSCs) without changing peak amplitudes"
      tonic_currents: "Increased tonic currents by approximately 350-400%"
      mipsc_frequency: "Elevated miniature IPSC frequency, suggesting presynaptic effects"
