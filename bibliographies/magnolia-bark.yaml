        control_group: "20%"
      efficacy_judgments:
        es_group: "72.7%"
        control_group: "17.1%"
      acceptability:
        es_group: "93.9%"
        control_group: "31.4%"
      conclusion: "Magnolia extract and magnesium effective for psycho-affective and sleep disturbances in menopause, in addition to isoflavone effects on vasomotor symptoms"

  - id: xue_2020
