notes:
  - "Magnolia officinalis bark (Houpo/厚朴) has been used in Chinese and Japanese traditional medicine for thousands of years"
  - "Official in Chinese Pharmacopoeia (multiple editions including 2010, 2015) and European Pharmacopoeia - minimum 2.0% total honokiol and magnolol"
  - "No WHO or Commission E monographs exist (not traditionally used in Western/German phytotherapy)"
  - "Primary traditional uses: anxiety, asthma, depression, GI disorders, headache - partially supported by modern clinical evidence"
  - "Most robust clinical evidence for stress reduction, cortisol reduction, anxiety relief, and menopausal mood/sleep symptoms"
  - "Standardization to honokiol and magnolol content (typically 90% combined in supplements; 2.0% minimum in pharmacopoeia) improves quality consistency"
  - "Extremely low oral bioavailability (magnolol 4.9%; honokiol 0.7% in rats) remains major challenge, yet oral activity is clearly demonstrated"
  - "Dual GABA_A and CB1 receptor modulation provides unique anxiolytic profile distinct from benzodiazepines - potentially fewer side effects"
  - "Novel binding site on GABA_A receptor distinct from benzodiazepines, neurosteroids, anesthetics, and ethanol"
  - "Safety profile excellent based on available data: no serious adverse events in human trials up to 1 year, NOAEL >240 mg/kg/day in animals"
  - "Quality control using HPLC and 1H NMR methods ensures consistent product standardization"
  - "Practically no clinical studies published in English; most research in Chinese/Japanese languages or preclinical"
  - "Xue 2020 study important as rare example of pure magnolia (not combination product) in clinical trial"
  - "Future research priorities: human PK studies, magnolia-only formulations, enhanced bioavailability strategies, sleep disorder RCTs, dose-ranging studies, long-term safety beyond 1 year"
