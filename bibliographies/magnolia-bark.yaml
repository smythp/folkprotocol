    sample_size: 56
    demographics: "35 men, 21 women screened for moderate stress"
    intervention:
      product: "Relora® (Next Pharmaceuticals) - standardized combination of Magnolia bark and Phellodendron bark extracts"
      duration: "4 weeks"
    key_findings:
      cortisol:
        result: "18% lower (p<0.05)"
        measure: "Salivary cortisol exposure"
      mood_state_improvements:
        - metric: "Overall Stress"
          result: "11% reduction (p<0.05)"
        - metric: "Tension"
          result: "13% reduction (p<0.05)"
        - metric: "Depression"
          result: "20% reduction (p<0.05)"
        - metric: "Anger"
          result: "42% reduction (p<0.05)"
        - metric: "Fatigue"
          result: "31% reduction (p<0.05)"
        - metric: "Confusion"
          result: "27% reduction (p<0.05)"
        - metric: "Global Mood State"
          result: "11% improvement (p<0.05)"
        - metric: "Vigor"
          result: "18% increase (p<0.05)"
      conclusion: "Daily supplementation with Relora® reduces cortisol exposure and perceived daily stress while improving mood parameters"

