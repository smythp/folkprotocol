    - "Lactation (insufficient safety data)"

  potential_concerns:
    - "High potentiation of aristolochic acid genotoxicity by M. officinalis demonstrated - may explain some Chinese herb nephropathy cases"
    - "Magnolia bark can be toxic and has been linked to kidney disease and permanent kidney failure in some reports (mechanisms unclear)"
    - "At elevated concentrations, honokiol may lead to gastrointestinal disturbances and hepatotoxicity (specific doses not established)"
    - "Although herbs containing magnolia are part of herbal formulae implicated in hepatotoxicities, causality assessment is often lacking"

  hepatoprotective_effects:
