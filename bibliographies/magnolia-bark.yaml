bioavailability_notes:
  honokiol:
    - "Low oral bioavailability and rapidly metabolized by liver"
    - "Hepatic extraction ratio in rats: 0.99 ± 0.01; clearance: 35.8 ± 0.04 mL/min"
    - "Bioavailability in rats: F = 0.007 ± 0.001 (extremely low - 0.7%)"
    - "Despite low bioavailability, honokiol is orally bioavailable and crosses the blood-brain barrier"
    - "Protein binding in human plasma: 60-65% at concentrations of 0.5-20 μg/mL"
    - "Peak plasma: 40.3 ± 30.8 ng/mL at 0.45 h post-oral administration (emulsion, rats)"
    - "Absolute bioavailability: 5.3 ± 11.7% (oral emulsion, rats)"

  magnolol:
    - "Poor aqueous solubility; only 4.9% oral bioavailability (Lin 2021)"
    - "Peak plasma: 426.4 ± 273.8 ng/mL at 1.20 h post-oral administration (emulsion, rats)"
    - "Absolute bioavailability: 17.5 ± 9.7% (oral emulsion, rats)"
    - "Extensive first-pass metabolism to sulfates and glucuronides"

  human_data:
    - "No human pharmacokinetic data available for honokiol as of recent studies (speculative only)"
    - "No indications on pharmacokinetic profile of magnolol in humans available"
    - "Only one study with extract containing <90% total neolignans in 7 healthy subjects and 10 asthmatic patients (Saiboku-To extract)"

  formulation_strategies:
    - "Nanoparticles, liposomes, solid dispersions, nanoemulsions under investigation"
    - "Nanoemulsion delivery improved bioavailability: magnolol by 3.03-fold, honokiol by 3.47-fold"
    - "Solid dispersions, phospholipid complexes, emulsions improved bioavailability and stability up to 2.98-fold (Lin 2021)"

  metabolism:
    - "Different metabolite profiles: IV administration produces magnolol glucuronides; oral produces sulfates/glucuronides in bloodstream"
    - "CYP2E1 manages oxidation to epoxy metabolites; CYP3A4 responsible for hydrolytic metabolism; CYP1A2 promotes decarboxylation"
    - "Glucuronidation metabolism similar to dietary polyphenols with relatively quick clearance"

  distribution:
    - "Tissue distribution: unmodified magnolol/honokiol predominate in organs; liver shows highest accumulation"
    - "Brain penetration variable; improved when combined with Gardenia jasminoides"
    - "Oral honokiol distributed rapidly to all organs with highest concentration in brain, liver, kidneys"
    - "~50% secreted in bile, ~60-65% plasma protein bound, ~27% excreted in urine"
    - "Elimination half-life (t1/2): 49.05-56.24 minutes (honokiol)"

  processing_effects:
    - "Processing affects pharmacokinetics: processed MO showed 36% increased AUC and 24% increased Cmax for honokiol versus unprocessed"

safety_summary:
  general_safety: "Magnolia bark extract and its constituents (magnolol and honokiol) are considered safe by multiple food safety authorities"

  human_clinical_trials:
    duration: "Up to 1 year without adverse effects reported"
    adverse_events: "Generally mild and infrequent when reported"
    specific_trials: "No adverse events in Kalman 2008 study; 1-1.2% adverse events in menopausal studies (comparable to control)"

  toxicology_studies:
    genotoxicity: "No mutagenic and genotoxic potential demonstrated in vitro and in vivo"
    noael: ">240 mg/kg body weight per day (OECD guidelines, subchronic study)"
    long_term_safety: "Intervention trials up to 1 year showed no adverse effects"

  metabolism:
