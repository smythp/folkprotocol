    pubmed_id: "16957676"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/16957676/"
    study_type: randomized_controlled_trial
    design: multicenter_controlled
    sample_size: 89
    demographics: "Mean age 53.8 years"
    intervention:
      es_group: "Soy isoflavones (60 mg) + lactobacilli (500 million spores) + calcium (141 mg) + vitamin D3 (5 mcg) + Magnolia bark extract (60 mg) + magnesium (50 mg)"
      control_group: "Calcium + vitamin D3 only"
