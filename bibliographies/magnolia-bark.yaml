    intervention:
      compound: "Magnolol"
      route: "Intraperitoneal"
      doses: "5 mg/kg and 25 mg/kg"
    key_findings:
      mechanism: "Acts via benzodiazepine site of GABA(A) receptor - effects reversed by flumazenil (benzodiazepine antagonist)"
