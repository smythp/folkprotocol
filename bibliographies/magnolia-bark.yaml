randomized_controlled_trials:
  - id: kalman_2008
    title: "Effect of a proprietary Magnolia and Phellodendron extract on stress levels in healthy women: a pilot, double-blind, placebo-controlled clinical trial"
    authors:
      - Kalman, Douglas S
      - Feldman, Samantha
      - Feldman, Robert
      - Schwartz, Howard I
      - Krieger, Diane R
      - Garrison, Robert
    year: 2008
    journal: Nutrition Journal
    volume: 7
    pages: "11"
    pubmed_id: "18426577"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/18426577/"
    pmcid: "PMC2359758"
    study_type: randomized_controlled_trial
    design: double_blind_placebo_controlled_pilot
    sample_size_enrolled: 40
    sample_size_completed: 26
    population: "Healthy, overweight premenopausal female adults who eat more in response to stress"
    intervention:
      product: "Relora (proprietary blend of Magnolia officinalis and Phellodendron amurense extracts)"
      standardization: "Not less than 1.5% honokiol and 0.1% berberine"
      dose: "250 mg"
      frequency: "Three times daily"
      duration: "6 weeks"
    key_findings:
      anxiety_state:
        result: "Significantly reduced temporary, transitory anxiety versus placebo"
        measure: "Spielberger STATE anxiety questionnaire"
        interpretation: "Effective for acute anxiety"
      anxiety_trait: "No significant effect on trait anxiety"
      cortisol_amylase: "No significant changes in salivary cortisol or amylase levels"
      sleep: "No significant changes in sleep quality/latency"
      appetite_body_composition: "No significant changes"
      adverse_events: "No adverse events occurred"
      conclusion: "Relora effective for reducing temporary anxiety; safe and well-tolerated"

  - id: talbott_2013
