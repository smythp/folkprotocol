    - "Clinical trial: 400 mg/day magnolia extract for 12 weeks reduced liver fat content and liver damage (ALT levels) in 74 people with NAFLD"
    - "Magnolia officinalis reverses alcoholic fatty liver in preclinical models"
    - "Evidence suggests hepatoprotective rather than hepatotoxic effects at therapeutic doses"

  special_considerations:
