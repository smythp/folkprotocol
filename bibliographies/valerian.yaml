# Dosing and Standardization
dosing_information:
  traditional_dosing:
    - preparation: "Dried root/rhizome"
      dose_range: "2-3 g"
      frequency: "Multiple times daily or single dose before bedtime"
    - preparation: "Tincture (1:5, 45% ethanol)"
      dose: "1-3 mL"
    - preparation: "Fluid extract"
      dose: "2-3 mL"
    - preparation: "Aqueous extract"
      dose: "400-900 mg"

  clinical_trial_dosing:
    - study: "Shekhar 2024"
      dose: "Standardized extract (dose not specified)"
      duration: "8 weeks"
      outcome: "Significant improvement"
    - study: "Zare Elmi 2021"
      dose: "530 mg valerian extract capsules"
      frequency: "Daily for 30 nights"
      outcome: "Significant improvement"
    - study: "Roh 2019"
      dose: "100 mg valerian root extract"
      frequency: "Three times daily"
      duration: "4 weeks"
      outcome: "EEG changes, anxiety reduction"
    - study: "Anderson 2005 PK study"
      dose: "600 mg single dose"
      note: "Standard PK reference dose"

  standardization_considerations:
    marker_compound: "Valerenic acid"
    quality_issues:
      - "Variable extract quality affects clinical outcomes"
      - "Whole root/rhizome preparations may be more reliable than isolated extracts"
      - "Valepotriate content varies by preparation method and stability"
      - "European Pharmacopoeia method preferred for valerenic acid analysis"
    recommendations:
      - "Use standardized preparations from reputable manufacturers"
      - "Follow pharmacopoeial quality standards (USP, EP, BP)"
      - "Consider whole root preparations for more consistent effects"

# Key Research Gaps and Recommendations
research_needs:
  - "Long-term safety studies (>6 months)"
  - "Standardization of preparations and dosing across trials"
  - "Clarification of active constituents and mechanisms"
  - "Resolution of pharmacokinetic variability and clinical implications"
  - "Head-to-head comparisons of whole root vs standardized extracts"
  - "Identification of optimal marker compounds for quality control"
  - "Studies with adequate sample sizes and rigorous methodology"
  - "Investigation of hepatotoxicity mechanism and risk factors"

# Summary Points
summary:
  efficacy:
    - "Moderate evidence for subjective sleep quality improvement"
    - "Limited evidence for objective sleep parameter improvements"
    - "Possible anxiolytic effects"
    - "Variable clinical outcomes likely due to extract quality differences"
    - "Whole root/rhizome preparations may be more reliable"

  safety:
    - "Generally well-tolerated with minimal adverse effects"
    - "No severe adverse events in subjects aged 7-80 years"
    - "Rare hepatotoxicity reported (likelihood score C)"
    - "No reproductive or developmental toxicity at high doses"
    - "No genotoxicity demonstrated"
    - "Long-term safety data lacking"

  pharmacokinetics:
    - "Peak valerenic acid levels at 1-2 hours post-dose"
    - "Elimination half-life ~1 hour"
    - "No accumulation with repeated dosing"
    - "High inter- and intra-subject variability"
    - "Variability may explain inconsistent clinical effects"

  quality_control:
    - "Well-established in major pharmacopoeias (USP, EP, BP)"
    - "Multiple standardized preparations available"
    - "Valerenic acid used as marker compound"
    - "Quality variability remains a clinical concern"

