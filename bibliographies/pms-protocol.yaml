---
# PMS Protocol Bibliography
# Compiled from systematic reviews, clinical trials, and mechanism studies
# Focus: comparative effectiveness, combination formulas, symptom-specific treatments

meta:
  protocol_name: PMS Protocol
  indication: Premenstrual syndrome (PMS) and premenstrual dysphoric disorder (PMDD)
  compiled_date: 2026-01-15
  search_focus:
    - Systematic reviews on herbal treatments for PMS
    - Head-to-head trials comparing herbs for PMS
    - Traditional formulas used for PMS
    - Mechanism studies (hormonal, neurotransmitter pathways)
    - Comparative effectiveness
    - Combination formulas
    - Symptom-specific treatments

systematic_reviews_meta_analyses:
  - id: herbal_nutritional_pms_2022
    title: "A Systematic Review and Meta-Analysis of Premenstrual Syndrome with Special Emphasis on Herbal Medicine and Nutritional Supplements"
    journal: Pharmaceuticals
    year: 2022
    volume: 15
    issue: 11
    pubmed_id: "36355543"
    study_type: systematic_review_meta_analysis
    database_search_period: "Screened 754 articles"
    trials_included: 15
    sample_size: 1211
    key_findings:
      overall_effect: "Herbal medicine and nutritional supplements may be effective and safe for PMS"
      symptom_reduction: "Reduced symptom scores with substantial heterogeneity"
      most_studied_herb: "Vitex agnus castus (4 trials, ~500 women)"
      vitex_effectiveness: "Consistently ameliorated PMS better than placebo"
      other_effective_herbs:
        - "Ginkgo biloba (single trial)"
        - "Crocus sativus/saffron (single trial)"
      adverse_events: "Mild adverse events reported by 4 RCTs"
      safety: "None of the herbs associated with major health risks"
    pmc_url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC9699062/"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/36355543/"
    url: "https://www.mdpi.com/1424-8247/15/11/1371"

  - id: herbal_treatments_systematic_2011
    title: "Herbal treatments for alleviating premenstrual symptoms: A systematic review"
