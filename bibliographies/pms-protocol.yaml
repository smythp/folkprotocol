comparative_effectiveness_summary:
  tier_1_highest_evidence:
    - herb: "Vitex agnus-castus"
      evidence: "4 trials, ~500 women; 2.57x more likely to experience remission vs placebo"
      best_for: "Overall PMS symptoms, especially physical symptoms and breast pain"
      mechanism: "Dopaminergic; reduces prolactin, increases progesterone"
    - herb: "Saffron (Crocus sativus)"
      evidence: "Multiple RCTs; as effective as fluoxetine for PMDD"
      best_for: "Psychological symptoms, depression, PMDD"
      mechanism: "Inhibits reuptake of dopamine, norepinephrine, serotonin"

  tier_2_good_evidence:
    - herb: "Curcumin"
      evidence: "6 of 10 RCTs positive; significant reductions in mood, behavioral, physical symptoms"
      best_for: "Overall PMS symptoms"
      mechanism: "Anti-inflammatory, modulates neurotransmitters"
    - herb: "Ginkgo biloba"
      evidence: "RCTs showing effectiveness, particularly for congestive symptoms"
      best_for: "Breast pain/tenderness, congestive symptoms"
      mechanism: "Improves circulation, reduces inflammation"
    - herb: "Lemon balm"
      evidence: "RCTs; significant reductions in anxiety (SMD: -0.98), insomnia (42% reduction)"
      best_for: "Anxiety, depression, insomnia, behavioral symptoms"
      mechanism: "GABAergic (increases GABA concentration)"

  tier_3_promising_evidence:
    - herb: "Fennel"
      evidence: "Meta-analysis of 12 RCTs; similar to conventional drugs for dysmenorrhea"
      best_for: "Menstrual pain, pelvic pain, lethargy"
    - herb: "Chamomile"
      evidence: "Systematic review of 8 RCTs; more effective than placebo for pain"
      best_for: "Menstrual pain, general physical and psychological symptoms"
    - herb: "Valerian"
      evidence: "Double-blind trial; significant improvements in all symptom categories"
      best_for: "Emotional, behavioral, physical symptoms"
    - herb: "White Peony (Paeonia lactiflora)"
      evidence: "RCTs for hormonal balance; reduces prolactin, increases progesterone"
      best_for: "Hormonal imbalances, PCOS-related symptoms"
    - herb: "Bupleurum (Chai Hu)"
      evidence: "Traditional use; key component of most effective TCM formulas"
      best_for: "Liver Qi stagnation pattern, PMS-related depression"

  tier_4_limited_evidence:
    - herb: "St. John's wort"
      note: "Effective for physical and behavioral symptoms but NOT for mood/anxiety"
      limitation: "SSRIs preferred for psychological symptoms"
    - herb: "Dong Quai"
      note: "Traditional use extensive but clinical evidence limited and inconsistent"
    - herb: "Passionflower"
      note: "Effective for anxiety but specific PMS/PMDD trials lacking"

  best_traditional_combinations:
    top_tier:
      - formula: "Jia-Wei-Xiao-Yao-San (JWXYS)"
        prevalence: "37.5% of all PMS prescriptions"
        evidence: "Clinical trial: p < 0.01 for physical, psychological symptoms"
        components: "8 herbs including Bupleurum, White Peony, Dong Quai"
      - formula: "Chaihu Shugan Powder"
        evidence: "Widely used, especially for PMS-related depression"
    common_additions:
      - "JWXYS + Cyperus rotundus (7.7% of prescriptions)"
      - "JWXYS + Leonurus heterophyllus (5.9%)"

  nutrient_combinations:
    - combination: "Calcium + Vitamin B6"
      evidence: "Overall symptoms decreased more significantly with combination"
    - combination: "Magnesium + Vitamin B6"
      evidence: "Highest effectiveness in relieving PMS symptoms"

research_gaps:
  - "Limited head-to-head trials comparing different herbs for PMS"
  - "Most research compares herbs to placebo rather than to each other"
  - "No comparative studies of Vitex with SSRIs and oral contraceptive pills"
  - "Optimal dosages and treatment durations not well established for many herbs"
  - "Need for larger, higher-quality RCTs with standardized preparations"
  - "Mechanism studies needed for many traditional combinations"
  - "Long-term safety data needed (most studies 3 months or less)"
  - "Differential effectiveness for specific PMS symptom clusters needs more research"

