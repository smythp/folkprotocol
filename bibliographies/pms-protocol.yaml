    year: 2011
    pubmed_id: "21171936"
    study_type: systematic_review
    key_findings:
      effective_herbs:
        - "Vitex agnus-castus"
        - "Hypericum perforatum (St. John's wort)"
        - "Matricaria chamomilla (Chamomile)"
        - "Crocus sativus (Saffron)"
        - "Curcumin"
        - "Melissa officinalis (Lemon balm)"
        - "Zataria multiflora"
