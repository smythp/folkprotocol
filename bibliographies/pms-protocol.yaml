  - "Vitex agnus-castus has the most robust evidence for overall PMS treatment"
  - "Saffron shows promise as effective as SSRIs for PMDD with better side effect profile"
  - "Traditional Chinese Medicine formulas (especially JWXYS) have good evidence for PMS"
  - "Combination approaches may offer synergistic benefits over single herbs"
  - "Symptom-specific herb selection improves outcomes (e.g., ginkgo for breast pain, fennel for dysmenorrhea)"
  - "Herbal treatments generally have favorable safety profiles with mild adverse events"
  - "Treatment duration of at least 3 cycles recommended before assessing effectiveness"
  - "Quality and standardization of commercial products varies significantly"
  - "TCM pattern differentiation approach may improve treatment specificity"
  - "Nutrients (calcium, magnesium, B6) can complement herbal treatments"
  - "SSRIs remain first-line for severe PMDD, but herbs may be alternative for milder cases"
  - "Most effective herbs have multi-target mechanisms (hormonal, neurotransmitter, anti-inflammatory)"
