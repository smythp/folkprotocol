head_to_head_comparisons:
  - id: vitex_vs_fluoxetine_atmaca_2002
    title: "Vitex agnus castus versus fluoxetine for PMDD"
    study: "Atmaca et al, 2002"
    study_type: randomized_controlled_trial
    sample_size: 41
    condition: "PMDD"
    duration: "2 months"
    comparison:
      intervention: "Vitex agnus castus"
      comparator: "Fluoxetine (SSRI)"
    key_findings:
      fluoxetine_effect: "Helped psychological symptoms"
      vitex_effect: "Reduced physical symptoms"
      conclusion: "Different symptom profiles for each treatment"

  - id: vitex_vs_fluoxetine_general
    title: "Vitex agnus-castus compared to fluoxetine and vitamin B6"
    study_type: controlled_comparative_trials
    number_of_trials: 2
    key_findings:
      vs_fluoxetine: "Chasteberry showed equivalent efficacy to fluoxetine"
      vs_vitamin_b6: "Chasteberry showed equivalent efficacy to vitamin B6"
      note: "Vitamin B6 is not considered a proven remedy for PMS, so equal effectiveness less meaningful"

  - id: vitex_meta_analysis_2019
    title: "Vitex agnus-castus in premenstrual syndrome: A meta-analysis of double-blind randomised controlled trials"
    authors:
      - Cerqueira, Rafael O
      - Frey, Benicio N
      - Leclerc, Erika
      - Brietzke, Elisa
    journal: Phytomedicine
    year: 2019
    pubmed_id: "31780016"
    study_type: meta_analysis
    design: double_blind_randomized_controlled_trials
    key_findings:
      efficacy: "Women taking VAC 2.57 (95% CI 1.52-4.35) times more likely to experience symptom remission vs placebo"
      positive_studies: "13 of 14 studies reported positive effects on total premenstrual symptoms"
      comparators: "Compared to placebo, dietary supplements, or active comparators (oral contraceptives, SSRIs)"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/31780016/"
    sciencedirect_url: "https://www.sciencedirect.com/science/article/abs/pii/S0965229919306053"

individual_herbs_mechanisms:
  vitex_agnus_castus:
    species: "Vitex agnus-castus"
    common_names:
      - "Chasteberry"
      - "Chaste tree berry"
    active_compounds:
      primary: "Dopaminergic compounds"
    mechanism_of_action:
      hormonal:
        primary_action: "Modulates stress-induced prolactin secretion via dopaminergic actions"
        prolactin_effect: "Decreases prolactin levels"
        downstream_effects:
          - "Reversal of LH suppression"
          - "Full development of corpus luteum"
          - "Increased progesterone levels"
          - "Reduced PMS symptoms"
        fsh_lh_effects: "Reduces FSH, increases LH"
        estrogen_progesterone: "Decreased estrogen, increased progesterone"
        hyperfolliculinism: "Reduces synthesis of FSH and estrogen (one cause of PMS)"
      receptor_interactions:
        - "μ (mu)-opioid receptors"
        - "δ (delta)-opioid receptors"
        - "Dopamine receptors"
    clinical_applications:
      breast_pain: "Dopaminergic compounds improve premenstrual mastodynia"
      general_pms: "Possibly improves other PMS symptoms"
    evidence_quality: "Most studied herb for PMS, 4 trials with ~500 women"
    sources:
      - pmc_url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC6494412/"
      - drugbank_url: "https://go.drugbank.com/drugs/DB13193"

  saffron:
    species: "Crocus sativus"
    common_name: "Saffron"
    active_compounds:
      primary:
        - "Crocin"
        - "Picrocrocin"
        - "Safranal"
    mechanism_of_action:
      neurotransmitter_modulation:
        - "Inhibition of dopamine reuptake"
        - "Inhibition of norepinephrine reuptake"
        - "Inhibition of serotonin reuptake"
      hormonal:
        - "Increased cortisol levels (saffron odor exposure)"
        - "Decreased 17-β estradiol levels"
        - "Reduced anxiety scores in both follicular and luteal phases"
      antioxidant:
        - "Strong antioxidant properties"
        - "Crocin, crocetin, and safranal as main active ingredients"
    clinical_trials:
      agha_hosseini_2008:
        design: "Double-blind, randomized, placebo-controlled"
        dose: "30 mg/day (15 mg twice daily)"
        duration: "Two menstrual cycles"
        outcomes:
          - "Significant differences in Total Premenstrual Daily Symptoms"
          - "Significant differences in Hamilton Depression Rating Scale"
        pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/18271889/"
      student_study:
        sample_size: 78
        dose: "30 mg dried saffron extract once daily"
        statistical_significance: "P < 0.001 compared to placebo"
        sciencedirect_url: "https://www.sciencedirect.com/science/article/abs/pii/S187638201530010X"
      pmdd_study:
        sample_size: 120
        condition: "PMDD"
        comparison: "Saffron vs fluoxetine vs placebo"
        outcomes:
          - "Saffron significantly reduced symptom severity vs placebo"
          - "Saffron as effective as fluoxetine in improving PMDD symptoms"
        pmc_url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC7792881/"
    sources:
      - researchgate_url: "https://www.researchgate.net/publication/300379660_Crocus_sativus_L_saffron_in_the_treatment_of_premenstrual_syndrome_a_double_blind_randomized_and_placebo_controlled_trial"

