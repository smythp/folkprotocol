    journal: International Journal of Chemical and Biochemical Sciences
    year: 2024
    study_type: comprehensive_literature_review
    researchgate_url: "https://www.researchgate.net/publication/378736891_Traditional_herbal_interventions_for_premenstrual_syndrome_management_A_comprehensive_literature_review"

  - id: iranian_herbal_pms_2018
