# SAFETY AND TOXICOLOGY STUDIES

safety_toxicology:
  - id: gautam2014_toxicology
    authors: "Gautam MK, Goel RK"
    title: "Toxicological Study of Ocimum sanctum Linn Leaves: Hematological, Biochemical, and Histopathological Studies"
    journal: "Journal of Toxicology"
    year: 2014
    volume: "2014"
    article_id: "135654"
    pmid: "24616736"
    pmcid: "PMC3927567"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/24616736/"
    pmc_url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC3927567/"
    study_type: "Acute and subacute toxicity study"
    acute_phase:
      species: "Mice"
      dosages: "200, 600, 2000 mg/kg"
      formulation: "50% ethanolic extract (OSE)"
      observation: "14 days"
    subacute_phase:
      species: "Rats"
      dosages: "200, 400, 800 mg/kg"
      duration: "28 consecutive days"
      route: "Oral gavage"
    acute_findings: "OSE did not produce any hazardous symptoms or death and CNS and ANS toxicities"
    subacute_findings: "No mortality, behavioral changes, or alterations in food/water consumption observed"
    biochemical_parameters: "All parameters unchanged including liver enzymes (AST, ALT, ALP), kidney function (creatinine), glucose, cholesterol, complete blood counts"
    histopathology: "No change observed both in macroscopic and microscopic aspects of vital organs (liver, kidney, spleen, heart, reproductive tissues)"
    conclusions: "Ocimum sanctum extract could be safe for human use"
    recommendations: "Additional teratogenic, mutagenic, and carcinogenic studies to complete safety profile"
    quality: "Comprehensive toxicology study with acute and subacute phases"

  - id: chandrasekaran2013_genotoxicity
    authors: "Chandrasekaran CV, Srikanth HS, Anand MS, Allan JJ, Viji MMH, Amit A"
    title: "Evaluation of the mutagenic potential and acute oral toxicity of standardized extract of Ocimum sanctum (OciBest™)"
    journal: "Human & Experimental Toxicology"
    year: 2013
    volume: "32"
    issue: "9"
    pages: "992-1004"
    pmid: "23424203"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/23424203/"
    doi: "10.1177/0960327112472992"
    study_type: "Genotoxicity and acute toxicity battery"
    test_methods:
      - "Bacterial reverse mutation (Ames test)"
      - "Chromosome aberration analysis"
      - "Micronucleus test"
      - "Acute oral toxicity"
    bacterial_reverse_mutation:
      strains: "Salmonella typhimurium (TA98, TAMix)"
      dosage_range: "7.9-2500.0 µg/mL"
      metabolic_activation: "With and without S9"
      result: "Did not increase histidine revertant colonies"
    chromosome_aberration:
      dosage_range: "10.0-100.0 µg/mL"
      exposure: "4-hour and 18-hour"
      metabolic_activation: "With and without S9"
      result: "No structural chromosomal aberrations"
    micronucleus:
      dosage_range: "10.0-100.0 µg/mL"
      metabolic_activation: "With and without S9"
      result: "No increase in micronucleus induction"
    acute_toxicity:
      species: "Wistar rats"
      dose: "5 g/kg"
      observation: "14 days"
      result: "No treatment-related toxic effects"
    conclusions: "OciBest™ is not genotoxic in bacterial reverse mutation, chromosomal aberration and micronucleus tests"
    safety: "No genotoxic potential demonstrated across all test systems"
    quality: "Comprehensive genotoxicity battery following standard protocols"

