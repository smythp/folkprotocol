# NOTES

notes: |
  - Holy basil (Ocimum sanctum/Ocimum tenuiflorum) has strong evidence base from systematic reviews and multiple RCTs
  - Standardized extracts (HolixerTM, OciBest) show consistent efficacy and safety
  - Dosing ranges from 250-1200 mg daily depending on indication and extract standardization
  - Safety profile excellent: no significant adverse events in systematic review of 24 trials
  - Traditional use in Ayurveda for 3000+ years supported by modern clinical evidence
  - Key bioactive compounds: eugenol, ursolic acid, rosmarinic acid, ociglycoside
  - Applications span metabolic, neuropsychiatric, immune, and antimicrobial domains
  - No WHO or Commission E monograph (herb from Indian tradition, not European)
  - Ayurvedic Pharmacopoeia of India provides official monograph
  - Bioavailability challenges being addressed with novel delivery systems (NLCs)
