# SYSTEMATIC REVIEWS AND META-ANALYSES

systematic_reviews:
  - id: jamshidi2017_efficacy_safety
    authors: "Jamshidi N, Cohen MM"
    title: "The Clinical Efficacy and Safety of Tulsi in Humans: A Systematic Review of the Literature"
    journal: "Evidence-based Complementary and Alternative Medicine"
    year: 2017
    pmid: "28400848"
    pmcid: "PMC5376420"
    doi: null
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/28400848/"
    pmc_url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC5376420/"
    study_type: "Systematic literature review"
    trials_included: 24
    initial_screening: 1553
    domains_reviewed: "Metabolic disorders (17 trials), neurocognitive/mood effects (4 trials), immune function/viral infections (5 trials)"
    dosing_range: "250 mg to 3,000 mg daily"
    duration_range: "2-13 weeks"
    key_findings: |
      - Metabolic effects: Fasting blood glucose improved 1.2-2.2 fold over 12-13 weeks
      - Postprandial glucose improved 1.5-6.0 fold
      - HbA1c improved 1.5-3.2 fold
      - Demonstrated promise for diabetes, metabolic syndrome, psychological stress
      - Need for larger, longer-duration studies with standardized formulations
    safety: "All studies reported favourable clinical outcomes with no significant adverse events; only one trial documented mild transient nausea"
    quality: "Systematic review of human clinical trials"

  - id: kamble2022_anticandidal
    authors: "Kamble S, Gade G, Bapat A, Gaur P, Patil RH"
    title: "Anti-candidal Effect of Ocimum sanctum: A Systematic Review on Microbial Studies"
    journal: "Journal of Pharmacy and Bioallied Sciences"
    year: 2022
    pmid: null
    pmcid: "PMC9166562"
    pmc_url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC9166562/"
    study_type: "Systematic review following PRISMA guidelines"
    focus: "Anti-candidal effects of Ocimum sanctum"
    databases_searched: "PubMed, Cochrane Library"
    search_period: "Through 2021"
    key_findings: |
      - Systematic evaluation of anti-candidal properties
      - Evidence of antimicrobial efficacy against Candida species
    quality: "PRISMA-compliant systematic review"

# RANDOMIZED CONTROLLED TRIALS

randomized_controlled_trials:
  - id: lopresti2022_holixer_stress
    authors: "Lopresti AL, Smith SJ, Metse AP, Drummond PD"
    title: "A randomized, double-blind, placebo-controlled trial investigating the effects of an Ocimum tenuiflorum (Holy Basil) extract (HolixerTM) on stress, mood, and sleep in adults experiencing stress"
    journal: "Frontiers in Nutrition"
    year: 2022
    volume: "9"
    pmid: "36185698"
    pmcid: "PMC9524226"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/36185698/"
    pmc_url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC9524226/"
    study_type: "Two-arm, parallel-group, randomized, double-blind, placebo-controlled trial"
    sample_size: 100
    completers: 85
    age_range: "18-65 years"
    intervention:
      product: "HolixerTM"
      dosage: "125 mg twice daily (250 mg/day total)"
      duration: "8 weeks"
      formulation: "Two capsules twice daily"
    primary_outcomes:
      - measure: "Perceived Stress Scale (PSS)"
        result: "37% decrease in treatment vs 19% in placebo"
        statistic: "p = 0.003"
    secondary_outcomes:
      - measure: "Athens Insomnia Scale"
        result: "48% reduction vs 27% placebo"
        statistic: "p = 0.025"
      - measure: "Hair cortisol"
        result: "Significantly lower in treatment group"
        statistic: "p = 0.025"
      - measure: "MAST stress response"
        result: "Lower salivary cortisol, amylase, blood pressure"
        statistic: "p = 0.001 for cortisol and amylase"
    key_findings: |
      - Treatment reduced both subjective stress and objective physiological markers
      - Significant improvements in stress perception and sleep quality
      - Reduced hair cortisol (chronic stress marker)
      - Reduced acute stress response (salivary biomarkers)
    safety: "No serious adverse events; 83% reported no adverse effects"
    quality: "Well-designed RCT with objective and subjective measures"

  - id: saxena2012_ocibest_stress
    authors: "Saxena RC, Singh R, Kumar P, Negi MPS, Saxena VS, Geetharani P, Allan JJ, Venkateshwarlu K"
    title: "Efficacy of an Extract of Ocimum tenuiflorum (OciBest) in the Management of General Stress: A Double-Blind, Placebo-Controlled Study"
    journal: "Evidence-Based Complementary and Alternative Medicine"
    year: 2012
    volume: "2012"
    pmid: "21977056"
    pmcid: "PMC3185238"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/21977056/"
    pmc_url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC3185238/"
    study_type: "Randomized, double-blind, placebo-controlled trial"
    sample_size: 150
    enrollment: 158
    placebo_group: 79
    treatment_group: 71
    location: "Two centers in Lucknow, India"
    study_period: "April 2008 - September 2009"
    intervention:
      product: "OciBest"
      dosage: "1200 mg actives daily"
      duration: "6 weeks"
      formulation: "400 mg capsules"
      standardization: "Ociglycoside-I (>0.1% w/w), rosmarinic acid (>0.2% w/w), triterpene acids (>2.5%)"
    outcomes:
      - symptom: "Forgetfulness"
        effect_size: "70%"
        significance: "p ≤ 0.05"
      - symptom: "Sexual dysfunction"
        effect_size: "62%"
        significance: "p ≤ 0.05"
      - symptom: "Exhaustion"
        effect_size: "39%"
        significance: "p ≤ 0.05"
      - symptom: "Sleep disturbance"
        effect_size: "37%"
        significance: "p ≤ 0.05"
    key_findings: |
      - OciBest 39% more effective than placebo for stress symptom management
      - Significant improvements in forgetfulness (70% effect size)
      - Reduced sexual problems, exhaustion, and sleep issues
      - Overall improvement 1.6 times greater than placebo
    safety: "No adverse events reported in either group"
    quality: "Double-blind RCT with good sample size"

  - id: sampath2015_cognitive
    authors: "Sampath S, Mahapatra SC, Padhi MM, Sharma R, Talwar A"
    title: "Holy basil (Ocimum sanctum Linn.) leaf extract enhances specific cognitive parameters in healthy adult volunteers: A placebo controlled study"
    journal: "Indian Journal of Physiology and Pharmacology"
    year: 2015
    volume: "59"
    issue: "1"
    pages: "69-77"
    pmid: "26571987"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/26571987/"
    study_type: "Randomized controlled trial, double-blind"
    intervention:
      dosage: "300 mg daily"
      duration: "30 days"
      formulation: "Ethanolic leaf extract capsules"
    cognitive_outcomes:
      - measure: "Sternberg test reaction time (RT)"
        result: "Significant improvement vs placebo"
      - measure: "Sternberg test error rate (ER)"
        result: "Significant improvement vs placebo"
      - measure: "Neutral task RT"
        result: "Significant improvement vs placebo"
      - measure: "P300 latency"
        result: "Significant improvement (intergroup difference)"
    key_findings: |
      - Significant improvement in reaction time and error rates on cognitive tests
      - Enhanced cognitive performance on Sternberg and Stroop tests
      - Intra-group improvement in P300 latency, salivary cortisol, anxiety measures
      - Improvement stabilized after day 15 in placebo group
      - Extract group showed continued improvement
    safety: "No adverse effects; heart rate and skin conductance unchanged"
    quality: "Double-blind RCT with multiple cognitive measures"

  - id: agrawal1996_diabetes
    authors: "Agrawal P, Rai V, Singh RB"
    title: "Randomized placebo-controlled, single blind trial of holy basil leaves in patients with noninsulin-dependent diabetes mellitus"
    journal: "International Journal of Clinical Pharmacology and Therapeutics"
    year: 1996
    volume: "34"
    issue: "9"
    pages: "406-409"
    pmid: "8880292"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/8880292/"
    study_type: "Randomized placebo-controlled crossover trial, single-blind"
    population: "Patients with non-insulin-dependent diabetes mellitus (NIDDM)"
    intervention:
      plant_material: "Holy basil leaves (Ocimum sanctum and Ocimum album)"
      comparator: "Placebo leaves"
    outcomes:
      - measure: "Fasting blood glucose"
        result: "Decreased by 21.0 mg/dl (17.6% reduction)"
        statistic: "p < 0.001"
      - measure: "Postprandial blood glucose"
        result: "Decreased by 15.8 mg/dl (7.3% reduction)"
        statistic: "p < 0.02"
      - measure: "Urine glucose"
        result: "Similar improvement patterns"
      - measure: "Total cholesterol"
        result: "Mild reduction during basil treatment"
    key_findings: |
      - Significant decrease in fasting and postprandial blood glucose
      - 17.6% reduction in fasting glucose (21.0 mg/dl)
      - 7.3% reduction in postprandial glucose (15.8 mg/dl)
      - Potential adjunct to dietary therapy and drug treatment
    recommendations: "Basil leaves may be prescribed as adjunct to dietary therapy and drug treatment in mild to moderate NIDDM"
    quality: "Crossover RCT in diabetic population"

  - id: mondal2011_immunomodulatory
    authors: "Mondal S, Varma S, Bamola VD, Naik SN, Mirdha BR, Padhi MM, Mehta N, Mahapatra SC"
    title: "Double-blinded randomized controlled trial for immunomodulatory effects of Tulsi (Ocimum sanctum Linn.) leaf extract on healthy volunteers"
    journal: "Journal of Ethnopharmacology"
    year: 2011
    volume: "136"
    issue: "3"
    pages: "452-456"
    pmid: "21619917"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/21619917/"
    study_type: "Double-blinded randomized controlled cross-over trial"
    sample_size: 22
    enrollment: 24
    population: "Healthy volunteers"
    intervention:
      dosage: "300 mg capsules"
      duration: "4 weeks"
      formulation: "Ethanolic Tulsi leaf extract"
    immunological_outcomes:
      - measure: "IFN-γ levels"
        result: "Statistically significant increase"
        statistic: "p = 0.039"
      - measure: "IL-4 levels"
        result: "Significant increase"
        statistic: "p = 0.001"
      - measure: "T-helper cells (percentage)"
        result: "Increased"
        statistic: "p = 0.001"
      - measure: "NK-cells (percentage)"
        result: "Increased"
        statistic: "p = 0.017"
    key_findings: |
      - Clear immunomodulatory role demonstrated
      - IFN-γ known for antiviral, antibacterial, anti-proliferative properties
      - Significant increases in both cell-mediated and humoral immunity markers
      - T-helper cells and NK-cells significantly increased
    conclusions: "Observations clearly ascertain the immunomodulatory role of Tulsi leaves extract on healthy volunteers"
    quality: "Double-blind crossover RCT with objective immune markers"

  - id: satapathy2017_metabolic
    authors: "Satapathy S, Das N, Bandyopadhyay D, Mahapatra SC, Sahu DS, Meda M"
    title: "Effect of Tulsi (Ocimum sanctum Linn.) Supplementation on Metabolic Parameters and Liver Enzymes in Young Overweight and Obese Subjects"
    journal: "Indian Journal of Clinical Biochemistry"
    year: 2017
    volume: "32"
    issue: "3"
    pages: "357-363"
    pmid: "28811698"
    pmcid: "PMC5539010"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/28811698/"
    pmc_url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC5539010/"
    study_type: "Randomized, parallel group, open-label pilot study"
    sample_size: 30
    intervention_group: 16
    control_group: 14
    age_range: "17-30 years"
    population: "Overweight/obese subjects"
    intervention:
      dosage: "250 mg capsule twice daily"
      duration: "8 weeks"
      timing: "On empty stomach"
      control: "No intervention"
    metabolic_outcomes:
      - measure: "Triglycerides"
        change: "12.14% decrease"
        statistic: "p = 0.019"
      - measure: "LDL-C"
        change: "11.73% decrease"
        statistic: "p = 0.001"
      - measure: "HDL-C"
        change: "21.74% increase"
        statistic: "p = 0.001"
      - measure: "VLDL-C"
        change: "12.14% decrease"
        statistic: "p = 0.019"
      - measure: "BMI"
        change: "1.98% decrease"
        statistic: "p = 0.005"
      - measure: "Plasma Insulin"
        change: "28.49% decrease"
