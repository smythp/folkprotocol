# NOTES

notes: |
  This bibliography represents a comprehensive review of clinical evidence on saw palmetto (Serenoa repens) as of January 2026. Key findings include:

  1. CONFLICTING EVIDENCE: While earlier studies (1998) suggested benefits for BPH, the most rigorous recent evidence (2023 Cochrane review) finds little to no benefit for BPH symptoms.

  2. ALOPECIA EFFICACY: More consistent positive evidence for androgenetic alopecia, with multiple RCTs showing benefits for hair growth and density.

  3. STANDARDIZATION CRITICAL: β-sitosterol content (2-3% vs 0.2-0.3%) significantly affects efficacy. Liquid formulations contain highest bioactive content.

  4. SAFETY: Excellent safety profile with mild, infrequent adverse events similar to placebo. Lower sexual dysfunction risk than finasteride.

  5. MECHANISM: Primarily works through 5α-reductase inhibition and α1-adrenergic receptor antagonism, reducing DHT levels.

  6. DOSE: Standard dose is 320 mg/day (standardized to 85-95% fatty acids/sterols). Higher doses (up to 960 mg/day) show no additional benefit for BPH.

  7. QUALITY VARIABILITY: Significant variation in commercial products emphasizes need for standardized, quality-assured formulations.

  Clinicians should note the divergence between earlier optimistic findings and recent high-quality evidence showing minimal BPH benefits, while remaining aware of potential benefits for hair loss conditions.
