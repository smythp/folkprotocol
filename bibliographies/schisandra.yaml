  excretion:
    routes: "Bile, feces, urine"
    amount: "Very low amounts typically excreted"

  drug_delivery_considerations:
    challenges: "Poor solubility and extensive first-pass metabolism limit oral bioavailability"
    solutions: "Advanced drug delivery systems to enhance therapeutic efficacy"

