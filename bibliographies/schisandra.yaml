        note: "Applies to all tested schisandra lignans"
      bioavailability:
        cmax_auc: "5-50 times higher in females vs males"
        exception: "Schisantherin A showed comparable levels"
      repeated_dosing:
        result: "Comparable PK profiles between single and multiple doses in both sexes"
        exception: "γ-schisandrin showed slower elimination in females after repeated administration"
      conclusion: "Female rats exhibited slower elimination and higher bioavailability of schisandra lignans compared to males"
      clinical_relevance: "Sex-dependent pharmacokinetics may require dose adjustments based on patient sex"

