  - id: ehambarampillai_2025
    title: "A comprehensive review of Schisandra chinensis lignans: pharmacokinetics, pharmacological mechanisms, and future prospects in disease prevention and treatment"
    authors:
      - Ehambarampillai, Danushiya
      - Wan, Murphy Lam Yim
    year: 2025
    journal: Chinese Medicine
    pubmed_id: "40205412"
    pubmed_url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC11984061/"
    study_type: comprehensive_systematic_review
    articles_analyzed: 168
    key_lignans_reviewed:
      - Schisandrin
      - Schisandrin A
      - Schisandrin B
      - Schisandrin C
      - Gomisin A
      - Gomisin B
      - Gomisin C
      - Gomisin K3
    pharmacokinetics:
      absorption:
        sites: "Duodenum and jejunum (primary); colon and rectum (secondary)"
        bioavailability_challenges: "Poor water solubility; extensive first-pass metabolism"
      distribution:
        primary_organs: "Liver and kidneys"
        secondary_organs: "Lungs, heart, spleen"
        bbb_penetration: "Schisandrin and Schisandrin A cross blood-brain barrier"
      bioavailability_sex_differences:
        - compound: Schisandrin B
          female_rats: "55.0%"
          male_rats: "19.3%"
          note: "Significant sex-dependent variation"
      metabolism:
        pathways: "Phase I: demethylation and hydroxylation"
        enzymes: "CYP3A4, CYP2C9"
      excretion:
        routes: "Bile, feces, urine"
        amount: "Very low amounts typically excreted"
      physicochemical_properties:
        solubility: "Poorly soluble"
        lipophilicity: "Moderate to high (consensus LogP 3.53-4.40)"
    pharmacological_activities:
      - Antioxidant
      - Anti-inflammatory
      - Neuroprotective
      - Hepatoprotective
      - Antibacterial and antiviral
      - Antidiabetic
      - Anticancer
    limitations: "Human clinical trial data remain limited; bioavailability challenges require advanced drug delivery systems"

