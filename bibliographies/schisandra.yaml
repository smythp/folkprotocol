systematic_reviews_meta_analyses:
  - id: huang_2025
    title: "Efficacy of Schisandra chinensis in liver injury: a systematic review and preclinical meta-analysis"
    authors:
      - Huang, Bo-Hao
      - Lv, Bo-Han
      - Wu, Dong-Jie
      - Xiong, Fei-Yang
      - Li, Yan-Bo
      - Lu, Yan-Ping
      - Lv, Wen-Liang
    year: 2025
    journal: Frontiers in Pharmacology
    pubmed_url: "https://www.frontiersin.org/journals/pharmacology/articles/10.3389/fphar.2025.1627081/full"
    doi: "10.3389/fphar.2025.1627081"
    study_type: systematic_review_preclinical_meta_analysis
    databases_searched: 8
    studies_included: 54
    total_animals: 1314
    animal_models:
      - "C57BL/6 mice (13 studies)"
      - "ICR mice (20 studies)"
      - "Kunming rats (5 studies)"
      - "Sprague-Dawley rats (6 studies)"
      - "BALB/c mice (1 study)"
      - "Wistar rats (1 study)"
    liver_injury_models:
      - Acetaminophen-induced
      - CCl4-induced
      - D-galactosamine-induced
      - Ethanol-induced
    key_findings:
      liver_enzyme_reduction:
        - metric: ALT_reduction
          smd: -4.74
          ci_95: "[-5.42, -4.06]"
          p_value: "<0.001"
          heterogeneity_i2: "90.8%"
        - metric: AST_reduction
          smd: -5.10
          ci_95: "[-5.84, -4.37]"
          p_value: "<0.001"
          heterogeneity_i2: "91.7%"
        - metric: ALP_reduction
          smd: -3.11
          ci_95: "[-4.86, -1.37]"
          p_value: "<0.001"
          heterogeneity_i2: "87.0%"
      oxidative_stress_markers:
        - metric: SOD_increase
          smd: 4.37
          ci_95: "[3.38, 5.37]"
          p_value: "<0.001"
          heterogeneity_i2: "89.3%"
        - metric: MDA_decrease
          smd: -3.42
          ci_95: "[-4.16, -2.69]"
          p_value: "<0.001"
          heterogeneity_i2: "89.7%"
        - metric: GSH_increase
          smd: 3.07
          ci_95: "[2.35, 3.80]"
          p_value: "<0.001"
          heterogeneity_i2: "84.0%"
      inflammatory_markers:
        - metric: TNF_alpha_reduction
          smd: -2.85
          ci_95: "[-3.73, -1.96]"
          p_value: "<0.001"
          heterogeneity_i2: "76.3%"
        - metric: IL6_reduction
          smd: -3.30
          ci_95: "[-4.43, -2.17]"
          p_value: "<0.001"
          heterogeneity_i2: "86.7%"
        - metric: IL1_beta_reduction
          smd: -2.41
          ci_95: "[-3.75, -1.07]"
          p_value: "<0.001"
          heterogeneity_i2: "85.4%"
      conclusion: "Schisandra chinensis bioactive compounds significantly reduced liver injury markers across multiple animal models"
      limitations: "High heterogeneity; limited human clinical trial data"

