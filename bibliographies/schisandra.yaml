pharmacokinetic_studies:
  - id: xin_2007
    title: "Effects of Schisandra sphenanthera extract on the pharmacokinetics of tacrolimus in healthy volunteers"
    authors:
      - Xin, Hua-Wen
      - Wu, Xiao-Chun
      - Li, Qing
      - Yu, Ai-Rong
      - Zhu, Min
      - Shen, Yang
      - Su, Dan
      - Xiong, Lei
    year: 2007
    journal: British Journal of Clinical Pharmacology
    volume: 64
    issue: 4
    pages: "469-475"
    pubmed_id: "17506780"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/17506780/"
    doi: "10.1111/j.1365-2125.2007.02672.x"
    study_type: pharmacokinetic_drug_interaction_study
    sample_size:
      total: 12
      population: "Healthy male volunteers"
    intervention:
      extract: "Schisandra sphenanthera extract (SchE)"
      dose: "Three capsules twice daily"
      duration: "13 days"
      substrate_drug: "Tacrolimus 2 mg oral"
    pharmacokinetic_outcomes:
      - metric: AUC increase
        result: "164.2%"
        ci_95: "[70.1, 258.4]"
      - metric: Cmax increase
        result: "227.1%"
        ci_95: "[155.8, 298.4]"
      - metric: Tmax increase
        result: "36.8%"
        ci_95: "[13.4, 60.2]"
      - metric: CL/F decrease
        result: "49.0%"
        ci_95: "[31.1, 66.9]"
      - metric: V/F decrease
        result: "53.7%"
        ci_95: "[40.1, 67.4]"
    mechanism:
      enzymes_affected:
        - CYP3A
        - P-glycoprotein (P-gp)
      interaction_type: Inhibition
    clinical_significance: "Schisandra extract increases tacrolimus oral bioavailability via inhibition of P-gp-mediated efflux and CYP3A-mediated metabolism"
    safety_implications: "Blood tacrolimus concentrations occasionally markedly increased in transplant recipients receiving concomitant SchE; monitoring required"

