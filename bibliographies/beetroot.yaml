# BIOAVAILABILITY AND PHARMACOKINETICS

bioavailability:
  nitrate:
    - source: "Cooked beetroot"
      bioavailability: "106±15%"
      note: "Near-complete absorption"
    - source: "Beetroot juice and whole beetroot"
      bioavailability: "~100%"
      note: "Nitrate from vegetables absorbed very effectively"

  betanin:
    - source: "Beetroot juice (300 mL)"
      urinary_excretion: "0.5-0.9% of ingested betacyanins in 12h"
      note: "Limited absorption but detectable"

  key_references:
    - "The plasma bioavailability of nitrate and betanin from Beta vulgaris rubra in humans - PMC (https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5346430/)"
    - "The oral bioavailability of nitrate from nitrate-rich vegetables in humans - PubMed (https://pubmed.ncbi.nlm.nih.gov/18723086/)"

