# MECHANISMS OF ACTION

mechanisms:
  primary:
    - pathway: "NO3-/NO2-/NO pathway"
      detail: "Dietary nitrate → salivary nitrite → nitric oxide"
      effects: "Vasodilation, blood pressure reduction, improved blood flow"

  nitrate_independent:
    - compounds: "Polyphenols, betalains, betanin"
      effects: "Blood pressure lowering independent of nitrate content"
      evidence: "Nitrate-depleted beetroot juice shows weaker but present effects"
      reference: "https://pubmed.ncbi.nlm.nih.gov/29141968/"

  secondary_effects:
    - "Improved mitochondrial efficiency"
    - "Enhanced parasympathetic modulation"
    - "Reduced oxygen cost of exercise"
    - "Potential insulin sensitivity improvement"

