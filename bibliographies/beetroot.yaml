# NOTES

notes:
  - "Beetroot is well-studied for cardiovascular health and athletic performance"
  - "Primary mechanism via nitrate → nitrite → nitric oxide pathway"
  - "Secondary nitrate-independent mechanisms via polyphenols and betalains"
  - "Generally safe with minimal adverse effects (mainly beeturia)"
  - "Most robust evidence for blood pressure reduction and exercise endurance"
  - "Cognitive effects remain unclear - acute benefits possible, chronic benefits not established"
  - "Not included in WHO or Commission E monographs - primarily a food/supplement"
  - "Dosing: 200-800 mg nitrate/day (70-250 mL juice) for cardiovascular; 316-985 mg for performance"
  - "Near-complete bioavailability of nitrate from beetroot (~100%)"
  - "Limited absorption of betanin (<1% urinary excretion)"
  - "Some concerns about exceeding acceptable daily nitrate intake with high consumption"
