  general_supplementation:
    extract_dose: "20g/day standardized extract"
    duration: "Up to 12 weeks studied"
    safety_profile: "Well tolerated in older adults"

# SAFETY PROFILE

safety:
  adverse_events:
    serious: "None reported in clinical trials"
    minor:
      - "Beeturia (reddish urine/stool coloring) - benign pigmentation effect"
      - "Flu-like symptoms (unrelated to beetroot consumption)"

  concerns:
    - issue: "May exceed acceptable daily nitrate intake"
      detail: "Can stimulate endogenous N-nitroso compounds (NOCs) formation"
      note: "NOCs are carcinogenic, but risk appears minimal with vegetable-source nitrate"
      reference: "https://pubmed.ncbi.nlm.nih.gov/32292042/"

    - issue: "Breath-hold diving/swimming safety"
      detail: "Beetroot-induced vasodilation may counteract normal cardiovascular responses"
      population: "Breath-hold athletes, military training"
      reference: "https://pubmed.ncbi.nlm.nih.gov/38997903/"

  general_tolerance:
    - "Nitrate from vegetables generally considered safe"
    - "No serious adverse events in 12-week supplementation study"
    - "No significant changes in anthropometric, biochemical, or hemodynamic measurements"
    - "Safe in older adults, hypertensive patients, athletes"

