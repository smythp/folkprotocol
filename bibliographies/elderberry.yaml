    key_findings:
      common_cold:
        - "Elderberry may not reduce the risk of developing the common cold"
        - "May reduce duration and severity of colds, but evidence is uncertain"
      influenza:
        - "Elderberry may reduce the duration of influenza but evidence is uncertain"
        - "Compared to oseltamivir, elderberry-containing product may be associated with lower risk of influenza complications and adverse events"
      safety:
        - "No evidence that it overstimulates the immune system"
        - "No studies directly linked elderberry to clinical inflammatory outcomes"
        - "Some effect on inflammatory markers, although this effect may decline with ongoing supplementation"
      conclusion: "Elderberry may be a safe option for treating viral respiratory illness, but stronger evidence from recent studies is needed"

