# Safety and Toxicology

safety_profile:
  general_safety:
    - "Elderberry generally considered safe for short-term use in adults"
    - "Adverse events in clinical studies rare, typically mild"
    - "Adverse events occur less frequently than in placebo groups"
    - "No serious adverse events reported in reviewed trials"
    sources:
      - "https://pubmed.ncbi.nlm.nih.gov/33827515/"
      - "https://pubmed.ncbi.nlm.nih.gov/30670267/"

  toxicology_concerns:
    raw_plant_parts:
      - "Bark, root, and leaves contain cyanogenic glycoside sambunigrin"
      - "Potentially toxic due to possible cyanide release"
      - "Contact may lead to cyanide poisoning"
      - "Use cautiously in patients with CNS disorders due to potential CNS depression from cyanide poisoning"
    berries:
      - "Cooked berries do not carry cyanide poisoning risk"
      - "Unripe berries contain toxic constituents and should be avoided"
    allergic_reactions:
      - "Elderberry preparations have rarely caused allergic reactions"
    source: "https://www.ncbi.nlm.nih.gov/books/NBK501835/"

  pregnancy_and_lactation:
    pregnancy:
      - "No animal or human studies of safety in pregnancy identified"
      - "EMA does not recommend use during pregnancy due to lack of information"
      - "Health care personnel should not advise pregnant women to use elderberry against upper respiratory tract infections"
    lactation:
      - "No data exist on excretion of elderberry components into breastmilk"
      - "No data on safety and efficacy in nursing mothers or infants"
      - "No recommendations can be made on use of medicinal doses during breastfeeding"
      - "EMA does not recommend use during lactation due to lack of information"
    sources:
      - "https://www.ncbi.nlm.nih.gov/books/NBK501835/"
      - "https://pmc.ncbi.nlm.nih.gov/articles/PMC3941201/"

  drug_interactions:
    diabetes_medications:
      risk: "May increase risk of hypoglycemia"
      mechanism: "Based on in vitro research"
      affected_drugs:
        - "Insulin"
        - "Metformin"
        - "Sulfonylureas"
      significance: "Minor/significance unknown"
    other_interactions:
      - "No known severe, serious, or moderate interactions"
      - "Mild interactions with at least 28 different drugs"
    source: "https://reference.medscape.com/drug/american-black-elder-elderberry-344473"

