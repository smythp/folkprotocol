# Randomized Controlled Trials (RCTs)

randomized_controlled_trials:
  - title: "Randomized study of the efficacy and safety of oral elderberry extract in the treatment of influenza A and B virus infections"
    authors:
      - Z Zakay-Rones
      - E Thom
      - T Wollan
      - J Wadstein
    year: 2004
    pmid: "15080016"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/15080016/"
    full_text_link: "https://journals.sagepub.com/doi/10.1177/147323000403200205"
    journal: "Journal of International Medical Research"
    study_type: "Randomized, Double-Blind, Placebo-Controlled Trial"
    location: "Norway"
    season: "1999-2000 influenza season"
    sample_size: 60
    age_range: "18-54 years"
    intervention:
      product: "Elderberry syrup"
      dose: "15 ml four times daily"
      duration: "5 days"
      comparison: "Placebo syrup"
    primary_outcomes:
      symptom_relief: "Symptoms relieved on average 4 days earlier in elderberry group compared to placebo"
      rescue_medication: "Significantly less rescue medication use in elderberry group versus placebo"
    conclusion: "Elderberry extract seems to offer an efficient, safe and cost-effective treatment for influenza"

  - title: "Elderberry Supplementation Reduces Cold Duration and Symptoms in Air-Travellers: A Randomized, Double-Blind Placebo-Controlled Clinical Trial"
    authors:
      - Evelin Tiralongo
      - Shirley S Wee
      - Rodney A Lea
    year: 2016
    pmid: "27023596"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/27023596/"
    full_text_link: "https://pmc.ncbi.nlm.nih.gov/articles/PMC4848651/"
    journal: "Nutrients"
    study_type: "Randomized, Double-Blind, Placebo-Controlled Trial"
    sample_size:
      total: 312
      elderberry: 158
      placebo: 154
    population: "Air travellers"
    dosing_regimen:
      priming_phase:
        duration: "10 days pre-travel"
        dose: "600 mg daily (2 capsules)"
      travel_phase:
        duration: "1 day pre-travel through 4-5 days post-arrival"
        dose: "900 mg daily (3 capsules)"
      standardization:
        polyphenols: "22%"
        anthocyanins: "15%"
        anthocyanin_dose_range: "90-135 mg daily"
    treatment_duration: "15-16 days total"
    primary_outcomes:
      cold_episode_days:
        placebo: 117
        elderberry: 57
        p_value: 0.02
      average_symptom_score:
        placebo: 583
        elderberry: 247
        p_value: 0.05
      mean_duration:
        placebo: "6.88 days"
        elderberry: "4.75 days"
        reduction: "Approximately 2 days shorter"
      symptom_severity:
        placebo: "34 mean score"
        elderberry: "21 mean score"

  - title: "Elderberry Extract Outpatient Influenza Treatment for Emergency Room Patients Ages 5 and Above: a Randomized, Double-Blind, Placebo-Controlled Trial"
    authors:
      - Michael Macknin
      - Kathy Wolski
      - Jeffrey Negrey
      - Sharon Mace
    year: 2020
    pmid: "32929634"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/32929634/"
    full_text_link: "https://pmc.ncbi.nlm.nih.gov/articles/PMC7661609/"
    journal: "Journal of General Internal Medicine"
    study_type: "Randomized, Double-Blind, Placebo-Controlled Trial"
    sample_size:
      total: 87
      placebo: 44
      elderberry: 43
    age_range: "5 years and above (children 5-12, adults ≥13)"
    dosing_regimen:
      children_5_12: "15 ml twice daily for 5 days"
      adults_13_plus: "15 ml four times daily for 5 days"
    duration: "5 days"
    primary_outcomes:
      time_to_symptom_alleviation:
        placebo: "4.9 ± 2.8 days"
        elderberry: "5.3 ± 3.6 days"
        p_value: 0.57
        significance: "Not significantly different"
    secondary_outcomes:
      time_to_complete_resolution:
        placebo: "8.7 ± 3.9 days"
        elderberry: "8.6 ± 3.9 days"
        p_value: 0.87
        significance: "Not significantly different"
    post_hoc_analysis:
      elderberry_alone: "7.3 ± 3.4 days"
      placebo_alone: "5.1 ± 3.4 days"
      p_value: 0.02
      note: "Elderberry alone took significantly longer than placebo alone"
    adverse_events:
      most_common:
        - "Dry mouth (5.7%)"
        - "Constipation (4.6%)"
        - "Rash (4.6%)"
        - "Bad taste (3.4%)"
      significance: "No significant differences between groups"
    conclusion: "No evidence that elderberry benefits the duration or severity of influenza"
    note: "Conflicts with earlier positive RCTs; highlights need for additional research"

  - title: "Inhibition of several strains of influenza virus in vitro and reduction of symptoms by an elderberry extract (Sambucus nigra L.) during an outbreak of influenza B Panama"
    authors:
      - Z Zakay-Rones
      - N Varsano
      - M Zlotnik
      - O Manor
      - L Regev
      - M Schlesinger
      - M Mumcuoglu
    year: 1995
    pmid: "9395631"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/9395631/"
    journal: "Journal of Alternative and Complementary Medicine"
    study_type: "Randomized, Double-Blind, Placebo-Controlled Trial"
    setting: "Agricultural community (kibbutz) during influenza B/Panama outbreak"
    product: "Sambucol (SAM)"
    in_vitro_findings:
      - "Elderberry extract reduced hemagglutination and inhibited replication of multiple influenza strains"
      - "Activity demonstrated against influenza A and B types plus animal strains"
    in_vivo_findings:
      improvement_within_2_days:
        elderberry: "93.3% of cases showed significant improvement including fever"
        placebo: "91.7% showed improvement within 6 days"
        p_value: "<0.001"
      complete_recovery:
        elderberry: "Approximately 90% within 2-3 days"
        placebo: "At least 6 days required"

# Bioavailability and Pharmacokinetics Studies

pharmacokinetics_studies:
  - title: "Absorption and excretion of elderberry (Sambucus nigra L.) anthocyanins in healthy humans"
    authors:
      - T Frank
      - M Janssen
      - G Netzet
      - B Christian
      - I Bitsch
      - M Netzel
    year: 2007
    pmid: "18040528"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/18040528/"
    journal: "Molecular Nutrition & Food Research"
    study_type: "Controlled Clinical Trial"
    sample_size: 6
    population: "Healthy volunteers"
    dosing:
      low_dose: "30 ml elderberry extract (278 mg total anthocyanins)"
      high_dose: "200 ml elderberry extract (1852 mg total anthocyanins)"
      administration: "Single oral dose"
    pharmacokinetic_parameters:
      urinary_excretion_7h:
        low_dose: "0.39% of administered dose"
        high_dose: "0.27% of administered dose"
      elimination_half_life:
        low_dose: "1.85 hours"
        high_dose: "2.57 hours"
      renal_clearance:
        low_dose: "196 ml/min"
        high_dose: "169 ml/min"
    conclusion: "Compounds exhibited low bioavailability based on dose-normalized AUC and urinary recovery data"

  - title: "Bioavailability of anthocyanidin-3-glycosides following consumption of elderberry extract and blackcurrant juice"
    authors:
      - I Bitsch
      - M Janssen
      - M Netzel
      - G Strass
      - T Frank
    year: 2004
    pmid: "15176653"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/15176653/"
    journal: "International Journal of Food Sciences and Nutrition"
    study_type: "Clinical Trial (Exploratory Pilot)"
    sample_size: 6
    population: "Healthy volunteers"
    dosing:
      blackcurrant_juice: "137 ml (144.8 mg total anthocyanins)"
      elderberry_extract: "30 ml (147.3 mg total anthocyanins)"
    bioavailability_data:
      urinary_excretion_7h:
        blackcurrant: "0.04% of administered dose"
        elderberry: "0.37% of administered dose"
      comparative_bioavailability:
        cmax_fold_increase: "5.3-fold higher for elderberry vs blackcurrant"
        auc_fold_increase: "6.2-fold higher for elderberry vs blackcurrant"
      half_life:
        elderberry: "1.74 hours"
        blackcurrant: "1.73 hours"
        significance: "No significant difference"
    note: "Elderberry showed significantly better bioavailability compared to blackcurrant"

  - title: "Urinary Excretion of Cyanidin Glucosides and Glucuronides in Healthy Humans After Elderberry Juice Ingestion"
    authors:
      - Roland Bitsch
      - Michael Netzel
      - Susanne Sonntag
      - Gabriele Strass
      - Thomas Frank
      - Irmgard Bitsch
    year: 2004
    pmid: "15577200"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/15577200/"
    full_text_link: "https://pmc.ncbi.nlm.nih.gov/articles/PMC1082892/"
    journal: "Food Research International"
    study_type: "Pilot Study"
    sample_size: 7
    demographics: "6 females, 1 male"
    dosing: "150 ml elderberry juice concentrate containing 3.57 g total anthocyanins (single bolus)"
    urinary_excretion_5h:
      glucosidically_bound_cyanidins: "0.053% of administered dose"
      cyanidin_glucuronide: "0.003% of ingested anthocyanin glucosides"
    key_findings:
      - "Minimal anthocyanin bioavailability through urinary recovery"
      - "Conversion to glucuronidated forms negligible"
      - "Metabolic transformation to glucuronides has minimal significance in urinary elimination pathways"

  - title: "Absorption and metabolism of anthocyanins in elderly women after consumption of elderberry or blueberry"
    authors:
      - Xianli Wu
      - Guohua Cao
      - Ronald L Prior
    year: 2002
    pmid: "12097661"
    pubmed_link: "https://pubmed.ncbi.nlm.nih.gov/12097661/"
    journal: "Journal of Nutrition"
    study_type: "Human Absorption and Metabolism Study"
    sample_size: 10
    population: "Elderly women"
    dosing:
      elderberry: "12 g extract (720 mg total anthocyanins)"
      blueberry: "189 g lowbush blueberry (690 mg total anthocyanins)"
    urinary_excretion:
      elderberry: "0.077% of intake within 4 hours"
      blueberry: "0.004% of intake within 6 hours"
      plasma_detection: "Anthocyanin levels undetectable in blueberry consumers using standard methods"
    metabolic_findings:
      - "First documented evidence of in vivo methylation of cyanidin to peonidin in humans"
      - "First documented evidence of glucuronide conjugate formation in humans"
      - "Two major anthocyanins identified: cyanidin-3-glucoside and cyanidin-3-sambubioside"
      - "Four metabolites identified in urine using HPLC-MS/MS"

