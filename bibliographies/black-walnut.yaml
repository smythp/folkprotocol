# Summary Points
summary:
  clinical_evidence:
    - "CRITICAL GAP: No human RCTs identified for any therapeutic indication of Juglans nigra"
    - "No systematic reviews or meta-analyses specific to Juglans nigra in humans"
    - "One allergen characterization study used human sera (n=25 DBPCFC-confirmed allergy patients): Jug n 4 bound IgE in 32% of subjects"
    - "Traditional anthelmintic use is the only approved indication (Health Canada 2022); evidence base is traditional use only"
    - "All mechanistic/efficacy evidence is in vitro (juglone, tannins, polyphenols)"

  key_phytochemistry:
    - "Principal bioactive: juglone (5-hydroxy-1,4-naphthoquinone) — antimicrobial, antifungal, cytotoxic, Pin1-inhibitory"
    - "Secondary bioactives: ellagitannins, gallotannins (~45% in bark/rind), flavonoids, ellagic acid, fatty acids"
    - "161 compounds tentatively identified in hull/bark/leaf by UHPLC-HR-MS/MS (Osztie 2024)"
    - "Juglone predicted bioavailable via passive GI absorption (PAMPA, Osztie 2024); BBB-penetrant in silico"

  safety:
    - "Juglone is Ames test positive (mutagenic with metabolic activation) at 1.25–2.5 μmol/L (Erisen 2020)"
    - "IC50 in mouse fibroblasts: 60 μmol/L at 48h (Erisen 2020)"
    - "Health Canada: consult practitioner beyond 14 days; no long-term use"
    - "Contact dermatitis well-documented from hull handling; internal use GI effects at higher doses"
    - "Contraindicated in pregnancy/lactation across all sources"
    - "HIGH TANNIN CONTENT (~45%) is a significant drug interaction risk"
    - "No DILI cases reported in literature; hepatotoxicity risk theoretical but not documented in humans"

  bioavailability:
    - "No human PK data available for any black walnut preparation"
    - "PAMPA predicts passive GI absorption for juglone (Osztie 2024)"
    - "Rat in vivo: ~40–50% oral absorption; glucuronidation/reduction as primary metabolic pathways; renal covalent binding at higher doses (Chen 2006)"
    - "Free juglone plasma t½ ~2 hours; liposomal encapsulation gives 12-fold improvement (Aithal 2011) — commercial preparations contain free juglone"
    - "EMA notes juglone degrades in gastric acid in aqueous preparations (J. regia data)"
    - "Tannin-protein complexation in GI tract may reduce juglone bioavailability in whole-hull preparations"

  regulatory_status:
    - "Health Canada NHPID (2022): traditional vermifuge/anthelmintic — ONLY official regulatory monograph for J. nigra"
    - "No WHO monograph for Juglans nigra"
    - "No Commission E monograph for Juglans nigra"
    - "No EMA/HMPC monograph for Juglans nigra"
    - "No USP/NF monograph for black walnut hull"
    - "All J. regia (English walnut) monographs cover LEAF for topical use; NOT applicable to J. nigra hull"

