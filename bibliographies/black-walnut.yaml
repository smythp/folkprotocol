      Commission E evaluated English walnut leaf (J. regia) but not black walnut (J. nigra).
      The related J. regia approval covers external topical use only.

  - authority: "European Medicines Agency (EMA) / HMPC"
    title: "No EU herbal monograph exists for Juglans nigra"
    status: "Not evaluated"
    related_document: "EMA/HMPC/346737/2011 — Final Assessment Report for Juglans regia L. folium (English walnut leaf)"
    url: "https://www.ema.europa.eu/en/documents/herbal-report/final-assessment-report-juglans-regia-l-folium_en.pdf"
    note: >
      EMA/HMPC published an assessment for J. regia leaf but not J. nigra. The J. regia
      monograph covers traditional use for minor inflammatory skin conditions and excessive
      perspiration. Not applicable to black walnut hull.

  - authority: "ESCOP (European Scientific Cooperative on Phytotherapy)"
    title: "Juglandis folium (Walnut leaf) monograph — Juglans regia only"
    status: "Juglans nigra not covered"
    note: >
      ESCOP published a monograph for Juglandis folium from Juglans regia covering minor
      inflammatory skin conditions and excessive perspiration. Constituents include
      ellagitannin-type tannins, flavonoids, diarylheptanoids, juglone derivatives,
      anthraquinones, and oligomeric proanthocyanidins. Cross-species applicability to
      J. nigra unconfirmed.

  - authority: "World Health Organization (WHO)"
    title: "No WHO monograph for Juglans nigra"
    status: "Not evaluated"
    note: "WHO monographs do not cover Juglans nigra. No WHO pharmacopoeia entry identified."

  - authority: "United States Pharmacopeia (USP) / National Formulary"
    title: "No USP/NF monograph for black walnut hull"
    status: "Not listed"
    note: >
      No USP or NF quality standard for black walnut hull identified.
      FDA classifies walnut as GRAS as a food ingredient; this applies to the nut meat
      and does not constitute therapeutic approval for hull preparations.

# Dosing Information
dosing_information:
  regulatory_dose:
    - source: "Health Canada NHPID (2022)"
      preparation: "Unripe hull — dry, powder, or non-standardized ethanolic extract (tincture, fluid extract, dry extract)"
      dose: "0.65–2.75 g/day"
      frequency: "Not specified (occasional use)"
      duration: "Maximum 14 days without practitioner oversight"
      population: "Adults 18+"

  traditional_and_commercial_dosing:
    - preparation: "Liquid extract 1:2 (green hull)"
      dose_range: "1.5–5.5 mL/day"
      source: "Southern Cross University / Australian naturopathic herbalism"
      note: "Traditional practitioner dosing; not clinically validated"
    - preparation: "Tincture 1:4 at 25% ethanol"
      dose: "5–10 drops, 3× daily"
      weekly_max: "10–15 mL/week"
      cycling: "2 weeks on / 2 weeks off"
      source: "Naturopathic herbalist tradition"
      note: "Practitioner-only in some jurisdictions due to mutagenicity concerns"
    - preparation: "Fresh plant liquid extract 1:1 (green hull)"
      dose: "1–10 drops, 1–3× daily in water"
      source: "Traditional Western herbalism; practitioner use"
      note: "Most potent form; restricted to trained practitioners"
    - preparation: "Infusion (bark or leaf)"
      dose: "30 g dried material in 500 mL water; 200 mL 3× daily"
      source: "SCU monograph; traditional use"

  standardization:
    primary_markers: "Juglone (naphthoquinone), ellagic acid, total tannin content"
    typical_tannin_content: "~45% tannin in bark/rind (high tannin matrix)"
    standardization_note: >
      No pharmacopoeial standardization exists for black walnut hull preparations.
      Commercial products are not standardized to juglone content due to juglone's
      instability and toxicity concerns. Health Canada explicitly permits
      'non-standardized' ethanolic extracts only.

  bioavailability_note: >
    No human pharmacokinetic studies measuring plasma juglone concentrations or
    tannin metabolite profiles after oral black walnut hull preparations are available.
    In vitro PAMPA data (Osztie 2024) predicts juglone crosses GI epithelial and BBB
    membranes via passive diffusion. Rat in vivo data (Chen 2006) show ~40–50% oral
    bioavailability in rodents; juglone is metabolized primarily via glucuronidation and
    reduction; plasma half-life is ~2 hours (Aithal 2011); renal covalent binding occurs
    at higher doses (Chen 2006). EMA assessment data for J. regia leaf infusions indicate
    juglone is present at ~0.1% and is degraded in acidic gastric environments, potentially
    limiting systemic bioavailability in aqueous preparations. The combination of short
    plasma half-life (~2h) and acid lability suggests that commercial hull preparations
    may deliver substantially less systemic juglone than rat-model extrapolations predict.

# Safety Studies and Toxicology
safety_studies:
  - citation:
      authors: "Erisen S, Arasoğlu T, Mansuroglu B, Kocacaliskan İ, Derman S"
      title: "Cytotoxic and mutagenic potential of juglone: a comparison of free and nano-encapsulated form"
      journal: "Archives of Industrial Hygiene and Toxicology"
      year: 2020
      pmid: "32597139"
      url: "https://pubmed.ncbi.nlm.nih.gov/32597139/"
    safety_data:
      mutagenicity: "Positive (Ames test, TA98, with S9 metabolic activation) at 1.25–2.5 μmol/L"
      cytotoxicity_ic50: "60 μmol/L in L929 mouse fibroblasts at 48h (free juglone)"
      mutagenicity_mechanism: "Requires metabolic activation (S9); suggests bioactivation by CYP enzymes to mutagenic intermediates"
      nano_form: "Nano-encapsulated juglone: no mutagenicity, reduced cytotoxicity — but not used in commercial preparations"

  known_safety_concerns:
    - concern: "Juglone mutagenicity"
      evidence_level: "In vitro (Ames test)"
      detail: "Free juglone is mutagenic with metabolic activation; theoretical carcinogenic risk with long-term internal use"
    - concern: "High tannin content"
      detail: "~45% tannin in bark/rind; excessive tannin intake can impair kidney/liver function; reduces oral drug absorption (take 1+ hours apart from medications)"
    - concern: "Contact dermatitis"
      detail: "Well-documented occupational/handling dermatitis from fresh hull; juglone stains skin and causes irritation"
    - concern: "Cardiovascular depression"
      detail: "Large doses may sedate cardiac function; relevant at doses well above traditional use"
    - concern: "GI irritation"
      detail: "Nausea, vomiting, watery diarrhea possible at higher doses; cathartic/purgative action"
    - concern: "Tannin-drug interaction"
      detail: "Tannins bind and reduce absorption of co-administered oral medications; clinical significance at therapeutic doses"

  contraindications_consensus:
    - "Pregnancy and lactation (contraindicated across all traditional and regulatory sources)"
    - "Chronic GI conditions (colitis, Crohn's, IBS)"
    - "Concurrent oral medication use without separation by ≥1 hour (tannin-drug binding)"
    - "Long-term use without practitioner oversight (mutagenicity risk)"

  safety_duration_consensus: "All regulatory and traditional sources agree on limiting use to 14 days to 6 weeks maximum without practitioner oversight"

# Key Research Gaps
research_needs:
  - "Human pharmacokinetic studies: plasma juglone Cmax, Tmax, half-life, and urinary metabolite profiles after oral hull preparations"
  - "Dose-finding clinical trials for anthelmintic/antiparasitic indications (traditional use not clinically validated)"
  - "Human genotoxicity data for juglone at doses achievable from typical hull preparations (translate Ames data to human exposure context)"
  - "Controlled clinical trials for antifungal applications (e.g., Candida, dermatophytes) — substantial in vitro evidence not followed by human trials"
  - "Long-term safety data (carcinogenicity, hepatotoxicity) at therapeutic doses in humans"
  - "Standardized preparation development with validated juglone content and stability data"
  - "Drug interaction studies: quantification of tannin effects on specific oral medications"
