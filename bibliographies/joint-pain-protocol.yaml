        url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC9654013/"
      - title: "Ginger extract suppresses the activations of NF-κB and Wnt pathways and protects inflammatory arthritis"
        pmc_id: "PMC10176230"
        url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC10176230/"

