head_to_head_comparisons:
  - id: curcumin_vs_ibuprofen_2014
    title: "Curcumin vs ibuprofen for knee osteoarthritis"
    authors:
      - Kuptniratsaikul, et al.
    year: 2014
    study_type: randomized_controlled_trial
    intervention:
      curcumin: "2000 mg/day"
      ibuprofen: "800 mg/day"
    condition: "Knee osteoarthritis"
    key_findings:
      efficacy: "Curcumin comparable in efficacy to ibuprofen"
      conclusion: "Direct comparison showing equivalence to NSAID"
    source: "Referenced in multiple systematic reviews"

  - id: glucosamine_chondroitin_vs_nsaid
    study_type: clinical_trials
    comparison: "Glucosamine with chondroitin vs NSAIDs (ibuprofen)"
    key_findings:
      efficacy: "Nearly equal to ibuprofen in reducing moderate to severe pain"
      conclusion: "Non-herbal supplement comparison establishing benchmark"
    source: "Multiple lifestyle medicine reviews"

  - id: aflapin_vs_other_boswellia_2024
    title: "Boswellia formulations comparative effectiveness"
    authors:
      - Dubey, et al.
    year: 2024
    study_type: systematic_review
    trials_included: 9
    participants: 712
    key_findings:
      aflapin_superiority:
        product: "Aflapin® (highly bioavailable BSE)"
        vas_pain:
          mean_difference: "-16.09 mm"
        womac_pain:
          mean_difference: "-18.68"
        womac_function:
          mean_difference: "-14.99"
        womac_stiffness:
          mean_difference: "-14.25"
      conclusion: "Aflapin significantly outperformed other Boswellia formulations"
    source: "Referenced in lifestyle medicine reviews"

individual_herbs_mechanisms:
  turmeric_curcumin:
    species: "Curcuma longa"
    active_compounds:
      primary: "Curcumin (diferuloylmethane)"
      curcuminoids:
        - "Curcumin"
        - "Demethoxycurcumin"
        - "Bisdemethoxycurcumin"
    mechanism_of_action:
      nf_kb_pathway:
        - "Inhibits TLR4 pathway and downstream NF-κB signaling"
        - "Inhibits IL-1β-induced NF-κB activation through suppression of IκBα phosphorylation"
        - "Suppresses IκBα degradation"
        - "Inhibits IκBα kinase activity"
        - "Suppresses NF-κB-dependent gene products (COX-2)"
        - "Reduces nuclear protein expression of NF-κB subunit p65"
      cox2_inhibition:
        - "Directly inhibits COX-2 enzyme"
        - "Reduces pro-inflammatory prostaglandin production"
        - "Modulates inflammation and discomfort"
      cartilage_protection:
        - "Reduces joint inflammation"
        - "Alleviates pain symptoms"
        - "Anti-inflammatory and cartilaginous protective effects"
        - "Prevents decrease in cartilage-specific proteins (collagen II, CSPG, Sox9)"
        - "Reduces NF-kB-driven inflammatory proteins (MMP-9, Cox-2, Caspase-3)"
      additional_pathways:
        - "Inhibits MAPK pathway"
        - "Inhibits NLRP3 inflammasome"
        - "Activates Nrf2 antioxidant pathway"
        - "Involves PI-3K/Akt pathway"
    bioavailability:
      challenge: "Poor bioavailability of standard curcumin"
      solutions:
        - "Modified formulations with enhanced absorption"
        - "Combination with black pepper (piperine)"
        - "Phytosome technology"
    clinical_evidence:
      safety: "Significantly less GI adverse events than NSAIDs"
      efficacy: "Comparable to NSAIDs for pain relief"
    mechanism_studies:
      - title: "Anti-Inflammatory Effects of Curcumin in the Inflammatory Diseases: Status, Limitations and Countermeasures"
        pmc_id: "PMC8572027"
        url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC8572027/"
      - title: "Curcumin Modulates Nuclear Factor κB (NF-κB)-mediated Inflammation in Human Tenocytes in Vitro"
        pmc_id: "PMC3151097"
        url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC3151097/"
      - title: "Curcumin Attenuates Environment-Derived Osteoarthritis by Sox9/NF-kB Signaling Axis"
        url: "https://www.mdpi.com/1422-0067/22/14/7645"
      - title: "Regulation mechanism of curcumin mediated inflammatory pathway and its clinical application"
        journal: "Frontiers in Pharmacology"
        url: "https://www.frontiersin.org/journals/pharmacology/articles/10.3389/fphar.2025.1642248/full"

  boswellia:
    species: "Boswellia serrata"
    common_names:
      - "Indian frankincense"
      - "Shallaki"
    active_compounds:
      primary: "Boswellic acids"
      most_active: "AKBA (3-O-acetyl-11-keto-beta-boswellic acid)"
    mechanism_of_action:
      five_lox_inhibition:
        - "Potent 5-Lipoxygenase (5-LOX) inhibitors"
        - "Nonredox inhibition mechanism"
        - "AKBA is most potent 5-LOX inhibitor"
        - "Inhibits leukotriene biosynthesis from arachidonic acid"
        - "Reduces LTB4 levels significantly"
      cox2_inhibition:
        - "Inhibits cyclooxygenase (COX)-2"
        - "Reduces prostaglandin E2 (PGE2) levels"
      dual_pathway:
        - "Dual inhibition of COX and 5-LOX pathways"
        - "Additive therapeutic effects"
        - "Improved safety vs COX inhibitors alone"
      cartilage_protection:
        - "Relieves OA joint pain through inhibition of inflammatory processes"
        - "Inhibits cartilage degeneration"
        - "Protects transcription factor SOX-9 (maintains chondrocyte homeostasis)"
        - "Provides cartilage protection in experimental OA"
    formulations:
      standard: "Standard boswellia extract"
      enhanced:
        - "5-Loxin® (enriched AKBA)"
        - "Aflapin® (highly bioavailable, superior outcomes)"
    mechanism_studies:
      - title: "Boswellia serrata Extract, 5-Loxin®, Prevents Joint Pain and Cartilage Degeneration"
        pmc_id: "PMC9605825"
        url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC9605825/"
      - title: "An Anti-Inflammatory Composition of Boswellia serrata Resin Extracts Alleviates Pain and Protects Cartilage"
        pmc_id: "PMC7261341"
        url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC7261341/"
      - title: "Therapeutic potential of Boswellia serrata in arthritis management: mechanistic insights into COX-2, 5-LOX, and NFĸB modulation"
        journal: "Inflammopharmacology"
        url: "https://link.springer.com/article/10.1007/s10787-025-01912-w"

  ginger:
    species: "Zingiber officinale"
    active_compounds:
      primary:
        - "6-gingerol"
        - "8-gingerol"
        - "10-gingerol"
        - "6-shogaol"
        - "8-shogaol"
        - "10-shogaol"
    mechanism_of_action:
      cox_inhibition:
        - "Inhibits cyclooxygenase-2 (COX-2)"
        - "Inhibits lipoxygenase (LOX)"
        - "Reduces prostaglandin E2 (PGE2) production"
        - "Reduces leukotriene production"
        - "Inhibits both COX-1 and COX-2"
      tnf_alpha_suppression:
        - "Inhibits tumor necrosis factor (TNF)-α production"
        - "Reduces TNF-α gene expression"
        - "6-gingerol inhibits iNOS and TNF production"
      nf_kb_pathway:
        - "Suppresses IκBα phosphorylation"
        - "Inhibits NF-κB activation"
        - "Blocks NF-κB p65 phosphorylation, nuclear translocation, and transcriptional activity"
        - "6-shogaol blocks LPS-mediated IκBα phosphorylation and degradation"
      inflammatory_cytokines:
        - "Inhibits interleukin-1β (IL-1β)"
        - "Reduces IL-6"
        - "Reduces IL-17"
        - "Suppresses pro-inflammatory transcription factor (NF-κB)"
