clinical_evidence_grade: |
  DUAL PROFILE — Strong evidence of harm; limited evidence for therapeutic use.

  HARM EVIDENCE: Strong (multiple systematic reviews, IARC Group 1 monographs, prospective
  cohort data). Carcinogenicity, oral submucous fibrosis, metabolic syndrome, and dependence
  all well-established in human populations.

  THERAPEUTIC EVIDENCE: Limited and historical. The primary human clinical data for therapeutic
  application is the arecoline IV infusion series in Alzheimer's disease (1981–1996), involving
  small samples (n=9–15) with a short-term IV route not applicable to oral supplementation.
  No RCTs of standardized oral areca nut extract for any therapeutic indication identified.
  The BENIT trial (n=176) is the largest RCT directly involving areca nut — focused on cessation.

key_bioactive_markers:
  alkaloids:
    - arecoline: primary psychoactive/therapeutic/toxic alkaloid; muscarinic + nicotinic agonist
    - arecaidine: hydrolysis product of arecoline; also genotoxic
    - guvacoline: minor alkaloid, weaker activity
    - guvacine: GABA uptake inhibitor; CNS depressant component
  polyphenols:
    - proanthocyanidins (arecatannin, proanthocyanidin A and B): antioxidant, antimicrobial
    - catechins: antioxidant
    - gallic acid: antioxidant, antimicrobial
  fatty_acids:
    - lauric acid, myristic acid, palmitic acid, oleic acid (in fat fraction ~14–18%)

pharmacopoeial_dosing:
  tcm_general: "3–10 g dried seed (decoction) — Chinese Pharmacopoeia 2020"
  tcm_anthelmintic: "30–60 g dried seed (single dose for tapeworm) — Chinese Pharmacopoeia 2020"
  arecoline_hbr_veterinary: "40 mg oral (dogs) for tapeworm; historical human anthelmintic dose not established"
  arecoline_iv_alzheimers: "4–16 mg/day continuous IV infusion (individually optimized) — research setting only"
  standardization_marker: "Arecoline ≥0.20% (w/w) by HPLC per Chinese Pharmacopoeia 2020"

safety_summary:
  carcinogenicity: "Areca nut (whole nut): IARC Group 1 — sufficient evidence in humans. Arecoline: IARC Group 2A — probable human carcinogen"
  oral_toxicity: "Oral LD50 (rats): ~100 mg/kg for arecoline. Cholinergic side effects at sub-lethal doses"
  dependence: "Dependence criteria met in ~34% of habitual users; SDS score 7.3; no approved pharmacotherapy"
  hepatotoxicity: "Rare; isolated case reports; LiverTox likelihood score D (possible)"
  reproductive: "Low birth weight and preterm labour associations in epidemiological data"
  chronic_use: "Oral submucous fibrosis in habitual chewers; malignant transformation rate 2.3–7.6%"
  therapeutic_window: "Dose-dependent: low doses (traditional TCM range) may carry lower risk; no validated safe therapeutic dose established for non-traditional populations"
