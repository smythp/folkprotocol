    study_type: systematic_review_meta_analysis
    key_findings:
      - "Pooled odds ratio for type 2 diabetes: OR = 1.45 (95% CI: 1.30–1.62) for current/ex-chewers vs never-chewers"
      - "Dose-response trend: longer duration and higher frequency of chewing → greater diabetes risk"
      - "Arecoline's GABA receptor antagonism implicated in pancreatic β-cell dysfunction"
      - "Metabolic syndrome components (central obesity, hypertriglyceridaemia, hyperglycaemia) all elevated in chewers"
      - "Confounding by tobacco co-use acknowledged but OR remains significant in tobacco-free chewer subgroup"
