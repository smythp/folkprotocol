    study_type: toxicokinetics_review
    key_findings:
      - "Arecoline rapidly absorbed orally; peak plasma concentration in <30 min in animal models"
      - "Extensive first-pass metabolism: hydrolysis to arecaidine (also genotoxic) via CES1 and plasma esterases"
      - "Additional metabolic pathways: N-oxidation (FMO3), glutathionylation, nitrosamine formation"
      - "Genotoxicity: clastogenic effects in multiple in vitro and in vivo assays; DNA strand breaks, micronuclei"
      - "Arecaidine (hydrolysis product): DNA cross-linking and strand-break activity comparable to arecoline"
      - "Guvacoline and guvacine: weaker activity; less well-studied toxicokinetics"
      - "Human pharmacokinetic data sparse; extrapolation from animal models carries significant uncertainty"

