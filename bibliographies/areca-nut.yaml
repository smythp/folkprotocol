herb: areca-nut
botanical_name: Areca catechu L.
common_names:
  - areca nut
  - betel nut
  - pinang (Malay/Indonesian)
  - supari (Hindi)
  - bing lang (Chinese, 槟榔)
  - kramuk (Sanskrit)
family: Arecaceae

notes: |
  CRITICAL SAFETY DISTINCTION: Areca nut (Areca catechu seed) is classified by IARC as a
  Group 1 human carcinogen (Vol. 85, 2004) — causing oral, pharyngeal, and esophageal cancers.
  Arecoline, its primary alkaloid, is classified Group 2B (possibly carcinogenic, IARC Vol. 128,
  2021). This applies to the nut itself, regardless of tobacco co-use. Consumed by ~600 million
  people globally, it is the fourth most widely used psychoactive substance after tobacco, alcohol,
  and caffeine. In traditional medicine (TCM, Ayurveda), low-dose areca nut preparations have
  documented anthelmintic, gastrointestinal, and antidepressant uses. Modern clinical research
  primarily documents harm (oral submucous fibrosis, cancers, metabolic syndrome, dependence),
  with a smaller body of research investigating potential therapeutic applications of arecoline
  (notably cholinergic effects in Alzheimer's disease). The Chinese Pharmacopoeia has included
  areca nut since 1953.

