  # ─── PHARMACOKINETICS & TOXICOKINETICS ───────────────────────────────────────

  - id: marques_2021_genetic_toxicology
    title: "Genetic toxicology and toxicokinetics of arecoline and related areca nut compounds: an updated review"
    authors:
