  # ─── SYSTEMATIC REVIEWS & META-ANALYSES ──────────────────────────────────────

  - id: yunus_2024_diabetes_meta_analysis
    title: "Type 2 diabetes associated with areca nut usage: A systematic review and meta-analysis"
    authors:
      - Yunus, Md Nazmul
      - et al.
    year: 2024
    journal: Diabetes Research and Clinical Practice
    pubmed_id: "38428680"
