      conclusion: "CoQ10 effective for migraine prophylaxis with excellent safety profile"

comparative_effectiveness_studies:
  - id: butterbur_vs_placebo_rct_2004
    title: "Petasites hybridus root (butterbur) is an effective preventive treatment for migraine"
    authors:
      - Lipton, RB
      - Göbel, H
      - Einhäupl, KM
      - Wilks, K
      - Mauskop, A
    year: 2004
    journal: Neurology
    pubmed_id: "15623680"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/15623680/"
    doi: "10.1212/01.wnl.0000147290.68260.11"
    study_type: randomized_controlled_trial
    design: "Three-arm, parallel-group, randomized trial"
    sample_size: 245
    intervention:
      group_1: "Petasites extract 75 mg bid"
      group_2: "Petasites extract 50 mg bid"
      group_3: "Placebo bid"
    duration: "4 months"
    key_findings:
      petasites_75mg:
        reduction: "48%"
        p_value: "0.0012 vs placebo"
        interpretation: "Highly effective"
      petasites_50mg:
        reduction: "36%"
        p_value: "0.127 vs placebo"
        interpretation: "Non-significant trend"
      placebo:
        reduction: "26%"
      recommendation: "American Headache Society level A recommendation (effective for migraine prevention)"
      safety_concern: "AAN stopped recommending in 2015 due to hepatotoxicity concerns"

  - id: feverfew_comparative_evidence
    title: "Feverfew comparative effectiveness summary"
    study_type: comparative_summary
    key_findings:
      efficacy: "Weak to modest effects as monotherapy"
      comparison_to_butterbur: "No direct head-to-head trial found"
      evidence_level: "Insufficient scientific evidence of efficacy established to date"
      safety: "Very safe profile"
      conclusion: "Safer than butterbur but less effective; may work better in combinations"

  - id: herbal_comparative_summary_2024
    title: "Migraine Management Using Feverfew, Butterbur, Peppermint, and Ginger: Perspectives of Pharmacy Students"
    year: 2024
    journal: European Journal of Theoretical and Applied Sciences
    url: "https://ejtas.com/index.php/journal/article/view/779"
    study_type: comparative_review
    herbs_compared:
      - Feverfew
      - Butterbur
      - Peppermint
      - Ginger
    key_findings:
      butterbur: "Historically strongest evidence for prevention but safety concerns limit use"
      feverfew: "Modest and inconsistent effects as monotherapy"
      ginger: "Shows promise for acute treatment but limited evidence overall"
      peppermint: "Effective for topical/aromatherapy application"

  - id: feverfew_ginger_combination_rct
    title: "A double-blind placebo-controlled pilot study of sublingual feverfew and ginger (LipiGesic™ M) in the treatment of migraine"
    year: 2011
    pubmed_id: "21631494"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/21631494/"
    study_type: randomized_double_blind_placebo_rct
    intervention: "Sublingual feverfew + ginger combination"
    sample_size: "Not specified (pilot study)"
    key_findings:
      pain_relief_2h:
        feverfew_ginger: "63%"
        placebo: "39%"
        p_value: "0.002"
        interpretation: "Significantly superior to placebo"
      conclusion: "Combination of feverfew and ginger provides acute migraine relief"
      note: "Sublingual delivery may enhance bioavailability"

  - id: feverfew_willow_combination_rct
    title: "Tanacetum parthenium and Salix alba (Mig-RL) combination in migraine prophylaxis: a prospective, open-label study"
    year: 2006
    pubmed_id: "17163262"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/17163262/"
    study_type: prospective_open_label
    sample_size: 12
    diagnosis: "Migraine without aura"
    intervention:
      composition:
        - "Feverfew (Tanacetum parthenium) 300 mg"
        - "White willow (Salix alba) 300 mg"
      dosing: "Twice daily"
      duration: "12 weeks"
    key_findings:
      attack_frequency_6wk:
        reduction: "57.2%"
        responders: "9 out of 10 patients"
      attack_frequency_12wk:
        reduction: "61.7%"
      conclusion: "Remarkable efficacy in reducing migraine attack frequency, pain intensity, and duration"
      recommendation: "Warrants further investigation in double-blind, randomized, placebo-controlled trials"

  - id: herbamig_combination_observational
    title: "HERBAMIG in the prevention of migraine headaches: results of a study based on real-life data"
    year: 2024
    url: "https://www.openaccessjournals.com/articles/herbamig-in-the-prevention-of-migraine-headaches-results-of-a-study-based-on-reallife-data-17995.html"
    study_type: observational_clinical_followup
    sample_size: 302
    location: France
    duration: "3 months"
    intervention:
      name: "HERBAMIG"
      composition:
        - "90 mg feverfew"
        - "150 mg willow bark"
        - "40 mg coenzyme Q10"
        - "15 mg riboflavin"
