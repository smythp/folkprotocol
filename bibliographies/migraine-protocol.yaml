mechanism_studies:
  feverfew_parthenolide:
    - id: parthenolide_trpa1_mechanism
      title: "Parthenolide inhibits nociception and neurogenic vasodilatation in the trigeminovascular system by targeting the TRPA1 channel"
      year: 2013
      pubmed_id: "23933184"
      pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/23933184/"
      pmc_id: "PMC3843982"
      pmc_url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC3843982/"
      active_compound: Parthenolide
      mechanisms:
        trpa1_targeting:
          - "Parthenolide acts as TRPA1 partial agonist"
          - "Causes selective channel desensitization"
          - "Non-selective defunctionalization of CGRP-containing sensory neurons"
        cgrp_inhibition:
          - "Inhibits CGRP release from trigeminal neurons"
          - "Inhibits CGRP-mediated meningeal vasodilatation"
        serotonin_effects:
          - "Greatly reduces platelet aggregation response to serotonin"
          - "Potent inhibitor of serotonin release from platelets"
          - "Noncompetitive inhibition of serotonin-mediated smooth muscle response"
        anti_inflammatory:
          - "Inhibits nuclear factor-kappaB (NF-κB)"
          - "Binds and inhibits IκB kinase complex (IKK) β"
          - "Reduces proinflammatory cytokine-mediated signaling"
          - "Trans-chrysanthenyl acetate inhibits prostaglandin synthetase"

  butterbur_petasites:
    - id: petasites_mechanisms_2022
      title: "Petasites for Migraine Prevention: New Data on Mode of Action, Pharmacology and Safety"
      year: 2022
      journal: Frontiers in Neurology
      pmc_id: "PMC9108977"
      pmc_url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC9108977/"
      pubmed_id: "35585841"
      pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/35585841/"
      active_compounds: "Petasins (sesquiterpene esters of petasol and angelic acid)"
      mechanisms:
        leukotriene_inhibition:
          - "Decreases prostaglandin E2 (PGE2)"
          - "Decreases leukotriene B4 (LTB4)"
          - "Decreases cysteinyl-leukotrienes (LTs)"
          - "Blocks intracellular calcium influx into neutrophils and eosinophils"
          - "Inhibits leukotriene biosynthesis"
        cox2_inhibition:
          - "Inhibits cyclooxygenase-2 (COX-2) activity"
          - "Decreases leukotriene synthesis"
          - "Decreases prostaglandin E2 release"
