      dosing: "One capsule daily"
    key_findings:
      conclusion: "Effectively reduces the frequency, intensity, and duration of migraines"
      quality_of_life: "Significantly improved patients' quality of life"
      note: "Real-world effectiveness data from clinical practice"

  - id: coriander_syrup_rct
    title: "Effects of Coriandrum sativum Syrup on Migraine: A Randomized, Triple-Blind, Placebo-Controlled Trial"
    year: 2016
    pubmed_id: "26889386"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/26889386/"
    pmc_id: "PMC4752800"
    pmc_url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC4752800/"
    study_type: randomized_triple_blind_placebo_rct
    sample_size: 68
    diagnosis: Migraineurs
    intervention:
      coriander_group:
        - "15 mL Coriander fruit syrup three times daily"
        - "Plus 500 mg sodium valproate per day"
      placebo_group:
        - "Placebo syrup"
        - "Plus 500 mg sodium valproate per day"
      duration: "One month"
    key_findings:
      duration: "Decreased (P < 0.001)"
      severity: "Decreased (P < 0.001)"
      frequency: "Decreased (P < 0.001)"
      conclusion: "Coriander fruit syrup as prophylactic treatment shows efficacy"
      note: "Positive preliminary findings warrant further investigation"

  - id: chamomile_topical_rct
    title: "Evaluation of the effect of topical chamomile (Matricaria chamomilla L.) oleogel as pain relief in migraine without aura: a randomized, double-blind, placebo-controlled, crossover study"
    year: 2018
    pubmed_id: "29808331"
    pubmed_url: "https://pubmed.ncbi.nlm.nih.gov/29808331/"
    study_type: randomized_double_blind_placebo_crossover
    sample_size: 100
    intervention: "Chamomile oleogel applied topically"
    control: "Placebo oleogel"
    key_findings:
      pain_relief: "Efficacious for alleviating migraine pain"
      associated_symptoms: "Controlled nausea, vomiting, light and sound sensitivity"
      conclusion: "Chamomile effective for migraine without aura as acute treatment"

  - id: lavender_prophylaxis_rct
    title: "Effect of lavender essential oil as a prophylactic therapy for migraine: A randomized controlled clinical trial"
    year: 2016
    journal: ScienceDirect
    url: "https://www.sciencedirect.com/science/article/abs/pii/S2210803316300033"
    study_type: randomized_double_blind_placebo_rct
    duration: "3 months"
    intervention: "Lavender essential oil aromatherapy"
    key_findings:
      midas_score: "Significantly reduced (P < 0.05) compared to baseline and control group"
      side_effects: "No complaints or adverse effects reported"
      conclusion: "Lavender effective as prophylactic therapy for migraine"

  - id: coq10_female_migraine_rct
    title: "Efficacy of coenzyme Q10 for the prevention of migraine in women: A randomized, double-blind, placebo-controlled study"
    year: 2017
    journal: ScienceDirect
    url: "https://www.sciencedirect.com/science/article/abs/pii/S1876382017301828"
    study_type: randomized_double_blind_placebo_rct
    sample_size: 84
    diagnosis: "Women with episodic migraine"
    intervention:
      coq10_group: "400 mg/day CoQ10"
      placebo_group: "Placebo"
      duration: "Not specified"
      background: "Plus usual prophylactic drugs"
    key_findings:
      frequency_reduction: "-56.7% vs -41.9% (CoQ10 vs placebo)"
      severity_reduction: "-46.6% vs -30.1% (CoQ10 vs placebo)"
      duration_reduction: "-60.0% vs -37.8% (CoQ10 vs placebo)"
      conclusion: "Significant effect of CoQ10 on frequency, severity, and duration of attacks"

  - id: intranasal_peppermint_rct
    title: "Comparing the Effect of Intranasal Lidocaine 4% with Peppermint Essential Oil Drop 1.5% on Migraine Attacks: A Double-Blind Clinical Trial"
    year: 2019
    pmc_id: "PMC6647908"
    pmc_url: "https://pmc.ncbi.nlm.nih.gov/articles/PMC6647908/"
    study_type: double_blind_clinical_trial
    intervention_comparison:
      group_1: "Intranasal lidocaine 4%"
      group_2: "Intranasal peppermint essential oil 1.5%"
    key_findings:
      intensity_reduction: "Considerable reduction in both groups"
      frequency_reduction: "Considerable reduction in both groups"
      comparison: "Peppermint oil effects similar to lidocaine treatment"
      conclusion: "Peppermint oil viable alternative to lidocaine for acute migraine"

