herbs:

  # CARMINATIVES (Gas/Bloating Reduction)

  - name: "Peppermint"
    latin_name: "Mentha × piperita"
    category: "Carminative, Anti-spasmodic"

    mechanisms:
      - type: "Calcium channel blockade"
        description: "Menthol blocks calcium channels in smooth muscle cells, preventing muscle contraction"
        evidence: "In vitro/in vivo"

      - type: "Smooth muscle relaxation"
        description: "Antispasmodic effect relaxes digestive tract muscles, alleviating cramping, bloating, and gas"
        evidence: "Clinical"

      - type: "Gas expulsion"
        description: "Carminative properties help expel gas, reducing abdominal pressure and discomfort"
        evidence: "Traditional/clinical"

    active_compounds:
      - "Menthol"
      - "Menthone"

    studies:
      - finding: "Peppermint oil markedly attenuated contractile responses in guinea pig taenia coli to acetylcholine, histamine, 5-HT, and substance P"
        model: "Guinea pig taenia coli"

      - finding: "Potential-dependent calcium currents in rabbit jejunum smooth muscle cells were inhibited in concentration-dependent manner"
        model: "Rabbit jejunum (whole cell clamp)"
        effect: "Similar to dihydropyridine calcium antagonists"

      - finding: "Menthol reduces calcium influx in intestinal smooth-muscle cells, easing spasms and allowing gas movement"
        model: "Intestinal smooth muscle"

    references:
      - "PMC8601825 - Antispasmodic Potential of Medicinal Plants"
      - "PMC6539827 - Antispasmodic Effect of Essential Oils"

  - name: "Fennel"
    latin_name: "Foeniculum vulgare"
    category: "Carminative, Anti-spasmodic"

    mechanisms:
      - type: "Gas expulsion"
        description: "Volatile oils provide potent carminative effects that help expel gas from intestinal tract"
        evidence: "Traditional/clinical"

      - type: "Smooth muscle relaxation"
        description: "Acts as antispasmodic, relaxing smooth muscles to ease painful cramping"
        evidence: "In vitro/in vivo"

      - type: "Bile stimulation"
        description: "Relaxes smooth muscles and stimulates bile flow, reducing pain during digestion"
        evidence: "Clinical"

    active_compounds:
      - "Anethole"
      - "Fenchone"
      - "Estragole"

    references:
      - "Multiple sources on carminative herbs"

  - name: "Ginger"
    latin_name: "Zingiber officinale"
    category: "Carminative, Prokinetic, Anti-inflammatory"

    mechanisms:
      - type: "Digestive enzyme stimulation"
        description: "Stimulates production of digestive enzymes and bile, aiding food breakdown and reducing gas formation"
        evidence: "Clinical"

      - type: "Gastric motility enhancement"
        description: "Enhances gastric motility, providing relief from fullness and bloating"
        evidence: "Clinical trials"

      - type: "Prokinetic action"
        description: "Accelerates gastric emptying and stimulates antral contractions"
        evidence: "Human clinical trials"

      - type: "Anti-inflammatory"
        description: "Inhibits prostaglandin and leukotriene biosynthesis; reduces TNF, IL-6, GM-CSF, MCP-1"
        evidence: "In vitro/in vivo"

    active_compounds:
      - "Gingerols"
      - "Shogaols (6-s, 8-s, 10-s)"

    studies:
      - finding: "Accelerates gastric emptying and stimulates antral contractions in healthy volunteers"
        model: "Human clinical trial"
        reference: "PMC3016669"

      - finding: "Ginger-turmeric combination synergistically attenuated TNF, IL-6, GM-CSF, MCP-1"
        model: "RAW 264.7 cells"
        reference: "Frontiers Pharmacology 2022"

      - finding: "No irritant effect on gastric mucosa; selectively reduces inflammatory cytokines with no interference with essential immunity"
        evidence: "Clinical/in vivo"

      - finding: "2015 study on Prodigest (artichoke + ginger) showed significant improvement in delayed gastric emptying"
        model: "Human clinical trial"

    references:
      - "PMC3016669 - Effect of ginger on gastric motility and functional dyspepsia"
      - "Frontiers Pharmacology 2022 - Synergistic inhibition of pro-inflammatory pathways"
      - "PMC9229778 - Synergistic anti-inflammatory activity"

  # BITTERS (Digestive Stimulation)

  - name: "Gentian"
    latin_name: "Gentiana lutea"
