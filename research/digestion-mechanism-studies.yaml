        model: "Rabbit jejunum"

      - type: "Potassium channel activation"
        description: "Activates K⁺ channels, causing smooth muscle relaxation; effect blocked by 4-aminopyridine"
        evidence: "In vitro"

      - type: "Histamine/ACh antagonism"
        description: "Inhibits spasm induced by histamine and acetylcholine"
        evidence: "In vitro"
        model: "Guinea pig ileum"

    active_compounds:
      - "Bisabolol (sesquiterpene)"
      - "Flavonoids"

    studies:
      - finding: "Crude extract produced significant antispasmodic effect on isolated rabbit jejunum"
