        reference: "Frontiers Pharmacology 2022"

    references:
      - "Frontiers Pharmacology 2022; PMC9160922"
      - "PMC9229778 - Synergistic anti-inflammatory activity"
      - "NCBI Books NBK92752 - Turmeric, the Golden Spice"

