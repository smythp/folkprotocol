# GENERAL MECHANISMS ACROSS CATEGORIES

general_mechanisms:

  carminatives:
    primary_action: "Gas expulsion and smooth muscle relaxation"
    compounds: "Volatile oils (essential oils)"
    effects:
      - "Relax digestive tract muscles"
      - "Ease gas passage"
      - "Support digestive function"
      - "Stimulate GI muscle contractions and peristalsis"
      - "Ease bloating and dispel excess gas"

  bitters:
    primary_action: "Digestive secretion stimulation"
    receptor: "T2R (bitter taste receptors) in GI tract"
    cascade:
      - "Tongue receptors → vagus nerve → brain"
      - "Gastrin release"
      - "HCl, pepsin, bile, pancreatic enzyme secretion"
      - "Enhanced satiety and gut motility regulation"

  anti_spasmodics:
    primary_action: "Smooth muscle relaxation"
    mechanisms:
      calcium_channel_blockade: "Inhibits voltage-dependent Ca²⁺ channels → reduced Ca²⁺ influx → less contraction"
      potassium_channel_activation: "Opens K⁺ channels → hyperpolarization → calcium channel deactivation → relaxation"
      intracellular_cAMP: "Modulates cAMP levels"
    general_principle: "Activation of voltage-gated K⁺ channels → membrane hyperpolarization → Ca²⁺ channel deactivation → smooth muscle relaxation"

  anti_inflammatories:
    primary_action: "Reduce GI inflammation"
    pathways:
      - "COX-2 inhibition (↓ prostaglandins)"
      - "NF-κB pathway inhibition"
      - "Cytokine suppression (TNF, IL-6, GM-CSF, MCP-1)"
      - "TLR4/TRAF6/JNK/c-JUN pathway inhibition"
      - "Nrf2/HO-1 enhancement (antioxidant)"
    note: "Ginger effective comparable to NSAIDs but fewer GI side effects"

  prokinetics:
    primary_action: "Enhance gut motility and gastric emptying"
    mechanisms:
      - "Serotonin receptor interaction"
      - "Migrating motor complex (MMC) enhancement"
      - "Antral contraction stimulation"
      - "Multi-pathway motility enhancement"

  microbiome_modulators:
    primary_action: "Prebiotic fermentation and SCFA production"
    bioavailability: "5-10% absorbed in small intestine; 90-95% reaches colon"
    effects:
      - "Stimulate SCFA-producing bacteria"
      - "Increase butyrate, acetate, propionate"
      - "Enhance gut barrier integrity"
      - "Immune modulation (Treg induction)"
      - "Metabolic regulation"
    key_bacteria: "Faecalibacterium, Eubacterium, Roseburia, Blautia"

  gut_brain_axis:
    primary_pathways:
      - "Vagus nerve (parasympathetic)"
      - "Enteric nervous system (ENS)"
      - "Neuroendocrine system"
      - "Immune system"
      - "Circulatory system (metabolites, hormones)"
    key_molecules:
      - "Serotonin (90% from gut EC cells)"
      - "SCFAs"
      - "Neuroactive substances from microbiota"
    communication: "Bidirectional: gut → brain via vagus; brain → gut via autonomic nervous system"

